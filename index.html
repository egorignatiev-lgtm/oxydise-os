"Fasting period", "Internal education notes"], "rows": [["After 24 hours", "Liver glycogen becomes depleted and fat oxidation begins; insulin drops; ketones rise; autophagy starts; growth hormone rises to help preserve lean tissue."], ["After 48 hours", "Ketones become a more dominant fuel; deeper autophagy may clear damaged proteins and organelles; immune-cell recycling begins; systemic inflammation may reduce in some people."], ["After 72 hours", "Stem-cell activity may increase in gut and immune tissues; immune regeneration may accelerate; refeeding becomes critical and should be handled carefully."]]}, {"type": "prose", "text": ["Customer-safe position: fasting is a personalised nutrition/medical topic. Encourage people to work with a qualified clinician or nutrition professional, especially if they have any medical condition or medication use."]}, {"type": "h2", "text": "12. Growth factors and useful biological language", "id": "12"}, {"type": "prose", "text": ["Colleagues do not need to be molecular biologists, but a few terms help them understand the research and speak confidently with educated customers."]}, {"type": "xtable", "head": ["Term", "Plain-English meaning", "Why it matters"], "rows": [["VEGF - vascular endothelial growth factor", "A signal that stimulates new blood vessel formation, called angiogenesis.", "Important for oxygen and nutrient delivery, wound healing, exercise adaptation and tissue recovery. It can also be hijacked by cancers, so use carefully."], ["BDNF - brain-derived neurotrophic factor", "A brain-support factor involved in neuroplasticity: neurons growing, surviving and forming new connections.", "Relevant to learning, memory, mood, brain fog and exercise/cold/fasting discussions."], ["PDGF - platelet-derived growth factor", "A repair signal released by platelets at injury sites.", "Relevant to collagen synthesis, tissue repair, wound healing and PRP conversations."], ["HIF-1 alpha", "A low-oxygen signalling pathway.", "Important for understanding hypoxia, cancer microenvironments and the hyperoxic-hypoxic paradox."], ["PGC-1 alpha", "A regulator of mitochondrial biogenesis.", "Useful in mitochondrial-efficiency conversations."], ["Cytokines", "Immune signalling molecules involved in inflammation and repair.", "Useful for discussing pressure research and chronic vs acute inflammation."]]}, {"type": "callout", "k": "Big picture", "text": "VEGF = blood supply. BDNF = brain wiring. PDGF = repair scaffold."}, {"type": "h2", "text": "13. Testing, microbiome, bloods and DNA methylation", "id": "13"}, {"type": "prose", "text": ["Testing helps move a customer from guessing to measurable baselines. It also reinforces the Oxydise position: advanced wellness should be guided, thoughtful and individual rather than random stacking of devices."]}, {"type": "xtable", "head": ["Area", "Purpose", "Core points", "Careful wording"], "rows": [["Microbiome testing", "Find gut-driven issues that can hold clients back.", "Gut health influences nutrient absorption, body composition, energy and recovery. Dysbiosis may contribute to inflammation, poor sleep and cognitive dips.", "“This can guide personalised nutrition, but a qualified professional should interpret results.”"], ["Blood testing", "Get data before recommending interventions.", "Can check hormones, CRP/inflammation, liver strain, metabolic markers, B12, vitamin D, ferritin and training stress.", "“Test what is real rather than guessing.”"], ["DNA methylation", "Understand biological age and epigenetic patterns.", "Shows how lifestyle, sleep, stress and environment may be influencing gene expression over time.", "“This is not genetics; it is how genes are being expressed, and it can be influenced.”"], ["Peptides", "Advanced regenerative/performance topic.", "Customers may ask due to biohacking content. This is medical/regulated territory.", "Do not recommend or prescribe. Refer to qualified clinicians."]]}, {"type": "callout", "k": "Rapid one-liners for colleagues", "text": "Microbiome: fix the gut environment, and everything else may work better. Bloods: treat what is real, not what is guessed. DNA methylation: understand biological ageing and build longer-term plans. HBOT: oxygen plus pressure supports recovery capacity. Red Light: a mitochondrial light signal for circulation and repair support."}, {"type": "h2", "text": "14. Evidence map and studies", "id": "14"}, {"type": "callout", "k": "Evidence rule", "text": "This is not a full literature review. The aim is to give colleagues enough context to understand the direction of the science without overclaiming. Podcasts and documentaries are not primary evidence."}, {"type": "xtable", "head": ["Study / resource", "What it supports", "How to use carefully"], "rows": [["UHMS indications", "HBOT is established standard care for specific medical indications such as decompression sickness, carbon monoxide poisoning, selected diabetic wounds and delayed radiation injury.", "Does not prove home wellness HBOT treats every condition. Use to understand medical roots."], ["Thom et al. stem cell mobilisation", "HBOT mobilised stem/progenitor cells from bone marrow in a nitric-oxide-dependent mechanism.", "Mechanism education only; not guaranteed regeneration."], ["Hachmo et al. 2020", "Repeated HBOT in healthy ageing adults was associated with telomere length increases and lower senescent immune-cell markers.", "Important but not a universal anti-ageing promise."], ["Zilberman-Itskovich et al. 2022", "Randomised sham-controlled post-COVID study reported improvements in neurocognitive and symptom measures.", "Does not mean every Long COVID case responds or that home protocols are identical."], ["Hadanny et al. 2020", "HBOT in healthy older adults was associated with cognitive enhancement and regional cerebral blood-flow changes.", "Does not prove dementia prevention."], ["de Freitas & Hamblin 2016", "PBM mechanisms include mitochondrial chromophores and downstream signalling.", "Does not mean every device/dose is effective."], ["Huang et al. 2011", "Biphasic dose response in low-level light therapy.", "Supports “more is not always better”."], ["Glen Jeffery / UCL 670 nm eye study", "Morning 670 nm exposure improved colour contrast sensitivity in a small older-adult study.", "Do not generalise to all panels or advise eye treatment."], ["Wunsch & Matuschka 2014", "Red and NIR light supported skin appearance and collagen-related outcomes in a controlled trial.", "Not instant cosmetic transformation."], ["PEMF reviews", "PEMF is studied as a non-invasive modality in musculoskeletal, pain and recovery contexts.", "Evidence varies by indication, device, waveform, dose and study quality."], ["Hydrogen water reviews", "Molecular hydrogen is studied for oxidative stress, inflammation and metabolic/exercise outcomes.", "Emerging and mixed. Avoid cure-style or detox claims."], ["Grounding reviews", "Grounding is discussed in relation to sleep, pain, inflammation and autonomic markers.", "Evidence is debated and often based on small studies. Oxydise should not sell it."], ["Brain PBM / Neuro Gamma research", "Transcranial/intranasal PBM is studied for brain energy, blood flow, oscillations and cognitive/neurological contexts.", "Device-specific and not a medical treatment claim."]]}, {"type": "h2", "text": "15. Podcast and video library", "id": "15"}, {"type": "callout", "k": "Library rule", "text": "Podcasts, YouTube videos and documentaries are for colleague education and pattern recognition. They are not primary evidence. If a video makes a strong claim, colleagues should look for the study behind it before using the claim with customers."}, {"type": "callout", "k": "Website structure note", "text": "The previously manual-check podcast/video links have been split into the same 15.1 to 15.6 categories as the original library. On the website, each resource card should show: title, speaker/channel, why watch, claim-risk flag and suggested audience."}, {"type": "h3", "text": "15.1 Starter videos and core Oxydise context"}, {"type": "xtable", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Alan Trim with Oli Patrick - Hyperbarics & Beyond", "Alan Trim with Oli Patrick / Modern Wellness", "Oxydise founder story, mechanics of HBOT, access model, clinical/performance applications and how to explain the category with care.", "All colleagues", "[[Open||https://shows.acast.com/modern-wellness-podcast/episodes/129-hyperbarics-game-changing-recovery-oxydises-alan-trim-in]]"], ["Mindability Matters with Alan Trim - Oxydise", "Alan Trim / Mindability Matters", "Alan/Oxydise overview, red light beds, hyperbaric chambers and the wider customer-education story.", "All colleagues", "[[Open||https://www.youtube.com/watch?v=cAiDfGp7XC4&t=3s]]"], ["Oli Patrick - Why You Are Always Tired / The Oxydise Protocol", "Oli Patrick / Oxydise", "Useful for explaining fatigue, energy, the “engine room” and how customers think about low energy.", "Sales, marketing", "[[Open||https://www.youtube.com/watch?v=3oU-rANB2Fw&t=2822s]]"], ["Jason Sonners: How Hyperbaric Oxygen Therapy Changed My Life", "Jason Sonners / Oxydise", "Personal journey with HBOT and why it matters to him. Use as story and education, not outcome proof.", "All colleagues", "[[Open||https://www.youtube.com/watch?v=z51gbFL9WWQ&t=229s]]"], ["From Addiction to Elite 15: Jeremy McConnell’s HYROX Journey", "Jeremy McConnell / Oxydise", "Recovery, addiction, performance and identity story. Useful for tone, empathy and human transformation themes.", "All colleagues", "[[Open||https://www.youtube.com/watch?v=4o-RfRJvrkw&t=5s]]"], ["From Brain Fog to Clarity: Michael’s Transformational Journey with HBOT", "Michael testimonial / Oxydise", "Customer story around brain fog and clarity. Use only as approved anecdote, never as a promise.", "Sales, support", "[[Open||https://www.youtube.com/watch?v=Pc7dPt3goPw]]"], ["Beyond The Pill: The Path to Longevity", "Amazon Prime documentary context", "Oxydise took part via chamber/documentary involvement. Use only with approved wording and never as clinical proof.", "All colleagues", "[[Context||https://thelongevity.network/]]"]]}, {"type": "h3", "text": "15.2 HBOT foundations, pressure, protocols and research channels"}, {"type": "xtable", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["HBOT USA channel", "HBOT USA", "Educational channel for HBOT basics, protocols and interviews.", "Starter", "[[Open||https://www.youtube.com/@HBOTUSA]]"], ["HBOT USA research by category", "HBOT USA", "Research-library page grouped by HBOT topic and condition. Good for colleague research, not for direct claims without checking the study.", "Advanced", "[[Open||https://hbotusa.com/hbot-research-by-category/]]"], ["How to Hyperbaric channel", "How to Hyperbaric", "Interviews and education from HBOT practitioners and experts.", "Starter", "[[Open||https://www.youtube.com/@hyperbaric]]"], ["How HBOT is the Most Powerful Tool for Longevity and Recovery", "Dr Scott Sherr / Thomas DeLauer", "Deep-dive into HBOT, oxygen delivery, recovery and longevity framing. Strong internal education; translate claims cautiously.", "Core HBOT", "[[Open||https://www.youtube.com/watch?v=onILjIlPCRA&t=6s]]"], ["Dr Scott Sherr on The Dr Hyman Show", "Dr Scott Sherr / Dr Mark Hyman", "Clear HBOT physiology and why oxygen delivery matters in wellness and clinical contexts.", "Core HBOT", "[[Open||https://www.youtube.com/watch?v=uaZNFWb9pxg]]"], ["Dave Asprey and Dr Jason Sonners - HBOT questions", "Dave Asprey / Dr Jason Sonners", "Useful for pressure, dosing and consumer HBOT questions. Translate claims carefully.", "Advanced", "[[Open||https://www.youtube.com/watch?v=87XyzRLICkU&t=1s]]"], ["Dr Jason Sonners / HBOT and ageing", "Dr Jason Sonners", "Useful for internal education on pressure, consistency, physiology and longevity framing.", "Advanced", "[[Open||https://www.youtube.com/watch?v=xqdZufdEjrw]]"], ["Proven Methods for Getting Top Results from HBOT", "Dr Masha Makeeva / How to HYPERBARIC", "Protocol and optimisation education. Useful for colleague confidence and practical questions.", "Sales, support", "[[Open||https://www.youtube.com/watch?v=tk1b_txokQg]]"], ["#1 Absolute Best Way to Get Maximum Results from HBOT", "Dr Masha Makeeva / How to HYPERBARIC", "Practical optimisation advice. Good internal watch; avoid absolute public claims.", "Advanced", "[[Open||https://www.youtube.com/watch?v=IMcE3edYkug]]"], ["The Healing and Regenerative Power of HBOT", "HBOT USA", "Overview of HBOT and tissue-repair concepts. Good for background, not a claim library.", "Starter", "[[Open||https://www.youtube.com/watch?v=wMFmA3AotU8]]"], ["How to Answer the Top 8 HBOT Patient Questions", "HBOT USA", "Practical Q&A resource covering safety, process, benefits and expectations.", "Sales, support", "[[Open||https://www.youtube.com/watch?v=oSykWqi9BXc]]"], ["Soft vs Hard HBOT Chambers: What Recent Research Reveals", "HBOT USA", "Compares mild/soft and harder clinical systems. Useful for pressure positioning and expectation-setting.", "Sales, directors", "[[Open||https://www.youtube.com/watch?v=P9ZdlZiCITg]]"]]}, {"type": "h3", "text": "15.3 HBOT stories, brain health, sport and recovery examples"}, {"type": "xtable", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Joe Namath brain injury/HBOT story", "Joe Namath / HBOT story", "Useful for understanding why high-profile brain-recovery stories make HBOT memorable. Use only as anecdote, not proof.", "Internal story", "[[Open||https://www.youtube.com/watch?v=s7nxU3QadIA]]"], ["Joe Rogan / Justin Wren HBOT discussion", "Joe Rogan / Justin Wren", "Mainstream conversation about hyperbaric experiences and brain recovery themes.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=mhympAfm0TY&t=4s]]"], ["Joe Rogan Suggests Hyperbaric Chamber to Israel Adesanya", "Joe Rogan & Israel Adesanya", "Shows HBOT entering combat-sport culture. Use as sector awareness, not clinical evidence.", "Sport/recovery", "[[Open||https://www.youtube.com/watch?v=IFZqzfgQ9bU]]"], ["Mel Gibson / Amen Clinics experience", "Mel Gibson / Amen Clinics", "Public brain-health story that customers may mention; treat as anecdote and avoid copying claims.", "Anecdote only", "[[Open||https://www.youtube.com/watch?v=0xZ0oLhR154]]"], ["Jay’s Journey - MS and HBOT", "Jay / Oxydise-style story", "Customer story: hope, energy and lived experience of a neurological diagnosis. Internal empathy resource.", "Internal story", "[[Open||https://www.youtube.com/watch?v=nSngCpLzlbk]]"], ["Claire Turner - living with Stage 4 Melanoma", "Claire Turner / Oxydise", "Cancer-related customer story. Use with extreme care, consent and approved wording only.", "Hold for approval", "[[Open||https://www.youtube.com/watch?v=7e7vnyDBUiU&t=4s]]"], ["Ben Whittaker recovery story", "Ben Whittaker / Oxydise", "Athlete recovery example and performance-context content.", "Sport/recovery", "[[Open||https://www.youtube.com/watch?v=Py2DG8MKPdw]]"], ["Stoltman Brothers recovery routine", "Stoltman Brothers / Oxydise", "Strength-athlete recovery credibility and recovery-stack storytelling.", "Sport/recovery", "[[Open||https://www.youtube.com/watch?v=XQMfYoE0Sts&t=19s]]"]]}, {"type": "h3", "text": "15.4 Red Light / photobiomodulation, light and mitochondria"}, {"type": "xtable", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Huberman Lab - Using light to optimise health", "Andrew Huberman / Huberman Lab", "Foundation for circadian light, sunlight, blue light, red light and practical light hygiene.", "Starter", "[[Open||https://www.youtube.com/watch?v=UF0nqolsNZc&t=1s]]"], ["Huberman with Dr Glen Jeffery", "Andrew Huberman / Glen Jeffery", "Useful for retina, mitochondria, 670 nm, LED concerns and light-timing nuance.", "Advanced", "[[Open||https://www.youtube.com/watch?v=iT8W6kaD-RA&t=1s]]"], ["Dr Ruscio - powerful effects of red light therapy", "Dr Michael Ruscio", "Simple public-facing overview of PBM, mitochondria and practical benefits; verify claims before using.", "Starter", "[[Open||https://www.youtube.com/watch?v=exrLFJk96ws]]"], ["Gary Brecka - red light therapy", "Gary Brecka", "Mainstream biohacking explanation; useful for knowing what customers may have heard.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=mvr0Ub3TG_Y&t=5s]]"], ["Human Biologist on the Benefits of Red Light Therapy", "Gary Brecka with Joe Rogan / PowerfulJRE clips", "Mainstream PBM explanation. Useful for customer awareness and common claims; check study basis before using.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=lM8SR11Oazw&t=1s]]"], ["Methylene blue, red light and HBOT synergy", "Biohacking discussion", "Advanced stack conversation. Internal context only; do not recommend methylene blue.", "Internal only", "[[Open||https://www.youtube.com/watch?v=mylh0x62kN8&t=1s]]"]]}, {"type": "h3", "text": "15.5 Grounding, hydrogen, metabolism, mindset and wider biohacking"}, {"type": "xtable", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Huberman AMA - nature and grounding", "Andrew Huberman / Huberman Lab", "Good example of cautious, practical discussion of nature exposure and grounding-style questions.", "Grounding", "[[Open||https://www.youtube.com/watch?v=eJU6Df_ffAE&t=2s]]"], ["Earthing / blood-quality discussion", "Grounding-sector content", "Content colleagues may encounter. Treat as debated and do not productise.", "Grounding", "[[Open||https://www.youtube.com/watch?v=Q31UfsdKdhc]]"], ["Hydrogen Water Studies library", "Hydrogen Water Studies", "Research-library link for molecular hydrogen and hydrogen water studies.", "Hydrogen", "[[Open||https://hydrogenwaterstudies.com/]]"], ["HBOT + Hydrogen discussion", "HBOT/hydrogen discussion", "Internal education on why some practitioners pair hydrogen with HBOT. Verify claims and avoid overstatement.", "Hydrogen", "[[Open||https://www.youtube.com/watch?v=lSeVKavhlxo]]"], ["Diary of a CEO - sugar / metabolic health", "The Diary of a CEO", "Sector awareness for metabolic health, sugar and everyday energy conversations.", "Metabolic health", "[[Open||https://www.youtube.com/watch?v=ZE_H7rijrVk]]"], ["I Tested 100,000 People’s DNA. This Diet Will Kill You", "Gary Brecka / The Diary of a CEO", "Public genetics and nutrition conversation. Useful because customers may reference Gary Brecka; verify claims before repeating.", "Genetics/nutrition", "[[Open||https://www.youtube.com/watch?v=10enqcw2Qiw]]"], ["Gary Brecka - prediction/biological age style interview", "Gary Brecka", "Know what customers may hear in public longevity media; verify before repeating.", "Longevity", "[[Open||https://www.youtube.com/watch?v=r3atRG5wvtg]]"], ["Joe Rogan Experience - Gary Brecka", "Gary Brecka / Joe Rogan", "Public biohacking/longevity conversation. Useful for awareness, not evidence.", "Biohacking", "[[Open||https://www.youtube.com/watch?v=nhC8lLPpGl4&t=1s]]"], ["Huberman - peptide therapeutics", "Andrew Huberman", "Useful for understanding why customers ask about peptides; do not recommend or prescribe.", "Internal only", "[[Open||https://www.youtube.com/watch?v=zU5EYw06wtw]]"], ["Steven Bartlett / Dr Alex Tatem - peptides", "The Diary of a CEO / Dr Alex Tatem", "Sector-awareness resource around peptides, tissue repair and metabolic topics. Clinical/regulatory caution required.", "Internal only", "[[Open||https://www.youtube.com/watch?v=jt5hHb6kzYM&t=2428s]]"], ["The Impact of Mindset on Stress and Performance", "Dr Andrew Huberman / Huberman Lab Clips", "Explains how stress mindset can change physiological and psychological outcomes. Useful for customer empathy and behaviour change.", "Mindset", "[[Open||https://www.youtube.com/watch?v=SedgGUlhSl0&t=9s]]"], ["How Placebo Effects Work to Change Biology & Psychology", "Andrew Huberman / Huberman Lab", "Full episode on placebo, belief and measurable biology. Useful for understanding expectation without dismissing customers.", "Mindset", "[[Open||https://www.youtube.com/watch?v=gdUNjPijwA8]]"], ["Science of Mindsets for Health & Performance", "Dr Alia Crum with Andrew Huberman", "Mind-body research around stress, performance and health outcomes. Useful for colleague communication.", "Mindset", "[[Open||https://www.youtube.com/watch?v=dFR_wFN23ZY&t=1s]]"]]}, {"type": "h3", "text": "15.6 Sector awareness: longevity culture, communication and internal-only risk topics"}, {"type": "xtable", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["The #1 Tool Bryan Johnson Swears By", "Bryan Johnson & Chris Williamson / Chris Williamson", "Bryan Johnson discusses a top longevity tool. Useful for understanding “top tool” narratives in biohacking culture.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=Hk1FEGw0ARw&t=515s]]"], ["Bryan Johnson - India air pollution + HBOT", "Bryan Johnson", "Example of how longevity consumers think about biomarkers, environment and HBOT protocols.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=XVJaqRSrEZA&t=767s]]"], ["David Sinclair - can ageing be reversed?", "David Sinclair", "Longevity culture and public ageing biology. Useful context; some claims are debated.", "Longevity", "[[Open||https://www.youtube.com/watch?v=DnvWAP99r3Y&t=7242s]]"], ["Bryan Johnson / All-In Podcast DMT episode", "Bryan Johnson / All-In", "Not core Oxydise education. Keep only as sector-awareness around public biohacking culture.", "Optional", "[[Open||https://www.youtube.com/watch?v=Axpnkqd-Agk&t=2107s]]"], ["Chase Hughes - influence and spotting lies", "Chase Hughes", "Communication/behaviour awareness rather than health science. Optional for sales/communication training.", "Sales optional", "[[Open||https://www.youtube.com/watch?v=A44MGp-In4w]]"], ["Sauna 90-day experiment", "Recovery/longevity channel", "Useful wider recovery/longevity context. Make clear Oxydise is not a sauna brand.", "Optional", "[[Open||https://www.youtube.com/watch?v=kiUM92VDI1Y]]"], ["Cancer Dies When You Do THIS", "Dr Eric Berg", "High-risk cancer content. Internal awareness only; do not use as customer advice or evidence for Oxydise claims.", "Internal only", "[[Open||https://www.youtube.com/watch?v=f9PL6o4OLNw]]"], ["How to Cure Cancer?", "Michael Levin & Lex Fridman / Lex Clips", "Future-facing biology and cancer thinking. Internal curiosity only; not customer treatment language.", "Internal only", "[[Open||https://www.youtube.com/watch?v=yRMIZrn8IuE]]"]]}, {"type": "callout", "k": "Approval note for the video library", "text": "On the website, cancer, peptides, disease-specific and strong claim videos should be visually marked as Internal only or Hold for clinical review unless specifically approved. The goal is to educate colleagues, not provide public medical recommendations."}, {"type": "h2", "text": "16. People everyone should know", "id": "16"}, {"type": "callout", "k": "People rule", "text": "Knowing names helps colleagues understand the sector, not name-drop. Add links to YouTube channels or prominent videos where useful. Do not repeat a person’s claims without checking the underlying evidence."}, {"type": "xtable", "head": ["Name", "Known for", "Why Oxydise colleagues should know them", "Useful links / videos"], "rows": [["Dr Shai Efrati / Sagol Center", "HBOT, neuroplasticity, ageing and post-COVID research.", "Know the Israeli research direction and hyperoxic-hypoxic paradox. Use cautiously, not as anti-ageing claims.", "Search / Sagol Center"], ["Dr Jason Sonners", "HBOT education, mild vs higher pressure and inflammatory signalling.", "Useful for practical HBOT education and dose mindset.", "How to Hyperbaric / HBOT USA videos"], ["Dr Scott Sherr", "HBOT, health optimisation, methylene blue and oxygen metabolism.", "Clear communicator for oxygen and pressure physiology.", "Dr Hyman HBOT episode"], ["Prof Michael Hamblin", "Photobiomodulation mechanisms and applications.", "Foundational PBM literature and RLT credibility.", "PubMed / PBM literature"], ["Prof Glen Jeffery", "Red light, mitochondria and ageing retina.", "Useful for 670 nm / eye-energy discussion; do not generalise to all devices.", "Huberman interview"], ["Andrew Huberman", "Neuroscience, circadian light and behaviour.", "Useful public educator for light, sleep and behaviour change.", "Huberman Lab"], ["Bryan Johnson", "Longevity, protocol culture and self-measurement.", "Understand the biohacking mindset; avoid copying extreme protocols.", "Bryan Johnson podcast / Blueprint"], ["Oli Patrick", "Physiology, performance, recovery and wellness strategy.", "Important Oxydise advisor/collaborator; practical energy and recovery language.", "Modern Wellness / Oxydise content"], ["Dr Masha Makeeva", "HBOT safety, regenerative therapies and clinical training.", "Escalation point for medical-suitability conversations and internal safety education.", "Internal / clinical board"], ["Peter Attia", "Healthspan, VO2 max, metabolic health and risk reduction.", "Core longevity language: healthspan, strength, cardiovascular base and risk.", "The Drive / Outlive"], ["Ben Greenfield", "Biohacking, performance and recovery technologies.", "Understand customers already in the biohacking world.", "Ben Greenfield Life"], ["David Sinclair", "Ageing biology, epigenetics and longevity debate.", "Important longevity name; also know some claims are debated.", "Lifespan / interviews"], ["Emeran Mayer", "Gut-brain axis and microbiome.", "Useful for gut, mood, inflammation and wellbeing context.", "Books / interviews"], ["Rhonda Patrick", "Nutrients, sauna, metabolism and evidence translation.", "Good model for careful science communication.", "FoundMyFitness"], ["Satchin Panda", "Circadian biology and time-restricted eating.", "Supports daylight, sleep timing and circadian education.", "Interviews / books"], ["Matthew Walker", "Sleep science.", "Sleep is foundational for all recovery conversations.", "Why We Sleep / interviews"], ["Thomas Seyfried", "Cancer metabolism.", "Advanced internal cancer-metabolism thinker; never use as customer treatment advice.", "Lectures / books"], ["Kelly Turner", "Radical remission factors and patient agency.", "Useful empathy resource for cancer-support conversations and non-technology factors.", "Radical Remission"], ["Michael Levin", "Bioelectricity and regeneration.", "Advanced future-science lens; curiosity, not claims.", "Lectures / interviews"], ["Gary Brecka", "Genetics, methylation and public biohacking.", "Customers may ask about him. Know the claims and verify before repeating.", "Ultimate Human / interviews"], ["Wim Hof", "Breathwork and cold exposure.", "Customers may connect HBOT with resilience and oxygen conversations. Safety boundaries matter.", "Beyond The Pill / Wim Hof content"], ["Tim Spector", "Nutrition, microbiome and personalised health.", "Useful for microbiome and nutrition context.", "ZOE / books"], ["Davinia Taylor", "Biohacking, nutrition and metabolic health.", "Customers may reference her in UK wellness/longevity culture.", "Willpowders / interviews"], ["Marisa Peer", "Mindset, hypnotherapy and behaviour change.", "Featured in longevity/wellness media; useful for wider sector awareness.", "Interviews / Beyond The Pill context"]]}, {"type": "h2", "text": "17. Books and wider wellness sector map", "id": "17"}, {"type": "callout", "k": "Book rule", "text": "Books are internal education, not proof for product claims. Use them to build context, vocabulary and customer empathy. Do not quote books as clinical evidence unless the underlying study is checked."}, {"type": "xtable", "head": ["Book", "Author", "Came out", "What it is about", "Most important takeaways"], "rows": [["The Body: A Guide for Occupants", "Bill Bryson", "2019", "An accessible tour of human biology, covering the main systems of the body, disease, repair and how much is still not fully understood.", "Build colleague confidence with plain-English biology. The body is interconnected, resilient and complex, so avoid over-simple explanations of health problems."], ["The Blue Zones, Second Edition", "Dan Buettner", "2012 (original 2008)", "Lessons from long-lived communities, linking lifespan to daily habits, food culture, purpose and social connection.", "Environment often beats willpower. Build movement into daily life, eat simply, reduce stress, maintain social ties and make healthy choices automatic."], ["Outlive: The Science and Art of Longevity", "Peter Attia, MD, with Bill Gifford", "2023", "A practical longevity framework focused on healthspan: living better for longer, not just adding years.", "Move from reactive to proactive health. Exercise, metabolic health, sleep, nutrition and emotional wellbeing are core levers. Measure risk early and act before disease is obvious."], ["Lifespan: Why We Age - and Why We Don’t Have To", "David A. Sinclair, PhD, with Matthew D. LaPlante", "2019", "A science-led argument that ageing is a biological process influenced by genes, cellular repair and environment.", "Useful for longevity customers, but teach colleagues that longevity claims are contested. Separate promising science from proven customer advice."], ["Good Energy: The Surprising Connection Between Metabolism and Limitless Health", "Casey Means, MD, with Calley Means", "2024", "A metabolic-health book linking cellular energy, mitochondria, glucose control and lifestyle to broad health outcomes.", "Good everyday framing: energy, cravings, sleep, movement and ultra-processed food connect to metabolic health. Avoid disease-treatment claims."], ["The Mind-Gut Connection", "Emeran A. Mayer, MD", "2016", "Explains the gut-brain axis: two-way communication between digestion, microbiome, mood, stress, food choices and behaviour.", "Useful for why gut health, inflammation, mood and recovery feel connected. Keep the message balanced around diet, stress, sleep and symptoms."], ["Why We Sleep: The New Science of Sleep and Dreams", "Matthew Walker, PhD", "2017", "Popular science on why sleep matters for learning, memory, emotional regulation, metabolism, immunity and recovery.", "Sleep is a foundation for recovery. Understand routine, light, caffeine, alcohol and bedroom environment. Some claims are debated, so stay practical."]]}, {"type": "h3", "text": "Book table continued"}, {"type": "xtable", "head": ["Book", "Author", "Came out", "What it is about", "Most important takeaways"], "rows": [["Breath: The New Science of a Lost Art", "James Nestor", "2020", "Journalistic exploration of breathing, nasal breathing, CO2 tolerance, mouth breathing, breathwork traditions and respiratory awareness.", "Breathing patterns can affect stress, sleep and performance. Useful customer language, but do not over-medicalise techniques or present them as cures."], ["The Circadian Code", "Satchin Panda, PhD", "2018", "Shows how light timing, meal timing, sleep timing and daily routines interact with the body clock and metabolic health.", "Recovery is not only what people do, but when they do it. Morning light, consistent sleep windows and sensible eating windows are practical talking points."], ["Boundless: Upgrade Your Brain, Optimize Your Body & Defy Aging", "Ben Greenfield", "2020 (updated 2025)", "Wide-ranging biohacking manual covering sleep, training, recovery, cognition, nutrition, devices and self-experimentation.", "Useful for biohacker language and expectations. Bring conversations back to basics first: sleep, movement, nutrition, recovery and safety."], ["The Blood Sugar Solution 10-Day Detox Diet", "Mark Hyman, MD", "2014", "A short dietary reset aimed at reducing sugar cravings, insulin spikes and reliance on processed foods.", "Metabolic health is central to energy and weight control. Reducing sugar/refined carbohydrates can help, but short resets only matter if followed by sustainable habits."], ["The Plant Paradox", "Steven R. Gundry, MD", "2017", "A diet book built around the author’s view that lectins and some plant foods can trigger gut and inflammatory issues.", "Gut health and individual tolerance matter. Understand this school of thought, but avoid presenting lectin avoidance as settled or universal advice."], ["The Inflammation Spectrum", "Dr Will Cole with Eve Adamson", "2019", "A food-trigger and inflammation framework using elimination and reintroduction to personalise diet choices.", "Personalisation is a recurring theme. Track symptoms, food responses, sleep and stress. Reducing ultra-processed foods is more robust than assuming one diet suits everyone."], ["The Longevity Paradox", "Steven R. Gundry, MD", "2019", "A microbiome-centred longevity book linking ageing, gut bacteria, diet quality and metabolic resilience.", "Microbiome health, metabolic flexibility and food quality are useful themes. Treat strict exclusions as the author’s model, not a one-size-fits-all rule."]]}, {"type": "h3", "text": "Book table continued"}, {"type": "xtable", "head": ["Book", "Author", "Came out", "What it is about", "Most important takeaways"], "rows": [["Mitochondria and the Future of Medicine", "Lee Know, ND", "2018", "A deeper look at mitochondria, cellular energy, oxidative stress, chronic illness, ageing and the central role of energy production in health.", "Good advanced education. Link mitochondria to energy, recovery and resilience, but do not translate broad disease discussions into product or therapy claims."], ["Oxygen Under Pressure", "Dr Jason Sonners", "2020", "An introduction to HBOT, oxygen delivery under pressure and possible recovery uses.", "Oxygen availability, pressure, dose and protocol all matter. Be clear on indications, contraindications and supervision. Do not overstate therapeutic claims."], ["Supercharge Your Health with PEMF Therapy", "William Pawluk, MD, MSc", "2021", "A guide to pulsed electromagnetic field therapy, including device types, protocols and proposed benefits.", "Understand modality, evidence and safety screening before discussing benefits. Be conservative around support, recovery and wellbeing claims."], ["The End of Alzheimer’s", "Dale E. Bredesen, MD", "2017", "A multifactorial protocol for cognitive decline, covering sleep, metabolism, inflammation, hormones and nutrients.", "Brain health is multifactorial. Clinical claims are debated and require medical oversight. Do not use as a treatment guide."], ["Radical Remission: Surviving Cancer Against All Odds", "Kelly A. Turner, PhD", "2014", "Research and survivor stories about unexpected cancer remission and common factors people reported.", "Important empathy resource for cancer-support conversations. Never imply cancer can be cured by lifestyle, Oxydise equipment or any non-medical intervention."], ["The Cancer Code", "Dr Jason Fung", "2020", "Cancer history and cancer-metabolism book arguing cancer should be understood through genetic, metabolic and environmental lenses.", "Internal education only. Cancer is complex and high-risk: colleagues should not advise on treatment, prevention or protocols beyond qualified medical professionals."], ["Evolutionary Ideas", "Sam Tatam", "2022", "A behavioural science and innovation book on solving new problems by borrowing from proven, evolved solutions.", "For colleagues: make desired behaviours easy, visible and socially reinforced. Use defaults, habit design and small tests before complex solutions."]]}, {"type": "h3", "text": "17.1 Suggested starting order"}, {"type": "list", "items": ["Start with general literacy: The Body, The Blue Zones and Outlive.", "Add core recovery foundations: Why We Sleep, Breath, The Circadian Code and The Mind-Gut Connection.", "Use Lifespan, Good Energy and Boundless to understand longevity and biohacker customer language while keeping claims cautious.", "Keep therapy-specific titles, cancer titles and Alzheimer’s titles as role-relevant internal education only."]}, {"type": "callout", "k": "Working principle", "text": "Keep claims evidence-based, distinguish wellbeing support from treatment claims, and treat books as prompts for discussion rather than approved clinical guidance."}, {"type": "h3", "text": "17.2 Wider wellness and biohacking sector map"}, {"type": "prose", "text": ["Oxydise should not sound as if the only solution is Oxydise equipment. A credible wellness brand can recommend strong foundations where they genuinely help customers. This builds trust and shows the goal is customer outcomes, not only product sales."]}, {"type": "xtable", "head": ["Area", "Tools / topics to know", "Why it matters"], "rows": [["Sleep", "8 Sleep, temperature control, sleep consistency, light timing and caffeine timing.", "Many recovery problems start with poor sleep."], ["Wearables / tracking", "Oura, WHOOP, Garmin, Apple Watch, HRV, resting heart rate and sleep regularity.", "Use tracking to measure trends, not obsess over daily fluctuations."], ["Blood and biomarkers", "Vitamin D, B12, ferritin, CRP, thyroid, hormones and metabolic markers.", "Move from guessing to measurable baselines with clinician interpretation."], ["Microbiome", "Gut testing, fibre, fermented foods and personalised nutrition.", "Relevant to inflammation, mood, recovery and nutrient uptake."], ["Circadian rhythm", "Morning daylight, evening dim light and consistent sleep/wake times.", "A free foundational tool that supports energy and sleep."], ["Heat and cold", "Sauna, cold exposure and cryotherapy.", "Useful recovery and resilience tools; match to contraindications."], ["Movement", "Zone 2 cardio, resistance training, mobility and walking.", "Technology should support movement, not replace it."], ["Nutrition and metabolic health", "Protein, fibre, glucose stability, hydration and electrolytes.", "Supports mitochondrial energy and repair. Avoid extreme advice unless qualified."], ["Mental health / stress", "Breathwork, therapy, meditation and nervous-system regulation.", "Stress load changes recovery; empathy matters."], ["Environment", "Air quality, mould awareness, daylight, noise and EMF concerns.", "Customers in chronic illness communities may care deeply about environmental load."]]}, {"type": "h2", "text": "18. Equipment fundamentals and technology language", "id": "18"}, {"type": "callout", "k": "How Oxydise should talk about technology", "text": "The aim is to sound knowledgeable, precise and premium without sounding aggressive about competitors. Explain engineering principles clearly. Do not call another company cheap, do not name competitors in a negative way and do not publish manufacturer comparisons or percentage claims unless Oxydise has test data and approval."}, {"type": "h3", "text": "18.1 HBOT equipment basics"}, {"type": "xtable", "head": ["Term", "What it means"], "rows": [["Oxygen concentrator", "A device that takes room air and uses zeolite molecular sieves to trap nitrogen, leaving concentrated oxygen, often around 90-96%, to flow to the user."], ["Sieve beds", "Zeolite-filled beds inside the concentrator. They are responsible for nitrogen adsorption and oxygen concentration."], ["Zeolite", "A mineral with microscopic cage-like pores that trap nitrogen molecules more readily than oxygen under pressure."], ["Compressor", "Supplies air to pressurise the chamber. The chamber should not be inflated with pure oxygen."], ["Mask / hood", "The delivery route for concentrated oxygen. The chamber is pressurised with air; oxygen is usually delivered separately."], ["Flow rate (LPM)", "Litres per minute of oxygen flow. Higher flow does not automatically mean better if the mask, seal, pressure and protocol are not right."], ["Pressure gauge", "Shows chamber pressure. Users should not exit until pressure returns to zero."], ["Pressure relief valve", "Safety valve that prevents over-pressurisation. Never cover it during operation."], ["Compression / decompression", "The gradual increase/decrease in pressure at the start and end of the session. Important for ear comfort and safety."]]}, {"type": "callout", "k": "Safety line from equipment manual", "text": "Never inflate the chamber using pure oxygen alone. Use compressed air for chamber pressure and oxygen through the intended breathing circuit. Keep flammables and sharp objects out of the chamber and follow device instructions."}, {"type": "h3", "text": "18.2 How the oxygen concentrator works - the proper explanation"}, {"type": "prose", "text": ["A good simple explanation: the concentrator pulls in room air, then uses zeolite molecular sieves to separate nitrogen from oxygen. Air is mostly nitrogen and oxygen. The zeolite structure acts like a microscopic cage that captures nitrogen under pressure, allowing oxygen-rich gas to pass through to the mask.", "Within a typical oxygen concentrator there are two zeolite-filled sieve beds. The system alternates between them every few seconds. While one bed is online and pressurised, it captures nitrogen and allows oxygen to pass through. At the same time, the second bed is depressurised, releasing the nitrogen it captured and regenerating itself for the next cycle. The beds keep switching, which creates a continuous supply of concentrated oxygen."]}, {"type": "xtable", "head": ["Quality factor", "Why it matters", "Customer-safe way to say it"], "rows": [["Zeolite quality", "Not all zeolite performs the same. Purity, structure and adsorption capacity affect nitrogen capture.", "“The material inside the sieve beds matters, not just the box around it.”"], ["Quantity of zeolite", "Too little zeolite can reduce reserve capacity and make performance less stable under load.", "“We care about consistent output, not only headline specifications.”"], ["Moisture management", "Moisture is one of the biggest enemies of zeolite. Water vapour can occupy adsorption sites and reduce nitrogen capture efficiency.", "“Good moisture control helps protect oxygen purity over time.”"], ["Engineering and cycling", "Valve timing, pressure swing stability and airflow design all affect how well the concentrator regenerates its sieve beds.", "“The concentrator has to work consistently session after session.”"], ["Long-term oxygen purity", "The real difference is not only oxygen purity on day one; it is whether the system maintains performance over months and years.", "“We focus on engineering that keeps oxygen delivery stable over the long term.”"]]}, {"type": "callout", "k": "Customer script - concentrator quality", "text": "“Inside the oxygen concentrator are zeolite sieve beds. Their job is to remove nitrogen from room air so the mask receives oxygen-rich air. The quality of those sieve beds, the amount of zeolite, moisture control and the engineering around the cycling process all affect how consistent the oxygen output remains over time. That is why we focus on build quality and long-term performance, not just headline numbers.”"}, {"type": "h3", "text": "18.3 Red Light equipment basics"}, {"type": "xtable", "head": ["Term", "What it means"], "rows": [["LED count", "Number of LEDs. Useful, but less important than wavelength, irradiance, lens angle, thermal control and verified output."], ["Wavelength blend", "The mix of red and NIR wavelengths. Common useful bands include 630, 660, 810, 830 and 850 nm."], ["LED binning / quality control", "Manufacturers sort LEDs by wavelength and output tolerance. Tighter tolerances improve consistency."], ["Lens angle", "How tightly or widely light is directed. Affects intensity and coverage."], ["Irradiance claim", "Power per cm2. Always ask at what distance and how it was measured."], ["Power draw vs output", "Electrical wattage is not the same as light delivered to the body."], ["Pulse / frequency", "Some devices allow pulsed light. Interesting, but do not turn frequency settings into unapproved claims."], ["Thermal management", "Good LEDs require heat control. Heat is not the main therapeutic mechanism of PBM; it is something that must be managed to protect performance."]]}, {"type": "h3", "text": "18.4 Why LED quality and thermal regulation matter"}, {"type": "prose", "text": ["In Red Light Therapy, the value is not just that the bed turns red or looks powerful. The value is delivering the intended wavelengths and output consistently, session after session. LED choice, manufacturing quality, driver design, lensing, spacing and thermal regulation all affect the real dose reaching the user."]}, {"type": "xtable", "head": ["Issue", "Why it matters", "How Oxydise should say it"], "rows": [["LED manufacturer and binning", "Lower-cost LEDs may have wider tolerances in wavelength and output. Better sourcing and tighter binning help keep the device closer to the intended wavelength profile.", "“We pay attention to LED quality and wavelength consistency, because photobiomodulation depends on the right light signal.”"], ["Headline lifespan claims", "Claims such as 50,000 or 100,000 hours only mean much if heat, current and operating conditions are well controlled.", "“LEDs can last a long time, but only if they are driven and cooled properly.”"], ["Thermal drift", "Heat can affect LED performance. Poor thermal regulation can lead to output changes or wavelength drift over time.", "“Thermal control protects consistency. It is one reason engineering detail matters.”"], ["Wavelength stability over months of use", "Internal experience suggests lower-quality systems can move away from the stated wavelength over time. Do not publish a percentage unless backed by Oxydise test data.", "“We are careful about verified output, not just brochure numbers.”"], ["Verified output", "Real performance should be measured at the correct distance and operating temperature.", "“The question is not only how strong it is, but what dose and wavelengths are actually delivered.”"]]}, {"type": "callout", "k": "Customer script - red light quality", "text": "“With red light beds, the quality of the LEDs and the way heat is managed are critical. Photobiomodulation depends on the body receiving the intended wavelengths at a consistent output. Some systems sound impressive because they quote long LED lifespans or high power numbers, but without good thermal regulation the real wavelength and output can drift over time. We focus on stable, measured performance, not just impressive headline specs.”"}, {"type": "h3", "text": "18.5 Competitor-safe language"}, {"type": "xtable", "head": ["Internal instinct", "Better customer-facing phrasing"], "rows": [["“Competitor equipment is cheap.”", "“There can be big differences in engineering quality, materials and long-term output stability.”"], ["“They use poor LEDs.”", "“Not all LEDs are the same. Wavelength tolerance, heat management and measured output matter.”"], ["“Their concentrator will drop purity.”", "“Moisture control, sieve-bed quality and servicing all influence whether oxygen purity stays consistent.”"], ["“Our equipment is better because theirs is Chinese.”", "“We focus on product quality, design detail, verified performance and support.”"], ["“The wavelength will drift by 20%.”", "“Lower-quality systems can drift materially over time. We should only use exact percentages when we have test evidence and approval.”"]]}, {"type": "callout", "k": "Premium positioning line", "text": "“Oxydise is not just selling equipment. We are building a standard around performance, support and consistency over time.”"}, {"type": "h3", "text": "18.6 Glossary"}, {"type": "xtable", "head": ["Term", "Meaning"], "rows": [["Angiogenesis", "Growth of new blood vessels."], ["ATP", "Adenosine triphosphate, the cell’s energy currency."], ["BDNF", "Brain-derived neurotrophic factor, involved in brain plasticity and neuronal support."], ["Cytochrome c oxidase", "A mitochondrial enzyme often discussed as a PBM chromophore."], ["Cytokines", "Immune signalling molecules involved in inflammation and repair."], ["Fluence", "Total energy delivered by light per cm2, measured as J/cm2."], ["H2", "Molecular hydrogen gas, the form discussed in hydrogen water and hydrogen therapy research."], ["HIF-1 alpha", "Hypoxia-inducible factor, a signalling protein activated by low oxygen states."], ["Hyperoxia", "Higher-than-normal oxygen exposure."], ["Hypoxia", "Low oxygen availability in tissue."], ["Irradiance", "Light power arriving at a surface per cm2."], ["Mitochondria", "Cellular structures that help produce ATP and regulate energy metabolism."], ["Nitric oxide", "A signalling molecule involved in blood flow and mitochondrial function."], ["Partial pressure", "The pressure exerted by a specific gas in a mixture."], ["PBM", "Photobiomodulation, the biological effect of specific light exposure."], ["PEMF", "Pulsed electromagnetic field."], ["PSA", "Pressure swing adsorption, the concentrator process that alternates pressure across sieve beds to separate gases."], ["ROS", "Reactive oxygen species; damaging in excess but also useful as signalling molecules."], ["Senescent cells", "Cells that no longer divide normally and can contribute to inflammatory signalling."], ["Sieve bed", "A zeolite-filled part of an oxygen concentrator that adsorbs nitrogen and helps concentrate oxygen."], ["Stem/progenitor cells", "Repair-associated cells with regenerative potential."], ["VEGF", "Vascular endothelial growth factor, involved in blood vessel growth."], ["Zeolite", "Mineral used in oxygen concentrators to separate nitrogen from air."]]}, {"type": "h2", "text": "19. Prominent Oxydise-associated people and projects", "id": "19"}, {"type": "callout", "k": "Consent and usage rule", "text": "Only mention a person if their relationship/story is publicly approved or specifically approved internally. Do not discuss private health information. Use a name to build context, not to pressure a customer."}, {"type": "xtable", "head": ["Name / project", "Who they are", "Conversation relevance", "When to mention"], "rows": [["Anthony Elanga", "Professional footballer", "Sports performance / recovery credibility.", "Mention only approved public wording; useful with footballers and performance customers."], ["Ola Aina", "Professional footballer", "Elite sport recovery credibility.", "Use only approved public wording."], ["Ben Whittaker", "Professional boxer", "Combat sport recovery and marginal gains.", "Use only approved public wording."], ["Joseph Parker", "Professional boxer / former heavyweight champion", "High-performance recovery story.", "Use only approved public wording."], ["Gorka Marquez", "Professional dancer / Strictly Come Dancing", "Dance, performance, energy and recovery.", "Use for performance/lifestyle context if public and approved."], ["Tom Stoltman / Stoltman Brothers", "World-class strength athletes", "Strength, training load and recovery.", "Use only approved public wording."], ["Philly Bowden", "Elite marathon runner", "Endurance recovery and resilience.", "Use if public and approved."], ["Harry Aikines-Aryeetey", "Elite sprinter", "Speed, power and recovery.", "Use if public and approved."], ["Sam Kerr", "Professional footballer", "Women’s football / elite recovery context.", "Verify current public approval before using."], ["Louise Proddow", "Customer story on Oxydise website", "Post-procedure recovery anecdote.", "Use only as anecdote and with approved copy."], ["Jeremy McConnell", "Public figure/customer story on website", "Biohacking / baseline optimisation.", "Use only approved public wording."], ["Lynne", "Customer story", "Cancer-related story.", "Use only with consent and approved wording. Never imply cancer treatment."], ["Tom Joice", "Public/customer association to confirm", "To be completed internally.", "Verify exact relationship and approval before publication."], ["Diane Budwell / Dianne Buswell", "Professional dancer / public figure - spelling to confirm internally", "Dance, performance, energy and recovery context.", "Add once spelling, relationship and approved wording are confirmed."], ["Clair Turner / Claire Turner", "Customer story - spelling to confirm", "Cancer-related story / resilience and energy.", "Use only with consent and approved wording."], ["Lone’er Kavanagh", "Professional MMA athlete; documentary project in progress", "Combat sport, performance, recovery and storytelling.", "Mention only as “documentary project in progress” if approved. Do not publish details until cleared."], ["Beyond The Pill: The Path to Longevity", "Amazon/documentary involvement", "Oxydise took part / chamber featured in the documentary.", "Use approved line: “Oxydise’s hyperbaric chamber featured in Beyond The Pill: The Path to Longevity.” Avoid implying endorsement or clinical proof."]]}, {"type": "callout", "k": "Best moment to use names", "text": "Mention prominent customers only after listening to the customer goal. Athletes care about recovery and consistency; beauty customers care about skin and confidence; chronic illness customers care about safety and empathy. Do not name-drop before the customer feels heard."}, {"type": "h2", "text": "21. Reference list", "id": "21"}, {"type": "prose", "text": ["Reference links are for internal checking and context. Some links point to studies; others are public education, podcasts, internal learning portals or internal source documents. Only primary studies or approved Oxydise pages should be used to substantiate customer-facing claims.", "1. FDA - safe use of HBOT devices: [[Open||https://www.fda.gov/medical-devices/letters-health-care-providers/follow-instructions-safe-use-hyperbaric-oxygen-therapy-devices-letter-health-care-providers]]", "2. UHMS - HBO indications: [[Open||https://www.uhms.org/resources/featured-resources/hbo-indications.html]]", "3. StatPearls - HBOT contraindications: [[Open||https://www.ncbi.nlm.nih.gov/books/NBK557661/]]", "4. StatPearls - Hyperbaric physics: [[Open||https://www.ncbi.nlm.nih.gov/books/NBK448104/]]", "5. Thom et al. - Stem cell mobilisation by hyperbaric oxygen: [[Open||https://pubmed.ncbi.nlm.nih.gov/16299259/]]", "6. Hachmo et al. - HBOT, telomeres and immunosenescence: [[Open||https://pubmed.ncbi.nlm.nih.gov/33206062/]]", "7. Zilberman-Itskovich et al. - HBOT for post-COVID condition: [[Open||https://www.nature.com/articles/s41598-022-15565-0]]", "8. Hadanny et al. - Cognitive enhancement and cerebral blood flow: [[Open||https://pubmed.ncbi.nlm.nih.gov/32589613/]]", "9. de Freitas and Hamblin - PBM mechanisms: [[Open||https://pubmed.ncbi.nlm.nih.gov/28070154/]]", "10. Quirk et al. - Light, cytochrome c oxidase and nitric oxide: [[Open||https://pubmed.ncbi.nlm.nih.gov/32716711/]]", "11. Huang et al. - Biphasic dose response in low-level light therapy: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC3315174/]]", "12. UCL / Glen Jeffery - Morning deep red light and eyesight: [[Open||https://www.ucl.ac.uk/news/2021/nov/morning-exposure-deep-red-light-improves-declining-eyesight]]", "13. Wunsch and Matuschka - Red and NIR light for skin: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC3926176/]]", "14. Hamblin - PBM anti-inflammatory effects: [[Open||https://pubmed.ncbi.nlm.nih.gov/28748217/]]", "15. Sonners - comparative mild vs high-pressure HBOT cytokine analysis: [[Open||https://www.researchgate.net/publication/389431285_Comparative_Analysis_Effects_of_Mild_and_High-Pressure_Hyperbaric_Oxygen_Therapy_HBOT_on_Cytokine_Modulation_both_Immune_and_Inflammatory_Pathways]]", "16. Oxydise - full guide to HBOT: [[Open||https://oxydise.co.uk/blogs/studies/full-guide-to-hyperbaric-oxygen]]", "17. Oxydise - safety: [[Open||https://oxydise.co.uk/pages/safety]]", "18. Oxydise homepage: [[Open||https://oxydise.co.uk/]]", "19. Alan Trim with Oli Patrick - Modern Wellness Podcast: [[Open||https://shows.acast.com/modern-wellness-podcast/episodes/129-hyperbarics-game-changing-recovery-oxydises-alan-trim-in]]", "20. Dr Mark Hyman / Dr Scott Sherr - HBOT: [[Open||https://www.youtube.com/watch?v=uaZNFWb9pxg]]", "21. Huberman Lab - Using light to optimise health: [[Open||https://www.youtube.com/watch?v=UF0nqolsNZc]]", "22. Bryan Johnson - India air pollution and HBOT: [[Open||https://www.youtube.com/watch?v=XVJaqRSrEZA]]", "23. Emeran Mayer - The Mind-Gut Connection: [[Open||https://emeranmayer.com/the-mind-gut-connection-2/]]", "24. David Sinclair - Lifespan: [[Open||https://lifespanbook.com/]]", "25. Ben Greenfield - Boundless: [[Open||https://boundlessbook.com/]]", "26. Kelly Turner - Radical Remission books: [[Open||https://www.radicalremission.com/the-books]]", "27. Alan Trim - personal site and story: [[Open||https://www.alantrim.com/]]", "28. HBOT USA - research by category: [[Open||https://hbotusa.com/hbot-research-by-category/]]", "29. Hydrogen Water Studies: [[Open||https://hydrogenwaterstudies.com/]]", "30. Brain photobiomodulation narrative review: [[Open||https://pubmed.ncbi.nlm.nih.gov/29327206/]]", "31. Transcranial photobiomodulation for brain diseases: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC10840571/]]", "32. Vielight Neuro Gamma 4 product information: [[Open||https://www.vielight.com/devices/vielight-neuro-gamma/]]", "33. Molecular hydrogen / hydrogen water review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC10816294/]]", "34. Ohsawa et al. 2007 - Hydrogen acts as a therapeutic antioxidant: [[Open||https://pubmed.ncbi.nlm.nih.gov/17486089/]]", "35. Johnsen et al. 2023 - Molecular hydrogen therapy clinical studies review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC10707987/]]", "36. Sim et al. 2020 - Hydrogen-rich water RCT in healthy adults: [[Open||https://www.nature.com/articles/s41598-020-68930-2]]", "37. Li et al. 2024 - Molecular hydrogen and exercise oxidative stress meta-analysis: [[Open||https://www.frontiersin.org/journals/nutrition/articles/10.3389/fnut.2024.1328705/full]]", "38. Molecular Hydrogen Institute - human studies library: [[Open||https://molecularhydrogeninstitute.org/human-studies/]]", "39. PEMF comprehensive review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC11205752/]]", "40. Grounding review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC4378297/]]", "41. Oxygen concentrator molecular sieve basics: [[Open||https://www.oxidationtech.com/downloads/Applications/How-Oxygen-Concentrators-Work/Molecular-Sieve-Animation-Basics.pdf]]", "42. Zeolite molecular sieve oxygen production system: [[Open||https://www.mdpi.com/2227-9717/11/1/124]]", "43. LED thermal management and wavelength stability context: [[Open||https://tech-led.com/how-near-infrared-leds-are-revolutionizing-medical-devices/]]", "44. Hydrogen-rich water and exercise performance review: [[Open||https://www.mdpi.com/2218-1989/14/10/537]]", "45. Beyond The Pill documentary site: [[Open||https://thelongevity.network/]]"]}]

RESOURCES["sales-bible"] = {
  num:17, group:"Resources", title:"Sales Call Bible",
  eyebrow:"Resources \u00b7 Internal draft",
  lead:"A practical structure for calls: how to build trust, listen properly, ask the right questions, explain HBOT and Red Light Therapy safely, use customer stories appropriately, and know exactly what to do after each conversation. Not a robotic script \u2014 a consistent standard: calm, expert, empathetic, clear and commercially disciplined.",
  blocks:[
    {type:"callout", k:"One-line rule", text:"Every lead must be captured, called, qualified, safety-checked, followed up, and given a next task."},
    {type:"h2", text:"Non-negotiables for every call"},
    {type:"table", head:["Non-negotiable","What it means in practice"], rows:[
      ["Every lead goes into CRM","Wrong calls are still logged \u2014 they improve website wording, ads and lead quality."],
      ["Every customer has an owner","Sales owns the lead until order form, Shopify delivery form or admin handover is complete."],
      ["Every customer has a next action","No call ends without a next task, follow-up date or handover."],
      ["Ask why they enquired","Do not jump straight into product. Understand the customer first."],
      ["Ask safety questions","Use approved contraindication wording. Pause and escalate if unclear."],
      ["No medical advice","Do not diagnose, recommend treatment, change medication advice or promise outcomes."],
      ["Use approved language","Explain mechanisms and support safely. Do not improvise medical claims."],
      ["Tailor the follow-up","Send only the relevant brochures and documents."],
      ["Record what was discussed","Source, category, product interest, reason, safety status, buying route, access notes, next task."]
    ]},
    {type:"callout", k:"The sales mindset", text:"This is a consultation, not a pitch. The customer should feel listened to, reassured and clear on what happens next."},
    {type:"h2", text:"The Oxydise way of communicating", sub:"Calm, credible, considered and practical \u2014 confident without pushy, scientific without clinical, empathetic without vague."},
    {type:"table", head:["Value","How it sounds on a call"], rows:[
      ["Trust","\u201CI'll be honest about what we can and cannot say.\u201D"],
      ["Empathy","\u201CTell me what has led you to look at this now.\u201D"],
      ["Relationships","\u201CWe support you before, during and after delivery.\u201D"],
      ["Curiosity","\u201CLet me understand the background before recommending anything.\u201D"],
      ["Detail","\u201CLet's check the room, access, safety and usage plan properly.\u201D"],
      ["Innovation","\u201CWe're constantly improving the equipment with our manufacturing partners.\u201D"]
    ]},
    {type:"callout", k:"Tone rule", text:"Avoid hype. Avoid urgency. Avoid \u201Cthis will fix you\u201D. Use phrases such as \u201Csupports\u201D, \u201Cmay help\u201D, \u201Cdesigned to\u201D, \u201Cresearch suggests\u201D, \u201Cmany customers report\u201D and \u201Cwe will guide you\u201D."},
    {type:"h2", text:"Full first-call structure"},
    {type:"orderlist", items:[
      ["Open warmly","Confirm time, thank them, explain Oxydise starts by understanding the goal rather than pushing equipment."],
      ["Set the agenda","\u201CI'll ask a few questions, check suitability and safety, then explain the best route and next steps.\u201D"],
      ["Understand why now","What triggered the enquiry, who it is for, and what outcome matters most."],
      ["Categorise","Medical/recovery, sports, wellness, beauty, B2B, existing, wrong lead or unknown."],
      ["Product interest","HBOT, Red Light, both, small products, B2B or unsure."],
      ["Safety screen","Ask contraindication questions. Escalate medical questions."],
      ["Practical fit","Room, access, space, power, mobility, stairs, hardshell access video, red-light placement."],
      ["Explain Oxydise","Values, service model, rental/purchase, installation, support, product-development story."],
      ["Explain relevant product","Plain-English mechanism and condition-relevant approved support points."],
      ["Social proof","Relevant customer stories \u2014 after discovery, never as a cold opener."],
      ["Commercial route","Rental, purchase, rent-to-buy, 12-month finance, B2B route or director call."],
      ["Next step","Email, documents, order form, delivery form, Dr Masha call, director call, callback task."],
      ["CRM update","Source, reason, category, safety, documents, buying route, access notes, next action."]
    ]},
    {type:"script", k:"Default opener", text:"\u201CHi [Name], it's [Salesperson] from Oxydise. Thanks for getting in touch. Is now still a good time for a few minutes? I saw you were looking at [HBOT / Red Light / both]. Rather than just send a brochure, I like to understand what has brought you to us and what you are hoping to achieve, because the right route is different for different people.\u201D"},
    {type:"h2", text:"Safety, contraindications & medical-claim guardrails"},
    {type:"callout", k:"Non-negotiable safety statement", text:"The salesperson must not diagnose, treat, prescribe, interpret scans or blood tests, advise on medication, advise against oncology treatment, or promise outcomes. Medical questions go to the customer's clinician or Dr Masha where appropriate."},
    {type:"script", k:"Medical advice response", text:"\u201CThat is a medical question, so I would not want to give you the wrong advice. We can explain how the equipment works and what the process looks like, but for your specific situation it would be best to speak with a qualified clinician. We can also arrange a consultation with Dr Masha where appropriate.\u201D"},
    {type:"h2", text:"HBOT contraindication screen", sub:"Ask before progressing to rental, purchase or delivery. If any answer is yes or unclear \u2014 pause and escalate."},
    {type:"table", head:["Question","If yes / unsure"], rows:[
      ["Ever had a pneumothorax, collapsed lung, lung blebs or significant lung disease?","Pause. Clinician review required."],
      ["Current chest infection, fever, severe sinus infection or blocked ears?","Delay until resolved or clinician confirms."],
      ["Recent or planned chest/thoracic surgery?","Pause. Clinician review required."],
      ["Currently receiving chemotherapy (esp. doxorubicin, cisplatin, bleomycin-type)?","Pause. Oncology/clinician sign-off required."],
      ["COPD, emphysema, severe asthma or air-trapping issues?","Pause. Clinician review required."],
      ["Uncontrolled heart failure or serious cardiac instability?","Pause. Clinician review required."],
      ["Seizure disorder or history of oxygen sensitivity?","Pause. Clinician review required."],
      ["Pregnant?","Usually avoid unless medically indicated. Clinician route only."],
      ["Recent ear surgery, ear barotrauma, or cannot equalise ear pressure?","Delay or clinician review."]
    ]},
    {type:"h2", text:"Claims framework"},
    {type:"dodont", rows:[
      ["\u201CHBOT supports oxygen delivery and may support recovery, inflammation balance and tissue repair.\u201D","\u201CHBOT cures inflammation / cancer / long Covid / neurological conditions.\u201D"],
      ["\u201CResearch is strongest for recognised medical indications, with emerging evidence elsewhere.\u201D","\u201CThe science proves it will work for you.\u201D"],
      ["\u201CMany customers report improvements in energy, sleep, focus or recovery, but results vary.\u201D","\u201CYou will feel better after X sessions.\u201D"],
      ["\u201CRLT supports cellular energy and is used for skin, recovery and comfort goals.\u201D","\u201CRLT treats disease.\u201D"],
      ["\u201CWe can discuss protocols, but we do not replace your clinician.\u201D","\u201CStop/change your medication or treatment plan.\u201D"]
    ]},
    {type:"h2", text:"Objection handling"},
    {type:"table", head:["Concern","Best response","Avoid saying"], rows:[
      ["\u201CIs it safe?\u201D","\u201CIt is generally well tolerated when screened and used correctly. That is why we ask safety questions and provide training.\u201D","\u201CIt is completely risk-free.\u201D"],
      ["\u201CWill it work for me?\u201D","\u201CWe can explain the mechanism, match it to your goal, and track response over a sensible block.\u201D","\u201CYes, definitely.\u201D"],
      ["\u201CHow many sessions?\u201D","\u201CIt depends on the goal. One or two sessions is rarely enough. We usually think in blocks; 40\u201360 sessions is where most people get strong effects.\u201D","\u201CYou only need one session.\u201D"],
      ["\u201CI'm claustrophobic.\u201D","\u201CThat is common. We can talk through chamber type, training and starting slowly. The Wellness Lab can help some people experience it first.\u201D","\u201CYou'll be fine.\u201D"],
      ["\u201CIt is expensive.\u201D","\u201CThat is why rental, rent-to-buy and finance routes exist. We can start with the most sensible level of commitment.\u201D","\u201CIt is cheap.\u201D"],
      ["\u201CI found a cheaper one online.\u201D","\u201CCompare the whole package: equipment, safety, training, delivery, support, warranty and advice. Tell me who it is and I'll give you an honest view.\u201D","\u201CCheap ones are dangerous.\u201D"]
    ]},
    {type:"h2", text:"Do not say"},
    {type:"list", items:[
      "\u201CHBOT cures cancer / long Covid / dementia / autoimmune disease / infertility.\u201D",
      "\u201CRed Light is safe for everyone.\u201D",
      "\u201CYou can ignore your doctor.\u201D",
      "\u201CThis replaces medication, surgery, rehabilitation or oncology treatment.\u201D",
      "\u201CHigher pressure is always better.\u201D",
      "\u201COur equipment is medically certified for everything we discuss.\u201D",
      "\u201CYou will see X result by session Y.\u201D"

/* ---------- Feedback storage (persists on hosted sites / file; in-memory fallback when blocked) ---------- */
const Store = (()=>{
  let ok=false; const mem={};
  try{ const t="__ox_probe"; localStorage.setItem(t,t); localStorage.removeItem(t); ok=true; }catch(e){ ok=false; }
  return {
    persistent: ok,
    get(k){ try{ return ok ? localStorage.getItem(k) : (k in mem?mem[k]:null); }catch(e){ return k in mem?mem[k]:null; } },
    set(k,v){ try{ if(ok) localStorage.setItem(k,v); else mem[k]=v; }catch(e){ mem[k]=v; } }
  };
})();

const OVR_KEY="oxydise_overrides_v1";
const TMPL_KEY="oxydise_tmpl_v1";
let OVR={}, TMPL={};
function ovrLoad(){ let local={}; try{ local=JSON.parse(Store.get(OVR_KEY)||"{}"); }catch(e){} OVR=Object.assign({}, (BAKED&&BAKED.overrides)||{}, local); }
function ovrSave(){ Store.set(OVR_KEY, JSON.stringify(OVR)); backendPush("overrides"); }
function tmplLoad(){ let local={}; try{ local=JSON.parse(Store.get(TMPL_KEY)||"{}"); }catch(e){} TMPL=Object.assign({}, (BAKED&&BAKED.tmpl)||{}, local); }
function tmplGet(tid){ const d=TMPL[tid]; return d? JSON.parse(JSON.stringify(d)) : {notes:"",docs:[]}; }
function tmplSet(tid,obj){ TMPL[tid]=obj; Store.set(TMPL_KEY, JSON.stringify(TMPL)); backendPush("tmpl"); }
function downloadText(text,name,type){ try{ const b=new Blob([text],{type:type||"text/plain"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); }catch(e){ toast("Download not supported here."); } }
function normUrl(u){ return /^(https?:|mailto:|tel:|\/|#)/i.test(u) ? u : "https://"+u; }

const EDIT={on:false};
function setEditing(on){
  EDIT.on=on;
  document.body.classList.toggle("editing",on);
  const bar=$("#editbar"); if(bar) bar.hidden=!on;
  const btn=$("#editBtn"); if(btn){ btn.textContent=on?"Editing\u2026":"Edit"; btn.classList.toggle("on",on); }
  render();
}
function tryEnableEditing(){
  if(EDIT.on){ setEditing(false); toast("Edits saved on this device."); return; }
  const pass=prompt("Enter the edit passcode to change site text:");

const EDIT_SEL="h1.page-title, .lead, .promise p, .ed-h2, .section > .sub, .tbl td, ul.clean li, ul.tmpl li, .card .ct, .card .cd, .callout p, .rule-row .rk, .rule-row .rv, .feedback-q";
function markEditable(c, pageKey){
  // wrap trailing text of section headings so the ◈ icon is preserved
  c.querySelectorAll(".section > h2").forEach(h2=>{
    if(h2.querySelector(".ed-h2")) return;
    let txt=""; h2.childNodes.forEach(n=>{ if(n.nodeType===3) txt+=n.textContent; });
    txt=txt.replace(/\s+/g," ").trim();
    if(!txt) return;
    [...h2.childNodes].forEach(n=>{ if(n.nodeType===3) h2.removeChild(n); });
    const sp=document.createElement("span"); sp.className="ed-h2"; sp.textContent=txt; h2.appendChild(sp);
  });
  const targets=[...c.querySelectorAll(EDIT_SEL)].filter(el=>{
    if(el.childElementCount!==0) return false;
    if(!el.textContent.trim()) return false;
    if(el.closest(".fb-form, .fb-list, .reg-detail, .reg-tbl, #editbar")) return false;
    return true;
  });
  targets.forEach((el,i)=>{
    const key=pageKey+"#"+i;
    el.dataset.edit=key;
    if(OVR[key]!=null) el.textContent=OVR[key];
    if(EDIT.on){
      el.contentEditable="true";
      el.spellcheck=true;
      el.classList.add("editable");
      el.addEventListener("blur",()=>{
        const v=el.textContent.replace(/\s+\n/g,"\n").trim();
        OVR[key]=v; ovrSave();
      });
      el.addEventListener("keydown",e=>{ if(e.key==="Enter" && el.tagName!=="P" && !el.classList.contains("lead")){ e.preventDefault(); el.blur(); } });
    }
  });
}

function regBadge(btn,tid){
  const d=TMPL[tid]||{}; const dc=(d.docs||[]).length; const hn=!!(d.notes&&d.notes.trim());
  const b=btn.querySelector(".reg-badge");
  if(dc){ b.hidden=false; b.textContent=dc; } else b.hidden=true;
  btn.classList.toggle("has-notes",hn||dc>0);
}
function regBadgeByTid(tid){ const btn=document.querySelector('.reg-toggle[data-tid="'+tid+'"]'); if(btn) regBadge(btn,tid); }
function wireTemplateRows(c){
  const tbl=c.querySelector(".reg-tbl"); if(!tbl) return;
  tbl.querySelectorAll(".reg-toggle").forEach(btn=>{
    const tid=btn.dataset.tid; regBadge(btn,tid);
    btn.onclick=()=>{
      const detail=tbl.querySelector('.reg-detail[data-detail="'+tid+'"]');
      const panel=detail.querySelector(".reg-panel");
      const opening=detail.hidden;
      detail.hidden=!opening;
      btn.querySelector(".rt-ic").textContent=opening?"\u2212":"\uFF0B";
      if(opening){ renderRegPanel(panel,tid); }

function renderRegPanel(panel,tid){
  panel.innerHTML=`
    <div class="rp-label">Thoughts / notes</div>
    <textarea class="rp-notes" rows="3" placeholder="Notes, questions or decisions about this template\u2026"></textarea>
    <div class="rp-label">Documents</div>
    <div class="rp-docs"></div>
    <div class="rp-add">
      <input class="rp-doc-label" placeholder="Name (e.g. Draft v2)">
      <input class="rp-doc-url" placeholder="Paste a share link \u2014 Google Drive, Dropbox, SharePoint, URL\u2026">
      <button class="rp-add-btn" type="button">Add document</button>
    </div>
    <div class="rp-help">To attach a document, upload it to your shared drive and paste the link here \u2014 then everyone sees it once you Publish from Edit mode.</div>`;
  const notes=panel.querySelector(".rp-notes"); notes.value=(tmplGet(tid).notes)||"";
  let nt; notes.addEventListener("input",()=>{ const x=tmplGet(tid); x.notes=notes.value; tmplSet(tid,x); clearTimeout(nt); nt=setTimeout(()=>regBadgeByTid(tid),200); });
  function drawDocs(){
    const docs=(tmplGet(tid).docs)||[];
    const box=panel.querySelector(".rp-docs");
    box.innerHTML=docs.length
      ? docs.map((d,i)=>`<div class="rp-doc"><a class="ext" href="${esc(d.url)}" target="_blank" rel="noopener">\u{1F4CE} ${esc(d.label||d.url)}</a><button class="rp-doc-del" type="button" data-i="${i}">Remove</button></div>`).join("")
      : `<div class="rp-empty">No documents linked yet.</div>`;
    box.querySelectorAll(".rp-doc-del").forEach(b=>b.onclick=()=>{ const x=tmplGet(tid); (x.docs||[]).splice(+b.dataset.i,1); tmplSet(tid,x); drawDocs(); regBadgeByTid(tid); });
  }
  panel.querySelector(".rp-add-btn").onclick=()=>{
    const labEl=panel.querySelector(".rp-doc-label"), urlEl=panel.querySelector(".rp-doc-url");
    const url=urlEl.value.trim(); if(!url){ urlEl.focus(); return; }
    const x=tmplGet(tid); x.docs=x.docs||[]; x.docs.push({label:labEl.value.trim()||url, url:normUrl(url)}); tmplSet(tid,x);
    labEl.value=""; urlEl.value=""; drawDocs(); regBadgeByTid(tid); toast("Document linked.");
  };
  drawDocs();
}

/* ----- Publish / export ----- */
async function publishSite(){
  let src=null;
  try{ const r=await fetch(location.href,{cache:"no-store"}); if(r.ok) src=await r.text(); }catch(e){}
  if(!src){ exportEdits(); toast("Couldn't read the page file in this preview, so I exported your edits as JSON. On the hosted site, Publish downloads the full updated page."); return; }
  const baked=JSON.stringify({overrides:OVR,tmpl:TMPL}).replace(/\*\//g,"*\\/");
  const out=src.replace(/\/\*BAKED_START\*\/[\s\S]*?\/\*BAKED_END\*\//, "/*BAKED_START*/var BAKED="+baked+";/*BAKED_END*/");
  if(out===src){ toast("Couldn't find the content marker to update."); return; }
  downloadText(out,"oxydise-operating-system.html","text/html");
  toast("Updated site downloaded. Replace your hosted file with it to publish for everyone.");
}
function exportEdits(){ downloadText(JSON.stringify({overrides:OVR,tmpl:TMPL},null,2),"oxydise-content.json","application/json"); }
function importEdits(file){
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result); if(d.overrides){ OVR=Object.assign({},OVR,d.overrides); ovrSave(); } if(d.tmpl){ TMPL=Object.assign({},TMPL,d.tmpl); Store.set(TMPL_KEY,JSON.stringify(TMPL)); backendPush("tmpl"); } toast("Edits imported."); render(); }catch(e){ toast("That file wasn't valid edits JSON."); } };
  rd.readAsText(file);
}
function discardLocal(){
  const shared = Net.enabled;
  if(!confirm(shared ? "Reload the shared content from the server, dropping any unsynced local changes?" : "Discard edits made in this browser? Published text stays; only unsaved local changes are removed.")) return;
  Store.set(OVR_KEY,"{}"); Store.set(TMPL_KEY,"{}"); ovrLoad(); tmplLoad();
  if(shared){ backendHydrate().then(()=>render()); toast("Reloaded from the server."); }
  else { render(); toast("Local edits discarded."); }
}

const FB_KEY="oxydise_feedback_v1";
function fbAll(){ try{ return JSON.parse(Store.get(FB_KEY)||"[]"); }catch(e){ return []; } }
function fbSaveAll(list){ Store.set(FB_KEY, JSON.stringify(list)); backendPush("feedback"); }
function fbAdd(rec){ const list=fbAll(); list.unshift(rec); fbSaveAll(list); }
function fbForPage(pid){ return fbAll().filter(x=>x.pageId===pid); }
function fbDelete(id){ fbSaveAll(fbAll().filter(x=>x.id!==id)); }
function fbClear(){ fbSaveAll([]); }
function fbId(){ return "f"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtTime(ts){ try{ return new Date(ts).toLocaleString([], {dateStyle:"medium", timeStyle:"short"}); }catch(e){ return ""; } }
function toast(t){ let n=document.querySelector(".toast"); if(!n){ n=document.createElement("div"); n.className="toast"; document.body.appendChild(n); } n.textContent=t; n.classList.add("show"); clearTimeout(n._t); n._t=setTimeout(()=>n.classList.remove("show"),2300); }

function feedbackForm(pageId, pageTitle, showList){
  showList = showList!==false;
