<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Oxydise — Customer Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF; --panel:#FBFBFD; --surface:#F5F5F7; --line:#E5E5EA;
  --ink:#1D1D1F; --muted:#6E6E73; --primary:#00AAFF; --navy:#001540;
  --primary-soft:rgba(0,170,255,.10); --navy-soft:rgba(0,21,64,.05);
  --shadow:0 1px 2px rgba(0,21,64,.04),0 8px 24px rgba(0,21,64,.06);
  --display:"Urbanist",-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;
  --body:"Manrope",-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  --sidebar-w:300px;
}
[data-theme="dark"]{
  --bg:#0B0B0D; --panel:#151518; --surface:#1D1D1F; --line:#2C2C2E;
  --ink:#F5F5F7; --muted:#98989D; --primary:#00AAFF; --navy:#001540;
  --primary-soft:rgba(0,170,255,.14); --navy-soft:rgba(255,255,255,.04);
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01";letter-spacing:-.005em;
}
a{color:inherit;text-decoration:none}
::selection{background:var(--primary-soft);color:var(--ink)}

/* ---------- Sidebar ---------- */
.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
  background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;z-index:40;overflow-y:auto;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.brand{padding:28px 26px 22px;display:flex;align-items:center;justify-content:space-between}
/* password gate */
.gate{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:var(--bg);padding:24px}
body.locked .gate{display:flex}
body.locked .sidebar,body.locked .main,body.locked #editbar,body.locked .scrim{display:none!important}
.gate-card{width:100%;max-width:360px;text-align:center}
.gate-logo{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:.02em;color:var(--ink)}
.gate-eyebrow{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-top:6px}
.gate-msg{font-size:14.5px;color:var(--muted);line-height:1.5;margin:22px 0 18px}
.gate-input{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--ink);font-family:var(--body);font-size:15px;text-align:center;transition:.15s}
.gate-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
.gate-btn{width:100%;margin-top:12px;padding:13px 16px;border-radius:12px;border:1px solid var(--primary);background:var(--primary);color:#fff;font-family:var(--display);font-weight:600;font-size:15px;cursor:pointer;transition:.15s}
.gate-btn:hover{filter:brightness(1.06)}
[data-theme="dark"] .gate-btn{color:var(--navy)}
.gate-err{margin-top:14px;font-size:13.5px;color:#e0533d;font-weight:500}
.gate-err[hidden]{display:none}
.brand-logo{cursor:pointer;color:var(--ink);display:flex;align-items:center;transition:color .2s}
.brand-logo svg{height:30px;width:auto;display:block}
.brand-logo:hover{color:var(--primary)}
/* education portal */
.edu-toc{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.edu-toc .toc-h{font-family:var(--display);font-weight:700;font-size:15px;letter-spacing:.04em;color:var(--ink);margin-bottom:12px}
.toc-list{display:grid;grid-template-columns:1fr 1fr;gap:2px 26px}
.toc-item{display:flex;gap:10px;align-items:baseline;padding:6px 8px;border-radius:8px;color:var(--ink);cursor:pointer;font-size:14px;line-height:1.4;transition:.12s}
.toc-item:hover{background:var(--primary-soft);color:var(--primary)}
.toc-n{color:var(--primary);font-weight:700;font-variant-numeric:tabular-nums;min-width:22px;flex-shrink:0}
.edu-h3{font-family:var(--display);font-weight:600;font-size:18px;color:var(--ink);margin:0}
.edu-sub{margin-top:-4px}
@media(max-width:760px){ .toc-list{grid-template-columns:1fr} }

/* education: make it read like the source document */
.edu-doc .section{margin-top:22px}
.edu-doc .section h2{font-family:var(--display);font-weight:700;font-size:30px;line-height:1.15;color:var(--ink);border-top:2px solid var(--ink);padding-top:20px;margin-top:14px;letter-spacing:-0.01em}
.edu-doc .section h2 .ico{display:none}
.edu-doc .edu-sub{margin-top:14px}
.edu-doc .edu-h3{font-family:var(--display);font-weight:700;font-size:25px;color:var(--navy)}
[data-theme="dark"] .edu-doc .edu-h3{color:var(--primary)}
.edu-doc .sub{font-size:15.5px;line-height:1.65;color:var(--ink)}
.edu-doc .tbl{font-size:14px}
.edu-doc .tbl thead th{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
[data-theme="dark"] .edu-doc .tbl thead th{background:#000}
.edu-doc .callout{background:var(--primary-soft);border-left:3px solid var(--primary);border-radius:10px;padding:14px 18px}
.edu-doc .callout .ck{font-family:var(--display);text-transform:none;letter-spacing:0;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px}
[data-theme="dark"] .edu-doc .callout .ck{color:var(--primary)}
.edu-doc .callout p{font-size:14.5px;line-height:1.6}
.edu-doc .edu-toc h2,.edu-doc .edu-toc .toc-h{border-top:none}
.edu-doc .edu-toc{border-top:none}
.theme-btn{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--bg);color:var(--muted);cursor:pointer;display:grid;place-items:center;
  transition:.2s;font-size:15px;
}
.theme-btn:hover{color:var(--ink);border-color:var(--primary)}
.nav-scroll{flex:1;padding:6px 16px 30px}
.nav-group{margin-top:22px}
.nav-group:first-child{margin-top:6px}
.nav-label{
  font-family:var(--body);font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.13em;color:var(--muted);padding:0 12px 8px;display:block;
}
.nav-link{
  display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:9px;
  color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;
  transition:.15s;line-height:1.3;position:relative;
}
.nav-link .nx{font-variant-numeric:tabular-nums;font-size:12px;color:var(--muted);min-width:18px;font-weight:600;opacity:.7}
.nav-link:hover{background:var(--surface);color:var(--ink)}
.nav-link.active{background:var(--primary-soft);color:var(--ink)}
.nav-link.active .nx{color:var(--primary);opacity:1}
.nav-link.dim{opacity:.38}
.nav-link .dot{position:absolute;right:12px;width:6px;height:6px;border-radius:50%;background:var(--primary);opacity:0;transition:.15s}
.nav-link.has-role .dot{opacity:1}

/* ---------- Main ---------- */
.main{margin-left:var(--sidebar-w);min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{max-width:1080px;margin:0 auto;padding:13px 56px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.viewing{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.filters{display:flex;gap:7px;flex-wrap:wrap}
.chip{
  font-family:var(--body);font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:999px;
  border:1px solid var(--line);background:var(--bg);color:var(--muted);cursor:pointer;transition:.15s;letter-spacing:.01em;
}
.chip:hover{color:var(--ink);border-color:var(--muted)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
[data-theme="dark"] .chip.on{background:var(--primary);color:var(--navy);border-color:var(--primary)}
.menu-toggle{display:none}

.content{max-width:1080px;margin:0 auto;padding:60px 56px 120px}

/* ---------- Page header ---------- */
.eyebrow{font-size:12.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);margin-bottom:18px}
h1.page-title{font-family:var(--display);font-weight:600;font-size:clamp(2.1rem,5vw,3.5rem);line-height:1.04;letter-spacing:-.02em;color:var(--ink);max-width:18ch}
.lead{font-size:1.0625rem;line-height:1.55;color:var(--muted);margin-top:22px;max-width:62ch}
.page-head{padding-bottom:34px;margin-bottom:18px;border-bottom:1px solid var(--line)}

/* ---------- Sections / blocks ---------- */
.section{margin-top:46px}
.section > h2{
  font-family:var(--display);font-weight:600;font-size:1.4rem;letter-spacing:-.01em;color:var(--ink);
  display:flex;align-items:center;gap:12px;margin-bottom:6px;
}
.section > h2 .ico{color:var(--primary)}
.section .sub{color:var(--muted);font-size:.95rem;margin-bottom:18px;max-width:64ch}

.promise{
  background:linear-gradient(180deg,var(--primary-soft),transparent);
  border:1px solid var(--line);border-radius:16px;padding:24px 26px;margin-top:34px;
  position:relative;overflow:hidden;
}
.promise:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--primary)}
.promise .k{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:9px}
.promise p{font-size:1.02rem;line-height:1.6;color:var(--ink)}
.promise p + p{margin-top:12px;color:var(--muted);font-size:.96rem}

/* tables */
.tbl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:14px;background:var(--bg)}
.tbl th{
  text-align:left;font-family:var(--body);font-weight:600;font-size:11.5px;letter-spacing:.07em;
  text-transform:uppercase;color:var(--muted);background:var(--surface);padding:11px 16px;border-bottom:1px solid var(--line);
}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.5;color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--panel)}
.tbl td .owner-tag{display:inline-block}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%}
.edu-doc .sub{max-width:none!important}
@media(max-width:760px){
  .tbl-wrap .tbl{min-width:600px}
  .tbl-wrap .reg-tbl{min-width:780px}
}
.role-pill{
  display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;
  background:var(--navy-soft);color:var(--ink);letter-spacing:.01em;white-space:nowrap;
}
tr.role-hit td{background:var(--primary-soft)!important}
tr.role-hit td:first-child{box-shadow:inset 3px 0 0 var(--primary)}
.row-dim{opacity:.32;transition:.2s}

/* card grids */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{
  background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:18px 19px;transition:.18s;
}
.card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px)}
.card .ct{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink);margin-bottom:6px}
.card .cd{font-size:13.5px;color:var(--muted);line-height:1.5}
.card.role-hit{border-color:var(--primary);background:var(--primary-soft)}

/* simple lists */
ul.clean{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:6px}
ul.clean li{padding-left:22px;position:relative;color:var(--ink);font-size:14.5px;line-height:1.5}
ul.clean li:before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;background:var(--primary)}
ul.tmpl{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:6px}
ul.tmpl li{padding:11px 14px;background:var(--surface);border-radius:10px;font-size:13.5px;color:var(--ink);border:1px solid transparent;transition:.15s}
ul.tmpl li:hover{border-color:var(--line);background:var(--panel)}

.rule-row{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.rule-row:last-child{border-bottom:none}
.rule-row .rk{font-family:var(--display);font-weight:600;font-size:14.5px;color:var(--ink);min-width:230px;flex-shrink:0}
.rule-row .rv{color:var(--muted);font-size:14px;line-height:1.5}

.callout{border:1px solid var(--line);border-left:3px solid var(--navy);background:var(--panel);border-radius:12px;padding:16px 19px;margin-top:18px}
.callout .ck{font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:7px}
[data-theme="dark"] .callout{border-left-color:var(--primary)}
[data-theme="dark"] .callout .ck{color:var(--primary)}
.callout p{font-size:14.5px;color:var(--ink);line-height:1.58}
.callout.warn{border-left-color:var(--primary)}
.callout.script{background:var(--surface)}
.callout.script p{font-style:italic;color:var(--ink)}

.feedback-q{display:flex;gap:11px;padding:9px 0;color:var(--muted);font-size:14px;align-items:flex-start}
.feedback-q:before{content:"?";font-family:var(--display);font-weight:700;color:var(--primary);background:var(--primary-soft);width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px;flex-shrink:0;margin-top:1px}

/* home hero metrics */
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:6px}
.metric{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:22px}
.metric .mn{font-family:var(--display);font-weight:700;font-size:2rem;color:var(--primary);letter-spacing:-.02em}
.metric .ml{font-size:13px;color:var(--muted);margin-top:4px}
.role-banner{display:none;align-items:center;gap:12px;background:var(--primary-soft);border:1px solid var(--primary);border-radius:12px;padding:13px 18px;margin-top:24px;font-size:14px}
.role-banner.show{display:flex}
.role-banner b{color:var(--ink)}
.role-banner .clear{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--primary);cursor:pointer;border:none;background:none}

.search{
  width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:var(--bg);
  color:var(--ink);font-family:var(--body);font-size:14.5px;margin-bottom:18px;transition:.15s;
}
.search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}

/* feedback widget */
.fb-form{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.fb-form .fb-text{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14.5px;line-height:1.5;resize:vertical;min-height:64px;transition:.15s}
.fb-form .fb-text:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
.fb-row{display:flex;gap:10px;margin-top:10px;align-items:center;flex-wrap:wrap}
.fb-row .fb-name{flex:1;min-width:180px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;transition:.15s}
.fb-row .fb-name:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
.fb-submit{padding:10px 20px;border-radius:10px;border:1px solid var(--primary);background:var(--primary);color:#fff;font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap}
.fb-submit:hover{filter:brightness(1.06);transform:translateY(-1px)}
[data-theme="dark"] .fb-submit{color:var(--navy)}
.fb-msg{margin-top:12px;font-size:13.5px;color:var(--primary);font-weight:500;background:var(--primary-soft);border-radius:9px;padding:9px 13px}
.fb-list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.fb-list-h{font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.fb-item{position:relative;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.fb-item-top{display:flex;gap:10px;align-items:baseline;margin-bottom:5px}
.fb-who{font-family:var(--display);font-weight:600;font-size:13.5px;color:var(--ink)}
.fb-when{font-size:12px;color:var(--muted)}
.fb-pin{font-size:11px;color:var(--primary);font-weight:600;margin-left:auto}
.fb-body{font-size:14px;color:var(--ink);line-height:1.55;white-space:pre-wrap;padding-right:62px}
.fb-del{position:absolute;top:11px;right:12px;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-weight:500}
.fb-del:hover{color:var(--primary)}
.fb-toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0 6px}
.fb-tb{padding:9px 15px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:500;font-size:13px;cursor:pointer;transition:.15s}
.fb-tb:hover{border-color:var(--primary);color:var(--primary)}
.fb-tb.danger:hover{border-color:#e0533d;color:#e0533d}
.fb-note{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5}
.fb-group{margin-top:20px}
.fb-group-h{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:9px}
.fb-badge{font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-soft);border-radius:20px;padding:2px 9px}
.fb-count-wrap{font-family:var(--body);font-weight:400;font-size:.95rem;color:var(--muted)}
.fb-empty{font-size:14px;color:var(--muted);line-height:1.6;margin-top:8px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
[data-theme="dark"] .toast{background:var(--primary);color:var(--navy)}

/* edit button + mode */
.edit-btn{margin-left:auto;padding:7px 16px;border-radius:20px;border:1px solid var(--line);background:var(--bg);color:var(--muted);font-family:var(--body);font-weight:600;font-size:13px;cursor:pointer;transition:.15s;flex-shrink:0}
.edit-btn:hover{color:var(--ink);border-color:var(--primary)}
.edit-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
[data-theme="dark"] .edit-btn.on{color:var(--navy)}
.sync-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-left:6px;transition:.2s}
.sync-dot.ok{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.sync-dot.err{background:#e0533d;box-shadow:0 0 0 3px rgba(224,83,61,.18)}
.sync-dot[hidden]{display:none}
.editable{border-radius:4px;transition:background .12s, box-shadow .12s}
body.editing .editable{box-shadow:0 0 0 1px var(--line);cursor:text}
body.editing .editable:hover{background:var(--primary-soft)}
body.editing .editable:focus{outline:none;box-shadow:0 0 0 2px var(--primary);background:var(--primary-soft)}
body.editing .ed-h2{display:inline-block;min-width:30px}
body.editing{padding-bottom:60px}
#editbar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;gap:13px;padding:11px 20px;background:var(--navy);color:#fff;z-index:300;box-shadow:0 -6px 24px rgba(0,0,0,.2);font-size:13.5px;flex-wrap:wrap}
#editbar[hidden]{display:none}
[data-theme="dark"] #editbar{background:#000;border-top:1px solid var(--line)}
.eb-tag{font-family:var(--display);font-weight:700;letter-spacing:.04em}
.eb-hint{color:rgba(255,255,255,.7);font-size:12.5px}
.eb-spacer{flex:1}
.eb-btn{padding:7px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;font-family:var(--body);font-weight:600;font-size:12.5px;cursor:pointer;transition:.15s}
.eb-btn:hover{background:rgba(255,255,255,.12)}
.eb-btn.primary{background:var(--primary);border-color:var(--primary)}
.eb-btn.primary:hover{filter:brightness(1.08)}
.eb-btn.danger:hover{background:rgba(224,83,61,.85);border-color:transparent}

/* template register: notes + documents */
.reg-tbl td.reg-note-cell{width:46px;text-align:center;padding:8px}
.reg-toggle{position:relative;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--muted);cursor:pointer;font-size:15px;line-height:1;transition:.15s;display:inline-flex;align-items:center;justify-content:center}
.reg-toggle:hover{border-color:var(--primary);color:var(--primary)}
.reg-toggle.has-notes{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.reg-badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.reg-badge[hidden]{display:none}
[data-theme="dark"] .reg-badge{color:var(--navy)}
.reg-detail > td{background:var(--surface);padding:0!important;border-bottom:1px solid var(--line)}
.reg-panel{padding:16px 18px}
.rp-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:4px 0 7px}
.rp-notes{width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.5;resize:vertical;transition:.15s}
.rp-notes:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.rp-docs{margin-bottom:12px}
.rp-doc{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--bg);border:1px solid var(--line);border-radius:9px;margin-bottom:7px;font-size:13.5px}
.rp-doc a{flex:1;word-break:break-all}
.rp-doc-del{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-weight:500;flex-shrink:0}
.rp-doc-del:hover{color:var(--primary)}
.rp-empty{font-size:13px;color:var(--muted);padding:4px 0 8px}
.rp-add{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rp-add .rp-doc-label{flex:1;min-width:120px;max-width:200px}
.rp-add .rp-doc-url{flex:2;min-width:200px}
.rp-add input{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:13.5px;transition:.15s}
.rp-add input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.rp-add-btn{padding:9px 16px;border-radius:9px;border:1px solid var(--primary);background:var(--primary);color:#fff;font-family:var(--display);font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;transition:.15s}
.rp-add-btn:hover{filter:brightness(1.06)}
[data-theme="dark"] .rp-add-btn{color:var(--navy)}
.rp-help{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}

.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.03em}
.tag.p1{background:rgba(0,170,255,.16);color:#0077b3}.tag.p2{background:var(--surface);color:var(--muted)}.tag.p3{background:var(--surface);color:var(--muted)}
[data-theme="dark"] .tag.p1{color:#5cc8ff}
.ext{color:var(--primary);font-weight:600}
.ext:hover{text-decoration:underline}

.foot{margin-top:80px;padding-top:26px;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px;line-height:1.7}

@media(max-width:980px){
  :root{--sidebar-w:270px}
  .content,.topbar-inner{padding-left:30px;padding-right:30px}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-toggle{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer;font-size:17px}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
  .scrim.show{display:block}
  .rule-row{flex-direction:column;gap:4px}.rule-row .rk{min-width:0}
}
.fade{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.lang-switch{display:inline-flex;gap:2px;border:1px solid var(--line);border-radius:9px;padding:2px;background:var(--bg);margin-left:8px}
.lang-btn{border:none;background:none;font-family:var(--display);font-size:12px;font-weight:600;color:var(--muted);padding:4px 9px;border-radius:7px;cursor:pointer;letter-spacing:.02em}
.lang-btn.on{background:var(--primary);color:#fff}
[data-theme="dark"] .lang-btn.on{color:var(--navy)}
.lang-btn:hover:not(.on){color:var(--ink)}
.role-banner .rb-sep{opacity:.5}
</style>

let NET_OK=false;
function setSyncDot(state){ const d=document.getElementById("syncDot"); if(!d) return; d.hidden=!Net.enabled; d.className="sync-dot "+(state||""); d.title = state==="ok"?"Live \u2014 synced to the shared server":(state==="err"?"Offline \u2014 changes saved on this device only":"Connecting\u2026"); }
async function backendHydrate(){
  if(!Net.enabled) return false;
  try{
    const m=await Net.getAll();
    if(m.overrides!=null) Store.set(OVR_KEY, JSON.stringify(m.overrides));
    if(m.tmpl!=null) Store.set(TMPL_KEY, JSON.stringify(m.tmpl));
    if(m.feedback!=null) Store.set(FB_KEY, JSON.stringify(m.feedback));
    ovrLoad(); tmplLoad();
    NET_OK=true; setSyncDot("ok"); return true;
  }catch(e){ NET_OK=false; setSyncDot("err"); console.warn("sync read failed",e); return false; }
}
function backendPush(which){
  if(!Net.enabled) return;
  let key,val;
  if(which==="overrides"){ key="overrides"; val=OVR; }
  else if(which==="tmpl"){ key="tmpl"; val=TMPL; }
  else if(which==="feedback"){ key="feedback"; try{ val=JSON.parse(Store.get(FB_KEY)||"[]"); }catch(e){ val=[]; } }
  else return;
  Net.set(key,val).then(()=>{ NET_OK=true; setSyncDot("ok"); }).catch(e=>{ NET_OK=false; setSyncDot("err"); console.warn("sync write failed",e); toast("Couldn't reach the server \u2014 saved on this device."); });
}
function backendPoll(){
  if(!Net.enabled) return;
  setInterval(async ()=>{
    const ae=document.activeElement;
    if(ae && (ae.isContentEditable || (ae.closest && ae.closest(".fb-form, .rp-panel, #editbar")))) return;
    try{
      const m=await Net.getAll(); NET_OK=true; setSyncDot("ok");
      let changed=false;
      const cmp=(k,store)=>{ if(m[k]==null) return; const nv=JSON.stringify(m[k]); let cv; try{ cv=JSON.stringify(JSON.parse(Store.get(store)||"null")); }catch(e){ cv="null"; } if(nv!==cv){ Store.set(store,nv); changed=true; } };
      cmp("overrides",OVR_KEY); cmp("tmpl",TMPL_KEY); cmp("feedback",FB_KEY);
      if(changed){ ovrLoad(); tmplLoad(); render(); }
    }catch(e){ NET_OK=false; setSyncDot("err"); }
  }, 12000);
}

these values, Oxydise has built this knowledge base for curious colleagues: people who want to understand the technology deeply enough to guide customers with trust, empathy, detail and care."}, {"type": "xtable", "head": ["Value", "Short line", "What it means in practice"], "rows": [["01 Trust", "Transparent, honest, consistent.", "We earn trust by being transparent, honest and consistent in everything we do; from pricing to performance. Our advice is grounded in expertise and genuine care, not short-term sales success."], ["02 Empathy", "Listen first. Long-term outcomes.", "We listen first, taking the time to understand each customer’s goals, concerns and journey. Every recommendation is made with long-term outcomes in mind, not quick wins."], ["03 Relationships", "Meaningful. Lasting. Collaborative.", "We build meaningful, lasting relationships with our customers, partners and colleagues. Through trust, openness and collaboration, we create a network that grows stronger together."], ["04 Curious", "Always learning. Questioning convention.", "We are driven by curiosity; constantly learning, testing and improving to stay ahead in a fast-moving space. By questioning convention, we uncover better ways to support health, recovery and performance."], ["05 Detail", "The difference is in the detail.", "We believe the difference is in the detail; from product quality and customer requirements to customer experience. Every touchpoint is thoughtfully designed and executed to deliver the highest standard."], ["06 Innovation", "Proven science. Forward-thinking ideas.", "We combine proven science with forward-thinking ideas to push the category forward. Our ambition is not just to compete, but to lead - making advanced wellness technology more accessible than ever."]]}, {"type": "h3", "text": "1.2 Knowledge-base principles"}, {"type": "callout", "k": "Baseline rule", "text": "Oxydise colleagues should understand more than they say. The knowledge base is here to educate colleagues deeply. Customer conversations should remain simple, calm, careful and approved."}, {"type": "xtable", "head": ["Principle", "What it means for colleagues"], "rows": [["Education first", "Use the science to understand the technology. Do not turn every mechanism into a customer claim."], ["Plain English first", "A tired, stressed or anxious customer should be able to understand the explanation without needing a biology degree."], ["Evidence-aware, not hype-led", "Use “research suggests”, “may support”, “is being studied”, “can help create the right environment” and “some customers report”. Avoid guarantees."], ["Safety before conversion", "Contraindications, tolerance, medicines, eye safety, fire safety, device instructions and practical suitability come before sales."], ["Protocols are context-dependent", "Pressure, session length, frequency, light dose and total exposure depend on the person, goal, equipment and safety profile."], ["Anecdotes are not evidence", "Stories help people understand possibilities, but they do not prove an outcome and must not be used as a promise."], ["Living library", "Every study, video, podcast, book and protocol card should have an owner, review date and status: starter, recommended, advanced, internal-only, or pending approval."]]}, {"type": "callout", "k": "Recommended resource card format", "text": "Title, type, topic, who it is useful for, time to complete, why it matters, customer-safe takeaway, can it be quoted externally, owner, last reviewed and approval status."}, {"type": "h2", "text": "2. How to use this education page", "id": "2"}, {"type": "prose", "text": ["This page is the place we want anyone who works with Oxydise to come back to: new colleagues, sales, admin, delivery, installers, maintenance, marketing and directors. It should help people understand the technology, listen to the important podcasts, watch the right videos and gradually work through the books. It should feel like a modern learning portal for curious colleagues, not a public-facing sales page and not a rigid checklist."]}, {"type": "xtable", "head": ["Route", "What to read/watch", "Best for"], "rows": [["Start here", "Knowledge-base principles, customer-safe language, HBOT basics, Red Light basics and safety guardrails.", "Everyone"], ["Build confidence", "Equipment fundamentals, oxygen concentrator explanation, protocols, common customer concerns and customer-safe wording.", "Sales, admin, support, delivery and marketing"], ["Go deeper", "Mitochondria, inflammation, cytokines, VEGF/BDNF/PDGF, fasting, PEMF, grounding, hydrogen, Neuro Gamma and study summaries.", "Wellness experts, content, founders and advanced sales"], ["Stay current", "Video library, people to know, new studies and sector awareness.", "Everyone who talks to customers or creates content"]]}, {"type": "callout", "k": "Colleague rhythm suggestion", "text": "New starters should be encouraged to spend 30-60 minutes per working day on education in their first month, but this should be framed as confidence-building rather than a mandatory “required pathway”."}, {"type": "h3", "text": "2.1 Plain-English decoder for scientific language"}, {"type": "callout", "k": "How science should appear on the website", "text": "Keep the real scientific words, because they build credibility. Then immediately explain them in brackets or in a short “In simple terms” line so every colleague can understand and repeat the idea clearly."}, {"type": "xtable", "head": ["Scientific term", "Simple colleague version"], "rows": [["Oxidative phosphorylation", "How mitochondria use oxygen to turn food energy into ATP, the cell’s usable energy."], ["Electron transport chain", "The final energy-production pathway inside mitochondria. Oxygen is the final receiver in this process."], ["Dissolved oxygen in plasma", "Oxygen carried in the liquid part of blood, not only attached to red blood cells."], ["Hypoxia", "Low oxygen availability in a tissue."], ["Hyperoxia", "Higher-than-normal oxygen exposure."], ["HIF-1 alpha", "The body’s low-oxygen alarm signal. It switches on survival pathways when tissues are short of oxygen."], ["Cytochrome c oxidase", "A mitochondrial enzyme that helps cells make energy and is often discussed as a light-sensitive target in Red Light Therapy."], ["Photobiomodulation", "Using specific wavelengths of light to influence cell signalling. In simple terms: a useful light signal, not heat or tanning."], ["Reactive oxygen species / ROS", "Small reactive molecules. Too much can be damaging, but a controlled amount is also used by the body as a signal."], ["Cytokines", "Immune-system messages that can turn inflammation up or down."], ["VEGF", "A blood-vessel growth signal. Simple version: blood supply."], ["BDNF", "A brain-support signal involved in learning, memory and new connections. Simple version: brain wiring."], ["PDGF", "A tissue-repair signal released by platelets. Simple version: repair scaffold."], ["VO2-rest", "How much oxygen the body uses at rest. Higher resting oxygen use can suggest the system is working harder than it should."], ["Selective antioxidant", "A compound that may help with harmful oxidative stress without blocking every useful stress signal the body needs for adaptation."]]}, {"type": "h2", "text": "3. Customer-safe language and claim guardrails", "id": "3"}, {"type": "callout", "k": "Best one-sentence guardrail", "text": "We can explain how the technology works, what research is exploring and what customers often report, but we do not diagnose, treat, prescribe, cure or promise outcomes."}, {"type": "xtable", "head": ["Risk area", "Internal rule", "Customer-facing wording"], "rows": [["Medical advice", "Colleagues can educate; clinicians advise on medical suitability.", "“I can explain how it works and when we would advise speaking to a clinician.”"], ["Studies", "A study does not equal a universal outcome. Know the population, protocol, dose, comparator and limitations.", "“A study in this area suggests...” rather than “it proves you will...”."], ["Customer stories", "Use only with consent and approved wording. Do not imply that one person’s story predicts another person’s result.", "“Some customers have reported...” not “this will happen for you”."], ["Home use", "Training, screening, installation, servicing and manufacturer instructions matter.", "“We support installation, training and safe-use guidance.”"], ["New modalities", "Grounding, hydrogen, PEMF and Neuro Gamma should be described carefully. Some evidence is emerging, mixed, early-stage or device-specific.", "“This is useful background, but not something to overclaim.”"]]}, {"type": "h2", "text": "4. Hyperbaric Oxygen Therapy", "id": "4"}, {"type": "h3", "text": "4.1 Simple explanation everyone should be able to say"}, {"type": "prose", "text": ["Hyperbaric Oxygen Therapy, or HBOT, means breathing concentrated oxygen while inside a pressurised chamber. The pressure allows more oxygen to dissolve into the liquid part of the blood, called plasma, not just attach to red blood cells. That extra dissolved oxygen can reach tissues that may be inflamed, injured, poorly perfused or recovering, helping create a better environment for repair, energy production and recovery."]}, {"type": "callout", "k": "Customer-safe summary", "text": "HBOT does not force the body to heal. It changes the oxygen environment so the body has more of what it needs to repair, regulate inflammation and produce energy. Use “support” language, not “treat” or “cure” language."}, {"type": "h3", "text": "4.2 The simple picture"}, {"type": "xtable", "head": ["Concept", "Plain-English explanation", "Why it matters"], "rows": [["ATA", "Atmospheres absolute. 1.0 ATA is normal sea-level pressure. A 1.5 ATA chamber is 50% more pressure than normal air pressure.", "Pressure is one part of the dose. It changes how much gas can dissolve into fluids."], ["Oxygen percentage", "Room air is about 21% oxygen. Oxygen concentrators commonly deliver around 90-96% oxygen through a mask or hood.", "Oxygen percentage and chamber pressure are different. Both affect oxygen dose."], ["Henry’s law", "More pressure over a gas means more of that gas can dissolve into liquid.", "This is why pressure helps oxygen dissolve into plasma."], ["Plasma oxygen", "Oxygen dissolved directly in the blood fluid, not carried on haemoglobin.", "This is the hidden advantage of HBOT: oxygen can reach areas where red-cell delivery is limited."], ["Partial pressure", "The pressure contribution of one gas in a mixture.", "Higher oxygen partial pressure increases the oxygen gradient into tissue."], ["Air breaks / off-gassing", "Short breaks from the oxygen mask during longer sessions.", "Used in some protocols to manage oxygen exposure and create oxygen fluctuations that may trigger adaptive repair signalling."]]}, {"type": "h3", "text": "4.3 How the oxygen concentrator works"}, {"type": "prose", "text": ["If you are asked how the oxygen concentrator works, say: it pulls in room air, then uses zeolite - a mineral with microscopic cage-like pores - to trap nitrogen molecules and allow oxygen to pass through. By continuously cycling this process, the machine delivers a steady flow of concentrated oxygen, usually around 93%, through tubing to the mask or hood.", "Most concentrators use two zeolite-filled molecular sieve beds. While one bed is online and under pressure, it adsorbs nitrogen and lets oxygen-enriched gas pass through. At the same time, the second bed is depressurised, releasing the nitrogen it previously captured and regenerating itself for the next cycle. The machine switches between the two beds every few seconds, which is how it creates a continuous supply of oxygen."]}, {"type": "callout", "k": "Important equipment distinction", "text": "The chamber should be pressurised with air. Concentrated oxygen is delivered through the intended breathing circuit. Never imply that the whole chamber is filled with pure oxygen."}, {"type": "xtable", "head": ["Quality point", "Why it matters", "How to say it without attacking competitors"], "rows": [["Zeolite quality", "Different molecular sieves vary in adsorption performance, durability and regeneration behaviour.", "“The quality of the sieve material matters because it affects how consistently nitrogen is removed over time.”"], ["Quantity of zeolite", "A larger or better-designed sieve bed can give the system more capacity and stability, depending on the engineering.", "“It is not just the concentrator label that matters; the internal bed design matters.”"], ["Moisture management", "Water vapour can occupy adsorption sites in zeolite and reduce the bed’s ability to capture nitrogen efficiently.", "“Moisture is one of the main enemies of long-term oxygen purity, so drying and moisture control are important engineering details.”"], ["Regeneration cycle", "The pressure/depressure cycle must allow captured nitrogen to release properly before the next cycle.", "“A good system keeps switching and regenerating cleanly, rather than slowly losing performance.”"], ["Long-term oxygen purity", "The goal is not a strong reading on day one only; it is consistent output after real-world use.", "“We care about performance stability over time, not just headline specifications.”"]]}, {"type": "callout", "k": "Customer-safe comparison language", "text": "Do not name a rival, imply they are “cheap”, or attack a manufacturer unless there is approved evidence. The premium Oxydise line is: “The difference is in the engineering details - sieve-bed quality, moisture control, pressure stability, oxygen purity and long-term serviceability.”"}, {"type": "h3", "text": "4.4 Core mechanisms colleagues should understand"}, {"type": "xtable", "head": ["Mechanism", "What is happening", "Where it helps the conversation"], "rows": [["Dissolved oxygen in plasma", "Under pressure, oxygen dissolves into plasma and can travel beyond normal haemoglobin delivery.", "Poor circulation, inflammation, injury recovery, fatigue states and tissue repair."], ["Inflammation modulation", "HBOT can influence inflammatory signalling and oxidative stress responses. Describe this as helping regulate inflammatory environments, not as a blanket anti-inflammatory cure.", "Pain, long-term inflammation, recovery load and post-viral fatigue."], ["Microcirculation and angiogenesis", "Oxygen gradients and intermittent exposure can support VEGF-related signalling and new blood vessel formation.", "Slow healing, vascular recovery, brain perfusion and tissue resilience."], ["Mitochondrial support", "Mitochondria need oxygen for oxidative phosphorylation. HBOT improves oxygen availability where tissue is hypoxic, inflamed or poorly perfused.", "Energy, recovery, brain fog and exercise tolerance."], ["Stem/progenitor cell mobilisation", "Studies have reported mobilisation of stem/progenitor cells after repeated HBOT exposure.", "Regenerative framing; use as mechanism education, not guaranteed outcome."], ["Neuroplasticity and brain perfusion", "HBOT research explores brain blood flow, cognitive function and neuroplasticity in certain populations.", "Brain fog, ageing brain and concussion/TBI conversations - escalate medical cases."], ["Collagen and fibroblast activity", "Oxygen is needed for collagen synthesis and wound-healing biology.", "Post-surgery, skin, tissue repair and injury recovery."]]}, {"type": "h3", "text": "4.5 HBOT and mitochondrial efficiency"}, {"type": "prose", "text": ["Hyperbaric oxygen affects mitochondrial efficiency at a fundamental level: it restores oxygen availability to the electron transport chain, where ATP is produced. When tissues are inflamed, hypoxic or poorly perfused, mitochondria are forced into less efficient energy production, often producing more oxidative stress for less useful output.", "HBOT increases dissolved oxygen in plasma, bypassing compromised circulation and delivering oxygen directly to tissues. This can improve oxidative phosphorylation efficiency, support mitochondrial biogenesis pathways such as PGC-1 alpha, and reduce the compensatory “overworking” that can show up as elevated resting oxygen consumption or VO2-rest. In simple terms, HBOT does not stimulate mitochondria to work harder - it helps create the conditions for them to work properly again."]}, {"type": "callout", "k": "Careful mitochondrial wording", "text": "Say “may support mitochondrial efficiency where oxygen availability is limited” rather than “fixes mitochondria”. The Dr John Cramer notes are useful because they also remind colleagues that mitochondrial DNA damage and mitophagy failure are deeper ageing issues that HBOT alone should not be claimed to reverse."}, {"type": "h3", "text": "4.6 The nutrient traffic jam"}, {"type": "prose", "text": ["Bloodwork can look normal or even high for a nutrient while cells may still be functionally deficient. A useful internal metaphor is the “nutrient traffic jam”: the nutrient is visible in the bloodstream, but inflammation, receptor issues, membrane dysfunction, poor microcirculation or metabolic stress may limit how well it reaches or enters cells."]}, {"type": "xtable", "head": ["Example", "What can happen internally", "Careful Oxydise framing"], "rows": [["Vitamin D", "Blood level may look acceptable, but receptor sensitivity and inflammatory signalling can affect cellular response.", "HBOT may help support the tissue environment; do not claim it corrects vitamin D status."], ["Magnesium", "Standard blood values may not reflect intracellular magnesium well.", "Encourage clinician-led testing and interpretation where relevant."], ["Ferritin / iron", "Iron can be stored but not well utilised in inflammatory states.", "Do not advise on anaemia; refer to clinician."], ["Glucose", "High blood glucose can coexist with poor cellular utilisation.", "Useful analogy for uptake, but do not give diabetes advice unless qualified."], ["B12 / folate / omega-3s", "Availability in blood does not always mean ideal cellular use.", "Use as education only; avoid implying HBOT “unlocks” all nutrients."]]}, {"type": "callout", "k": "Practical takeaway", "text": "The issue is not always “too little” or “too much” in the blood. Sometimes the issue is whether nutrients and fuel are reaching and being used by the cells. HBOT may help by supporting oxygenation, microcirculation and a less inflammatory tissue environment."}, {"type": "h3", "text": "4.7 Pressure levels and inflammation: Jason Sonners framing"}, {"type": "prose", "text": ["Jason Sonners is useful for internal education because he discusses how different pressure ranges may influence inflammatory signalling differently. Treat this as emerging and practical, not as settled clinical dosing rules."]}, {"type": "xtable", "head": ["Pressure range", "Internal positioning", "Useful for thinking about", "Caution"], "rows": [["1.3-1.5 ATA", "Mild to moderate pressure; comfortable for many people and practical for repeated home sessions.", "Wellness, fatigue, chronic low-grade inflammation, brain fog, long-term programmes and sensitive users.", "Do not oversell mild pressure as equivalent to hospital HBOT. Consistency and total sessions matter."], ["1.7-2.0 ATA", "Higher oxygen push, typically hardshell or more advanced systems.", "Acute injury, stubborn tissue recovery, advanced neurological/post-surgical contexts where suitable.", "Not automatically better for everyone. Suitability matters."], ["2.0+ ATA", "Clinical/medical pressure range.", "Hospital indications such as decompression sickness, carbon monoxide poisoning, serious wounds and radiation injury.", "Usually requires medical indication, prescription or qualified supervision."]]}, {"type": "callout", "k": "Practical pressure takeaway", "text": "Mild pressure is often framed for chronic, systemic and nervous-system style presentations. Higher pressure is often framed for acute injury, tissue damage, joint irritation and post-surgical recovery. Keep the language cautious: different pressures may produce different biological signals."}, {"type": "h3", "text": "4.8 Protocol cards - internal working guide"}, {"type": "callout", "k": "Protocol status", "text": "Internal education only. Protocols must remain flexible and safety-led. Complex cases, cancer, pregnancy, neurological diagnoses, medication questions and post-surgical cases should be escalated appropriately."}, {"type": "xtable", "head": ["Customer goal", "Typical internal guidance", "How to explain it"], "rows": [["General wellness / energy / longevity", "2-3 sessions per week; think in blocks of around 40 sessions; maintenance once weekly if useful.", "“We usually think in blocks rather than one-off sessions.”"], ["Chronic inflammation / pain / autoimmune patterns", "4-6 sessions per week; 40-60 sessions; review around session 20.", "“Consistency matters more than trying one or two sessions.”"], ["Neurological / brain health / concussion / brain fog", "Often 5 sessions per week initially; 40-60 sessions; step down after week 3-4.", "“Brain and nervous-system work usually needs repeated exposure.”"], ["Cancer support / post-treatment recovery", "3-5 sessions per week; oncology team involvement; supportive recovery only.", "“We do not treat cancer. This would be supportive recovery and should be discussed with your oncology team.”"], ["Sports performance / in-season recovery", "3-4 sessions per week ongoing.", "“It supports recovery capacity; it does not replace training.”"], ["Sports injury / rehab", "Often 5 sessions per week; 40-60 sessions.", "“Injury recovery is where a tighter block is usually more meaningful.”"], ["Post-surgery / tissue repair", "Often 5 sessions per week; 40-60 sessions, subject to suitability and clinician advice.", "“Earlier support can be more efficient, but suitability matters.”"], ["Long COVID / post-viral fatigue", "4-5 sessions per week; 30-50 sessions; track sleep, HRV, steps and symptoms.", "“Evidence is emerging and results vary, so we track objective change where possible.”"]]}, {"type": "h3", "text": "4.9 HBOT safety basics"}, {"type": "xtable", "head": ["Area", "What everyone must know"], "rows": [["Untreated pneumothorax", "Widely recognised as the key absolute contraindication. If there is any history or concern, pause and escalate."], ["Ears and sinuses", "Pressure changes require equalisation. Colds, sinus infections and ear issues can make sessions uncomfortable or unsafe."], ["Fire and oxygen safety", "Oxygen supports combustion. No flames, sparks, smoking, oils, flammable materials or unsafe electronics. Follow device instructions and fire prevention measures."], ["Oxygen toxicity", "Rare in properly delivered protocols, especially at mild pressure, but possible with higher oxygen partial pressures or excessive exposure. Dosing discipline and air breaks matter."], ["Twice daily use", "Where two sessions are used in a day, build in a meaningful gap and follow the equipment/protocol guidance. The existing internal note uses a four-hour break as a practical internal rule."], ["Medical complexity", "Cancer, seizures, lung disease, recent surgery, pregnancy and complex medication questions should be escalated to an appropriate professional."]]}, {"type": "h2", "text": "5. Red Light Therapy / photobiomodulation", "id": "5"}, {"type": "h3", "text": "5.1 Simple explanation everyone should be able to say"}, {"type": "prose", "text": ["Red Light Therapy, also called photobiomodulation, uses specific wavelengths of red and near-infrared light to interact with cells. The goal is not heat or tanning. It is a cellular light signal. Red wavelengths are often used for skin and surface tissues; near-infrared wavelengths travel deeper and are used for muscles, joints and recovery. The main idea is that light can support mitochondrial function, circulation, nitric oxide signalling and tissue repair."]}, {"type": "callout", "k": "Customer-safe summary", "text": "Red Light Therapy is a way of giving cells a useful light signal. It may support energy production, circulation, recovery and skin health when used consistently and at the right dose. It is not a cure and more light is not always better."}, {"type": "h3", "text": "5.2 Wavelengths, output and dose"}, {"type": "xtable", "head": ["Term", "Plain-English meaning", "What colleagues should know"], "rows": [["Wavelength (nm)", "The colour or type of light. Red is usually around 630-660 nm; near-infrared is commonly around 810-850 nm.", "Different wavelengths penetrate and interact differently. Do not just say “stronger”."], ["Red light", "Visible red light, often 630 and 660 nm.", "Commonly discussed for skin, collagen, surface circulation and general cellular signalling."], ["Near-infrared (NIR)", "Invisible or barely visible light, often 810, 830 and 850 nm.", "Often discussed for deeper tissue, muscles, joints and recovery."], ["Irradiance", "Power arriving at the skin per square centimetre.", "Supplier numbers can be inflated. Measured distance matters."], ["Fluence / dose", "Total light energy delivered over time.", "Dose = irradiance x time. Too little may do nothing; too much can blunt the effect."], ["Pulsing / frequency", "Light can be continuous or pulsed at a chosen frequency.", "Interesting area, but do not overclaim unless protocol-specific."], ["Biphasic dose response", "A little can stimulate, a moderate amount may be optimal, too much may be less effective.", "This is the “more is not always better” principle."]]}, {"type": "h3", "text": "5.3 Core mechanisms colleagues should understand"}, {"type": "xtable", "head": ["Mechanism", "What is happening", "Customer-safe language"], "rows": [["Cytochrome c oxidase / mitochondria", "Light may interact with mitochondrial enzymes involved in energy production.", "“It supports cellular energy production.”"], ["Nitric oxide signalling", "Light may influence nitric oxide availability, which can affect blood flow and mitochondrial respiration.", "“It can help circulation and cellular signalling.”"], ["ATP production", "Cells use ATP as their energy currency. PBM can influence mitochondrial activity.", "“It helps cells do the work of repair more efficiently.”"], ["Inflammation signalling", "PBM has been studied for anti-inflammatory effects in various models.", "“It may help calm the inflammatory environment that slows recovery.”"], ["Collagen / fibroblasts", "Red light can influence fibroblast activity and collagen-related pathways.", "“It is often used for skin quality and tissue repair support.”"], ["Microcirculation", "Light may influence local blood flow and tissue oxygen/nutrient delivery.", "“It may help tissues receive and use oxygen and nutrients better.”"]]}, {"type": "h3", "text": "5.4 The eye, retina and mitochondrial demand"}, {"type": "prose", "text": ["The eye is one of the most energy-intensive tissues in the body. The retina and retinal pigment epithelium burn a large amount of ATP because they are constantly processing light signals at high speed and maintaining ionic gradients that reset the visual cycle.", "On a per-cell basis, retinal mitochondrial demand is among the highest in human biology. This helps explain why ageing can show up early as reduced acuity, slower dark adaptation and inflammation, and why conditions such as age-related macular degeneration are often discussed through a metabolic and mitochondrial lens."]}, {"type": "callout", "k": "Eye safety language", "text": "Some online influencers suggest looking directly at red light. Oxydise should not recommend this. Advise eye protection to all clients unless a clinician/device-specific protocol says otherwise."}, {"type": "h3", "text": "5.5 RLT protocol cards - internal working guide"}, {"type": "xtable", "head": ["Use case", "Typical session", "Frequency", "Notes"], "rows": [["General wellness / energy / mood", "10-20 minutes", "3-5x/week for first month, then 2-3x/week", "Track sleep, energy and calmness. Avoid late-night overstimulation in sensitive users."], ["Skin / beauty / collagen", "10-20 minutes, expose skin", "3-5x/week initially", "Remove make-up and sunscreen. Expect gradual changes over weeks."], ["Muscle recovery / sports", "10-20 minutes around training schedule", "3-5x/week or targeted around heavy sessions", "Good for soreness/recovery discussions; do not promise performance."], ["Joint / pain / stiffness support", "10-20 minutes targeted or full body", "3-5x/week initially", "Track pain and mobility. Consider combining with HBOT where suitable."], ["Sensitive users / overstimulation", "Shorter sessions or lower output", "Build gradually", "Lower-BMI or highly sensitive users may need lower power; treat as internal observation pending validation."]]}, {"type": "h3", "text": "5.6 RLT safety and contraindication basics"}, {"type": "xtable", "head": ["Pause / review before use", "Why it matters"], "rows": [["Photosensitive conditions such as lupus or porphyria", "Light exposure can aggravate photosensitive conditions."], ["Photosensitising medications", "Some antibiotics, acne medicines and psychiatric medicines can increase light sensitivity."], ["Pregnancy, especially full-body or abdominal use", "Use a conservative approach unless clinician-approved."], ["Epilepsy triggered by light", "Flashing/pulsed light may be relevant."], ["Recent Botox/fillers, open wounds, burns, skin infections, severe migraine/light sensitivity, pacemakers/implanted devices, severe heart conditions", "Use caution and medical advice where appropriate."]]}, {"type": "h2", "text": "6. Combining HBOT, Red Light and other modalities", "id": "6"}, {"type": "callout", "k": "Simple principle", "text": "HBOT changes oxygen availability. Red Light changes cellular light signalling and mitochondrial activity. Used thoughtfully, they can complement each other, but sequencing should be context-specific."}, {"type": "xtable", "head": ["Context", "Suggested internal approach", "Why"], "rows": [["General recovery / wellness", "Either order may be used depending on practical setup and customer response.", "Red Light can support circulation and cellular readiness; HBOT can support oxygen delivery and recovery."], ["Customer feels overstimulated by RLT", "Reduce time/output; consider HBOT first or separate days.", "Some users are sensitive to light dose or nervous-system stimulation."], ["Oncology-sensitive or cancer-related cases", "Use HBOT first and Red Light only with clinician guidance.", "HBOT raises oxygen availability before metabolic stimulation. This is internal education only and not a cancer-treatment claim."], ["Athlete / acute recovery", "Consider RLT around training and HBOT as a recovery block.", "Monitor sleep, soreness and training load."], ["PEMF + Red Light", "PEMF can be framed as a relaxation/recovery-support tool. Pair carefully if the user is sensitive.", "Both can feel stimulating or regulating depending on programme and person."], ["HBOT + Hydrogen", "Some educators discuss hydrogen as a potential oxidative-stress support alongside oxygen-based therapies.", "Keep claims cautious; evidence is emerging and product-specific."]]}, {"type": "h3", "text": "6.1 Oncology-sensitive sequencing: HBOT first, Red Light after"}, {"type": "prose", "text": ["The attached internal oncology-sensitive protocol argues for HBOT first and Red Light Therapy afterwards. The reasoning is that HBOT raises tissue oxygen tension before any metabolic stimulation. Tumour tissue is often hypoxic, and hypoxia can activate HIF-1 alpha signalling linked to angiogenesis, metabolic survival pathways and aggressiveness. Red Light Therapy can increase mitochondrial activity, nitric oxide release and cellular repair signalling, which can increase oxygen demand. Internally, the sequence HBOT -> RLT is therefore treated as the more cautious order when a cancer-related context is present."]}, {"type": "callout", "k": "Important boundary", "text": "This is not a cancer-treatment protocol. It is internal physiology education and should only be discussed externally with approved wording and clinician involvement."}, {"type": "h3", "text": "6.2 Do not overclaim synergy"}, {"type": "prose", "text": ["It is acceptable to say the therapies may complement each other. Avoid saying they “work better together” as a universal claim unless a specific protocol and evidence source is approved."]}, {"type": "h2", "text": "7. PEMF technology", "id": "7"}, {"type": "prose", "text": ["PEMF stands for pulsed electromagnetic field. In simple terms, PEMF devices emit low-level electromagnetic pulses that are intended to interact with tissues and the nervous system. In wellness settings, PEMF is usually positioned around recovery, relaxation, sleep support, fatigue, comfort and nervous-system regulation rather than as a treatment for disease."]}, {"type": "callout", "k": "Customer-safe summary", "text": "PEMF is a non-invasive recovery-support technology. It may help some people feel calmer, more balanced or more energised depending on the programme, but the response is individual and it should not be presented as a medical treatment."}, {"type": "h3", "text": "7.1 How PEMF fits Oxydise"}, {"type": "xtable", "head": ["Use it for", "Do not use it for"], "rows": [["Explaining recovery stacks and wider wellness literacy.", "Diagnosing or treating pain, inflammation, neurological disease or sleep disorders."], ["Helping customers understand why programmes feel different: calming, energising, focus or deep rest.", "Claiming that one frequency has a guaranteed outcome."], ["Supporting nervous-system language: down-regulation, rest, balance and recovery.", "Overloading a sensitive customer with too many therapies at once."]]}, {"type": "h3", "text": "7.2 PEMF mat programme functions"}, {"type": "xtable", "head": ["Programme", "Internal description", "Plain-English positioning"], "rows": [["P1 - Schumann Recharge", "Schumann resonance to restore baseline energy and balance.", "Grounding-style recharge and baseline balance."], ["P2 - Energising Focus", "Stimulating beta and alpha waves, 7.83-21 Hz, to increase alertness and vitality.", "Daytime focus and vitality."], ["P3 - Hemispheric Balance", "Alpha and beta waves to harmonise left and right brain hemispheres.", "Balance and mental coordination."], ["P4 - Deep Relaxation Descent", "Gradual transition from 14.4 Hz beta down to low theta around 3 Hz.", "Deep relaxation and down-shift."], ["P5 - Mental Clarity & Drive", "Beta and gamma waves to promote clarity, motivation and alertness.", "Clearer, more motivated daytime state."], ["P6 - Maximum Energising", "High-intensity Schumann programme, 7.8-30 Hz.", "Peak stimulation; use cautiously in sensitive users."], ["P7 - Fatigue Relief", "High-frequency beta waves designed to combat tiredness and mental fatigue.", "Fatigue and alertness support."], ["P8 - Harmonious Meditation", "Emotion regulation and mental calming through meditative frequencies.", "Meditation and emotional calm."], ["P9 - Calm & Balance", "Schumann resonance at 7.8 Hz to stabilise mood and calm the nervous system.", "Calm, balance and grounding."], ["PA / P10 - Daytime Balance & Fatigue Reduction", "Gentle balancing programme for daytime fatigue while maintaining alertness.", "Daytime regulation without deep sedation."], ["PC / P11 - Energy Restoration", "Alternating low-frequency beta waves and Schumann resonance.", "Energy restoration."], ["PE / P12 - Morning Activation", "Theta around 4.5 Hz to 7.83 Hz Schumann resonance.", "Natural wakefulness support."], ["PF / P13 - Daytime Deep Rest", "Restorative programme for deep relaxation without full sleep.", "Reset between busy periods."], ["PH / P14 - Continuous Loop Mode", "Cycles through all programmes in sequence.", "Demonstration or broad-use mode; use with guidance."]]}, {"type": "h3", "text": "7.3 PEMF safety basics"}, {"type": "xtable", "head": ["Pause / review before use", "Why"], "rows": [["Pacemaker or implanted electronic device", "Electromagnetic fields may interfere with implanted electronics."], ["Pregnancy", "Use a conservative approach unless clinician-approved."], ["Epilepsy or seizure history", "Frequency-based stimulation may not be appropriate."], ["Active bleeding, acute infection, fever or unexplained symptoms", "Escalate and avoid using wellness devices as a substitute for medical assessment."], ["Highly sensitive / anxious users", "Start low and slow. Some programmes may feel stimulating."]]}, {"type": "h2", "text": "8. Grounding principles", "id": "8"}, {"type": "prose", "text": ["Grounding, also called earthing, usually means direct skin contact with the earth - for example bare feet on grass, soil or sand - or using conductive products that claim to connect the body electrically to the ground. People in the wellness sector may talk about grounding in relation to inflammation, sleep, stress, circadian rhythm and nervous-system regulation."]}, {"type": "callout", "k": "Oxydise brand position", "text": "Oxydise should not sell grounding as a product or make it a core proposition. It may devalue the premium, technology-led brand and distract from the clear pillars of HBOT and Red Light Therapy. Colleagues should still understand the principles because customers may ask about it."}, {"type": "h3", "text": "8.1 How to talk about grounding"}, {"type": "xtable", "head": ["Useful principle", "How to say it carefully"], "rows": [["Nature contact matters", "Time outdoors, daylight, movement and calm surroundings are foundational for wellbeing."], ["Possible electrical hypothesis", "Some grounding advocates propose that direct contact with the earth may influence charge balance and inflammatory signalling."], ["Evidence is debated", "The evidence base is smaller and more disputed than the evidence base for many established medical interventions. Avoid strong claims."], ["Oxydise does not need to own it", "It can be mentioned as a free lifestyle principle, not sold as an Oxydise solution."]]}, {"type": "callout", "k": "Customer-safe wording", "text": "“Grounding is something people in the wellness world talk about. We do not sell it as a product, but we do think simple foundations such as daylight, time outdoors, movement and sleep routine are worth understanding.”"}, {"type": "h2", "text": "9. Hydrogen and hydrogen water", "id": "9"}, {"type": "prose", "text": ["Hydrogen water is water with dissolved molecular hydrogen gas (H2). It is not the same thing as simply making water alkaline, and it is not about adding hydrogen ions or changing pH as the main mechanism. The interest is that dissolved H2 may act as a small, diffusible redox-signalling molecule. In the wellness and research world it is discussed around oxidative stress, inflammation, mitochondrial function, metabolic health and exercise recovery."]}, {"type": "callout", "k": "Customer-safe summary", "text": "Hydrogen water is an emerging wellness topic. It may be worth understanding because customers often connect it with HBOT, red light, mitochondria and recovery. Oxydise should frame it carefully: promising enough to learn about, not proven enough to use as a cure, treatment or replacement for medical care."}, {"type": "h3", "text": "9.1 What molecular hydrogen is - and is not"}, {"type": "xtable", "head": ["Point", "Plain-English explanation", "Why it matters"], "rows": [["Molecular hydrogen (H2)", "Two hydrogen atoms bonded together as a gas. Hydrogen water contains this dissolved gas.", "The active topic is dissolved H2, not just “hydrogen” as a vague word."], ["Not the same as alkaline water", "Some hydrogen-water products are alkaline, but pH is not the main evidence-based mechanism usually discussed.", "Avoid confusing hydrogen water with alkaline-water claims."], ["Small and diffusible", "H2 is very small and can diffuse through fluids and tissues quickly.", "This is why it is discussed in relation to cellular redox signalling."], ["Dose depends on concentration and timing", "H2 can escape from water over time. Concentration, container, production method and how soon it is consumed all matter.", "Do not compare products without measured concentration and protocol."], ["Evidence is heterogeneous", "There are human studies and reviews, but many trials are small, varied and use different doses and populations.", "Good internal education topic; not a strong customer claim yet."]]}, {"type": "h3", "text": "9.2 Why people discuss hydrogen with mitochondria, HBOT and Red Light"}, {"type": "prose", "text": ["HBOT, Red Light Therapy and hydrogen all sit in the wider oxygen, redox and mitochondrial conversation. HBOT increases oxygen availability under pressure. Red Light Therapy gives cells a light signal that may influence mitochondrial enzymes and nitric oxide. Molecular hydrogen is discussed as a redox-signalling tool that may influence oxidative stress and inflammatory pathways. The common thread is not “more stimulation”; it is helping the cell move towards a better regulated environment."]}, {"type": "xtable", "head": ["Theme", "Internal explanation", "Customer-safe wording"], "rows": [["Oxidative stress", "Molecular hydrogen is studied for selective antioxidant and redox-signalling effects, especially around hydroxyl radicals and peroxynitrite in mechanistic literature.", "“It is being studied for how it may influence oxidative-stress signalling.”"], ["Inflammation", "Some human and preclinical studies look at inflammatory markers, immune-cell behaviour and recovery contexts.", "“Some research is looking at inflammation and recovery markers.”"], ["Mitochondria", "Oxidative stress and inflammation influence mitochondrial efficiency. Hydrogen is sometimes discussed as a way to support a healthier redox environment.", "“It belongs in the wider mitochondrial-health conversation.”"], ["Exercise and recovery", "Research in exercise settings is mixed. A 2024 meta-analysis found improved antioxidant potential, but not a direct reduction in exercise-induced oxidative stress.", "“Interesting for sport/recovery, but not a guaranteed performance tool.”"], ["HBOT pairing", "Some practitioners discuss hydrogen alongside HBOT to balance oxygen/redox conversations.", "“This is advanced education, not an Oxydise protocol unless approved.”"]]}, {"type": "h3", "text": "9.3 Evidence snapshot - what it supports and what it does not prove"}, {"type": "xtable", "head": ["Evidence area", "What it suggests", "How to use carefully"], "rows": [["Foundational mechanism", "The 2007 Nature Medicine paper by Ohsawa et al. helped launch the field by reporting selective reduction of cytotoxic oxygen radicals in experimental models.", "Mechanism education only. It does not mean every hydrogen-water product has clinical benefit."], ["Clinical-study landscape", "A 2023 review discussed 81 clinical trials and 64 human scientific publications across hydrogen therapy routes and conditions.", "The field is real, but diverse. Trial quality, route, dose and population vary."], ["Healthy adults / inflammation", "A randomised, double-blind controlled trial in healthy adults reported changes in inflammatory responses and peripheral blood-cell apoptosis markers after hydrogen-rich water.", "Useful as a research signal; not a customer promise."], ["Exercise oxidative stress", "A 2024 systematic review/meta-analysis of six studies with 76 participants found improved antioxidant potential but no significant direct reduction in exercise-induced oxidative stress markers.", "Good example of cautious language: possible signal, small evidence base, more rigorous studies needed."], ["Research libraries", "HydrogenWaterStudies.com and the Molecular Hydrogen Institute collect many papers and categories.", "Use them as starting points, then check the original paper before repeating a claim."]]}, {"type": "h3", "text": "9.4 Hydrogen tablets - Alan’s internal summary"}, {"type": "prose", "text": ["Hydrogen tablets are designed to increase molecular hydrogen availability, usually by generating dissolved H2 in water before it is consumed. Internally, the simplest explanation is that molecular hydrogen is discussed as a selective antioxidant and redox-support molecule: it may help the body deal with excess oxidative stress and inflammation without flattening the useful stress responses still needed for adaptation and recovery."]}, {"type": "callout", "k": "Customer-safe summary", "text": "Hydrogen tablets sit in the wider recovery, redox and mitochondrial-health conversation. They should be described as a potential support tool, not as a treatment, cure, detox product or replacement for sleep, nutrition, medical care or a clinician-led plan."}, {"type": "xtable", "head": ["Benefit theme", "Internal explanation", "Customer-safe wording"], "rows": [["Oxidative-stress load", "Training, travel, poor sleep, stress, alcohol and modern lifestyle load can increase oxidative stress. Hydrogen is discussed as a way to help buffer excess stress signalling.", "“It may help support the body’s response to oxidative stress.”"], ["Inflammation and recovery", "Alan’s note frames hydrogen tablets as supporting lower inflammation levels and helping the body recover more efficiently.", "“It may support recovery and a healthier inflammatory environment.”"], ["Fatigue and burnout", "By supporting redox balance and recovery, hydrogen is discussed around physical recovery and feelings of fatigue or burnout.", "“Some people use it as part of a wider recovery routine.”"], ["Exercise performance and endurance", "The proposed mechanism is support for cellular energy production and less excess oxidative stress around training.", "“There is interest in exercise recovery and endurance, but we should not promise performance gains.”"], ["Metabolic health", "Hydrogen research and practitioner education sometimes discuss blood sugar balance, cholesterol markers and metabolic stress.", "“It is being studied in metabolic-health contexts; any marker changes need clinician interpretation.”"], ["Brain function and mood", "Alan’s note includes mental clarity, focus, mood and brain function as areas people may discuss.", "“It may be relevant to the wider brain-energy and clarity conversation, but not as a neurological treatment.”"]]}, {"type": "callout", "k": "How to position it", "text": "Keep it simple: hydrogen tablets may support the body’s ability to manage oxidative stress and recovery load. Do not oversell it, do not connect it to disease outcomes, and do not make it sound like Oxydise is moving away from its core HBOT and Red Light pillars."}, {"type": "h3", "text": "9.5 Practical product-literacy points"}, {"type": "xtable", "head": ["Question", "What colleagues should know"], "rows": [["What concentration matters?", "Hydrogen concentration is usually discussed in ppm or mg/L. Higher headline concentration is not automatically better unless it is measured and delivered consistently."], ["Why drink it quickly?", "H2 gas can dissipate. Once hydrogen water is generated or opened, timing and container quality affect how much H2 is still present when consumed."], ["What about tablets or machines?", "Tablets, generators and bottled products can all vary. Colleagues should avoid making quality claims without measured data."], ["Is it safe?", "Hydrogen water is generally discussed as low-risk for many healthy adults, but colleagues should not advise medically complex customers, pregnant customers or people in active treatment without clinician input."], ["Where does Oxydise place it?", "A useful supporting education topic. It should not dilute the HBOT and Red Light proposition or be made into a major sales pillar unless Oxydise approves a specific product and evidence position."]]}, {"type": "h3", "text": "9.6 What to say and what not to say"}, {"type": "xtable", "head": ["Say this", "Do not say this"], "rows": [["“Hydrogen water contains dissolved molecular hydrogen gas, which is being studied for oxidative-stress and inflammation signalling.”", "“Hydrogen water detoxes the body.”"], ["“The evidence is interesting, but still developing and product-specific.”", "“It cures inflammation, cancer, fatigue or ageing.”"], ["“Concentration, timing and storage matter because hydrogen gas can dissipate.”", "“Any hydrogen-water product will work.”"], ["“This is useful background for the wider mitochondrial and recovery conversation.”", "“This is part of an Oxydise protocol” unless Oxydise has approved that protocol."]]}, {"type": "callout", "k": "Resource to include", "text": "HydrogenWaterStudies.com can be included as a research-library link. Colleagues should treat it as a starting point, not as automatic substantiation for customer-facing claims."}, {"type": "h2", "text": "10. Neuro Gamma and brain photobiomodulation", "id": "10"}, {"type": "prose", "text": ["Neuro Gamma usually refers to a brain photobiomodulation device, commonly discussed in relation to Vielight Neuro Gamma, that uses near-infrared light and gamma-frequency pulsing. It is part of the wider brain photobiomodulation category: using red or near-infrared light transcranially and/or intranasally to influence brain energy, blood flow, inflammation signalling and neural oscillations."]}, {"type": "callout", "k": "Customer-safe summary", "text": "Neuro Gamma is an advanced brain-light technology topic. It should be explained as a brain photobiomodulation and neuromodulation concept, not as a treatment for dementia, depression, brain injury or any neurological disease unless a qualified clinician is leading the conversation."}, {"type": "h3", "text": "10.1 Benefits colleagues should remember"}, {"type": "list", "items": ["Better clarity and faster thinking.", "Improved focus and concentration.", "Stronger recall and memory.", "Less brain fog."]}, {"type": "prose", "text": ["These are internal memory hooks. In customer-facing language, say “may support clarity, focus and cognitive performance” rather than promising results."]}, {"type": "h3", "text": "10.2 How it fits with HBOT and Red Light"}, {"type": "xtable", "head": ["Topic", "Internal explanation"], "rows": [["Mitochondria", "Brain PBM is usually discussed through mitochondrial energy, cytochrome c oxidase and ATP signalling."], ["Gamma rhythm", "Gamma-frequency stimulation is often discussed in relation to attention, information processing, memory and brain energy."], ["HBOT link", "HBOT may support brain oxygen availability and perfusion; Neuro Gamma sits more in the light/neuromodulation lane."], ["Positioning", "Advanced education for brain health and biohacking customers. Do not confuse it with standard Red Light panels."]]}, {"type": "h3", "text": "10.3 Neuro Gamma safety basics"}, {"type": "xtable", "head": ["Pause / review before use", "Why"], "rows": [["History of seizures or photosensitive epilepsy", "Frequency-based light stimulation may not be appropriate."], ["Active brain bleed or acute neurological event", "Requires medical assessment; do not use wellness device advice."], ["Pregnancy", "Use conservative approach and clinician advice."], ["Severe migraine or light sensitivity", "Start cautiously or avoid."], ["Evening use", "Gamma-style stimulation may feel activating; avoid close to bedtime in sensitive users."]]}, {"type": "h2", "text": "11. Fasting, metabolic switching and cellular recycling", "id": "11"}, {"type": "prose", "text": ["Fasting is part of the wider longevity and metabolic health conversation. It should be treated as context, not as Oxydise advice. Fasting may be unsuitable for people with eating disorders, pregnancy, diabetes, underweight status, certain medications, cancer treatment, frailty or complex medical conditions."]}, {"type": "callout", "k": "Fasting guardrail", "text": "Oxydise colleagues should not prescribe fasting. Use this section only to understand why biohacking and longevity customers talk about autophagy, ketones, insulin and cellular clean-up."}, {"type": "xtable", "head": [
