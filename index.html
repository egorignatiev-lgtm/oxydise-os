ight / photobiomodulation, light and mitochondria": "15.4 Luz vermelha / fotobiomodulação, luz e mitocôndrias", "15.5 Grounding, hydrogen, metabolism, mindset and wider biohacking": "15.5 Grounding, hidrogénio, metabolismo, mentalidade e biohacking", "15.6 Sector awareness: longevity culture, communication and internal-only risk topics": "15.6 Conhecimento do setor: cultura da longevidade, comunicação e temas de risco apenas internos", "Book table continued": "Tabela de livros (continuação)", "17.1 Suggested starting order": "17.1 Ordem de leitura sugerida", "17.2 Wider wellness and biohacking sector map": "17.2 Mapa alargado do setor de bem-estar e biohacking", "18.1 HBOT equipment basics": "18.1 Noções básicas do equipamento de HBOT", "18.2 How the oxygen concentrator works - the proper explanation": "18.2 Como funciona o concentrador de oxigénio — a explicação correta", "18.3 Red Light equipment basics": "18.3 Noções básicas do equipamento de luz vermelha", "18.4 Why LED quality and thermal regulation matter": "18.4 Porque importam a qualidade dos LED e a regulação térmica", "18.5 Competitor-safe language": "18.5 Linguagem segura sobre concorrentes", "18.6 Glossary": "18.6 Glossário", "Approved 20 April 2026": "Aprovado em 20 de abril de 2026", "Based on these values, Oxydise has built this knowledge base for curious colleagues: people who want to understand the technology deeply enough to guide customers with trust, empathy, detail and care.": "Com base nestes valores, a Oxydise criou esta base de conhecimento para colaboradores curiosos: pessoas que querem compreender a tecnologia ao ponto de orientar os clientes com confiança, empatia, atenção ao detalhe e cuidado.", "Value": "Valor", "Short line": "Em poucas palavras", "What it means in practice": "O que significa na prática", "01 Trust": "01 Confiança", "Transparent, honest, consistent.": "Transparente, honesto, consistente.", "We earn trust by being transparent, honest and consistent in everything we do; from pricing to performance. Our advice is grounded in expertise and genuine care, not short-term sales success.": "Conquistamos confiança sendo transparentes, honestos e consistentes em tudo o que fazemos, do preço ao desempenho. O nosso aconselhamento assenta em conhecimento e cuidado genuíno, não no sucesso de vendas a curto prazo.", "02 Empathy": "02 Empatia", "Listen first. Long-term outcomes.": "Ouvir primeiro. Resultados a longo prazo.", "We listen first, taking the time to understand each customer’s goals, concerns and journey. Every recommendation is made with long-term outcomes in mind, not quick wins.": "Ouvimos primeiro, dedicando tempo a compreender os objetivos, as preocupações e o percurso de cada cliente. Cada recomendação tem em mente resultados a longo prazo, e não ganhos rápidos.", "03 Relationships": "03 Relações", "Meaningful. Lasting. Collaborative.": "Significativas. Duradouras. Colaborativas.", "We build meaningful, lasting relationships with our customers, partners and colleagues. Through trust, openness and collaboration, we create a network that grows stronger together.": "Construímos relações significativas e duradouras com clientes, parceiros e colegas. Através da confiança, abertura e colaboração, criamos uma rede que se fortalece em conjunto.", "04 Curious": "04 Curiosidade", "Always learning. Questioning convention.": "Sempre a aprender. A questionar o convencional.", "We are driven by curiosity; constantly learning, testing and improving to stay ahead in a fast-moving space. By questioning convention, we uncover better ways to support health, recovery and performance.": "Movemo-nos pela curiosidade: aprendemos, testamos e melhoramos continuamente para estar à frente num setor em rápida mudança. Ao questionar o convencional, descobrimos melhores formas de apoiar a saúde, a recuperação e o desempenho.", "05 Detail": "05 Detalhe", "The difference is in the detail.": "A diferença está no detalhe.", "We believe the difference is in the detail; from product quality and customer requirements to customer experience. Every touchpoint is thoughtfully designed and executed to deliver the highest standard.": "Acreditamos que a diferença está no detalhe: da qualidade do produto e dos requisitos do cliente à experiência do cliente. Cada ponto de contacto é cuidadosamente concebido e executado para entregar o mais alto padrão.", "06 Innovation": "06 Inovação", "Proven science. Forward-thinking ideas.": "Ciência comprovada. Ideias visionárias.", "We combine proven science with forward-thinking ideas to push the category forward. Our ambition is not just to compete, but to lead - making advanced wellness technology more accessible than ever.": "Combinamos ciência comprovada com ideias visionárias para fazer avançar a categoria. A nossa ambição não é apenas competir, mas liderar — tornando a tecnologia de bem-estar avançada mais acessível do que nunca.", "Baseline rule": "Regra de base", "Oxydise colleagues should understand more than they say. The knowledge base is here to educate colleagues deeply. Customer conversations should remain simple, calm, careful and approved.": "Os colaboradores da Oxydise devem compreender mais do que dizem. A base de conhecimento existe para formar os colegas em profundidade. As conversas com clientes devem manter-se simples, calmas, cuidadosas e aprovadas.", "Principle": "Princípio", "What it means for colleagues": "O que significa para os colaboradores", "Education first": "Formação primeiro", "Use the science to understand the technology. Do not turn every mechanism into a customer claim.": "Use a ciência para compreender a tecnologia. Não transforme cada mecanismo numa afirmação para o cliente.", "Plain English first": "Linguagem simples primeiro", "A tired, stressed or anxious customer should be able to understand the explanation without needing a biology degree.": "Um cliente cansado, stressado ou ansioso deve conseguir compreender a explicação sem precisar de um curso de biologia.", "Evidence-aware, not hype-led": "Baseado em evidências, não no exagero", "Use “research suggests”, “may support”, “is being studied”, “can help create the right environment” and “some customers report”. Avoid guarantees.": "Use “a investigação sugere”, “pode apoiar”, “está a ser estudado”, “pode ajudar a criar o ambiente certo” e “alguns clientes relatam”. Evite garantias.", "Safety before conversion": "Segurança antes da conversão", "Contraindications, tolerance, medicines, eye safety, fire safety, device instructions and practical suitability come before sales.": "Contraindicações, tolerância, medicamentos, segurança ocular, segurança contra incêndios, instruções do equipamento e adequação prática vêm antes das vendas.", "Protocols are context-dependent": "Os protocolos dependem do contexto", "Pressure, session length, frequency, light dose and total exposure depend on the person, goal, equipment and safety profile.": "A pressão, a duração da sessão, a frequência, a dose de luz e a exposição total dependem da pessoa, do objetivo, do equipamento e do perfil de segurança.", "Anecdotes are not evidence": "Anedotas não são evidência", "Stories help people understand possibilities, but they do not prove an outcome and must not be used as a promise.": "As histórias ajudam a compreender possibilidades, mas não provam um resultado e não devem ser usadas como promessa.", "Living library": "Biblioteca viva", "Every study, video, podcast, book and protocol card should have an owner, review date and status: starter, recommended, advanced, internal-only, or pending approval.": "Cada estudo, vídeo, podcast, livro e cartão de protocolo deve ter um responsável, data de revisão e estado: inicial, recomendado, avançado, apenas interno, ou a aguardar aprovação.", "Recommended resource card format": "Formato recomendado do cartão de recurso", "Title, type, topic, who it is useful for, time to complete, why it matters, customer-safe takeaway, can it be quoted externally, owner, last reviewed and approval status.": "Título, tipo, tema, para quem é útil, tempo de conclusão, porque importa, conclusão segura para o cliente, se pode ser citado externamente, responsável, última revisão e estado de aprovação.", "This page is the place we want anyone who works with Oxydise to come back to: new colleagues, sales, admin, delivery, installers, maintenance, marketing and directors. It should help people understand the technology, listen to the important podcasts, watch the right videos and gradually work through the books. It should feel like a modern learning portal for curious colleagues, not a public-facing sales page and not a rigid checklist.": "Esta página é o lugar a que queremos que regresse qualquer pessoa que trabalhe com a Oxydise: novos colaboradores, vendas, administração, entrega, instaladores, manutenção, marketing e direção. Deve ajudar as pessoas a compreender a tecnologia, ouvir os podcasts importantes, ver os vídeos certos e percorrer gradualmente os livros. Deve parecer um portal de formação moderno para colegas curiosos, não uma página de vendas pública nem uma checklist rígida.", "Route": "Percurso", "What to read/watch": "O que ler/ver", "Best for": "Indicado para", "Start here": "Comece aqui", "Knowledge-base principles, customer-safe language, HBOT basics, Red Light basics and safety guardrails.": "Princípios da base de conhecimento, linguagem segura para o cliente, noções de HBOT, noções de luz vermelha e limites de segurança.", "Everyone": "Todos", "Build confidence": "Ganhe confiança", "Equipment fundamentals, oxygen concentrator explanation, protocols, common customer concerns and customer-safe wording.": "Fundamentos do equipamento, explicação do concentrador de oxigénio, protocolos, preocupações comuns dos clientes e linguagem segura para o cliente.", "Sales, admin, support, delivery and marketing": "Vendas, administração, apoio, entrega e marketing", "Go deeper": "Aprofunde", "Mitochondria, inflammation, cytokines, VEGF/BDNF/PDGF, fasting, PEMF, grounding, hydrogen, Neuro Gamma and study summaries.": "Mitocôndrias, inflamação, citocinas, VEGF/BDNF/PDGF, jejum, PEMF, grounding, hidrogénio, Neuro Gamma e resumos de estudos.", "Wellness experts, content, founders and advanced sales": "Especialistas de bem-estar, conteúdo, fundadores e vendas avançadas", "Stay current": "Mantenha-se atualizado", "Video library, people to know, new studies and sector awareness.": "Biblioteca de vídeos, pessoas a conhecer, novos estudos e conhecimento do setor.", "Everyone who talks to customers or creates content": "Todos os que falam com clientes ou criam conteúdo", "Colleague rhythm suggestion": "Sugestão de ritmo para colaboradores", "New starters should be encouraged to spend 30-60 minutes per working day on education in their first month, but this should be framed as confidence-building rather than a mandatory “required pathway”.": "Os recém-chegados devem ser incentivados a dedicar 30 a 60 minutos por dia útil à formação no primeiro mês, mas isto deve ser apresentado como forma de ganhar confiança e não como um “percurso obrigatório”.", "How science should appear on the website": "Como a ciência deve aparecer no site", "Keep the real scientific words, because they build credibility. Then immediately explain them in brackets or in a short “In simple terms” line so every colleague can understand and repeat the idea clearly.": "Mantenha os termos científicos reais, porque dão credibilidade. Depois explique-os logo entre parênteses ou numa breve linha “Em termos simples”, para que cada colega possa compreender e repetir a ideia com clareza.", "Scientific term": "Termo científico", "Simple colleague version": "Versão simples para colegas", "Oxidative phosphorylation": "Fosforilação oxidativa", "How mitochondria use oxygen to turn food energy into ATP, the cell’s usable energy.": "Como as mitocôndrias usam oxigénio para transformar a energia dos alimentos em ATP, a energia utilizável da célula.", "Electron transport chain": "Cadeia transportadora de eletrões", "The final energy-production pathway inside mitochondria. Oxygen is the final receiver in this process.": "A via final de produção de energia dentro das mitocôndrias. O oxigénio é o recetor final neste processo.", "Dissolved oxygen in plasma": "Oxigénio no plasma", "Oxygen carried in the liquid part of blood, not only attached to red blood cells.": "Oxigénio transportado na parte líquida do sangue, não apenas ligado aos glóbulos vermelhos.", "Hypoxia": "Hipóxia", "Low oxygen availability in a tissue.": "Baixa disponibilidade de oxigénio num tecido.", "Hyperoxia": "Hiperóxia", "Higher-than-normal oxygen exposure.": "Exposição a oxigénio acima do normal.", "HIF-1 alpha": "HIF-1 alfa", "The body’s low-oxygen alarm signal. It switches on survival pathways when tissues are short of oxygen.": "O sinal de alarme do corpo para a falta de oxigénio. Ativa vias de sobrevivência quando os tecidos têm pouco oxigénio.", "Cytochrome c oxidase": "Citocromo c oxidase", "A mitochondrial enzyme that helps cells make energy and is often discussed as a light-sensitive target in Red Light Therapy.": "Uma enzima mitocondrial que ajuda as células a produzir energia e é frequentemente apontada como alvo sensível à luz na terapia de luz vermelha.", "Photobiomodulation": "Fotobiomodulação", "Using specific wavelengths of light to influence cell signalling. In simple terms: a useful light signal, not heat or tanning.": "Uso de comprimentos de onda específicos de luz para influenciar a sinalização celular. Em termos simples: um sinal de luz útil, não calor nem bronzeado.", "Reactive oxygen species / ROS": "Espécies reativas de oxigénio / ROS", "Small reactive molecules. Too much can be damaging, but a controlled amount is also used by the body as a signal.": "Pequenas moléculas reativas. Em excesso podem ser prejudiciais, mas em quantidade controlada o corpo também as usa como sinal.", "Cytokines": "Citocinas", "Immune-system messages that can turn inflammation up or down.": "Mensagens do sistema imunitário que podem aumentar ou reduzir a inflamação.", "VEGF": "VEGF", "A blood-vessel growth signal. Simple version: blood supply.": "Um sinal de crescimento de vasos sanguíneos. Versão simples: irrigação sanguínea.", "BDNF": "BDNF", "A brain-support signal involved in learning, memory and new connections. Simple version: brain wiring.": "Um sinal de apoio ao cérebro envolvido na aprendizagem, memória e novas ligações. Versão simples: as ligações do cérebro.", "PDGF": "PDGF", "A tissue-repair signal released by platelets. Simple version: repair scaffold.": "Um sinal de reparação de tecidos libertado pelas plaquetas. Versão simples: estrutura de reparação.", "VO2-rest": "VO2 em repouso", "How much oxygen the body uses at rest. Higher resting oxygen use can suggest the system is working harder than it should.": "Quanto oxigénio o corpo usa em repouso. Um uso de oxigénio em repouso mais elevado pode sugerir que o sistema está a trabalhar mais do que devia.", "Selective antioxidant": "Antioxidante seletivo", "A compound that may help with harmful oxidative stress without blocking every useful stress signal the body needs for adaptation.": "Um composto que pode ajudar no stress oxidativo prejudicial sem bloquear todos os sinais de stress úteis de que o corpo precisa para se adaptar.", "Best one-sentence guardrail": "A melhor regra numa só frase", "We can explain how the technology works, what research is exploring and what customers often report, but we do not diagnose, treat, prescribe, cure or promise outcomes.": "Podemos explicar como a tecnologia funciona, o que a investigação está a explorar e o que os clientes costumam relatar, mas não diagnosticamos, não tratamos, não prescrevemos, não curamos nem prometemos resultados.", "Risk area": "Área de risco", "Internal rule": "Regra interna", "Customer-facing wording": "Linguagem para o cliente", "Medical advice": "Aconselhamento médico", "Colleagues can educate; clinicians advise on medical suitability.": "Os colaboradores podem informar; os clínicos aconselham sobre a adequação médica.", "“I can explain how it works and when we would advise speaking to a clinician.”": "“Posso explicar como funciona e quando aconselharíamos falar com um clínico.”", "Studies": "Estudos", "A study does not equal a universal outcome. Know the population, protocol, dose, comparator and limitations.": "Um estudo não equivale a um resultado universal. Conheça a população, o protocolo, a dose, o comparador e as limitações.", "“A study in this area suggests...” rather than “it proves you will...”.": "“Um estudo nesta área sugere...” em vez de “prova que vai...”.", "Customer stories": "Histórias de clientes", "Use only with consent and approved wording. Do not imply that one person’s story predicts another person’s result.": "Use apenas com consentimento e linguagem aprovada. Não dê a entender que a história de uma pessoa prevê o resultado de outra.", "“Some customers have reported...” not “this will happen for you”.": "“Alguns clientes relataram...” e não “isto vai acontecer consigo”.", "Home use": "Uso doméstico", "Training, screening, installation, servicing and manufacturer instructions matter.": "A formação, a triagem, a instalação, a manutenção e as instruções do fabricante são importantes.", "“We support installation, training and safe-use guidance.”": "“Apoiamos a instalação, a formação e as orientações de uso seguro.”", "New modalities": "Novas modalidades", "Grounding, hydrogen, PEMF and Neuro Gamma should be described carefully. Some evidence is emerging, mixed, early-stage or device-specific.": "Grounding, hidrogénio, PEMF e Neuro Gamma devem ser descritos com cuidado. Algumas evidências são emergentes, mistas, em fase inicial ou específicas do dispositivo.", "“This is useful background, but not something to overclaim.”": "“É um contexto útil, mas não algo para exagerar.”", "Hyperbaric Oxygen Therapy, or HBOT, means breathing concentrated oxygen while inside a pressurised chamber. The pressure allows more oxygen to dissolve into the liquid part of the blood, called plasma, not just attach to red blood cells. That extra dissolved oxygen can reach tissues that may be inflamed, injured, poorly perfused or recovering, helping create a better environment for repair, energy production and recovery.": "A oxigenoterapia hiperbárica (HBOT) consiste em respirar oxigénio concentrado dentro de uma câmara pressurizada. A pressão permite que mais oxigénio se dissolva na parte líquida do sangue, o plasma, e não apenas se ligue aos glóbulos vermelhos. Esse oxigénio dissolvido adicional pode chegar a tecidos inflamados, lesionados, mal irrigados ou em recuperação, ajudando a criar um melhor ambiente para a reparação, a produção de energia e a recuperação.", "Customer-safe summary": "Resumo seguro para o cliente", "HBOT does not force the body to heal. It changes the oxygen environment so the body has more of what it needs to repair, regulate inflammation and produce energy. Use “support” language, not “treat” or “cure” language.": "A HBOT não obriga o corpo a curar-se. Altera o ambiente de oxigénio para que o corpo tenha mais do que precisa para reparar, regular a inflamação e produzir energia. Use a palavra “apoiar”, e não “tratar” ou “curar”.", "Concept": "Conceito", "Plain-English explanation": "Explicação simples", "Why it matters": "Porque importa", "ATA": "ATA", "Atmospheres absolute. 1.0 ATA is normal sea-level pressure. A 1.5 ATA chamber is 50% more pressure than normal air pressure.": "Atmosferas absolutas. 1,0 ATA é a pressão normal ao nível do mar. Uma câmara a 1,5 ATA tem 50% mais pressão do que a pressão normal do ar.", "Pressure is one part of the dose. It changes how much gas can dissolve into fluids.": "A pressão é apenas uma parte da dose. Altera a quantidade de gás que se pode dissolver nos líquidos.", "Oxygen percentage": "Percentagem de oxigénio", "Room air is about 21% oxygen. Oxygen concentrators commonly deliver around 90-96% oxygen through a mask or hood.": "O ar ambiente tem cerca de 21% de oxigénio. Os concentradores de oxigénio fornecem normalmente cerca de 90–96% de oxigénio através de uma máscara ou capuz.", "Oxygen percentage and chamber pressure are different. Both affect oxygen dose.": "A percentagem de oxigénio e a pressão da câmara são coisas diferentes. Ambas afetam a dose de oxigénio.", "Henry’s law": "Lei de Henry", "More pressure over a gas means more of that gas can dissolve into liquid.": "Quanto maior a pressão sobre um gás, mais desse gás se pode dissolver no líquido.", "This is why pressure helps oxygen dissolve into plasma.": "É por isto que a pressão ajuda o oxigénio a dissolver-se no plasma.", "Plasma oxygen": "Oxigénio no plasma", "Oxygen dissolved directly in the blood fluid, not carried on haemoglobin.": "Oxigénio dissolvido diretamente na parte líquida do sangue, não transportado pela hemoglobina.", "This is the hidden advantage of HBOT: oxygen can reach areas where red-cell delivery is limited.": "Esta é a vantagem escondida da HBOT: o oxigénio pode chegar a zonas onde a entrega pelos glóbulos vermelhos é limitada.", "Partial pressure": "Pressão parcial", "The pressure contribution of one gas in a mixture.": "A contribuição de um gás para a pressão de uma mistura.", "Higher oxygen partial pressure increases the oxygen gradient into tissue.": "Uma pressão parcial de oxigénio mais alta aumenta a entrada de oxigénio no tecido.", "Air breaks / off-gassing": "Pausas de ar / eliminação de gás", "Short breaks from the oxygen mask during longer sessions.": "Pequenas pausas sem a máscara de oxigénio durante sessões mais longas.", "Used in some protocols to manage oxygen exposure and create oxygen fluctuations that may trigger adaptive repair signalling.": "Usadas em alguns protocolos para gerir a exposição ao oxigénio e criar oscilações de oxigénio que podem ativar sinais adaptativos de reparação.", "If you are asked how the oxygen concentrator works, say: it pulls in room air, then uses zeolite - a mineral with microscopic cage-like pores - to trap nitrogen molecules and allow oxygen to pass through. By continuously cycling this process, the machine delivers a steady flow of concentrated oxygen, usually around 93%, through tubing to the mask or hood.": "Se lhe perguntarem como funciona o concentrador de oxigénio, diga: aspira o ar da sala e depois usa zeólito — um mineral com poros microscópicos em forma de gaiola — para reter as moléculas de azoto e deixar passar o oxigénio. Ao repetir este ciclo continuamente, a máquina fornece um fluxo constante de oxigénio concentrado, normalmente cerca de 93%, através de um tubo até à máscara ou capuz.", "Most concentrators use two zeolite-filled molecular sieve beds. While one bed is online and under pressure, it adsorbs nitrogen and lets oxygen-enriched gas pass through. At the same time, the second bed is depressurised, releasing the nitrogen it previously captured and regenerating itself for the next cycle. The machine switches between the two beds every few seconds, which is how it creates a continuous supply of oxygen.": "A maioria dos concentradores usa dois leitos de peneira molecular com zeólito. Enquanto um leito está em funcionamento e sob pressão, adsorve o azoto e deixa passar o gás enriquecido em oxigénio. Ao mesmo tempo, o segundo leito é despressurizado, libertando o azoto que tinha captado e regenerando-se para o ciclo seguinte. A máquina alterna entre os dois leitos a cada poucos segundos, criando assim um fornecimento contínuo de oxigénio.", "Important equipment distinction": "Distinção importante do equipamento", "The chamber should be pressurised with air. Concentrated oxygen is delivered through the intended breathing circuit. Never imply that the whole chamber is filled with pure oxygen.": "A câmara deve ser pressurizada com ar. O oxigénio concentrado é fornecido através do circuito de respiração previsto. Nunca dê a entender que toda a câmara está cheia de oxigénio puro.", "Quality point": "Aspeto de qualidade", "How to say it without attacking competitors": "Como dizê-lo sem atacar concorrentes", "Zeolite quality": "Qualidade do zeólito", "Different molecular sieves vary in adsorption performance, durability and regeneration behaviour.": "Diferentes peneiras moleculares variam no desempenho de adsorção, na durabilidade e no comportamento de regeneração.", "“The quality of the sieve material matters because it affects how consistently nitrogen is removed over time.”": "“A qualidade do material da peneira importa porque afeta a constância com que o azoto é removido ao longo do tempo.”", "Quantity of zeolite": "Quantidade de zeólito", "A larger or better-designed sieve bed can give the system more capacity and stability, depending on the engineering.": "Um leito de peneira maior ou melhor concebido pode dar ao sistema mais capacidade e estabilidade, consoante a engenharia.", "“It is not just the concentrator label that matters; the internal bed design matters.”": "“Não importa apenas a etiqueta do concentrador; o desenho interno do leito também importa.”", "Moisture management": "Controlo da humidade", "Water vapour can occupy adsorption sites in zeolite and reduce the bed’s ability to capture nitrogen efficiently.": "O vapor de água pode ocupar locais de adsorção no zeólito e reduzir a capacidade do leito de captar azoto de forma eficiente.", "“Moisture is one of the main enemies of long-term oxygen purity, so drying and moisture control are important engineering details.”": "“A humidade é um dos principais inimigos da pureza do oxigénio a longo prazo, por isso a secagem e o controlo da humidade são detalhes de engenharia importantes.”", "Regeneration cycle": "Ciclo de regeneração", "The pressure/depressure cycle must allow captured nitrogen to release properly before the next cycle.": "O ciclo de pressurização/despressurização deve permitir que o azoto captado seja libertado corretamente antes do ciclo seguinte.", "“A good system keeps switching and regenerating cleanly, rather than slowly losing performance.”": "“Um bom sistema continua a alternar e a regenerar de forma limpa, em vez de perder desempenho lentamente.”", "Long-term oxygen purity": "Pureza do oxigénio a longo prazo", "The goal is not a strong reading on day one only; it is consistent output after real-world use.": "O objetivo não é uma boa leitura apenas no primeiro dia; é um fornecimento constante após uso real.", "“We care about performance stability over time, not just headline specifications.”": "“Preocupa-nos a estabilidade do desempenho ao longo do tempo, e não apenas os números de destaque das especificações.”", "Customer-safe comparison language": "Linguagem segura de comparação para o cliente", "Do not name a rival, imply they are “cheap”, or attack a manufacturer unless there is approved evidence. The premium Oxydise line is: “The difference is in the engineering details - sieve-bed quality, moisture control, pressure stability, oxygen purity and long-term serviceability.”": "Não nomeie um rival, não insinue que é “barato” nem ataque um fabricante sem evidência aprovada. A posição premium da Oxydise é: “A diferença está nos detalhes de engenharia — qualidade do leito de peneira, controlo de humidade, estabilidade de pressão, pureza do oxigénio e durabilidade na manutenção.”", "Mechanism": "Mecanismo", "What is happening": "O que está a acontecer", "Where it helps the conversation": "Onde ajuda na conversa", "Under pressure, oxygen dissolves into plasma and can travel beyond normal haemoglobin delivery.": "Sob pressão, o oxigénio dissolve-se no plasma e pode chegar para além da entrega normal pela hemoglobina.", "Poor circulation, inflammation, injury recovery, fatigue states and tissue repair.": "Má circulação, inflamação, recuperação de lesões, estados de fadiga e reparação de tecidos.", "Inflammation modulation": "Modulação da inflamação", "HBOT can influence inflammatory signalling and oxidative stress responses. Describe this as helping regulate inflammatory environments, not as a blanket anti-inflammatory cure.": "A HBOT pode influenciar a sinalização inflamatória e as respostas ao stress oxidativo. Descreva isto como ajudar a regular ambientes inflamatórios, e não como uma cura anti-inflamatória universal.", "Pain, long-term inflammation, recovery load and post-viral fatigue.": "Dor, inflamação prolongada, carga de recuperação e fadiga pós-viral.", "Microcirculation and angiogenesis": "Microcirculação e angiogénese", "Oxygen gradients and intermittent exposure can support VEGF-related signalling and new blood vessel formation.": "Os gradientes de oxigénio e a exposição intermitente podem apoiar a sinalização relacionada com o VEGF e a formação de novos vasos sanguíneos.", "Slow healing, vascular recovery, brain perfusion and tissue resilience.": "Cicatrização lenta, recuperação vascular, irrigação cerebral e resiliência dos tecidos.", "Mitochondrial support": "Apoio mitocondrial", "Mitochondria need oxygen for oxidative phosphorylation. HBOT improves oxygen availability where tissue is hypoxic, inflamed or poorly perfused.": "As mitocôndrias precisam de oxigénio para a fosforilação oxidativa. A HBOT melhora a disponibilidade de oxigénio onde o tecido está hipóxico, inflamado ou mal irrigado.", "Energy, recovery, brain fog and exercise tolerance.": "Energia, recuperação, névoa mental e tolerância ao exercício.", "Stem/progenitor cell mobilisation": "Mobilização de células estaminais/progenitoras", "Studies have reported mobilisation of stem/progenitor cells after repeated HBOT exposure.": "Há estudos que relataram a mobilização de células estaminais/progenitoras após exposição repetida à HBOT.", "Regenerative framing; use as mechanism education, not guaranteed outcome.": "Enquadramento regenerativo; use como educação sobre o mecanismo, não como resultado garantido.", "Neuroplasticity and brain perfusion": "Neuroplasticidade e irrigação cerebral", "HBOT research explores brain blood flow, cognitive function and neuroplasticity in certain populations.": "A investigação sobre HBOT explora o fluxo sanguíneo cerebral, a função cognitiva e a neuroplasticidade em certas populações.", "Brain fog, ageing brain and concussion/TBI conversations - escalate medical cases.": "Névoa mental, envelhecimento do cérebro e conversas sobre concussão/TCE — encaminhe os casos médicos.", "Collagen and fibroblast activity": "Colagénio e atividade dos fibroblastos", "Oxygen is needed for collagen synthesis and wound-healing biology.": "O oxigénio é necessário para a síntese de colagénio e para a biologia da cicatrização de feridas.", "Post-surgery, skin, tissue repair and injury recovery.": "Pós-cirurgia, pele, reparação de tecidos e recuperação de lesões.", "Hyperbaric oxygen affects mitochondrial efficiency at a fundamental level: it restores oxygen availability to the electron transport chain, where ATP is produced. When tissues are inflamed, hypoxic or poorly perfused, mitochondria are forced into less efficient energy production, often producing more oxidative stress for less useful output.": "O oxigénio hiperbárico afeta a eficiência mitocondrial a um nível fundamental: restaura a disponibilidade de oxigénio para a cadeia transportadora de eletrões, onde se produz o ATP. Quando os tecidos estão inflamados, hipóxicos ou mal irrigados, as mitocôndrias são forçadas a uma produção de energia menos eficiente, gerando muitas vezes mais stress oxidativo com menos resultado útil.", "HBOT increases dissolved oxygen in plasma, bypassing compromised circulation and delivering oxygen directly to tissues. This can improve oxidative phosphorylation efficiency, support mitochondrial biogenesis pathways such as PGC-1 alpha, and reduce the compensatory “overworking” that can show up as elevated resting oxygen consumption or VO2-rest. In simple terms, HBOT does not stimulate mitochondria to work harder - it helps create the conditions for them to work properly again.": "A HBOT aumenta o oxigénio dissolvido no plasma, contornando a circulação comprometida e entregando o oxigénio diretamente aos tecidos. Isto pode melhorar a eficiência da fosforilação oxidativa, apoiar vias de biogénese mitocondrial como a PGC-1 alfa e reduzir o “excesso de trabalho” compensatório que se manifesta num consumo de oxigénio em repouso elevado (VO2 em repouso). Em termos simples, a HBOT não obriga as mitocôndrias a trabalhar mais — ajuda a criar as condições para voltarem a funcionar como deve ser.", "Careful mitochondrial wording": "Linguagem cuidadosa sobre mitocôndrias", "Say “may support mitochondrial efficiency where oxygen availability is limited” rather than “fixes mitochondria”. The Dr John Cramer notes are useful because they also remind colleagues that mitochondrial DNA damage and mitophagy failure are deeper ageing issues that HBOT alone should not be claimed to reverse.": "Diga “pode apoiar a eficiência mitocondrial onde a disponibilidade de oxigénio é limitada”, em vez de “repara as mitocôndrias”. As notas do Dr. John Cramer são úteis porque também lembram que os danos no ADN mitocondrial e a falha da mitofagia são problemas mais profundos do envelhecimento, que não se deve afirmar que a HBOT, por si só, reverte.", "Bloodwork can look normal or even high for a nutrient while cells may still be functionally deficient. A useful internal metaphor is the “nutrient traffic jam”: the nutrient is visible in the bloodstream, but inflammation, receptor issues, membrane dysfunction, poor microcirculation or metabolic stress may limit how well it reaches or enters cells.": "As análises ao sangue podem parecer normais, ou até altas, para um nutriente, enquanto as células continuam funcionalmente deficientes. Uma metáfora interna útil é o “engarrafamento de nutrientes”: o nutriente está visível na corrente sanguínea, mas a inflamação, problemas nos recetores, disfunção das membranas, má microcirculação ou stress metabólico podem limitar a forma como ele chega às células e entra nelas.", "Example": "Exemplo", "What can happen internally": "O que pode estar a acontecer internamente", "Careful Oxydise framing": "Enquadramento cuidadoso da Oxydise", "Vitamin D": "Vitamina D", "Blood level may look acceptable, but receptor sensitivity and inflammatory signalling can affect cellular response.": "O nível no sangue pode parecer aceitável, mas a sensibilidade dos recetores e a sinalização inflamatória podem afetar a resposta celular.", "HBOT may help support the tissue environment; do not claim it corrects vitamin D status.": "A HBOT pode ajudar a apoiar o ambiente do tecido; não afirme que corrige o estado de vitamina D.", "Magnesium": "Magnésio", "Standard blood values may not reflect intracellular magnesium well.": "Os valores sanguíneos habituais podem não refletir bem o magnésio intracelular.", "Encourage clinician-led testing and interpretation where relevant.": "Incentive análises e interpretação orientadas por um clínico quando for relevante.", "Ferritin / iron": "Ferritina / ferro", "Iron can be stored but not well utilised in inflammatory states.": "O ferro pode estar armazenado mas mal utilizado em estados inflamatórios.", "Do not advise on anaemia; refer to clinician.": "Não aconselhe sobre anemia; encaminhe para um clínico.", "Glucose": "Glucose", "High blood glucose can coexist with poor cellular utilisation.": "Uma glicemia elevada pode coexistir com uma má utilização celular.", "Useful analogy for uptake, but do not give diabetes advice unless qualified.": "Analogia útil para a captação, mas não dê conselhos sobre diabetes sem qualificação.", "B12 / folate / omega-3s": "B12 / folato / ómega-3", "Availability in blood does not always mean ideal cellular use.": "A disponibilidade no sangue nem sempre significa um uso celular ideal.", "Use as education only; avoid implying HBOT “unlocks” all nutrients.": "Use apenas como educação; evite sugerir que a HBOT “desbloqueia” todos os nutrientes.", "Practical takeaway": "Conclusão prática", "The issue is not always “too little” or “too much” in the blood. Sometimes the issue is whether nutrients and fuel are reaching and being used by the cells. HBOT may help by supporting oxygenation, microcirculation and a less inflammatory tissue environment.": "O problema nem sempre é haver “pouco” ou “demasiado” no sangue. Por vezes a questão é se os nutrientes e o combustível estão a chegar às células e a ser usados por elas. A HBOT pode ajudar ao apoiar a oxigenação, a microcirculação e um ambiente de tecido menos inflamado.", "Jason Sonners is useful for internal education because he discusses how different pressure ranges may influence inflammatory signalling differently. Treat this as emerging and practical, not as settled clinical dosing rules.": "Jason Sonners é útil para a educação interna porque discute como diferentes intervalos de pressão podem influenciar de forma diferente a sinalização inflamatória. Encare isto como algo emergente e prático, e não como regras clínicas de dosagem estabelecidas.", "Pressure range": "Intervalo de pressão", "Internal positioning": "Posicionamento interno", "Useful for thinking about": "Útil para pensar sobre", "Caution": "Cuidado", "1.3-1.5 ATA": "1,3–1,5 ATA", "Mild to moderate pressure; comfortable for many people and practical for repeated home sessions.": "Pressão ligeira a moderada; confortável para muitas pessoas e prática para sessões domésticas repetidas.", "Wellness, fatigue, chronic low-grade inflammation, brain fog, long-term programmes and sensitive users.": "Bem-estar, fadiga, inflamação crónica de baixo grau, névoa mental, programas de longo prazo e utilizadores sensíveis.", "Do not oversell mild pressure as equivalent to hospital HBOT. Consistency and total sessions matter.": "Não venda a pressão ligeira como equivalente à HBOT hospitalar. A constância e o total de sessões importam.", "1.7-2.0 ATA": "1,7–2,0 ATA", "Higher oxygen push, typically hardshell or more advanced systems.": "Maior aporte de oxigénio, normalmente câmaras rígidas ou sistemas mais avançados.", "Acute injury, stubborn tissue recovery, advanced neurological/post-surgical contexts where suitable.": "Lesão aguda, recuperação difícil de tecidos, contextos neurológicos/pós-cirúrgicos avançados quando adequado.", "Not automatically better for everyone. Suitability matters.": "Não é automaticamente melhor para todos. A adequação importa.", "2.0+ ATA": "2,0+ ATA", "Clinical/medical pressure range.": "Intervalo de pressão clínico/médico.", "Hospital indications such as decompression sickness, carbon monoxide poisoning, serious wounds and radiation injury.": "Indicações hospitalares como doença de descompressão, intoxicação por monóxido de carbono, feridas graves e lesões por radiação.", "Usually requires medical indication, prescription or qualified supervision.": "Normalmente exige indicação médica, prescrição ou supervisão qualificada.", "Practical pressure takeaway": "Conclusão prática sobre pressão", "Mild pressure is often framed for chronic, systemic and nervous-system style presentations. Higher pressure is often framed for acute injury, tissue damage, joint irritation and post-surgical recovery. Keep the language cautious: different pressures may produce different biological signals.": "A pressão ligeira é frequentemente enquadrada para quadros crónicos, sistémicos e ligados ao sistema nervoso. A pressão mais alta é frequentemente enquadrada para lesão aguda, dano nos tecidos, irritação articular e recuperação pós-cirúrgica. Mantenha a linguagem cautelosa: pressões diferentes podem produzir sinais biológicos diferentes.", "Protocol status": "Estado do protocolo", "Internal education only. Protocols must remain flexible and safety-led. Complex cases, cancer, pregnancy, neurological diagnoses, medication questions and post-surgical cases should be escalated appropriately.": "Apenas para educação interna. Os protocolos devem manter-se flexíveis e orientados pela segurança. Casos complexos, cancro, gravidez, diagnósticos neurológicos, questões sobre medicação e casos pós-cirúrgicos devem ser encaminhados de forma adequada.", "Customer goal": "Objetivo do cliente", "Typical internal guidance": "Orientação interna típica", "How to explain it": "Como explicar", "General wellness / energy / longevity": "Bem-estar geral / energia / longevidade", "2-3 sessions per week; think in blocks of around 40 sessions; maintenance once weekly if useful.": "2–3 sessões por semana; pense em blocos de cerca de 40 sessões; manutenção uma vez por semana, se for útil.", "“We usually think in blocks rather than one-off sessions.”": "“Costumamos pensar em blocos, e não em sessões isoladas.”", "Chronic inflammation / pain / autoimmune patterns": "Inflamação crónica / dor / padrões autoimunes", "4-6 sessions per week; 40-60 sessions; review around session 20.": "4–6 sessões por semana; 40–60 sessões; reavaliação por volta da sessão 20.", "“Consistency matters more than trying one or two sessions.”": "“A constância importa mais do que experimentar uma ou duas sessões.”", "Neurological / brain health / concussion / brain fog": "Neurológico / saúde do cérebro / concussão / névoa mental", "Often 5 sessions per week initially; 40-60 sessions; step down after week 3-4.": "Muitas vezes 5 sessões por semana no início; 40–60 sessões; reduzir após a 3.ª–4.ª semana.", "“Brain and nervous-system work usually needs repeated exposure.”": "“O trabalho no cérebro e no sistema nervoso costuma exigir exposição repetida.”", "Cancer support / post-treatment recovery": "Apoio no cancro / recuperação após tratamento", "3-5 sessions per week; oncology team involvement; supportive recovery only.": "3–5 sessões por semana; com envolvimento da equipa de oncologia; apenas recuperação de apoio.", "“We do not treat cancer. This would be supportive recovery and should be discussed with your oncology team.”": "“Não tratamos o cancro. Isto seria recuperação de apoio e deve ser discutido com a sua equipa de oncologia.”", "Sports performance / in-season recovery": "Desempenho desportivo / recuperação em época", "3-4 sessions per week ongoing.": "3–4 sessões por semana de forma continuada.", "“It supports recovery capacity; it does not replace training.”": "“Apoia a capacidade de recuperação; não substitui o treino.”", "Sports injury / rehab": "Lesão desportiva / reabilitação", "Often 5 sessions per week; 40-60 sessions.": "Muitas vezes 5 sessões por semana; 40–60 sessões.", "“Injury recovery is where a tighter block is usually more meaningful.”": "“Na recuperação de lesões é onde um bloco mais intenso costuma fazer mais sentido.”", "Post-surgery / tissue repair": "Pós-cirurgia / reparação de tecidos", "Often 5 sessions per week; 40-60 sessions, subject to suitability and clinician advice.": "Muitas vezes 5 sessões por semana; 40–60 sessões, sujeito a adequação e a aconselhamento clínico.", "“Earlier support can be more efficient, but suitability matters.”": "“Um apoio mais precoce pode ser mais eficiente, mas a adequação importa.”", "Long COVID / post-viral fatigue": "COVID longa / fadiga pós-viral", "4-5 sessions per week; 30-50 sessions; track sleep, HRV, steps and symptoms.": "4–5 sessões por semana; 30–50 sessões; acompanhe o sono, a VFC, os passos e os sintomas.", "“Evidence is emerging and results vary, so we track objective change where possible.”": "“As evidências estão a surgir e os resultados variam, por isso acompanhamos mudanças objetivas sempre que possível.”", "Area": "Área", "What everyone must know": "O que todos têm de saber", "Untreated pneumothorax": "Pneumotórax não tratado", "Widely recognised as the key absolute contraindication. If there is any history or concern, pause and escalate.": "Amplamente reconhecido como a principal contraindicação absoluta. Perante qualquer historial ou suspeita, pare e encaminhe.", "Ears and sinuses": "Ouvidos e seios nasais", "Pressure changes require equalisation. Colds, sinus infections and ear issues can make sessions uncomfortable or unsafe.": "As mudanças de pressão exigem equalização. Constipações, sinusites e problemas de ouvidos podem tornar as sessões desconfortáveis ou inseguras.", "Fire and oxygen safety": "Segurança contra incêndio e do oxigénio", "Oxygen supports combustion. No flames, sparks, smoking, oils, flammable materials or unsafe electronics. Follow device instructions and fire prevention measures.": "O oxigénio favorece a combustão. Nada de chamas, faíscas, fumar, óleos, materiais inflamáveis ou eletrónica insegura. Siga as instruções do equipamento e as medidas de prevenção de incêndio.", "Oxygen toxicity": "Toxicidade do oxigénio", "Rare in properly delivered protocols, especially at mild pressure, but possible with higher oxygen partial pressures or excessive exposure. Dosing discipline and air breaks matter.": "Rara em protocolos bem aplicados, sobretudo a pressão ligeira, mas possível com pressões parciais de oxigénio mais altas ou exposição excessiva. A disciplina na dosagem e as pausas de ar importam.", "Twice daily use": "Uso duas vezes por dia", "Where two sessions are used in a day, build in a meaningful gap and follow the equipment/protocol guidance. The existing internal note uses a four-hour break as a practical internal rule.": "Quando se fazem duas sessões num dia, inclua um intervalo significativo e siga as orientações do equipamento/protocolo. A nota interna existente usa uma pausa de quatro horas como regra prática.", "Medical complexity": "Complexidade médica", "Cancer, seizures, lung disease, recent surgery, pregnancy and complex medication questions should be escalated to an appropriate professional.": "Cancro, convulsões, doença pulmonar, cirurgia recente, gravidez e questões complexas de medicação devem ser encaminhados para um profissional adequado.", "Resources · Knowledge Base": "Recursos · Base de conhecimento", "Resources · Internal draft": "Recursos · Rascunho interno", " var I18N_ORIG = new WeakMap();
function applyLang(){
  document.querySelectorAll(".lang-btn").forEach(function(b){ b.classList.toggle("on", b.dataset.lang===LANG); });
  document.documentElement.lang = LANG;
  var d = I18N[LANG] || null;
  var roots=[document.getElementById("nav"), document.querySelector(".topbar-inner"), document.getElementById("content"), document.getElementById("gate")];
  roots.forEach(function(root){
    if(!root) return;
    var w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null), nodes=[], n;
    while(n=w.nextNode()){
      var raw=n.nodeValue; if(!raw||!raw.trim()) continue;
      var pe=n.parentElement; if(!pe) continue;
      if(pe.closest(".no-i18n")) continue;
      var tg=pe.tagName; if(tg==="SCRIPT"||tg==="STYLE") continue;
      nodes.push(n);
    }
    nodes.forEach(function(node){
      var orig = I18N_ORIG.get(node);
      if(orig==null){ orig = node.nodeValue; I18N_ORIG.set(node, orig); }
      var key = orig.trim(), tr = d ? d[key] : null;
      node.nodeValue = (tr!=null) ? orig.replace(key, tr) : orig;
    });
  });
}

function blockHTML(b){

      return `<div class="section fade edu-sub"><h3 class="edu-h3">${richText(b.text)}</h3>${b.sub?`<p class="sub">${richText(b.sub)}</p>`:""}</div>`;
    case "toc":
      return `<div class="section fade edu-toc"><div class="toc-h">${richText(b.title||"Contents")}</div><div class="toc-list">${b.items.map(it=>`<a class="toc-item" onclick="eduScroll('sec-${esc(it.id)}')">${it.n?`<span class="toc-n">${esc(it.n)}</span>`:""}<span>${richText(it.label)}</span></a>`).join("")}</div></div>`;

      return `<div class="section fade">${b.text.map(t=>`<p class="sub" style="max-width:74ch">${richText(t)}</p>`).join("")}</div>`;
    case "table":
      return `<div class="section fade">${tableHTML(b.head,b.rows.map(r=>r.map(esc)))}</div>`;
    case "xtable":
      return `<div class="section fade">${tableHTML(b.head,b.rows.map(r=>r.map(richText)))}</div>`;

    case "cards":

    case "rules":
      return `<div class="section fade">${b.title?`<h2><span class="ico">\u25C8</span>${esc(b.title)}</h2>`:""}<div>${b.items.map(r=>`<div class="rule-row"><div class="rk">${esc(r[0])}</div><div class="rv">${esc(r[1])}</div></div>`).join("")}</div></div>`;
    case "callout":

    case "script":
      return `<div class="section fade"><div class="callout script"><div class="ck">${esc(b.k)}</div><p>${esc(b.text)}</p></div></div>`;
    case "dodont":
      return `<div class="section fade">${tableHTML(["Safe wording","Unsafe wording"],b.rows.map(r=>r.map(esc)),()=>"")}</div>`;
    case "orderlist":
      return `<div class="section fade"><div>${b.items.map((r,i)=>`<div class="rule-row"><div class="rk"><span style="color:var(--primary);font-variant-numeric:tabular-nums">${i+1}.</span> ${esc(r[0])}</div><div class="rv">${esc(r[1])}</div></div>`).join("")}</div></div>`;
    case "priority-key":
      return `<div class="section fade"><div class="cards">
        <div class="card"><div class="ct"><span class="tag p1">P1</span> Build first</div><div class="cd">Required to run the customer journey safely and consistently now.</div></div>
        <div class="card"><div class="ct"><span class="tag p2">P2</span> Build next</div><div class="cd">Important for better conversion, education, aftercare or marketing rhythm.</div></div>
        <div class="card"><div class="ct"><span class="tag p3">P3</span> Later / improve</div><div class="cd">Useful, but not essential before the first version goes live.</div></div>

      }).join("");
      return `<div class="section fade"><div class="tbl-wrap"><table class="tbl reg-tbl" id="${b.id}"><thead><tr>${b.head.map(x=>`<th>${esc(x)}</th>`).join("")}<th title="Notes &amp; documents">\u270E</th></tr></thead><tbody>${body}</tbody></table></div></div>`;
    }
    case "feedback":
      return `<div class="section fade">${b.items.map(q=>`<div class="feedback-q">${esc(q)}</div>`).join("")}</div>`;
    case "fb-board":

        <div id="fb-board"></div>
      </div>`;
    default: return "";
  }
}

function wireSearch(c){
  const inp = c.querySelector(".search"); if(!inp) return;
  inp.addEventListener("input",()=>{
    const q = inp.value.trim().toLowerCase();
    const tbl = document.getElementById(inp.dataset.target); if(!tbl)return;
    tbl.querySelectorAll("tbody tr").forEach(tr=>{
      if(tr.classList.contains("reg-detail")){ tr.hidden=true; const prev=tr.previousElementSibling; if(prev){ const ic=prev.querySelector(".rt-ic"); if(ic) ic.textContent="\uFF0B"; } return; }
      if(tr.dataset.search==null) return;
      tr.style.display = !q || tr.dataset.search.includes(q) ? "" : "none";
    });
  });
}

/* ---------- Routing ---------- */
function go(id){
  current=id;
  // Update the URL hash for bookmarking, but never let a blocked History API
  // (sandboxed iframe / strict file:// origins) stop navigation from rendering.
  try { if(history && history.replaceState) history.replaceState(null,"","#"+id); }
  catch(e){ try { location.hash = id; } catch(_){} }
  document.querySelectorAll(".nav-link").forEach(l=>l.classList.toggle("active",l.dataset.id===id));
  $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("show");
  render();
  try { window.scrollTo({top:0,behavior:"instant"}); } catch(e){ window.scrollTo(0,0); }
}
function render(){
  if(current==="home"){ renderHome(); }
  else {
    const p = ALL_PAGES.find(x=>x.id===current);
    if(!p){ current="home"; renderHome(); }
    else if(p.blocks) renderResource(p);
    else renderJourney(p);
  }
  afterRender();
}
function afterRender(){
  const c=$("#content");
  c.classList.toggle("edu-doc", current==="education");
  wireTemplateRows(c);
  markEditable(c, current);
  applyLang();
}

/* password gate */
function gateUnlock(){ Store.set("oxydise_unlocked","1"); document.body.classList.remove("locked"); }
function lockInit(){
  const g=$("#gate"); if(!g) return;
  if(Store.get("oxydise_unlocked")==="1"){ document.body.classList.remove("locked"); return; }
  document.body.classList.add("locked");
  const inp=$("#gatePass"), btn=$("#gateBtn"), err=$("#gateErr");
  function attempt(){ if(inp.value===VIEW_PASS){ err.hidden=true; gateUnlock(); } else { err.hidden=false; inp.value=""; inp.focus(); } }
  btn.onclick=attempt;
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") attempt(); });
  setTimeout(()=>{ try{ inp.focus(); }catch(e){} },60);
}

(function(){
  const bar=$("#editbar"); if(!bar) return;
  bar.querySelector("[data-done]").onclick=()=>{ setEditing(false); toast("Edits saved on this device."); };
  bar.querySelector("[data-publish]").onclick=publishSite;
  bar.querySelector("[data-export]").onclick=exportEdits;
  bar.querySelector("[data-discard]").onclick=discardLocal;
  const imp=$("#importFile");
  bar.querySelector("[data-import]").onclick=()=>imp.click();
  imp.onchange=()=>{ if(imp.files[0]) importEdits(imp.files[0]); imp.value=""; };
})();
const hash=location.hash.replace("#","");
current = (hash && (hash==="home"||ALL_PAGES.find(p=>p.id===hash)))?hash:"home";
applyRole();
go(current);
/* shared backend: render local instantly, then refresh from server + keep in sync */
if(Net.enabled){ setSyncDot(""); backendHydrate().then(ok=>{ if(ok) render(); }); backendPoll(); }

</script>
</body>
</html>
