    <textarea class="fb-text" rows="3" placeholder="Your idea for improving this page\u2026 (what could be clearer, missing, or better?)"></textarea>
    <div class="fb-row">
      <input class="fb-name" type="text" placeholder="Your name (optional)">
      <button class="fb-submit" type="button">Submit idea</button>
    </div>
    <div class="fb-msg" hidden></div>
    ${showList?`<div class="fb-list"></div>`:""}
  </div>`;
}
function fbItemHTML(it, withPage){
  return `<div class="fb-item">
    <div class="fb-item-top"><span class="fb-who">${esc(it.name||"Anonymous")}</span><span class="fb-when">${esc(fmtTime(it.ts))}</span>${withPage?`<span class="fb-pin">${esc(it.pageTitle||"")}</span>`:""}</div>
    <div class="fb-body">${esc(it.text)}</div>
    <button class="fb-del" data-del="${esc(it.id)}" title="Remove this idea">Remove</button>
  </div>`;
}
function wireFeedback(c){
  // per-page submission forms
  c.querySelectorAll(".fb-form").forEach(form=>{
    const pageId=form.dataset.page, pageTitle=form.dataset.title;
    const ta=form.querySelector(".fb-text"), nm=form.querySelector(".fb-name");
    const btn=form.querySelector(".fb-submit"), msg=form.querySelector(".fb-msg");
    const listBox=form.querySelector(".fb-list");
    function renderList(){
      if(!listBox) return;
      const items=fbForPage(pageId);
      listBox.innerHTML = items.length
        ? `<div class="fb-list-h">Ideas submitted for this page (${items.length})</div>`+items.map(it=>fbItemHTML(it,false)).join("")
        : "";
      listBox.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ fbDelete(b.dataset.del); renderList(); refreshBoard(); });
    }
    function submit(){
      const text=ta.value.trim(); if(!text){ ta.focus(); return; }
      fbAdd({id:fbId(), pageId, pageTitle, text, name:(nm.value.trim()||"Anonymous"), role:activeRole, ts:Date.now()});
      ta.value=""; nm.value="";
      msg.hidden=false;
      msg.textContent = Store.persistent
        ? "Thanks \u2014 your idea was saved to the improvement board."
        : "Thanks \u2014 saved for this session. (Saving across reloads is blocked in this preview; it will persist on the hosted site.)";
      clearTimeout(form._mt); form._mt=setTimeout(()=>{msg.hidden=true;},6000);
      renderList(); refreshBoard();
    }
    btn.onclick=submit;
    ta.addEventListener("keydown",e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") submit(); });
    renderList();
  });
  // live board (feedback page)
  refreshBoard();
  const tb=c.querySelector(".fb-toolbar");
  if(tb){
    const b = sel => tb.querySelector(sel);
    if(b("[data-email]")) b("[data-email]").onclick=fbEmailAll;
    if(b("[data-copy]"))  b("[data-copy]").onclick=fbCopyAll;
    if(b("[data-csv]"))   b("[data-csv]").onclick=fbDownloadCsv;
    if(b("[data-clear]")) b("[data-clear]").onclick=()=>{ if(fbAll().length && confirm("Clear all submitted ideas? This cannot be undone.")){ fbClear(); render(); } };
  }
}
function refreshBoard(){
  const box=document.getElementById("fb-board"); if(!box) return;
  const all=fbAll();
  const cnt=document.querySelector(".fb-count"); if(cnt) cnt.textContent=all.length;
  const cs=document.querySelector(".fb-count-s"); if(cs) cs.textContent=all.length===1?"":"s";
  if(!all.length){ box.innerHTML=`<p class="fb-empty">No ideas yet. Use the box above, or the feedback box at the bottom of any page, to add the first one.</p>`; return; }
  const order=[], groups={};
  all.forEach(it=>{ const t=it.pageTitle||"General"; if(!groups[t]){ groups[t]=[]; order.push(t); } groups[t].push(it); });
  box.innerHTML=order.map(t=>`<div class="fb-group"><div class="fb-group-h">${esc(t)} <span class="fb-badge">${groups[t].length}</span></div>${groups[t].map(it=>fbItemHTML(it,false)).join("")}</div>`).join("");
  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ fbDelete(b.dataset.del); render(); });
}
function fbEmailAll(){
  const all=fbAll(); if(!all.length){ toast("No ideas to send yet."); return; }
  const body=all.map(it=>`Page: ${it.pageTitle}\nFrom: ${it.name||"Anonymous"}\nWhen: ${fmtTime(it.ts)}\nIdea: ${it.text}`).join("\n\n----------------------------\n\n");
  const subject=`Oxydise website feedback \u2014 ${all.length} idea${all.length>1?"s":""}`;
  try{ window.location.href="mailto:?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body); }
  catch(e){ toast("Could not open email client."); }
}
function fbCopyAll(){
  const all=fbAll(); if(!all.length){ toast("No ideas to copy yet."); return; }
  const text=all.map(it=>`[${it.pageTitle}] ${it.name||"Anonymous"} (${fmtTime(it.ts)}): ${it.text}`).join("\n");
  const done=()=>toast("Copied "+all.length+" idea"+(all.length>1?"s":"")+" to clipboard");
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){ toast("Copy not supported here."); } ta.remove();
}
function fbDownloadCsv(){
  const all=fbAll(); if(!all.length){ toast("No ideas to export yet."); return; }
  const q=s=>'"'+String(s==null?"":s).replace(/"/g,'""')+'"';
  const rows=[["Page","Name","When","Viewing as","Idea"]].concat(all.map(it=>[it.pageTitle,it.name||"Anonymous",fmtTime(it.ts),it.role||"all",it.text]));
  const csv="\uFEFF"+rows.map(r=>r.map(q).join(",")).join("\r\n");
  try{
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="oxydise-feedback.csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast("Downloaded oxydise-feedback.csv");
  }catch(e){ toast("Download not supported here."); }
}

/* page contains tasks for the active role? */
function pageHasRole(p,role){
  if(role==="all") return true;
  const check = arr => (arr||[]).some(row=>ownerRoles(row[1]||row[0]).includes(role));
  return check(p.mustDo) || check(p.owners);
}
function applyRole(){
  document.querySelectorAll(".nav-link").forEach(l=>{
    l.classList.remove("dim","has-role");
    const id=l.dataset.id; if(id==="home")return;
    const p=ALL_PAGES.find(x=>x.id===id); if(!p)return;
    if(activeRole!=="all"){
      if(pageHasRole(p,activeRole)) l.classList.add("has-role");
      else l.classList.add("dim");
    }
  });
}

function renderJourney(p){
  const c=$("#content");
  const roleHit = row => activeRole!=="all" && ownerRoles(row[1]||row[0]).includes(activeRole) ? "role-hit" : (activeRole!=="all"?"row-dim":"");
  let h = `<div class="page-head fade">
    <div class="eyebrow"><span>${esc(p.group)}</span> \u00b7 <span>Stage</span> ${p.num}</div>
    <h1 class="page-title">${esc(p.title)}</h1>
    ${roleBanner()}
  </div>`;

  // promise
  if(p.promise){
    h+=`<div class="promise fade"><div class="k">Customer promise</div>${p.promise.map(x=>`<p>${esc(x)}</p>`).join("")}</div>`;
  }
  // owner
  if(p.owners){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Owner</h2>${tableHTML(["Role","Responsibility"],p.owners.map(o=>[esc(o[0]),esc(o[1])]),roleHit)}</div>`;
  }
  // must do
  if(p.mustDo){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Must do</h2>${tableHTML(["Action","Owner"],p.mustDo.map(m=>[esc(m[0]),`<span class="role-pill">${esc(m[1])}</span>`]))}</div>`;
  }
  // categories (general enquiry)
  if(p.categories){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>General-enquiry categories</h2>${tableHTML(["Category","Meaning"],p.categories.map(x=>[esc(x[0]),esc(x[1])]))}</div>`;
  }
  // statuses (stock)
  if(p.statuses){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Stock statuses</h2><ul class="tmpl">${p.statuses.map(s=>`<li>${esc(s)}</li>`).join("")}</ul></div>`;
  }
  // best practice
  if(p.bestPractice){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Best practice</h2>${p.bestPractice.map(x=>`<p class="sub" style="max-width:68ch">${esc(x)}</p>`).join("")}`;
    if(p.callout){
      const link = p.callout[2]?` <a class="ext" onclick="go('${p.callout[2]}')">Open \u2192</a>`:"";
      h+=`<div class="callout"><div class="ck">${esc(p.callout[0])}</div><p>${esc(p.callout[1])}${link}</p></div>`;
    }
    h+=`</div>`;
  } else if(p.callout){
    const link = p.callout[2]?` <a class="ext" onclick="go('${p.callout[2]}')">Open \u2192</a>`:"";
    h+=`<div class="section fade"><div class="callout"><div class="ck">${esc(p.callout[0])}</div><p>${esc(p.callout[1])}${link}</p></div></div>`;
  }
  // if it goes wrong
  if(p.ifWrong){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>If it goes wrong</h2>${tableHTML(["Situation","Fix"],p.ifWrong.map(x=>[esc(x[0]),esc(x[1])]))}</div>`;
  }
  // crm
  if(p.crm){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>CRM / stock update</h2>${tableHTML(["Field","Required"],p.crm.map(x=>[esc(x[0]),esc(x[1])]))}</div>`;
  }
  // templates
  if(p.templates){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Templates</h2><p class="sub">From the <a class="ext" onclick="go('templates')">Template Library</a>.</p><ul class="tmpl">${p.templates.map(t=>`<li>${esc(t)}</li>`).join("")}</ul></div>`;
  }
  // feedback
  h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Website feedback</h2><p class="sub">Prompts to capture for the <a class="ext" onclick="go('feedback')">improvement board</a> \u2014 or add your own idea for this page below.</p>${(p.feedback||[]).map(q=>`<div class="feedback-q">${esc(q)}</div>`).join("")}${feedbackForm(p.id,p.title)}</div>`;
  c.innerHTML=h;
  tagMustDo(c,p);
  wireFeedback(c);
}

/* tag must-do + owner rows for active role after render */
function tagMustDo(c,p){
  if(activeRole==="all") return;
  // owner table is first .tbl if owners present
  const tables = c.querySelectorAll(".section .tbl");
  // find tables by preceding h2 text
  c.querySelectorAll(".section").forEach(sec=>{
    const h2 = sec.querySelector("h2"); if(!h2) return;
    const t = h2.textContent.trim();
    const tbl = sec.querySelector(".tbl"); if(!tbl) return;
    let src=null;
    if(t==="Owner") src=p.owners;
    else if(t==="Must do") src=p.mustDo;
    else return;
    const trs = tbl.querySelectorAll("tbody tr");
    trs.forEach((tr,i)=>{
      const row=src[i]; if(!row)return;
      const ownerText = t==="Owner"? row[1] : row[1];
      if(ownerRoles(ownerText).includes(activeRole)) tr.classList.add("role-hit");
      else tr.classList.add("row-dim");
    });
  });
}

function renderResource(p){
  const c=$("#content");
  let h = `<div class="page-head fade">
    <div class="eyebrow">${esc(p.eyebrow||p.group)}</div>
    <h1 class="page-title">${esc(p.title)}</h1>
    ${p.lead?`<p class="lead">${esc(p.lead)}</p>`:""}
  </div>`;
  (p.blocks||[]).forEach(b=>{ h+=blockHTML(b); });
  if(p.id!=="feedback"){
    h+=`<div class="section fade"><h2><span class="ico">\u25C8</span>Suggest an improvement</h2><p class="sub">Spotted something on this page that could be better? Add it to the <a class="ext" onclick="go('feedback')">improvement board</a>.</p>${feedbackForm(p.id,p.title)}</div>`;
  }
  c.innerHTML=h;
  wireSearch(c);
  wireFeedback(c);
}

function richText(s){
  s=String(s); let out="",last=0,re=/\[\[(.*?)\|\|(.*?)\]\]/g,m;
  while((m=re.exec(s))){ out+=esc(s.slice(last,m.index)); out+=`<a class="ext" href="${m[2].replace(/"/g,"%22")}" target="_blank" rel="noopener">${esc(m[1])} \u2197</a>`; last=m.index+m[0].length; }
  out+=esc(s.slice(last)); return out;
}

unded in expertise and genuine care, not short-term sales success.": "Мы завоёвываем доверие, оставаясь прозрачными, честными и последовательными во всём — от ценообразования до результатов. Наши советы основаны на экспертизе и искренней заботе, а не на сиюминутных продажах.", "02 Empathy": "02 Эмпатия", "Listen first. Long-term outcomes.": "Сначала слушать. Долгосрочный результат.", "We listen first, taking the time to understand each customer’s goals, concerns and journey. Every recommendation is made with long-term outcomes in mind, not quick wins.": "Сначала мы слушаем, уделяя время тому, чтобы понять цели, тревоги и путь каждого клиента. Каждая рекомендация даётся с прицелом на долгосрочный результат, а не на быструю выгоду.", "03 Relationships": "03 Отношения", "Meaningful. Lasting. Collaborative.": "Значимые. Прочные. Партнёрские.", "We build meaningful, lasting relationships with our customers, partners and colleagues. Through trust, openness and collaboration, we create a network that grows stronger together.": "Мы строим значимые и прочные отношения с клиентами, партнёрами и коллегами. Через доверие, открытость и сотрудничество мы создаём сеть, которая становится сильнее вместе.", "04 Curious": "04 Любознательность", "Always learning. Questioning convention.": "Всегда учимся. Подвергаем сомнению привычное.", "We are driven by curiosity; constantly learning, testing and improving to stay ahead in a fast-moving space. By questioning convention, we uncover better ways to support health, recovery and performance.": "Нами движет любознательность: мы постоянно учимся, проверяем и совершенствуемся, чтобы быть впереди в быстро меняющейся сфере. Подвергая сомнению привычное, мы находим лучшие способы поддерживать здоровье, восстановление и работоспособность.", "05 Detail": "05 Детали", "The difference is in the detail.": "Разница — в деталях.", "We believe the difference is in the detail; from product quality and customer requirements to customer experience. Every e customers report”. Avoid guarantees.": "Используйте формулировки «исследования показывают», «может поддерживать», «изучается», «может помочь создать подходящие условия» и «некоторые клиенты отмечают». Избегайте гарантий.", "Safety before conversion": "Безопасность важнее продажи", "Contraindications, tolerance, medicines, eye safety, fire safety, device instructions and practical suitability come before sales.": "Противопоказания, переносимость, лекарства, защита глаз, пожарная безопасность, инструкции к оборудованию и практическая пригодность важнее продаж.", "Protocols are context-dependent": "Протоколы зависят от контекста", "Pressure, session length, frequency, light dose and total exposure depend on the person, goal, equipment and safety profile.": "Давление, длительность сеанса, частота, доза света и суммарное воздействие зависят от человека, цели, оборудования и профиля безопасности.", "Anecdotes are not evidence": "Отдельные истории — не доказательство", "Stories help people understand possibilities, but they do not prove an outcome and must not be used as a promise.": "Истории помогают понять возможности, но не доказывают результат и не должны использоваться как обещание.", "Living library": "Живая библиотека", "Every study, video, podcast, book and protocol card should have an owner, review date and status: starter, recommended, advanced, internal-only, or pending approval.": "У каждого исследования, видео, подкаста, книги и карточки протокола должны быть ответственный, дата пересмотра и статус: вводный, рекомендованный, продвинутый, только для внутреннего использования или ожидает согласования.", "Recommended resource card format": "Рекомендуемый формат карточки ресурса", "Title, type, topic, who it is useful for, time to complete, why it matters, customer-safe takeaway, can it be quoted externally, owner, last reviewed and approval status.": "Название, тип, тема, кому полезно, время на изучение, почему это важно, безопасный для клиента вывод, можно ли цитировать публично, ответственный, дата последнего пересмотра и статус согласования.", "This page is the place we want anyone who works with Oxydise to come back to: new colleagues, sales, admin, delivery, installers, maintenance, marketing and directors. It should help people understand the technology, listen to the important podcasts, watch the right videos and gradually work through the books. It should feel like a modern learning portal for curious colleagues, not a public-facing sales page and not a rigid checklist.": "Эта страница — место, куда мы хотим, чтобы возвращался каждый, кто работает с Oxydise: новые сотрудники, продажи, администрация, доставка, монтажники, обслуживание, маркетинг и директора. Она должна помогать понимать технологию, слушать важные подкасты, смотреть нужные видео и постепенно прорабатывать книги. Она должна ощущаться как современный обучающий портал для любознательных коллег, а не как публичная страница продаж или жёсткий чек-лист.", "Route": "Маршрут", "What to read/watch": "Что читать/смотреть", "Best for": "Кому подходит", "Start here": "Начните здесь", "Knowledge-base principles, customer-safe language, HBOT basics, Red Light basics and safety guardrails.": "Принципы базы знаний, безопасные для клиента формулировки, основы HBOT, основы красного света и правила безопасности.", "Everyone": "Все", "Build confidence": "Наберитесь уверенности", "Equipment fundamentals, oxygen concentrator explanation, protocols, common customer concerns and customer-safe wording.": "Основы оборудования, объяснение работы кислородного концентратора, протоколы, типичные вопросы клиентов и безопасные формулировки.", "Sales, admin, support, delivery and marketing": "Продажи, администрация, поддержка, доставка и маркетинг", "Go deeper": "Углубитесь", "Mitochondria, inflammation, cytokines, VEGF/BDNF/PDGF, fasting, PEMF, grounding, hydrogen, Neuro Gamma and study summaries.": "Митохондрии, воспаление, цитокины, VEGF/BDNF/PDGF, голодание, PEMF, заземление, водород, Neuro Gamma и обзоры исследований.", "Wellness experts, content, founders and advanced sales": "Эксперты по велнесу, контент, основатели и опытные продажи", "Stay current": "Будьте в курсе", "Video library, people to know, new studies and sector awareness.": "Видеотека, ключевые люди, новые исследования и понимание индустрии.", "Everyone who talks to customers or creates content": "Все, кто общается с клиентами или создаёт контент", "Colleague rhythm suggestion": "Рекомендуемый ритм для сотрудников", "New starters should be encouraged to spend 30-60 minutes per working day on education in their first month, but this should be framed as confidence-building rather than a mandatory “required pathway”.": "Новичков стоит поощрять уделять обучению 30–60 минут в рабочий день в течение первого месяца, но подавать это как способ обрести уверенность, а не как обязательный «учебный план».", "How science should appear on the website": "Как наука должна подаваться на сайте", "Keep the real scientific words, because they build credibility. Then immediately explain them in brackets or in a short “In simple terms” line so every colleague can understand and repeat the idea clearly.": "Сохраняйте настоящие научные термины — они вызывают доверие. Затем сразу поясняйте их в скобках или короткой строкой «Простыми словами», чтобы каждый сотрудник мог понять и чётко повторить мысль.", "Scientific term": "Научный термин", "Simple colleague version": "Простая версия для сотрудников", "Oxidative phosphorylation": "Окислительное фосфорилирование", "How mitochondria use oxygen to turn food energy into ATP, the cell’s usable energy.": "Как митохондрии используют кислород, чтобы превращать энергию пищи в АТФ — энергию, которую может использовать клетка.", "Electron transport chain": "Цепь переноса электронов", "The final energy-production pathway inside mitochondria. Oxygen is the final receiver in this process.": "Завершающий путь производства энергии внутри митохондрий. Кислород — конечный акцептор в этом процессе.", "Dissolved oxygen in plasma": "Кислород в плазме", "Oxygen carried in the liquid part of blood, not only attached to red blood cells.": "Кислород, переносимый жидкой частью крови, а не только связанный с эритроцитами.", "Hypoxia": "Гипоксия", "Low oxygen availability in a tissue.": "Недостаточная доступность кислорода в ткани.", "Hyperoxia": "Гипероксия", "Higher-than-normal oxygen exposure.": "Воздействие кислорода выше нормы.", "HIF-1 alpha": "HIF-1 альфа", "The body’s low-oxygen alarm signal. It switches on survival pathways when tissues are short of oxygen.": "Сигнал тревоги организма при нехватке кислорода. Он включает пути выживания, когда тканям не хватает кислорода.", "Cytochrome c oxidase": "Цитохром c-оксидаза", "A mitochondrial enzyme that helps cells make energy and is often discussed as a light-sensitive target in Red Light Therapy.": "Митохондриальный фермент, который помогает клеткам вырабатывать энергию и часто обсуждается как светочувствительная мишень в терапии красным светом.", "Photobiomodulation": "Фотобиомодуляция", "Using specific wavelengths of light to influence cell signalling. In simple terms: a useful light signal, not heat or tanning.": "Использование определённых длин волн света для влияния на клеточные сигналы. Простыми словами: полезный световой сигнал, а не тепло или загар.", "Reactive oxygen species / ROS": "Активные формы кислорода (АФК / ROS)", "Small reactive molecules. Too much can be damaging, but a controlled amount is also used by the body as a signal.": "Небольшие реактивные молекулы. Их избыток может вредить, но в умеренном количестве организм использует их как сигнал.", "Cytokines": "Цитокины", "Immune-system messages that can turn inflammation up or down.": "Сигналы иммунной системы, которые могут усиливать или снижать воспаление.", "VEGF": "VEGF", "A blood-vessel growth signal. Simple version: blood supply.": "Сигнал роста кровеносных сосудов. Простыми словами: кровоснабжение.", "BDNF": "BDNF", "A brain-support signal involved in learning, memory and new connections. Simple version: brain wiring.": "Сигнал поддержки мозга, связанный с обучением, памятью и новыми связями. Простыми словами: «проводка» мозга.", "PDGF": "PDGF", "A tissue-repair signal released by platelets. Simple version: repair scaffold.": "Сигнал восстановления тканей, выделяемый тромбоцитами. Простыми словами: «каркас» для восстановления.", "VO2-rest": "VO2 в покое", "How much oxygen the body uses at rest. Higher resting oxygen use can suggest the system is working harder than it should.": "Сколько кислорода организм потребляет в покое. Повышенное потребление в покое может указывать на то, что система работает с большей нагрузкой, чем следует.", "Selective antioxidant": "Селективный антиоксидант", "A compound that may help with harmful oxidative stress without blocking every useful stress signal the body needs for adaptation.": "Соединение, которое может помогать при вредном окислительном стрессе, не блокируя при этом все полезные стрессовые сигналы, нужные организму для адаптации.", "Best one-sentence guardrail": "Лучшее правило в одно предложение", "We can explain how the technology works, what research is exploring and what customers often report, but we do not diagnose, treat, prescribe, cure or promise outcomes.": "Мы можем объяснить, как работает технология, что изучают исследования и о чём часто сообщают клиенты, но мы не ставим диагнозы, не лечим, не назначаем, не обещаем излечения и не гарантируем результатов.", "Risk area": "Зона риска", "Internal rule": "Внутреннее правило", "Customer-facing wording": "Формулировки для клиента", "Medical advice": "Медицинские советы", "Colleagues can educate; clinicians advise on medical suitability.": "Сотрудники могут просвещать; о медицинской пригодности консультируют врачи.", "“I can explain how it works and when we would advise speaking to a clinician.”": "«Я могу объяснить, как это работает и когда мы посоветуем обратиться к врачу.»", "Studies": "Исследования", "A study does not equal a universal outcome. Know the population, protocol, dose, comparator and limitations.": "Исследование не равно универсальному результату. Знайте выборку, протокол, дозу, группу сравнения и ограничения.", "“A study in this area suggests...” rather than “it proves you will...”.": "«Исследование в этой области предполагает…», а не «оно доказывает, что у вас…».", "Customer stories": "Истории клиентов", "Use only with consent and approved wording. Do not imply that one person’s story predicts another person’s result.": "Используйте только с согласия и в согласованных формулировках. Не намекайте, что история одного человека предсказывает результат другого.", "“Some customers have reported...” not “this will happen for you”.": "«Некоторые клиенты сообщали…», а не «у вас будет так же».", "Home use": "Домашнее использование", "Training, screening, installation, servicing and manufacturer instructions matter.": "Важны обучение, проверка пригодности, установка, обслуживание и инструкции производителя.", "“We support installation, training and safe-use guidance.”": "«Мы помогаем с установкой, обучением и рекомендациями по безопасному использованию.»", "New modalities": "Новые методы", "Grounding, hydrogen, PEMF and Neuro Gamma should be described carefully. Some evidence is emerging, mixed, early-stage or device-specific.": "Заземление, водород, PEMF и Neuro Gamma следует описывать осторожно. Часть доказательств только появляется, противоречива, находится на ранней стадии или зависит от конкретного устройства.", "“This is useful background, but not something to overclaim.”": "«Это полезный контекст, но не повод для громких заявлений.»", "Hyperbaric Oxygen Therapy, or HBOT, means breathing concentrated oxygen while inside a pressurised chamber. The pressure allows more oxygen to dissolve into the liquid part of the blood, called plasma, not just attach to red blood cells. That extra dissolved oxygen can reach tissues that may be inflamed, injured, poorly perfused or recovering, helping create a better environment for repair, energy production and recovery.": "Гипербарическая оксигенотерапия (HBOT) — это вдыхание концентрированного кислорода внутри камеры под повышенным давлением. Давление позволяет большему количеству кислорода растворяться в жидкой части крови — плазме, а не только связываться с эритроцитами. Этот дополнительный растворённый кислород способен достигать тканей, которые воспалены, травмированы, плохо снабжаются кровью или восстанавливаются, помогая создать более благоприятные условия для восстановления, выработки энергии и регенерации.", "Customer-safe summary": "Безопасная для клиента формулировка", "HBOT does not force the body to heal. It changes the oxygen environment so the body has more of what it needs to repair, regulate inflammation and produce energy. Use “support” language, not “treat” or “cure” language.": "HBOT не заставляет организм исцеляться. Она меняет кислородную среду, чтобы у организма было больше того, что нужно для восстановления, регуляции воспаления и выработки энергии. Используйте слово «поддерживает», а не «лечит» или «излечивает».", "Concept": "Понятие", "Plain-English explanation": "Простое объяснение", "Why it matters": "Почему это важно", "ATA": "ATA", "Atmospheres absolute. 1.0 ATA is normal sea-level pressure. A 1.5 ATA chamber is 50% more pressure than normal air pressure.": "Абсолютные атмосферы. 1,0 ATA — нормальное давление на уровне моря. Камера на 1,5 ATA создаёт давление на 50% выше обычного атмосферного.", "Pressure is one part of the dose. It changes how much gas can dissolve into fluids.": "Давление — лишь часть дозы. Оно влияет на то, сколько газа может раствориться в жидкостях.", "Oxygen percentage": "Доля кислорода", "Room air is about 21% oxygen. Oxygen concentrators commonly deliver around 90-96% oxygen through a mask or hood.": "В воздухе около 21% кислорода. Кислородные концентраторы обычно подают примерно 90–96% кислорода через маску или капюшон.", "Oxygen percentage and chamber pressure are different. Both affect oxygen dose.": "Доля кислорода и давление в камере — это разные вещи. Оба влияют на дозу кислорода.", "Henry’s law": "Закон Генри", "More pressure over a gas means more of that gas can dissolve into liquid.": "Чем выше давление над газом, тем больше этого газа может раствориться в жидкости.", "This is why pressure helps oxygen dissolve into plasma.": "Именно поэтому давление помогает кислороду растворяться в плазме.", "Plasma oxygen": "Кислород в плазме", "Oxygen dissolved directly in the blood fluid, not carried on haemoglobin.": "Кислород, растворённый непосредственно в жидкой части крови, а не связанный с гемоглобином.", "This is the hidden advantage of HBOT: oxygen can reach areas where red-cell delivery is limited.": "В этом скрытое преимущество HBOT: кислород может достигать участков, куда доставка эритроцитами ограничена.", "Partial pressure": "Парциальное давление", "The pressure contribution of one gas in a mixture.": "Вклад одного газа в общее давление смеси.", "Higher oxygen partial pressure increases the oxygen gradient into tissue.": "Более высокое парциальное давление кислорода усиливает его поступление в ткани.", "Air breaks / off-gassing": "Перерывы на воздух / выведение", "Short breaks from the oxygen mask during longer sessions.": "Короткие перерывы без кислородной маски во время более длительных сеансов.", "Used in some protocols to manage oxygen exposure and create oxygen fluctuations that may trigger adaptive repair signalling.": "Используются в некоторых протоколах, чтобы регулировать воздействие кислорода и создавать его колебания, которые могут запускать адаптивные сигналы восстановления.", "If you are asked how the oxygen concentrator works, say: it pulls in room air, then uses zeolite - a mineral with microscopic cage-like pores - to trap nitrogen molecules and allow oxygen to pass through. By continuously cycling this process, the machine delivers a steady flow of concentrated oxygen, usually around 93%, through tubing to the mask or hood.": "Если вас спросят, как работает кислородный концентратор, скажите: он забирает воздух из помещения, затем с помощью цеолита — минерала с микроскопическими порами-«клетками» — задерживает молекулы азота и пропускает кислород. Непрерывно повторяя этот цикл, аппарат подаёт ровный поток концентрированного кислорода, обычно около 93%, по трубке к маске или капюшону.", "Most concentrators use two zeolite-filled molecular sieve beds. While one bed is online and under pressure, it adsorbs nitrogen and lets oxygen-enriched gas pass through. At the same time, the second bed is depressurised, releasing the nitrogen it previously captured and regenerating itself for the next cycle. The machine switches between the two beds every few seconds, which is how it creates a continuous supply of oxygen.": "В большинстве концентраторов используются два заполненных цеолитом молекулярных сита. Пока одно сито работает под давлением, оно поглощает азот и пропускает обогащённый кислородом газ. В это же время второе сито сбрасывает давление, высвобождая ранее захваченный азот и восстанавливаясь к следующему циклу. Аппарат переключается между двумя ситами каждые несколько секунд — так создаётся непрерывный поток кислорода.", "Important equipment distinction": "Важное различие в оборудовании", "The chamber should be pressurised with air. Concentrated oxygen is delivered through the intended breathing circuit. Never imply that the whole chamber is filled with pure oxygen.": "Камера должна находиться под давлением воздуха. Концентрированный кислород подаётся через предусмотренный дыхательный контур. Никогда не подразумевайте, что вся камера заполнена чистым кислородом.", "Quality point": "Аспект качества", "How to say it without attacking competitors": "Как сказать, не критикуя конкурентов", "Zeolite quality": "Качество цеолита", "Different molecular sieves vary in adsorption performance, durability and regeneration behaviour.": "Разные молекулярные сита различаются по эффективности адсорбции, долговечности и поведению при регенерации.", "“The quality of the sieve material matters because it affects how consistently nitrogen is removed over time.”": "«Качество материала сита важно, потому что от него зависит, насколько стабильно удаляется азот со временем.»", "Quantity of zeolite": "Количество цеолита", "A larger or better-designed sieve bed can give the system more capacity and stability, depending on the engineering.": "Более крупный или лучше спроектированный слой сита может давать системе больше ёмкости и стабильности — в зависимости от инженерного решения.", "“It is not just the concentrator label that matters; the internal bed design matters.”": "«Важна не только надпись на концентраторе; важна и конструкция внутреннего слоя.»", "Moisture management": "Контроль влажности", "Water vapour can occupy adsorption sites in zeolite and reduce the bed’s ability to capture nitrogen efficiently.": "Водяной пар может занимать места адсорбции в цеолите и снижать способность слоя эффективно захватывать азот.", "“Moisture is one of the main enemies of long-term oxygen purity, so drying and moisture control are important engineering details.”": "«Влага — один из главных врагов долговременной чистоты кислорода, поэтому осушение и контроль влажности — важные инженерные детали.»", "Regeneration cycle": "Цикл регенерации", "The pressure/depressure cycle must allow captured nitrogen to release properly before the next cycle.": "Цикл повышения/сброса давления должен позволять захваченному азоту полностью высвобождаться перед следующим циклом.", "“A good system keeps switching and regenerating cleanly, rather than slowly losing performance.”": "«Хорошая система продолжает чисто переключаться и регенерировать, а не постепенно теряет производительность.»", "Long-term oxygen purity": "Долговременная чистота кислорода", "The goal is not a strong reading on day one only; it is consistent output after real-world use.": "Цель — не сильный показатель только в первый день, а стабильная подача после реальной эксплуатации.", "“We care about performance stability over time, not just headline specifications.”": "«Нам важна стабильность работы со временем, а не только эффектные цифры в характеристиках.»", "Customer-safe comparison language": "Корректные формулировки для сравнения с клиентом", "Do not name a rival, imply they are “cheap”, or attack a manufacturer unless there is approved evidence. The premium Oxydise line is: “The difference is in the engineering details - sieve-bed quality, moisture control, pressure stability, oxygen purity and long-term serviceability.”": "Не называйте конкурента, не намекайте, что он «дешёвый», и не критикуйте производителя без подтверждённых данных. Премиальная позиция Oxydise звучит так: «Разница — в инженерных деталях: качестве слоя сита, контроле влажности, стабильности давления, чистоте кислорода и долговечности в обслуживании.»", "Mechanism": "Механизм", "What is happening": "Что происходит", "Where it helps the conversation": "Где это помогает в разговоре", "Under pressure, oxygen dissolves into plasma and can travel beyond normal haemoglobin delivery.": "Под давлением кислород растворяется в плазме и может поступать туда, куда доставка гемоглобином ограничена.", "Poor circulation, inflammation, injury recovery, fatigue states and tissue repair.": "Плохое кровообращение, воспаление, восстановление после травм, состояния усталости и регенерация тканей.", "Inflammation modulation": "Модуляция воспаления", "HBOT can influence inflammatory signalling and oxidative stress responses. Describe this as helping regulate inflammatory environments, not as a blanket anti-inflammatory cure.": "HBOT может влиять на воспалительные сигналы и реакции на окислительный стресс. Описывайте это как помощь в регуляции воспалительной среды, а не как универсальное противовоспалительное лечение.", "Pain, long-term inflammation, recovery load and post-viral fatigue.": "Боль, хроническое воспаление, нагрузка при восстановлении и постинфекционная усталость.", "Microcirculation and angiogenesis": "Микроциркуляция и ангиогенез", "Oxygen gradients and intermittent exposure can support VEGF-related signalling and new blood vessel formation.": "Градиенты кислорода и периодическое воздействие могут поддерживать сигналы, связанные с VEGF, и образование новых сосудов.", "Slow healing, vascular recovery, brain perfusion and tissue resilience.": "Медленное заживление, восстановление сосудов, кровоснабжение мозга и устойчивость тканей.", "Mitochondrial support": "Поддержка митохондрий", "Mitochondria need oxygen for oxidative phosphorylation. HBOT improves oxygen availability where tissue is hypoxic, inflamed or poorly perfused.": "Митохондриям нужен кислород для окислительного фосфорилирования. HBOT улучшает доступность кислорода там, где ткань испытывает гипоксию, воспалена или плохо снабжается кровью.", "Energy, recovery, brain fog and exercise tolerance.": "Энергия, восстановление, туман в голове и переносимость нагрузок.", "Stem/progenitor cell mobilisation": "Мобилизация стволовых/прогениторных клеток", "Studies have reported mobilisation of stem/progenitor cells after repeated HBOT exposure.": "В исследованиях отмечалась мобилизация стволовых/прогениторных клеток после повторных сеансов HBOT.", "Regenerative framing; use as mechanism education, not guaranteed outcome.": "Регенеративный контекст; используйте как объяснение механизма, а не как гарантированный результат.", "Neuroplasticity and brain perfusion": "Нейропластичность и кровоснабжение мозга", "HBOT research explores brain blood flow, cognitive function and neuroplasticity in certain populations.": "Исследования HBOT изучают мозговой кровоток, когнитивные функции и нейропластичность у определённых групп людей.", "Brain fog, ageing brain and concussion/TBI conversations - escalate medical cases.": "Туман в голове, стареющий мозг, темы сотрясений/ЧМТ — медицинские случаи направляйте специалистам.", "Collagen and fibroblast activity": "Коллаген и активность фибробластов", "Oxygen is needed for collagen synthesis and wound-healing biology.": "Кислород необходим для синтеза коллагена и биологии заживления ран.", "Post-surgery, skin, tissue repair and injury recovery.": "После операций, кожа, восстановление тканей и реабилитация после травм.", "Hyperbaric oxygen affects mitochondrial efficiency at a fundamental level: it restores oxygen availability to the electron transport chain, where ATP is produced. When tissues are inflamed, hypoxic or poorly perfused, mitochondria are forced into less efficient energy production, often producing more oxidative stress for less useful output.": "Гипербарический кислород влияет на эффективность митохондрий на фундаментальном уровне: он восстанавливает доступность кислорода для цепи переноса электронов, где вырабатывается АТФ. Когда ткани воспалены, испытывают гипоксию или плохо снабжаются кровью, митохондрии вынуждены работать менее эффективно, часто создавая больше окислительного стресса при меньшей полезной отдаче.", "HBOT increases dissolved oxygen in plasma, bypassing compromised circulation and delivering oxygen directly to tissues. This can improve oxidative phosphorylation efficiency, support mitochondrial biogenesis pathways such as PGC-1 alpha, and reduce the compensatory “overworking” that can show up as elevated resting oxygen consumption or VO2-rest. In simple terms, HBOT does not stimulate mitochondria to work harder - it helps create the conditions for them to work properly again.": "HBOT повышает уровень растворённого в плазме кислорода, обходя нарушенное кровообращение и доставляя кислород прямо в ткани. Это может повысить эффективность окислительного фосфорилирования, поддержать пути биогенеза митохондрий, такие как PGC-1 альфа, и снизить компенсаторную «перегрузку», которая проявляется в повышенном потреблении кислорода в покое (VO2 в покое). Проще говоря, HBOT не заставляет митохондрии работать усерднее — она помогает создать условия, чтобы они снова работали как надо.", "Careful mitochondrial wording": "Осторожные формулировки о митохондриях", "Say “may support mitochondrial efficiency where oxygen availability is limited” rather than “fixes mitochondria”. The Dr John Cramer notes are useful because they also remind colleagues that mitochondrial DNA damage and mitophagy failure are deeper ageing issues that HBOT alone should not be claimed to reverse.": "Говорите «может поддерживать работу митохондрий там, где доступность кислорода ограничена», а не «чинит митохондрии». Заметки д-ра Джона Крамера полезны и тем, что напоминают: повреждение митохондриальной ДНК и сбой митофагии — более глубокие проблемы старения, и не следует утверждать, что одна лишь HBOT их обращает вспять.", "Bloodwork can look normal or even high for a nutrient while cells may still be functionally deficient. A useful internal metaphor is the “nutrient traffic jam”: the nutrient is visible in the bloodstream, but inflammation, receptor issues, membrane dysfunction, poor microcirculation or metabolic stress may limit how well it reaches or enters cells.": "Анализ крови может выглядеть нормальным или даже повышенным по какому-то нутриенту, тогда как клетки всё равно функционально испытывают его дефицит. Полезная внутренняя метафора — «пробка из питательных веществ»: нутриент виден в крови, но воспаление, проблемы с рецепторами, нарушение мембран, плохая микроциркуляция или метаболический стресс могут ограничивать, насколько хорошо он достигает клеток и проникает в них.", "Example": "Пример", "What can happen internally": "Что может происходить внутри", "Careful Oxydise framing": "Осторожная формулировка Oxydise", "Vitamin D": "Витамин D", "Blood level may look acceptable, but receptor sensitivity and inflammatory signalling can affect cellular response.": "Уровень в крови может выглядеть приемлемым, но чувствительность рецепторов и воспалительные сигналы могут влиять на клеточный ответ.", "HBOT may help support the tissue environment; do not claim it corrects vitamin D status.": "HBOT может помочь поддержать тканевую среду; не утверждайте, что она нормализует уровень витамина D.", "Magnesium": "Магний", "Standard blood values may not reflect intracellular magnesium well.": "Стандартные показатели крови могут плохо отражать внутриклеточный магний.", "Encourage clinician-led testing and interpretation where relevant.": "При необходимости рекомендуйте тестирование и трактовку под контролем врача.", "Ferritin / iron": "Ферритин / железо", "Iron can be stored but not well utilised in inflammatory states.": "Железо может быть в запасах, но плохо использоваться при воспалительных состояниях.", "Do not advise on anaemia; refer to clinician.": "Не давайте советов по анемии; направляйте к врачу.", "Glucose": "Глюкоза", "High blood glucose can coexist with poor cellular utilisation.": "Высокий уровень глюкозы в крови может сочетаться с плохим её усвоением клетками.", "Useful analogy for uptake, but do not give diabetes advice unless qualified.": "Полезная аналогия для усвоения, но не давайте советов по диабету без соответствующей квалификации.", "B12 / folate / omega-3s": "B12 / фолат / омега-3", "Availability in blood does not always mean ideal cellular use.": "Наличие в крови не всегда означает идеальное использование клетками.", "Use as education only; avoid implying HBOT “unlocks” all nutrients.": "Используйте только в образовательных целях; избегайте намёков, что HBOT «раскрывает» все нутриенты.", "Practical takeaway": "Практический вывод", "The issue is not always “too little” or “too much” in the blood. Sometimes the issue is whether nutrients and fuel are reaching and being used by the cells. HBOT may help by supporting oxygenation, microcirculation and a less inflammatory tissue environment.": "Дело не всегда в том, что чего-то «слишком мало» или «слишком много» в крови. Иногда вопрос в том, доходят ли питательные вещества и топливо до клеток и используются ли ими. HBOT может помочь, поддерживая насыщение кислородом, микроциркуляцию и менее воспалённую тканевую среду.", "Jason Sonners is useful for internal education because he discusses how different pressure ranges may influence inflammatory signalling differently. Treat this as emerging and practical, not as settled clinical dosing rules.": "Джейсон Соннерс полезен для внутреннего обучения, потому что обсуждает, как разные диапазоны давления могут по-разному влиять на воспалительные сигналы. Относитесь к этому как к развивающемуся и практическому представлению, а не как к устоявшимся клиническим правилам дозирования.", "Pressure range": "Диапазон давления", "Internal positioning": "Внутреннее позиционирование", "Useful for thinking about": "Полезно для размышлений о", "Caution": "Предостережение", "1.3-1.5 ATA": "1,3–1,5 ATA", "Mild to moderate pressure; comfortable for many people and practical for repeated home sessions.": "Мягкое и умеренное давление; комфортно для многих и удобно для регулярных домашних сеансов.", "Wellness, fatigue, chronic low-grade inflammation, brain fog, long-term programmes and sensitive users.": "Велнес, усталость, хроническое слабовыраженное воспаление, туман в голове, долгосрочные программы и чувствительные пользователи.", "Do not oversell mild pressure as equivalent to hospital HBOT. Consistency and total sessions matter.": "Не преподносите мягкое давление как эквивалент больничной HBOT. Важны регулярность и общее число сеансов.", "1.7-2.0 ATA": "1,7–2,0 ATA", "Higher oxygen push, typically hardshell or more advanced systems.": "Более сильная подача кислорода, обычно жёсткие или более продвинутые системы.", "Acute injury, stubborn tissue recovery, advanced neurological/post-surgical contexts where suitable.": "Острые травмы, упорное восстановление тканей, продвинутые неврологические/послеоперационные случаи, где это уместно.", "Not automatically better for everyone. Suitability matters.": "Не всегда «лучше» для всех. Важна индивидуальная пригодность.", "2.0+ ATA": "2,0+ ATA", "Clinical/medical pressure range.": "Клинический/медицинский диапазон давления.", "Hospital indications such as decompression sickness, carbon monoxide poisoning, serious wounds and radiation injury.": "Больничные показания — например, декомпрессионная болезнь, отравление угарным газом, тяжёлые раны и лучевые повреждения.", "Usually requires medical indication, prescription or qualified supervision.": "Обычно требует медицинских показаний, назначения или наблюдения специалиста.", "Practical pressure takeaway": "Практический вывод о давлении", "Mild pressure is often framed for chronic, systemic and nervous-system style presentations. Higher pressure is often framed for acute injury, tissue damage, joint irritation and post-surgical recovery. Keep the language cautious: different pressures may produce different biological signals.": "Мягкое давление чаще связывают с хроническими, системными и нервно-регуляторными состояниями. Более высокое давление чаще связывают с острыми травмами, повреждением тканей, раздражением суставов и послеоперационным восстановлением. Сохраняйте осторожность в формулировках: разные давления могут давать разные биологические сигналы.", "Protocol status": "Статус протокола", "Internal education only. Protocols must remain flexible and safety-led. Complex cases, cancer, pregnancy, neurological diagnoses, medication questions and post-surgical cases should be escalated appropriately.": "Только для внутреннего обучения. Протоколы должны оставаться гибкими и ориентированными на безопасность. Сложные случаи, онкология, беременность, неврологические диагнозы, вопросы по лекарствам и послеоперационные ситуации нужно надлежащим образом направлять специалистам.", "Customer goal": "Цель клиента", "Typical internal guidance": "Типовая внутренняя рекомендация", "How to explain it": "Как это объяснить", "General wellness / energy / longevity": "Общий велнес / энергия / долголетие", "2-3 sessions per week; think in blocks of around 40 sessions; maintenance once weekly if useful.": "2–3 сеанса в неделю; мыслите блоками примерно по 40 сеансов; поддерживающий режим раз в неделю при необходимости.", "“We usually think in blocks rather than one-off sessions.”": "«Мы обычно мыслим блоками, а не разовыми сеансами.»", "Chronic inflammation / pain / autoimmune patterns": "Хроническое воспаление / боль / аутоиммунные проявления", "4-6 sessions per week; 40-60 sessions; review around session 20.": "4–6 сеансов в неделю; 40–60 сеансов; пересмотр около 20-го сеанса.", "“Consistency matters more than trying one or two sessions.”": "«Регулярность важнее, чем один-два пробных сеанса.»", "Neurological / brain health / concussion / brain fog": "Неврология / здоровье мозга / сотрясение / туман в голове", "Often 5 sessions per week initially; 40-60 sessions; step down after week 3-4.": "Часто 5 сеансов в неделю в начале; 40–60 сеансов; снижение интенсивности после 3–4-й недели.", "“Brain and nervous-system work usually needs repeated exposure.”": "«Работа с мозгом и нервной системой обычно требует повторного воздействия.»", "Cancer support / post-treatment recovery": "Поддержка при онкологии / восстановление после лечения", "3-5 sessions per week; oncology team involvement; supportive recovery only.": "3–5 сеансов в неделю; с участием онкологической команды; только поддерживающее восстановление.", "“We do not treat cancer. This would be supportive recovery and should be discussed with your oncology team.”": "«Мы не лечим рак. Это поддерживающее восстановление, и его следует обсудить с вашей онкологической командой.»", "Sports performance / in-season recovery": "Спортивные результаты / восстановление в сезоне", "3-4 sessions per week ongoing.": "3–4 сеанса в неделю на постоянной основе.", "“It supports recovery capacity; it does not replace training.”": "«Это поддерживает способность к восстановлению, но не заменяет тренировки.»", "Sports injury / rehab": "Спортивная травма / реабилитация", "Often 5 sessions per week; 40-60 sessions.": "Часто 5 сеансов в неделю; 40–60 сеансов.", "“Injury recovery is where a tighter block is usually more meaningful.”": "«При восстановлении после травм более плотный блок обычно имеет больше смысла.»", "Post-surgery / tissue repair": "После операции / восстановление тканей", "Often 5 sessions per week; 40-60 sessions, subject to suitability and clinician advice.": "Часто 5 сеансов в неделю; 40–60 сеансов, с учётом пригодности и рекомендаций врача.", "“Earlier support can be more efficient, but suitability matters.”": "«Более ранняя поддержка может быть эффективнее, но важна индивидуальная пригодность.»", "Long COVID / post-viral fatigue": "Лонг-COVID / постинфекционная усталость", "4-5 sessions per week; 30-50 sessions; track sleep, HRV, steps and symptoms.": "4–5 сеансов в неделю; 30–50 сеансов; отслеживайте сон, ВСР, шаги и симптомы.", "“Evidence is emerging and results vary, so we track objective change where possible.”": "«Доказательства только формируются и результаты различаются, поэтому по возможности отслеживаем объективные изменения.»", "Area": "Область", "What everyone must know": "Что должен знать каждый", "Untreated pneumothorax": "Нелеченый пневмоторакс", "Widely recognised as the key absolute contraindication. If there is any history or concern, pause and escalate.": "Широко признан ключевым абсолютным противопоказанием. При любой истории или подозрении остановитесь и направьте к специалисту.", "Ears and sinuses": "Уши и пазухи", "Pressure changes require equalisation. Colds, sinus infections and ear issues can make sessions uncomfortable or unsafe.": "Изменения давления требуют выравнивания. Простуда, синусит и проблемы с ушами могут сделать сеансы некомфортными или небезопасными.", "Fire and oxygen safety": "Пожарная и кислородная безопасность", "Oxygen supports combustion. No flames, sparks, smoking, oils, flammable materials or unsafe electronics. Follow device instructions and fire prevention measures.": "Кислород поддерживает горение. Никакого открытого огня, искр, курения, масел, горючих материалов и небезопасной электроники. Следуйте инструкциям к оборудованию и мерам пожарной профилактики.", "Oxygen toxicity": "Кислородная токсичность", "Rare in properly delivered protocols, especially at mild pressure, but possible with higher oxygen partial pressures or excessive exposure. Dosing discipline and air breaks matter.": "Редка при правильно проводимых протоколах, особенно при мягком давлении, но возможна при более высоком парциальном давлении кислорода или избыточном воздействии. Важны дисциплина дозирования и перерывы на воздух.", "Twice daily use": "Использование дважды в день", "Where two sessions are used in a day, build in a meaningful gap and follow the equipment/protocol guidance. The existing internal note uses a four-hour break as a practical internal rule.": "Если в один день проводятся два сеанса, делайте между ними значимый перерыв и следуйте указаниям по оборудованию/протоколу. Действующая внутренняя инструкция использует четырёхчасовой перерыв как практическое правило.", "Medical complexity": "Медицинская сложность", "Cancer, seizures, lung disease, recent surgery, pregnancy and complex medication questions should be escalated to an appropriate professional.": "Онкологию, судороги, заболевания лёгких, недавние операции, беременность и сложные вопросы по лекарствам следует направлять соответствующему специалисту.", "Resources · Knowledge Base": "Ресурсы · База знаний", "Resources · Internal draft": "Ресурсы · Внутренний черновик", "Colleague learning portal content, technology primer and resource library": "Материалы обучающего портала для сотрудников, введение в технологии и библиотека ресурсов"}, "pt": {"Start": "Início", "Overview": "Visão geral", "Customer Journey": "Percurso do cliente", "Business Operations": "Operações do negócio", "Resources": "Recursos", "Contact / Shopify to Order Form": "Contacto / Shopify ao formulário de encomenda", "Order Form to Delivery": "Do formulário de encomenda à entrega", "Delivery": "Entrega", "Rental Period": "Período de aluguer", "Collection": "Recolha", "After Collection": "Após a recolha", "General Enquiry": "Pedido geral", "Accounting": "Contabilidade", "Maintenance & Broken Equipment": "Manutenção e equipamento avariado", "Stock & Warehouse": "Stock e armazém", "Adding a New Product": "Adicionar um novo produto", "Marketing Operations": "Operações de marketing", "Template Library & Brochure Register": "Biblioteca de modelos e registo de brochuras", "Oxydise Education": "Formação Oxydise", "Website Feedback & Improvements": "Feedback do site e melhorias", "Exception Rules": "Regras de exceção", "Sales Call Bible": "Bíblia de chamadas de vendas", "Viewing as": "A ver como", "Edit": "Editar", "Show all": "Mostrar tudo", "All": "Todos", "Sales": "Vendas", "Admin": "Administração", "Driver": "Motorista", "Maintenance": "Manutenção", "Marketing": "Marketing", "Directors": "Diretores", "New leads, follow-up calls, qualification, order-form chase, Day 2 check-in, rental-end decision, reviews & referrals, general-enquiry follow-up, relationship issues.": "Novos contactos, chamadas de seguimento, qualificação, acompanhamento do formulário de encomenda, contacto no 2.º dia, decisão de fim de aluguer, avaliações e recomendações, seguimento de pedidos gerais, questões de relacionamento.", "Invoice, payment, forms, delivery booking, collection booking, accounting, stock admin, payment exceptions.": "Faturas, pagamentos, formulários, marcação de entrega, marcação de recolha, contabilidade, gestão de stock, exceções de pagamento.", "Delivery ETA, install, test, setup video, customer training, delivery form, collection, photos, accessory check, stock movement.": "Hora prevista de entrega, instalação, teste, vídeo de configuração, formação do cliente, formulário de entrega, recolha, fotos, verificação de acessórios, movimento de stock.", "Maintenance tickets, fault severity, photos/videos, repair/replacement, safety concerns, root cause, equipment status.": "Pedidos de manutenção, gravidade da avaria, fotos/vídeos, reparação/substituição, questões de segurança, causa raiz, estado do equipamento.", "Director: website feedback, education library, content strategy, journey improvements, stock/product issues, special jobs, strategic exceptions.": "Diretor: feedback do site, biblioteca de formação, estratégia de conteúdo, melhorias no percurso, questões de stock/produto, trabalhos especiais, exceções estratégicas.", "Templates, approved wording, brand consistency, email nurture, website content, education content, marketing calendar & performance.": "Modelos, redação aprovada, consistência da marca, nutrição por email, conteúdo do site, conteúdo de formação, calendário e desempenho de marketing.", "Director & founder: brand story and podcasts, education and approved claims, strategic approvals, high-value relationships, product and partnership decisions.": "Diretor e fundador: história da marca e podcasts, formação e afirmações aprovadas, aprovações estratégicas, relações de alto valor, decisões de produto e parcerias.", "Discount approvals, payment terms, refunds, serious complaints, free installs, influencer/athlete/special jobs, high-value B2B, product-launch approvals.": "Aprovação de descontos, condições de pagamento, reembolsos, reclamações graves, instalações gratuitas, influenciadores/atletas/trabalhos especiais, B2B de alto valor, aprovação de lançamentos de produto.", "Customer Operating System": "Sistema operativo do cliente", "How every customer moves through Oxydise.": "Como cada cliente avança pela Oxydise.", "This site explains how customers, orders, rentals, stock, maintenance, new products and marketing activity move through Oxydise — who owns each stage, what must happen, which templates to use, what to update in the CRM, and what to do when something does not go to plan. Use the person filter above to see your tasks.": "Este site explica como os clientes, encomendas, alugueres, stock, manutenção, novos produtos e atividade de marketing avançam pela Oxydise — quem é responsável por cada etapa, o que deve acontecer, que modelos usar, o que atualizar no CRM e o que fazer quando algo corre mal. Use o filtro de pessoa acima para ver as suas tarefas.", "Customer-journey stages": "Etapas do percurso do cliente", "Templates in the register": "Modelos no registo", "Global operating rules": "Regras operacionais globais", "Source of truth — the CRM": "Fonte de verdade — o CRM", "Core rules": "Regras essenciais", "Every customer has an owner.": "Cada cliente tem um responsável.", "Every customer has a next action.": "Cada cliente tem uma próxima ação.", "Use approved templates.": "Use modelos aprovados.", "Log every exception.": "Registe cada exceção.", "Keep CRM and stock updated.": "Mantenha o CRM e o stock atualizados.", "Capture website feedback when customers ask questions we do not answer clearly.": "Registe feedback para o site quando os clientes fazem perguntas que não respondemos com clareza.", "Every customer has an owner": "Cada cliente tem um responsável", "No lead, order, rental, issue or collection should be ownerless.": "Nenhum contacto, encomenda, aluguer, problema ou recolha deve ficar sem responsável.", "Every customer has a next action": "Cada cliente tem uma próxima ação", "If there is no next-action date, the process is broken.": "Se não houver data para a próxima ação, o processo está quebrado.", "CRM is the source of truth": "O CRM é a fonte de verdade", "WhatsApp and email are communication tools, not the official record.": "WhatsApp e email são ferramentas de comunicação, não o registo oficial.", "Use approved templates": "Use modelos aprovados", "Especially for medical, safety, protocol and product claims.": "Especialmente para afirmações médicas, de segurança, de protocolo e de produto.", "Do not make medical claims": "Não faça afirmações médicas", "Explain approved information only. Do not diagnose, advise treatment or promise outcomes.": "Explique apenas informação aprovada. Não diagnostique, não aconselhe tratamentos nem prometa resultados.", "Every exception is logged": "Cada exceção é registada", "If something goes wrong, record the owner, action and resolution.": "Se algo correr mal, registe o responsável, a ação e a resolução.", "Stock must match reality": "O stock deve corresponder à realidade", "Equipment cannot move without stock status and equipment ID being updated.": "O equipamento não pode mover-se sem atualizar o estado de stock e o ID do equipamento.", "Customer feedback improves the website": "O feedback dos clientes melhora o site", "Questions from calls, delivery and support should become better FAQs, emails, videos, templates or sales scripts.": "As perguntas de chamadas, entregas e apoio devem tornar-se melhores FAQs, emails, vídeos, modelos ou guiões de vendas.", "Every page uses the same layout": "Cada página usa a mesma estrutura", "A page answers the same nine questions, so the team always knows where to look.": "Cada página responde às mesmas nove perguntas, para que a equipa saiba sempre onde procurar.", "Section": "Secção", "Question it answers": "Pergunta que responde", "Customer promise": "Promessa ao cliente", "What should the customer feel, understand or receive at this stage?": "O que deve o cliente sentir, compreender ou receber nesta etapa?", "Owner": "Responsável", "Who owns this stage, who supports it, and who approves exceptions?": "Quem é responsável por esta etapa, quem apoia e quem aprova exceções?", "Must do": "Obrigatório fazer", "What are the non-negotiable actions?": "Quais são as ações inegociáveis?", "Best practice": "Boa prática", "What does good look like when done properly?": "Como é um bom trabalho bem feito?", "If it goes wrong": "Se algo correr mal", "What are the common exceptions and the fix?": "Quais são as exceções comuns e a solução?", "
