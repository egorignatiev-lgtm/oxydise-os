<!DOCTYPE html><html lang="en" data-theme="light"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet"><meta name="googlebot" content="noindex,nofollow">
<title>Oxydise Customer Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--display:"Urbanist",system-ui,sans-serif;--sans:"Manrope",system-ui,sans-serif;--primary:#00AAFF;--primary-soft:#eaf7ff;--navy:#001540;--ink:#0a1830;--muted:#5b6b82;--line:#e6ebf2;--panel:#f6f8fb;--bg:#ffffff;--shadow:0 1px 2px rgba(10,24,48,.04),0 8px 30px rgba(10,24,48,.06)}
[data-theme="dark"]{--primary:#3cbbff;--primary-soft:#0e2233;--navy:#9fc7ff;--ink:#e8eef7;--muted:#90a0b8;--line:#1d2a3e;--panel:#0e1726;--bg:#0a121e;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 30px rgba(0,0,0,.4)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
body.locked{overflow:hidden}a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.gate{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
body:not(.locked) .gate{display:none}
.gate-card{width:100%;max-width:380px;text-align:center}.gate-logo{height:30px;color:var(--ink);margin-bottom:26px;display:inline-flex}.gate-logo svg{height:100%;width:auto}
.gate h1{font-family:var(--display);font-size:20px;font-weight:600;margin:0 0 6px}.gate p{color:var(--muted);font-size:14px;margin:0 0 20px}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font:inherit;background:var(--panel);color:var(--ink);text-align:center;margin-bottom:10px}
.gate input:focus{outline:none;border-color:var(--primary)}
.gate button{width:100%;padding:12px;border:none;border-radius:11px;background:var(--primary);color:#fff;font:600 15px var(--sans);cursor:pointer}
.gate .err{color:#e23b4e;font-size:13px;height:16px;margin-top:8px}
.app{display:grid;grid-template-columns:288px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;color:var(--ink);height:28px;cursor:pointer;background:none;border:none;padding:0}.brand svg{height:26px;width:auto}
.nav{flex:1;overflow-y:auto;padding:6px 12px 28px}
.nav-gh{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:16px 10px 6px}
.nav-link{display:flex;gap:9px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:8px 12px;border-radius:9px;font:inherit;font-size:14px;color:var(--ink);line-height:1.3;border-left:2px solid transparent;align-items:baseline}
.nav-link:hover{background:var(--bg)}
.nav-link.on{background:var(--bg);border-left-color:var(--primary);color:var(--primary);font-weight:600}
.nav-link .n{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px;min-width:16px}.nav-link.on .n{color:var(--primary)}
.nav-link .dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--primary);opacity:0;transition:opacity .15s;align-self:center;flex:none}
.nav-link.role-rel .dot{opacity:1}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);padding:10px 28px}
.tb-row{display:flex;align-items:center;gap:10px;min-height:40px}
.viewlbl{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.chip{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:999px;padding:6px 14px;font:600 13px var(--sans);cursor:pointer}
.chip:hover{border-color:var(--primary)}.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
[data-theme="dark"] .chip.on{background:var(--primary);color:var(--navy)}
.tb-spacer{flex:1}.icon-btn{border:1px solid var(--line);background:var(--bg);color:var(--ink);width:36px;height:36px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:15px}
.icon-btn:hover{border-color:var(--primary);color:var(--primary)}.menu-btn{display:none}
.role-banner{display:none;margin-top:10px;font-size:13.5px;color:var(--ink);background:var(--primary-soft);border-radius:10px;padding:9px 14px}
.role-banner.show{display:block}.role-banner b{color:var(--navy)}.role-banner .clr{color:var(--primary);cursor:pointer;margin-left:8px;font-weight:600}
.content{padding:40px 52px 96px;max-width:1020px;width:100%;margin:0 auto;flex:1}
.fade{animation:fade .35s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero-eyebrow{font-family:var(--display);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);font-size:13px;margin:0 0 14px}
.hero-title{font-family:var(--display);font-weight:700;font-size:clamp(28px,5vw,44px);line-height:1.08;letter-spacing:-.02em;margin:0 0 14px;color:var(--ink)}
.hero-sub{font-family:var(--display);font-weight:600;font-size:clamp(15px,2.3vw,20px);color:var(--navy);margin:0 0 18px}
.hero-desc{font-size:17px;color:var(--ink);max-width:72ch;margin:0 0 12px}.hero-note{font-size:13.5px;color:var(--muted);max-width:72ch;margin:6px 0 0}
.doc-h1{font-family:var(--display);font-weight:700;font-size:clamp(25px,4vw,33px);line-height:1.12;letter-spacing:-.015em;color:var(--ink);border-top:2px solid var(--ink);padding-top:22px;margin:44px 0 22px;scroll-margin-top:120px}.doc-h1:first-child{margin-top:0}
.eh3{font-family:var(--display);font-weight:700;font-size:20px;color:var(--navy);margin:32px 0 12px;line-height:1.25}
.eh4{font-family:var(--display);font-weight:700;font-size:18.5px;color:var(--ink);margin:32px 0 10px;padding-left:14px;border-left:3px solid var(--primary);line-height:1.3}
.prose{font-size:16px;color:var(--ink);margin:0 0 16px;max-width:76ch}
.elist{margin:0 0 18px;padding-left:22px;max-width:76ch}.elist li{margin:0 0 7px}
.callout{background:var(--primary-soft);border-left:3px solid var(--primary);border-radius:0 12px 12px 0;padding:15px 18px;margin:0 0 16px;max-width:82ch}
.callout .ck{font-family:var(--display);font-weight:700;color:var(--navy);margin-bottom:5px;font-size:15px}.callout .cb{font-size:15px;color:var(--ink)}
.tbl-wrap{overflow-x:auto;max-width:100%;margin:0 0 20px;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}
.tbl{border-collapse:collapse;width:100%;font-size:14.5px}
.tbl thead th{background:var(--navy);color:#fff;text-align:left;font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:12px 16px;white-space:nowrap}
[data-theme="dark"] .tbl thead th{background:#11243b;color:var(--ink)}
.tbl td{padding:13px 16px;border-top:1px solid var(--line);vertical-align:top;color:var(--ink)}.tbl tbody tr:nth-child(even){background:var(--panel)}
.ext::after{content:" ↗";font-size:.8em;opacity:.7}
.rh{background:var(--primary-soft)!important;box-shadow:inset 3px 0 0 var(--primary)}
li.rh,p.rh{display:block;border-radius:8px;padding:4px 10px;margin-left:-10px}
.toc{border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin:8px 0 30px;background:var(--panel)}
.toc .tt{font-family:var(--display);font-weight:700;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.toc ol{margin:0;padding-left:20px;columns:2;column-gap:34px}.toc li{margin:0 0 7px;break-inside:avoid}@media(max-width:700px){.toc ol{columns:1}}
.pager{display:flex;gap:12px;margin-top:48px;border-top:1px solid var(--line);padding-top:24px}
.pager a{flex:1;border:1px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;background:var(--bg);min-width:0}
.pager a:hover{border-color:var(--primary);text-decoration:none}
.pager .pl{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-family:var(--display);font-weight:600}
.pager .pt{display:block;color:var(--ink);font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pager .nx{text-align:right}
/* home cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;margin:34px 0 0}
.card{border:1px solid var(--line);border-radius:18px;padding:24px;cursor:pointer;background:var(--bg);box-shadow:var(--shadow);transition:transform .15s,border-color .15s;text-align:left}
.card:hover{transform:translateY(-3px);border-color:var(--primary)}
.card .ci{font-size:22px;margin-bottom:12px}.card h3{font-family:var(--display);font-weight:700;font-size:18px;margin:0 0 6px;color:var(--ink)}
.card p{font-size:14px;color:var(--muted);margin:0}
/* comments */
.cmt{margin-top:54px;border-top:1px solid var(--line);padding-top:26px}
.cmt h3{font-family:var(--display);font-weight:700;font-size:16px;margin:0 0 4px;color:var(--ink)}
.cmt .hint{font-size:12.5px;color:var(--muted);margin:0 0 16px}
.cmt .hint a{font-weight:600}
.cmt-form{display:flex;flex-direction:column;gap:8px;max-width:560px;margin-bottom:18px}
.cmt-form input,.cmt-form textarea{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:14px;background:var(--bg);color:var(--ink)}
.cmt-form textarea{min-height:70px;resize:vertical}.cmt-form input:focus,.cmt-form textarea:focus{outline:none;border-color:var(--primary)}
.btn{align-self:flex-start;border:none;border-radius:10px;background:var(--primary);color:#fff;font:600 14px var(--sans);padding:9px 18px;cursor:pointer}
.btn.sec{background:var(--bg);color:var(--ink);border:1px solid var(--line)}.btn.sec:hover{border-color:var(--primary);color:var(--primary)}
.cmt-item{border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:10px;max-width:620px;background:var(--panel)}
.cmt-item .meta{font-size:12px;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between}
.cmt-item .meta .del{color:#e23b4e;cursor:pointer}
.cmt-empty{font-size:13.5px;color:var(--muted)}
/* template library */
.tl-actions{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0 8px}
.tl-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:11px;padding:10px 16px;background:var(--bg);color:var(--ink);font:600 14px var(--sans);cursor:pointer}
.tl-btn.prim{background:var(--primary);color:#fff;border-color:var(--primary)}.tl-btn:hover{border-color:var(--primary)}
.tl-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:24px 0 6px}
.tl-search{flex:1;min-width:180px;border:1px solid var(--line);border-radius:10px;padding:9px 13px;font:inherit;font-size:14px;background:var(--bg);color:var(--ink)}
.tl-search:focus{outline:none;border-color:var(--primary)}
.tl-count{font-size:13px;color:var(--muted);margin:14px 0}
.tpl{border:1px solid var(--line);border-radius:13px;margin-bottom:9px;background:var(--bg);overflow:hidden}
.tpl-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer}
.tpl-head:hover{background:var(--panel)}
.tpl-id{font-family:var(--display);font-weight:700;font-size:12px;color:var(--primary);min-width:42px}
.tpl-name{font-weight:600;flex:1;min-width:0}
.tpl-pri{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--panel);color:var(--muted)}
.tpl-stage{font-size:12px;color:var(--primary);border:1px solid var(--line);border-radius:999px;padding:3px 10px;white-space:nowrap}
.tpl-stage:hover{border-color:var(--primary)}
.tpl-body{display:none;padding:4px 16px 16px;border-top:1px solid var(--line)}
.tpl.open .tpl-body{display:block}
.tpl-meta{font-size:13.5px;color:var(--muted);margin:10px 0}
.tpl-meta b{color:var(--ink);font-weight:600}
.tpl-save{display:flex;flex-direction:column;gap:8px;max-width:520px;margin-top:10px;background:var(--panel);padding:14px;border-radius:11px}
.tpl-save .lbl{font-size:12px;color:var(--muted)}
.tpl-save input{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font:inherit;font-size:14px;background:var(--bg);color:var(--ink)}
.tpl-saved{font-size:13px;margin-top:6px}
/* tasks */
.tasks{margin-top:10px}
.task{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin-bottom:9px;background:var(--bg)}
.task.done{opacity:.55}.task.done .tk-title{text-decoration:line-through}
.task .tk-check{width:20px;height:20px;border:2px solid var(--line);border-radius:6px;cursor:pointer;flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.task.done .tk-check{background:var(--primary);border-color:var(--primary)}
.task .tk-title{font-weight:600}.task .tk-detail{font-size:13.5px;color:var(--muted);margin-top:2px}
.task .tk-del{color:#e23b4e;cursor:pointer;font-size:13px;margin-left:auto}
.scrim{display:none}
@media(max-width:920px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:0;width:300px;z-index:120;transform:translateX(-100%);transition:transform .2s;box-shadow:var(--shadow)}body.nav-open .sidebar{transform:none}body.nav-open .scrim{display:block;position:fixed;inset:0;background:rgba(5,12,24,.4);z-index:110}.menu-btn{display:inline-flex}.content{padding:28px 20px 80px}.chips{flex-wrap:nowrap;overflow-x:auto}.tbl{min-width:560px}}
</style></head>

<script>
var PAGES={"j1": {"type": "single", "title": "1. Contact / Shopify to Order Form", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel listened to, reassured and clear about the next step. They should understand which product may be relevant, how the process works, what information Oxydise needs, and that Oxydise will guide them rather than pressure them. The call should build relationship, trust and empathy, led by genuine knowledge of the technology and the approved product story."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Sales"], ["Support", "Egor / Giles / Alan for content, approved wording, product story and B2B support"], ["Handover to", "Olga once the order form (or Shopify delivery form) is complete"], ["Approval", "Directors for discounts, unusual commercial terms, payment terms, free installs, high-net-worth customers or strategic B2B"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Capture every lead in the CRM, including wrong calls.", "Sales"], ["Record source: social, Google, word of mouth, AI, outbound, Wellness Lab, Shopify, referral or other.", "Sales"], ["Record sub-source where possible: campaign, keyword, page, form, advert or referral name.", "Sales"], ["Try to get the customer on the phone - this is where relationship, trust and empathy are built.", "Sales"], ["Ask why they are interested and record the customer category.", "Sales"], ["Record product interest: HBOT, Red Light, both, small product, B2B or unsure.", "Sales"], ["If the lead is B2B or high-value, suggest a director conversation as part of the sales process.", "Sales"], ["Explain what Oxydise is, using approved technical points only (product quality, approved protocol guidance, LED detail, concentrator set-up).", "Sales"], ["Ask safety / contraindication questions using approved wording.", "Sales"], ["For hardshells or complex installs, ask where it will go and request an access video before promising delivery.", "Sales"], ["Explain the process: order form → invoice → payment → delivery form → delivery/install → support.", "Sales"], ["Explain delivery timing, rent-to-buy and finance routes where relevant. Mention the Wellness Lab.", "Sales"], ["Send a personalised follow-up email with the relevant brochure or documents only.", "Sales"], ["Set a next task if they do not reply.", "Sales"], ["Once agreed, send the correct forms and pass to Olga with all information needed; keep the customer updated.", "Sales"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "The call should feel consultative, not transactional: good questions, real listening, and an explanation tailored to the customer’s goal. The customer should hear a consistent Oxydise story - specialist knowledge, strong service, a transparent process, support before and after delivery, and a relationship-led approach."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Customer does not answer first call", "Send missed-call email/WhatsApp and set a task to call the next working day."], ["Customer does not answer second call", "Try again the following day and send the second message."], ["Customer still does not answer", "Move to General Enquiry, set a one-week follow-up, then email nurture if consent exists."], ["Order form not returned", "Call the next day to check they received it and ask what is unclear."], ["Customer asks medical advice", "Do not diagnose or advise medically. Use approved wording and suggest Dr Masha where appropriate."], ["Shopify order already placed", "Still call: understand the reason for purchase, check contraindications and explain delivery/support."], ["Customer says “later”", "Don’t lose them. Add a dated callback task and keep the lead warm."]]}, {"t": "h3", "text": "CRM update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Lead source", "Yes"], ["Sub-source / campaign / page", "If known"], ["Product interest", "Yes"], ["Customer category", "Yes"], ["Reason for enquiry", "Yes"], ["Safety / contraindication questions asked", "Yes"], ["Buying route", "Yes"], ["Delivery / access notes", "If relevant"], ["Follow-up task", "Yes"], ["Owner", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Autoresponses: email, Shopify, WhatsApp and Instagram.", "Follow-up email after the conversation.", "First, second and third not-picked-up call emails/messages.", "Safety / contraindication question document.", "HBOT and Red Light brochure emails - one per customer category, plus one per product.", "All-products brochure (for customers who don’t yet know what they want) and B2B brochure.", "Why Oxydise brochure: rent-to-buy, team, finance, delivery process and support.", "Deal sign-off document, order form email and order form, order-form chase email, Shopify order follow-up."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ The first-call wording, technical points, product story, objection handling and safety language now live in the Sales Call Bible (companion document) - not in a separate “Sales Document”. The science behind the talking points is in the HBOT Study Guide; the claim guardrails are in the Learning Portal §3."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["What did the customer ask that the website did not answer?", "What confused them before the call, and which page should be improved?", "Which new FAQ, case study or proof point would have helped?"]}]}, "j2": {"type": "single", "title": "2. Order Form to Delivery", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel their order is handled professionally and that the next step is clear: invoice, payment, rental/delivery form if required, then delivery booking."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Olga"], ["Support", "Sales for missing customer information"], ["Support", "Driver for delivery availability"], ["Approval", "Directors for payment exceptions or unusual requests"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Check the order form and invoice details are complete, then raise the invoice as soon as possible.", "Olga / Sales"], ["Raise the invoice.", "Olga"], ["Send the invoice by email together with the relevant questionnaire/form.", "Olga"], ["Send a WhatsApp with the invoice attached, explaining that once payment and form are complete, delivery is booked, and that Olga is the contact at this stage.", "Olga"], ["Ask the customer when they expect to pay.", "Olga"], ["Confirm payment received, and tell Sales.", "Olga"], ["Reserve the correct equipment.", "Olga / Stock owner"], ["Agree the delivery date and book the driver calendar.", "Olga"], ["Update the CRM to Delivery Booked.", "Olga"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "The customer should never wonder what happens next. Every message should make clear that the invoice has been sent, the form needs completing, and once payment and form are received delivery can be confirmed."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Invoice details missing", "Olga sends missing information back to Sales; Sales chases the customer."], ["Payment not received", "Olga sends a reminder, updates the expected date and keeps Sales informed if relationship-sensitive."], ["Rental/delivery form incomplete", "Do not book delivery unless an approved exception. Speak to the customer if needed."], ["Stock unavailable", "Speak to Egor and offer the next available date or a suitable alternative."], ["Driver unavailable", "Don’t promise a date until the calendar is checked. Keep the customer updated."], ["Customer wants urgent delivery before payment / outside process", "Director approval required. Speak to Egor first."], ["Small product order", "No rental form. Dispatch via DHL and update order status (Julija dispatches)."], ["Large product order", "Agree the process with Petro once the Luton-van process is in place; check stock with Egor."]]}, {"t": "h3", "text": "CRM update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Invoice number", "Yes"], ["Invoice sent date", "Yes"], ["Payment status", "Yes"], ["Rental/delivery form status", "If rental or delivery required"], ["Equipment reserved", "Yes"], ["Delivery date", "Yes"], ["Driver assigned", "Yes"], ["Customer address checked", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Invoice email and invoice WhatsApp.", "Rental/delivery form email.", "Payment reminder and payment-received confirmation.", "Delivery booking confirmation and reschedule message.", "DHL dispatch message (process and owner to confirm)."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Finance and rent-to-buy wording is in the Sales Call Bible §13; keep figures director-approved and confirmed in writing."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["Capture anything the customer asks here that should have been clearer during the call, website journey or invoice/payment explanation."]}]}, "j3": {"type": "single", "title": "3. Delivery", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel confident, safe and supported: they know how to use the equipment, understand the key safety points, know who to contact, and have a video to refer back to."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Driver"], ["Support", "Olga for scheduling"], ["Support", "Sales for the customer relationship"], ["Support", "Petro for maintenance issues"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Message ETA on WhatsApp and share location.", "Driver"], ["Install and test the equipment.", "Driver"], ["Record the setup/testing video.", "Driver"], ["Submit the delivery form (delivery is not complete until submitted).", "Driver"], ["Update CRM / stock status.", "Driver"], ["Explain how to operate the equipment and the key safety points.", "Driver"], ["Give the brochure / leaflet / approved customer materials.", "Driver"], ["Confirm support contacts: Sales and Olga.", "Driver"], ["Send the post-delivery email (video and notes) to Sales for the Day-2 call.", "Olga"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "The driver should slow down and make sure the customer is comfortable - ask them to show they can operate the machine before leaving. Delivery is a major trust moment, not just logistics. Drivers should understand the equipment well enough to answer practical questions and explain the basics in approved, non-medical language."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Driver running late", "Driver messages the customer and informs Olga."], ["Customer not home", "Call, WhatsApp, wait the agreed time, log a failed delivery and rebook."], ["Equipment fault during setup", "Do not mark delivery complete. Create a maintenance issue and escalate to Petro, or rebook a replacement."], ["Missing accessory", "Log it, inform Olga and arrange a replacement."], ["Customer nervous or confused", "Driver gives an extra walkthrough; Sales follows up on Day 2."], ["Customer asks medical questions", "Driver does not advise medically; refer to Sales / approved material."]]}, {"t": "h3", "text": "CRM / stock update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Delivery complete", "Yes"], ["Equipment ID", "Yes"], ["Stock status: with customer", "Yes"], ["Setup video uploaded", "Yes"], ["Safety explanation given", "Yes"], ["Customer trained", "Yes"], ["Accessories delivered", "Yes"], ["Day-2 check-in task created", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Delivery ETA WhatsApp.", "Driver checklist and installation checklist (Egor to create).", "Product operating guide - one per product.", "Safety / contraindication leaflet (given on delivery).", "Post-delivery email including the video usage guide; setup-video message; support contact card.", "“How to get the most from your equipment” leaflet. Consider one delivery pack: safety info, QR codes for videos, support contacts and best-use guidance."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Drivers should know the HBOT and Red Light basics from the Learning Portal (§4–5) and explain only in approved, non-medical language. Anything clinical is a Sales / Dr Masha question."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["What did the customer not understand when you arrived?", "Which instructions were hard to explain, and was any video, guide or FAQ missing?", "What question should be added to the website?"]}]}, "j4": {"type": "single", "title": "4. Rental Period", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel supported after delivery, not abandoned. They should know how to use the equipment, who to contact, and what options they have before the rental ends."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Sales"], ["Support", "Petro for technical issues"], ["Support", "Olga for collection/admin"], ["Approval", "Directors for discounts or payment terms"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Call the customer on Day 2.", "Sales"], ["Ask if they have used the equipment and whether everything went smoothly.", "Sales"], ["Discuss protocol using approved guidance (never medical advice).", "Sales"], ["Create a maintenance ticket if needed.", "Sales / Petro"], ["Call two weeks before the rental ends.", "Sales"], ["Confirm buy, extend or return.", "Sales"], ["Explain payment terms / finance if buying.", "Sales / Olga"], ["Hand a returning customer to Olga for collection.", "Sales"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "The rental period is where trust and conversion happen. Sales shouldn’t only ask “are you buying?” - understand how the customer is using the equipment, what they’re noticing, what concerns remain, and whether the product fits their life. Any advice on improving use follows approved protocol guidance and never becomes medical advice."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Customer has not used the equipment", "Understand why, resend the video/guide and offer support."], ["Customer is confused", "Re-explain, send materials and arrange support if needed."], ["Technical problem", "Create a maintenance ticket and escalate to Petro."], ["Customer unhappy", "Sales listens, documents the issue and escalates if serious."], ["No answer on Day 2", "Send a message and provide a number to call back."], ["No answer before rental end", "Use the call/message sequence, then Olga prepares the collection process."], ["Customer wants a discount or payment terms", "Sales cannot promise. Director approval required; communicate the agreed terms to Olga."]]}, {"t": "h3", "text": "CRM update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Day-2 check-in complete", "Yes"], ["Issues raised", "Yes"], ["Maintenance ticket linked", "If needed"], ["End-of-rental decision", "Yes"], ["Buy / extend / return", "Yes"], ["Next action date", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Day-2 check-in call script and follow-up email/message.", "Protocol support email (shared at sales stage; may need resending).", "Two-weeks-before-end call script and follow-up email.", "Buy / extend / return email; payment-terms explanation; director discount-approval message."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ The Day-2 and two-week call scripts are in the Sales Call Bible (§7–8). Protocol blocks are internal guidance, not prescription - see Sales Call Bible §10.4."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["What questions did the customer ask during the rental? What stopped them using it?", "What made them consider buying, and what made them hesitate?", "Which customer story or content would improve conversion?"]}]}, "j5": {"type": "single", "title": "5. Collection", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel the end of the rental is handled smoothly and respectfully. If they are happy, they should be invited to review, refer or stay connected."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Olga for booking"], ["Primary owner", "Driver for physical collection"], ["Support", "Sales for relationship / review"], ["Support", "Stock owner for warehouse update"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Confirm returning, extending or buying during the two-week call. Aim to extend or convert where appropriate.", "Sales"], ["If returning, arrange the collection date and book the driver calendar.", "Olga"], ["Send the collection confirmation.", "Olga"], ["Driver sends ETA / location.", "Driver"], ["Photograph the equipment and check accessories; pack safely.", "Driver"], ["Give the 10 Pillars of Health booklet if appropriate - with sensitivity for cancer-related or medically vulnerable customers.", "Driver"], ["Return to the warehouse and update stock status.", "Driver / Stock owner"], ["Ask for a review if the customer is happy, using the approved review process; send the thank-you / review email.", "Driver / Sales / Marketing"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Don’t treat collection as the end of the relationship. It is a chance to collect feedback, ask for a review, understand whether they may return later, and keep them in the right nurture journey."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Customer not home", "Driver calls/WhatsApps, Olga rebooks, and a failed collection is logged."], ["Customer decides to buy", "Pause collection. Sales confirms; Olga handles invoice/payment."], ["Equipment damaged", "Photograph, log and escalate to Olga/Directors; get Petro involved."], ["Accessories missing", "Record missing items and agree the next step."], ["Customer unhappy", "Do not ask for a review. Sales follows up first and agrees how to resolve."], ["Stock not updated", "Equipment cannot be marked available until checked."]]}, {"t": "h3", "text": "CRM / stock update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Collection date", "Yes"], ["Equipment ID", "Yes"], ["Photos uploaded", "Yes"], ["Accessories checked", "Yes"], ["Equipment condition", "Yes"], ["Stock status", "Yes"], ["Review requested", "Yes"], ["Customer sentiment", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Collection booking call script; collection confirmation email; day-of-collection WhatsApp.", "Review request script (approach to confirm); thank-you email; testimonial and referral requests.", "10 Pillars of Health leaflet."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Review, testimonial and consent handling should follow the marketing rules in §12 and the customer-story rules in the Sales Call Bible §14."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["Why did the customer return instead of buy, and what would have changed their decision?", "What did they like most, and what did they find difficult?", "Could this become a case study, testimonial or FAQ?"]}]}, "j6": {"type": "single", "title": "6. After Collection", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel remembered, valued and able to keep learning from Oxydise. If the relationship was positive, invite them into reviews, referrals, testimonials or future education. Word of mouth is a significant part of the business, so support it actively."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Sales for personal follow-up"], ["Primary owner", "Egor / Giles for email marketing"], ["Support", "Olga if final accounting is needed"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Send a personal thank-you message.", "Sales"], ["Request a review if appropriate.", "Sales"], ["Request a testimonial if the relationship is strong.", "Sales / Marketing"], ["Ask for a referral if appropriate.", "Sales"], ["Tag the customer segment.", "Sales / Marketing"], ["Add to the nurture sequence if consent exists.", "Marketing"], ["Create a future reactivation task if relevant.", "Sales"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Use the relationship. The best aftercare message doesn’t feel like a generic campaign - it references the customer’s situation, what they used, what they asked about, or what may be useful next."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Customer gives negative feedback", "Resolve first. Do not ask for a review."], ["Customer does not reply", "Move to nurture only if consent exists."], ["Customer wants to rent again", "Create a new opportunity; don’t leave it as a closed record."], ["Customer wants to buy after collection", "Sales creates the opportunity; Olga handles the invoice."], ["Customer agrees to a testimonial", "Schedule properly, collect consent and brief them."]]}, {"t": "h3", "text": "CRM update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Review requested", "Yes"], ["Marketing segment", "Yes"], ["Reactivation date", "If relevant"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Review request; referral request (approach to confirm); reactivation email (timing to confirm).", "New-product update; segment-specific nurture email."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Consent and approved-wording rules for any public use of a customer story sit in §12 and the Sales Call Bible §14."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["What outcome did the customer describe, and could it become a testimonial?", "Did they ask for more education, and what future content would keep them engaged?", "What made them trust Oxydise?"]}]}, "j7": {"type": "single", "title": "7. General Enquiry", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should not feel forgotten just because they weren’t ready to buy. They should receive useful, relevant education and an easy route back into a conversation."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Sales for short-term follow-up"], ["Primary owner", "Egor / Giles / marketing for nurture and content"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Move a lead here only after the defined contact attempts.", "Sales"], ["Add the category and the reason they did not progress.", "Sales"], ["Set a one-week follow-up task if no reply, and follow up.", "Sales"], ["Move back to active sales if they re-engage.", "Sales"]]}, {"t": "h3", "text": "General enquiry categories"}, {"t": "table", "head": ["Category", "Meaning"], "rows": [["Medical / recovery-led", "Injury, fatigue, long Covid, cancer-related, neurological or other health concern."], ["Sports / performance", "Athlete, gym, club, recovery or performance."], ["Wellness / optimisation", "Longevity, energy, focus, ageing well or general wellbeing."], ["B2B", "Clinic, practitioner, gym, wellness centre, club, airport or franchise."], ["Unknown", "Not enough information yet."]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "General enquiry should become a marketing asset, not a graveyard. Every non-ready customer should be tagged and educated based on what they care about."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["No category known", "Tag Unknown and send a requalification email."], ["Customer replies", "Move back to the Sales pipeline."], ["Medical question by email", "Use approved wording only."], ["B2B lead appears", "Move to the B2B workflow."], ["High-value lead goes cold", "Add a future follow-up task."]]}, {"t": "h3", "text": "CRM update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["General enquiry reason", "Yes"], ["Category", "Yes"], ["Product interest", "Yes"], ["Last contact attempt", "Yes"], ["Next follow-up date", "Yes"], ["Nurture sequence", "If consent exists"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["General enquiry follow-up; one-week check-in; requalification email.", "HBOT, Red Light, sports-recovery, wellness and B2B education sequences.", "Case-study email; book-a-call CTA; email designs."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Education sequences should use approved claim language from the Learning Portal §3 and the science from the HBOT Study Guide. Podcasts and videos are pattern-recognition, not customer proof (Learning Portal §15)."}]}, "j8": {"type": "single", "title": "8. Accounting", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel that payment, invoicing, rental forms, finance and any commercial terms are handled clearly and professionally."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Olga"], ["Approval", "Directors for discounts, refunds, payment terms and free installs"], ["Support", "Sales for customer context"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Raise the correct invoice from the CRM deal or director request.", "Olga"], ["Send the invoice by email with the correct form to complete.", "Olga"], ["Send a WhatsApp copy, ask the customer to confirm receipt, and explain that once paid Olga organises delivery.", "Olga"], ["Track payment status and chase after 3 days unless a different date is agreed.", "Olga"], ["Confirm payment received to the customer and reconcile the payment.", "Olga"], ["Get approval for exceptions and keep the CRM and accounting aligned.", "Olga / Directors"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Accounting messages should be clear, short and reassuring. Customers should never have to chase to understand what they owe, when it is due, or what happens after payment."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Payment overdue", "Olga sends a reminder and informs Sales if relationship-sensitive."], ["Customer disputes invoice", "Check order details, speak to Sales and correct if needed."], ["Wrong invoice sent", "Void / credit / reissue properly."], ["Customer wants payment terms", "Director approval before anything is promised."], ["Refund requested", "Check terms, approval and reason."], ["Discount promised without approval", "Escalate internally and record the process issue."], ["Free install", "Must still be recorded as £0 / special job."]]}, {"t": "h3", "text": "CRM / accounting update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Invoice number", "Yes"], ["Invoice date", "Yes"], ["Payment status", "Yes"], ["Payment date", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Invoice email and WhatsApp; payment reminder; payment-received confirmation.", "Contract for direct-debit agreements and other arrangements."]}, {"t": "h4", "text": "Related accounting SOPs outside the customer journey"}, {"t": "ul", "items": ["Bank reconciliation and month end.", "Credit control.", "Cash-transaction recording.", "Invoice-raising SOP."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Commercial and finance wording for customers is in the Sales Call Bible §13; keep figures director-approved and confirmed in writing. Approval thresholds are summarised in §16, Exception Rules."}]}, "j9": {"type": "single", "title": "9. Maintenance Requests and Broken Equipment", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should feel supported quickly and safely if something goes wrong. They should know the issue has been logged, who owns it, and what happens next."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Petro / Maintenance"], ["Support", "Sales for customer communication"], ["Support", "Olga for scheduling"], ["Support", "Driver for replacement / collection"], ["Escalation", "Directors for serious issues"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Create a maintenance ticket and record the equipment ID.", "Petro / Sales / Olga"], ["Triage issue severity and ask for a photo/video if needed.", "Petro"], ["Decide if the customer can continue using the equipment.", "Petro"], ["Schedule the repair, replacement or call, and update the customer.", "Petro / Sales"], ["Update stock status and record the root cause.", "Petro"], ["Close the ticket only when resolved.", "Petro"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Maintenance is part of the customer experience. A well-handled issue can build trust; a poorly handled one damages the brand."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Safety concern", "Stop-use guidance, escalate and document."], ["Equipment unusable", "Prioritise repair or replacement."], ["Repeated fault", "Remove the equipment from available stock and investigate."], ["Customer caused damage", "Photograph, document and escalate."], ["Spare part unavailable", "Give a clear timeline and consider a replacement."], ["Customer unhappy", "Sales handles the relationship; Petro handles the technical fix."], ["Issue found in the warehouse", "Mark unavailable and create a ticket."]]}, {"t": "h3", "text": "CRM / ticket update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Customer name", "Yes"], ["Equipment ID", "Yes"], ["Issue type", "Yes"], ["Severity", "Yes"], ["Can customer continue using?", "Yes"], ["Evidence attached", "If needed"], ["Owner", "Yes"], ["Target resolution date", "Yes"], ["Customer update sent", "Yes"], ["Resolution and root cause", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Maintenance acknowledgement; photo/video request; safe-use / pause-use message.", "Repair booking; replacement confirmation; issue-resolved message.", "Apology / service-recovery message; maintenance FAQ."]}, {"t": "h3", "text": "Feedback"}, {"t": "ul", "items": ["Was this issue preventable with better instructions, or a troubleshooting video?", "Was a common question missing from the FAQ, or misunderstood from delivery?", "Do we need an adjustment to the equipment?"]}]}, "j10": {"type": "single", "title": "10. Stock and Warehouse", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "The customer should receive the right equipment, in the right condition, with all accessories, on the promised date."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Olga / stock owner"], ["Support", "Drivers for movement updates"], ["Support", "Petro for repair / maintenance status"], ["Approval", "Directors for free installs, friend installs, influencer placements and special jobs"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Every item has an equipment ID and a status.", "Drivers / Stock owner"], ["Reserve equipment before delivery is confirmed.", "Olga"], ["Update status when it leaves the warehouse, is installed, and is collected.", "Driver"], ["Check condition and accessories on return.", "Driver / Warehouse"], ["Mark faulty items unavailable and agree a repair plan.", "Petro"], ["Do not mark returned equipment available until checked.", "Driver / Stock owner"], ["Log all free / special jobs - even off-system, there must be a booking in/out record.", "Directors / Stock owner"], ["Label and record any new deliveries into the warehouse.", "Warehouse / Stock owner"]]}, {"t": "h3", "text": "Stock statuses"}, {"t": "ul", "items": ["Available.", "Reserved.", "Blocked - maintenance.", "In transit.", "With customer.", "Collection booked."]}, {"t": "callout", "label": "Movement rule", "text": "Every time something leaves the warehouse, is delivered, collected, arrives new, breaks down or is repaired, the driver / stock owner must put the transaction through."}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Stock should be simple enough that anyone can look at it and understand what is available, what is with a customer, what is broken, and what is promised."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Physical stock does not match the system", "Pause bookings for the affected item until reconciled."], ["Accessory missing", "Locate, replace or mark incomplete."], ["Equipment damaged on return", "Photograph, log and create a maintenance ticket."], ["Equipment promised but unavailable", "Inform the customer and offer an alternative date/product."], ["Returned item marked available too soon", "Move back to returned/blocked until checked."], ["Free / friend install requested", "Director approval and a special-job record required."], ["Equipment moves without an ID", "Not allowed. Correct immediately."]]}, {"t": "h3", "text": "CRM / stock update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Equipment ID", "Yes"], ["Product code", "Yes"], ["Status", "Yes"], ["Location", "Yes"], ["Assigned customer", "If with customer"], ["Condition", "Yes"], ["Last maintenance date", "Yes"], ["Fault history", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Pre-delivery equipment checklist; return-condition checklist; cleaning checklist; maintenance checklist; stock-audit checklist."]}, {"t": "h3", "text": "Feedback"}, {"t": "ul", "items": ["Feed anything that needs action to Egor and the team so stock, warehouse, product or process issues can be fixed."]}, {"t": "callout", "label": "Business Operations", "text": ""}, {"t": "p", "text": "How new products enter the range and how marketing runs - the activity behind the customer journey."}]}, "j11": {"type": "single", "title": "11. Adding a New Product to the Product Range", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "Customers should only be offered products that Oxydise understands, can support, can explain safely, and can deliver or maintain properly. A product should not go live just because it is interesting; it must be operationally ready."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Directors"], ["Customer-process support", "Olga, Driver and Sales"], ["Brand / marketing support", "Giles, videographers, SEO, dev, Google Ads and Meta Ads specialists"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Confirm the customer need, market opportunity and strategic fit.", "Directors"], ["Complete supplier / manufacturer due diligence.", "Directors"], ["Collect product documentation: specs, manual, warranty, safety info, CE/UKCA or other certification, declaration of conformity, test reports and quality documents.", "Directors"], ["Confirm website wording and add a draft product; create the brochure and add it to existing brochures.", "Directors"], ["Confirm delivery, installation, access, accessories and packaging requirements.", "Egor"], ["Confirm maintenance requirements, spare parts, fault process and service intervals.", "Petro"], ["Create product code, SKU, stock status, equipment-ID process and CRM/Shopify setup.", "Egor / Ricky"], ["Create the product one-pager, internal training note, customer FAQ and sales guidance.", "Giles / Egor / Alan"], ["Prepare website, Shopify, Google Ads, Meta Ads, SEO and launch content.", "Egor / Marketing"], ["Train Sales, Olga, Driver and Petro before launch.", "Egor / Alan"], ["Run a controlled soft launch or pilot where appropriate; collect feedback and decide go/no-go.", "Directors"]]}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Launch slowly and professionally. A new product should not be marketed until the team knows how to sell it, deliver it, support it, maintain it and answer basic customer questions."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Website or Shopify wrong", "Pause the campaign and correct the page / product setup."], ["Customer issue in the pilot", "Log, fix and decide whether the product needs changes before wider rollout."]]}, {"t": "h3", "text": "CRM / stock update"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Product code / SKU", "Yes"], ["Product category", "Yes"], ["Rental / purchase route", "Yes"], ["Certification pack location", "Yes"]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["New-product approval checklist; supplier due-diligence checklist; compliance / certification checklist.", "Product master data sheet; product one-pager; internal product training note; shoot brief."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ New product education (one-pager, FAQ, training note) should match the claim guardrails in the Learning Portal §3 and feed into the Sales Call Bible and the Study Guide as needed."}, {"t": "h3", "text": "Feedback"}, {"t": "ul", "items": ["What did customers ask that we did not prepare for, and what did Sales find hard to explain?", "Did delivery / installation work as expected, and were there faults or support issues?", "Did marketing generate the right lead quality? Should the product stay, change or be removed?"]}]}, "j12": {"type": "single", "title": "12. Marketing Operations", "blocks": [{"t": "h3", "text": "Customer promise"}, {"t": "p", "text": "Customers should see a consistent Oxydise story across website, social, email, paid ads, PR, video and sales materials. Marketing should create trust, educate clearly and generate the right-quality leads, not just activity."}, {"t": "h3", "text": "Owner"}, {"t": "table", "head": ["Role", "Responsibility"], "rows": [["Primary owner", "Giles"], ["Content production", "Videographers"], ["SEO / website / paid", "SEO specialist, developer, Google Ads and Meta Ads specialist"], ["Customer stories and sales insight", "Sales"], ["Operational support", "Olga, Driver and Petro where needed"], ["Approval", "Egor / Alan for strategic campaigns, sensitive claims, budgets and partnerships"]]}, {"t": "h3", "text": "Must do"}, {"t": "table", "head": ["Must do", "Owner"], "rows": [["Maintain one marketing calendar across social, email, paid, SEO, website, PR and video.", "Giles"], ["Plan content around agreed pillars: education, outcomes, product, trust and B2B.", "Marketing"], ["Before each shoot, create a shoot brief: objective, customer/story, product, location, shot list, questions, approvals, consent and outputs.", "Giles / Videographers / Alan"], ["Get customer consent before recording, photographing or using customer content.", "Alan / Marketing"], ["Use client conversations, delivery moments, reviews and common questions as content ideas - but never record or publish without approval.", "Sales / Marketing"], ["Follow the content calendar; avoid ad-hoc posting unless approved.", "Marketing"], ["Make sure captions, claims and product wording are approved before publishing.", "Marketing"], ["Coordinate SEO and dev work through clear briefs, priorities and QA after changes.", "Egor"], ["Review performance monthly: lead quality, CPL, ROAS, enquiries, wrong calls, traffic and conversion.", "Egor"], ["Feed learning back into website, sales scripts, FAQs, templates and future content.", "Marketing"]]}, {"t": "p", "text": "[ To confirm: the agreed method for analysing each post / campaign (the metrics, owner and review cadence), and the canonical owner names for social posting and monthly analysis. ]"}, {"t": "h3", "text": "Best practice"}, {"t": "p", "text": "Marketing should work as one system: the same campaign idea connecting across website, organic social, paid ads, email, PR, sales conversations and customer stories. Fewer, better campaigns beat scattered activity. Before each shoot, everyone should know why the content is being recorded, who it is for, what the outputs are, and what claims or wording are allowed."}, {"t": "h3", "text": "If it goes wrong"}, {"t": "table", "head": ["Situation", "Fix"], "rows": [["Shoot has no clear brief", "Do not proceed until objective, shot list, consent and outputs are clear."], ["No customer consent", "Do not publish. Get consent or do not use the content."], ["Content makes unsupported claims", "Pause and rewrite using approved wording (Learning Portal §3)."], ["Calendar slips", "Escalate early; agree a revised date rather than letting it drift silently."], ["Ads create wrong calls", "Log wrong-call reasons and adjust keyword, creative, targeting or landing page."], ["Website change breaks conversion", "Roll back or fix quickly, then log what happened."], ["Post performs poorly", "Review hook, creative, audience, timing and landing page; record the learning."]]}, {"t": "h3", "text": "Templates"}, {"t": "ul", "items": ["Marketing calendar; shoot brief; shot list; customer-interview question sheet.", "Social caption template; brand / claims checklist; monthly performance report; post-campaign review."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ Every public claim must pass the Learning Portal §3 guardrails and §18.5 competitor-safe language. Customer-story consent and wording follow the Sales Call Bible §14."}, {"t": "h3", "text": "Website feedback"}, {"t": "ul", "items": ["Which questions are customers repeatedly asking, and which content generated good vs poor-fit leads?", "Which landing pages need improvement, and which stories should become case studies?", "Which ad / channel is driving wrong calls?"]}, {"t": "callout", "label": "Resources", "text": ""}, {"t": "p", "text": "The shared libraries and rules that keep the system consistent: templates, education, website feedback and exceptions."}]}, "education": {"type": "doc", "hero": ["OXYDISE EDUCATION", "Colleague Learning Portal", "Knowledge Base • Technology Primer • Resource Library", "For everyone who works with Oxydise - understand the science, speak about it with confidence, and know where the boundaries are.", "Internal education, not medical advice or a public claims bank. Condition-specific language and protocols require internal approval before public use."], "sections": [{"title": "1. Values and knowledge-base principles", "blocks": [{"t": "h3", "text": "1.1 The six we measure every decision against"}, {"t": "p", "text": "Approved 20 April 2026"}, {"t": "p", "text": "Based on these values, Oxydise has built this knowledge base for curious colleagues: people who want to understand the technology deeply enough to guide customers with trust, empathy, detail and care."}, {"t": "table", "head": ["Value", "Short line", "What it means in practice"], "rows": [["01 Trust", "Transparent, honest, consistent.", "We earn trust by being transparent, honest and consistent in everything we do; from pricing to performance. Our advice is grounded in expertise and genuine care, not short-term sales success."], ["02 Empathy", "Listen first. Long-term outcomes.", "We listen first, taking the time to understand each customer’s goals, concerns and journey. Every recommendation is made with long-term outcomes in mind, not quick wins."], ["03 Relationships", "Meaningful. Lasting. Collaborative.", "We build meaningful, lasting relationships with our customers, partners and colleagues. Through trust, openness and collaboration, we create a network that grows stronger together."], ["04 Curious", "Always learning. Questioning convention.", "We are driven by curiosity; constantly learning, testing and improving to stay ahead in a fast-moving space. By questioning convention, we uncover better ways to support health, recovery and performance."], ["05 Detail", "The difference is in the detail.", "We believe the difference is in the detail; from product quality and customer requirements to customer experience. Every touchpoint is thoughtfully designed and executed to deliver the highest standard."], ["06 Innovation", "Proven science. Forward-thinking ideas.", "We combine proven science with forward-thinking ideas to push the category forward. Our ambition is not just to compete, but to lead - making advanced wellness technology more accessible than ever."]]}, {"t": "h3", "text": "1.2 Knowledge-base principles"}, {"t": "p", "text": "Baseline rule"}, {"t": "p", "text": "Oxydise colleagues should understand more than they say. The knowledge base is here to educate colleagues deeply. Customer conversations should remain simple, calm, confident and approved."}, {"t": "table", "head": ["Principle", "What it means for colleagues"], "rows": [["Education first", "Use the science to understand the technology. Do not turn every mechanism into a customer claim."], ["Plain English first", "A tired, stressed or anxious customer should be able to understand the explanation without needing a biology degree."], ["Mechanism-led, not guarantee-led", "Explain the proven mechanism first, then be clear that individual outcomes vary. Confidence comes from the biology, not from pretending to know a customer result before it happens."], ["Safety before conversion", "Contraindications, tolerance, medicines, eye safety, fire safety, device instructions and practical suitability come before sales."], ["Protocols are context-dependent", "Pressure, session length, frequency, light dose and total exposure depend on the person, goal, equipment and safety profile."], ["Customer stories have a place", "Use approved stories as lived experience: “we have customers who have told us…”. Never turn a customer story into a guaranteed result for someone else."], ["Living library", "Every study, video, podcast, book and protocol card should have an owner, review date and status: starter, recommended, advanced, internal-only, or pending approval."]]}, {"t": "p", "text": "Recommended resource card format"}, {"t": "p", "text": "Title, type, topic, who it is useful for, time to complete, why it matters, customer-safe takeaway, can it be quoted externally, owner, last reviewed and approval status."}]}, {"title": "2. How to use this education page", "blocks": [{"t": "p", "text": "This page is the place we want anyone who works with Oxydise to come back to: new colleagues, sales, admin, delivery, installers, maintenance, marketing and directors. It should help people understand the technology, listen to the important podcasts, watch the right videos and gradually work through the books. It should feel like a modern learning portal for curious colleagues, not a public-facing sales page and not a rigid checklist."}, {"t": "table", "head": ["Route", "What to read/watch", "Best for"], "rows": [["Start here", "Knowledge-base principles, customer-safe language, HBOT basics, Red Light basics and safety guardrails.", "Everyone"], ["Build confidence", "Equipment fundamentals, oxygen concentrator explanation, protocols, common customer concerns and customer-safe wording.", "Sales, admin, support, delivery and marketing"], ["Go deeper", "Mitochondria, inflammation, cytokines, VEGF/BDNF/PDGF, fasting, PEMF, grounding, hydrogen, Neuro Gamma and study summaries.", "Wellness experts, content, founders and advanced sales"], ["Stay current", "Video library, people to know, new studies and sector awareness.", "Everyone who talks to customers or creates content"]]}, {"t": "p", "text": "Colleague rhythm suggestion"}, {"t": "p", "text": "New starters should be encouraged to spend 30-60 minutes per working day on education in their first month, but this should be framed as confidence-building rather than a mandatory “required pathway”."}, {"t": "h3", "text": "2.1 Plain-English decoder for scientific language"}, {"t": "p", "text": "How science should appear on the website"}, {"t": "p", "text": "Keep the real scientific words, because they build credibility. Then immediately explain them in brackets or in a short “In simple terms” line so every colleague can understand and repeat the idea clearly."}, {"t": "table", "head": ["Scientific term", "Simple colleague version"], "rows": [["Oxidative phosphorylation", "How mitochondria use oxygen to turn food energy into ATP, the cell’s usable energy."], ["Electron transport chain", "The final energy-production pathway inside mitochondria. Oxygen is the final receiver in this process."], ["Dissolved oxygen in plasma", "Oxygen carried in the liquid part of blood, not only attached to red blood cells."], ["Hypoxia", "Low oxygen availability in a tissue."], ["Hyperoxia", "Higher-than-normal oxygen exposure."], ["HIF-1 alpha", "The body’s low-oxygen alarm signal. It switches on survival pathways when tissues are short of oxygen."], ["Cytochrome c oxidase", "A mitochondrial enzyme that helps cells make energy and is often discussed as a light-sensitive target in Red Light Therapy."], ["Photobiomodulation", "Using specific wavelengths of light to influence cell signalling. In simple terms: a useful light signal, not heat or tanning."], ["Reactive oxygen species / ROS", "Small reactive molecules. Too much can be damaging, but a controlled amount is also used by the body as a signal."], ["Cytokines", "Immune-system messages that can turn inflammation up or down."], ["VEGF", "A blood-vessel growth signal. Simple version: blood supply."], ["BDNF", "A brain-support signal involved in learning, memory and new connections. Simple version: brain wiring."], ["PDGF", "A tissue-repair signal released by platelets. Simple version: repair scaffold."], ["VO2-rest", "How much oxygen the body uses at rest. Higher resting oxygen use can suggest the system is working harder than it should."], ["Selective antioxidant", "A compound discussed for reducing excess oxidative stress while preserving useful stress signals needed for adaptation."]]}]}, {"title": "3. Customer-safe language and claim guardrails", "blocks": [{"t": "h3", "text": "3.1 The new Oxydise language rule"}, {"t": "p", "text": "Oxydise should sound confident in what it is doing. We are not here to sound unsure about the underlying biology. We are also not here to pretend we can guarantee a personal medical outcome. The standard is:"}, {"t": "p", "text": "Confident about mechanisms. Responsible about outcomes. Clear about safety."}, {"t": "p", "text": "That means colleagues should lead with what is known: oxygen under pressure increases dissolved oxygen in plasma; pressure changes gas behaviour; oxygen is required for mitochondrial ATP production, collagen synthesis, white-cell oxidative killing and many repair pathways; red and near-infrared light act through photobiomodulation pathways; dose, timing and suitability matter."}, {"t": "p", "text": "The uncertainty is not whether the mechanism exists. The uncertainty is how strongly an individual person will respond, how many sessions they need, what else is driving their situation and whether the relevant use is on-label, off-label, wellness-led, clinician-led or internal education only."}, {"t": "table", "head": ["Old phrasing to reduce", "Better Oxydise phrasing"], "rows": [["Passive anecdote language", "“We have customers who have told us…”"], ["“This supports recovery…”", "“The mechanism supports recovery biology by improving oxygen availability, circulation, inflammatory signalling or cellular energy. Individual outcomes still vary.”"], ["Vague evidence hedging", "“The mechanism is well understood. The clinical evidence is strongest in [recognised indication] and still developing in [off-label area].”"], ["“It can help…”", "“The biological rationale is…” / “The mechanism we are interested in is…”"], ["“We cannot say much because it is off-label.”", "“Off-label does not mean random. It means we explain the mechanism, the evidence level and the safety boundary without promising a treatment outcome.”"], ["“It is not proven, so be careful.”", "“The mechanism is strong, but the clinical evidence is not equal across every condition. We explain the difference clearly.”"]]}, {"t": "p", "text": "Plain-English version for colleagues: be positive about the mechanism, but do not promise the customer’s result."}, {"t": "h3", "text": "3.2 The one-sentence rule"}, {"t": "p", "text": "We can explain how the technology works, where it is established, where it is being used off-label, what mechanisms make biological sense and what our customers have told us - but we do not diagnose, prescribe, replace a clinician or guarantee outcomes."}, {"t": "h3", "text": "3.3 On-label, off-label and internal education"}, {"t": "table", "head": ["Category", "What it means", "How Oxydise should talk about it"], "rows": [["On-label / recognised medical use", "A use recognised by regulators, medical bodies or reimbursement systems for appropriate HBOT equipment and clinical settings. Examples include decompression sickness, carbon monoxide poisoning, selected diabetic wounds and delayed radiation injury.", "“HBOT is established in medicine for specific indications. The mechanism is oxygen under pressure, and the clinical use is defined by protocols, screening and supervision.”"], ["Off-label clinical or wellness use", "A use outside the formal cleared/covered indication list, where practitioners or researchers use HBOT because the mechanism fits the biology of the problem.", "“This is a mechanism-led use. The biology makes sense, but it is not the same as an approved indication and we do not guarantee a clinical outcome.”"], ["Internal education only", "Topics that help colleagues understand the sector but should not be used as sales claims without approval, such as strong disease claims, cancer protocols, peptides, complex neurological disease and specific medication interactions.", "“This is useful for our understanding. It is not a customer claim or a protocol unless approved.”"], ["Customer story", "A real customer or athlete experience, used only with permission and approved wording.", "“We have customers who have told us…” not “this will happen for you.”"]]}, {"t": "h3", "text": "3.4 Why clinical evidence can lag behind the mechanism"}, {"t": "p", "text": "HBOT is harder to study than a tablet. A proper trial needs expensive equipment, repeated sessions, consistent pressure and oxygen delivery, trained operators, credible sham controls, objective outcomes and long follow-up. Oxygen is also not a patent-protected drug, so the commercial incentive for large pharmaceutical-style trials is weaker."}, {"t": "p", "text": "This does not make the mechanism weak. It means colleagues must separate three things:"}, {"t": "ul", "items": ["Mechanism strength - what oxygen under pressure clearly does biologically.", "Clinical evidence strength - how much trial evidence exists for a specific condition and protocol.", "Customer outcome certainty - what we can responsibly predict for one person."]}, {"t": "p", "text": "A useful internal analogy is the wound model. HBOT is established in wound contexts because wounds involve hypoxia, poor microcirculation, inflammation, infection risk, collagen demand and impaired repair. Many internal disease processes also have wound-like biology: low oxygen, poor blood flow, inflammation, oedema, mitochondrial strain or slow repair. That is the logic behind many off-label conversations. It is a rationale, not a guarantee."}, {"t": "p", "text": "Memorable internal phrase: “Disease is often the absence of oxygen at tissue level.” Use this as a teaching lens, not as a literal universal claim."}, {"t": "h3", "text": "3.5 Confident customer language examples"}, {"t": "table", "head": ["Situation", "Stronger phrasing"], "rows": [["General HBOT explanation", "“HBOT is oxygen plus pressure. The pressure is what allows oxygen to dissolve into the plasma, so oxygen can reach tissues beyond normal red-blood-cell delivery.”"], ["Customer asks whether it works", "“The mechanism is strong: oxygen under pressure improves oxygen availability, and oxygen is central to repair, energy and inflammation regulation. What varies is the individual response, which is why we think in blocks of sessions and track progress.”"], ["Customer asks about off-label use", "“That use is not an on-label medical indication, so we do not present it as a treatment claim. The reason people look at HBOT there is the mechanism: oxygen delivery, inflammation signalling, mitochondrial energy and tissue repair.”"], ["Customer asks about cancer", "“Cancer is complex, and we do not claim HBOT treats cancer. What we can say is that tumour hypoxia is an important area of cancer biology, HBOT is used in recognised ways for radiation injury, and cancer-related cases should be handled with oncology input and careful timing.”"], ["Customer asks about testimonials", "“We have customers who have told us they noticed changes in energy, sleep, focus, recovery or comfort. That helps us understand lived experience, but your response still depends on your situation and consistency.”"], ["Customer asks about medical advice", "“I can explain the mechanism and the process clearly, but I cannot make a personal medical decision for you. For your specific diagnosis, treatment plan or medication, we need clinician input.”"]]}, {"t": "h3", "text": "3.6 What not to say"}, {"t": "p", "text": "Do not say: “it cures”, “it treats every case”, “you will definitely feel X”, “ignore your doctor”, “everyone should do it”, “higher pressure is always better”, or “off-label means proven”."}, {"t": "p", "text": "Also avoid sounding frightened of the science. Do not overuse phrases like “maybe”, “might”, “could possibly” or “some people say”. The Oxydise tone is confident, grounded and human."}]}, {"title": "4. Hyperbaric Oxygen Therapy", "blocks": [{"t": "p", "text": "This section is the core everyone who works with Oxydise should know. Read Part A and you can speak about HBOT confidently and safely. Part B is the deeper reference for when you want detail - and for the full science, the complete Oxydise HBOT Study Guide is the companion document."}, {"t": "p", "text": "Part A - What everyone should know"}, {"t": "p", "text": "The essentials: what HBOT is, the three dials, the core mechanisms, our concentrator advantage, the on/off-label boundary, the safety basics and the script."}, {"t": "h3", "text": "4.1 What HBOT is - the one-paragraph version"}, {"t": "p", "text": "Hyperbaric Oxygen Therapy (HBOT) means breathing oxygen inside a chamber where the pressure is higher than normal. Two things happen at once: the customer breathes a high concentration of oxygen, and pressure forces much more oxygen to dissolve directly into the liquid part of the blood, the plasma. That oxygen-rich plasma can reach areas where normal circulation is compromised, and it helps switch on the body’s own repair, anti-inflammatory, immune and energy-production processes."}, {"t": "p", "text": "Plain-English version:  oxygen is the cargo; pressure is the delivery system."}, {"t": "h3", "text": "4.2 Everyday analogies colleagues can use"}, {"t": "table", "head": ["Analogy", "Explanation", "Why it works"], "rows": [["Fizzy-drink bottle", "A sealed fizzy drink holds gas in liquid because it is under pressure. When pressure drops, gas comes out as bubbles.", "This explains Henry’s Law, oxygen dissolving into plasma and controlled off-gassing."], ["Delivery network", "Red blood cells are like delivery trucks. If the road is blocked, the truck cannot pass. Plasma oxygen is like small parcels moving through back lanes.", "This explains why dissolved oxygen matters in poor circulation, swelling or damaged tissue."], ["Watering dry ground", "Hypoxic tissue is like dry ground. Once oxygen is restored, repair biology can start working again.", "This explains why HBOT creates a better environment for repair without promising a cure."], ["Internal wound model", "Many conditions involve wound-like biology: low oxygen, inflammation, swelling, poor microcirculation and slow repair.", "This helps colleagues reason from proven wound healing mechanisms into off-label physiology without overclaiming."]]}, {"t": "h3", "text": "4.3 The three dials of an HBOT dose"}, {"t": "p", "text": "HBOT is best understood as a dose of oxygen delivered under pressure. Three dials control that dose."}, {"t": "table", "head": ["Dose dial", "What it means", "Why it matters"], "rows": [["Pressure", "Depth/pressure, measured in ATA. 1 ATA is normal sea-level pressure; 1.5 ATA is 50% above normal pressure; 2 ATA is roughly the pressure at 10 metres underwater.", "More pressure increases the amount of gas that can dissolve into fluids and changes bubble behaviour."], ["Oxygen concentration", "The fraction of oxygen breathed through the mask or hood. Room air is about 21%; a good concentrator usually delivers around 90-95%; clinical settings use 100% oxygen.", "Oxygen percentage and pressure multiply together. Both affect oxygen partial pressure."], ["Time and frequency", "Session length, number of sessions and how closely sessions are grouped.", "Many regenerative mechanisms are cumulative. One session can feel useful, but repeated exposure builds the deeper signal."]]}, {"t": "p", "text": "Colleague takeaway: pressure, oxygen concentration and time are not interchangeable. A 1.5 ATA session with high oxygen is a different dose from breathing room air at pressure, or breathing oxygen at surface pressure."}, {"t": "h3", "text": "4.4 Core mechanisms - the six everyone should know"}, {"t": "p", "text": "These are the six mechanisms to know by heart. They are a grouping of the fuller science: each one expands into the thirteen mechanisms listed in Part B, and into the full detail of the HBOT Study Guide. Keep this layer in mechanism-and-environment language - what HBOT helps with, never a promise to treat or cure."}, {"t": "table", "head": ["Mechanism", "What is happening", "Where it helps the conversation"], "rows": [["Oxygen in plasma (hyperoxygenation)", "Under pressure, oxygen dissolves into the plasma and can travel beyond normal haemoglobin delivery.", "Poor circulation, inflammation, injury recovery, fatigue states and tissue repair."], ["Inflammation reduction", "HBOT helps regulate inflammatory signalling and oxidative-stress responses - describe it as helping regulate the inflammatory environment, not as a blanket anti-inflammatory cure.", "Pain, long-term inflammation, recovery load and post-viral fatigue."], ["ATP / mitochondrial support", "Mitochondria need oxygen to make ATP. HBOT improves oxygen availability where tissue is hypoxic, inflamed or poorly perfused.", "Energy, recovery, brain fog and exercise tolerance."], ["Stem / progenitor cell activation", "Repeated HBOT exposure has been reported to mobilise stem and progenitor cells from the bone marrow.", "Regenerative framing - use as mechanism education, not a guaranteed outcome."], ["Neuroplasticity and brain perfusion", "HBOT research explores brain blood flow, cognitive function and neuroplasticity in certain populations.", "Brain fog, ageing brain and concussion/TBI conversations - escalate medical cases."
