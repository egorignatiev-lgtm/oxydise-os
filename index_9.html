ence.", "Biohacking", "[[Open||https://www.youtube.com/watch?v=nhC8lLPpGl4&t=1s]]"], ["Huberman - peptide therapeutics", "Andrew Huberman", "Useful for understanding why customers ask about peptides; do not recommend or prescribe.", "Internal only", "[[Open||https://www.youtube.com/watch?v=zU5EYw06wtw]]"], ["Steven Bartlett / Dr Alex Tatem - peptides", "The Diary of a CEO / Dr Alex Tatem", "Sector-awareness resource around peptides, tissue repair and metabolic topics. Clinical/regulatory caution required.", "Internal only", "[[Open||https://www.youtube.com/watch?v=jt5hHb6kzYM&t=2428s]]"], ["The Impact of Mindset on Stress and Performance", "Dr Andrew Huberman / Huberman Lab Clips", "Explains how stress mindset can change physiological and psychological outcomes. Useful for customer empathy and behaviour change.", "Mindset", "[[Open||https://www.youtube.com/watch?v=SedgGUlhSl0&t=9s]]"], ["How Placebo Effects Work to Change Biology & Psychology", "Andrew Huberman / Huberman Lab", "Full episode on placebo, belief and measurable biology. Useful for understanding expectation without dismissing customers.", "Mindset", "[[Open||https://www.youtube.com/watch?v=gdUNjPijwA8]]"], ["Science of Mindsets for Health & Performance", "Dr Alia Crum with Andrew Huberman", "Mind-body research around stress, performance and health outcomes. Useful for colleague communication.", "Mindset", "[[Open||https://www.youtube.com/watch?v=dFR_wFN23ZY&t=1s]]"]]}, {"t": "h3", "text": "15.6 Sector awareness: longevity culture, communication and internal-only risk topics"}, {"t": "table", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["The #1 Tool Bryan Johnson Swears By", "Bryan Johnson & Chris Williamson / Chris Williamson", "Bryan Johnson discusses a top longevity tool. Useful for understanding “top tool” narratives in biohacking culture.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=Hk1FEGw0ARw&t=515s]]"], ["Bryan Johnson - India air pollution + HBOT", "Bryan Johnson", "Example of how longevity consumers think about biomarkers, environment and HBOT protocols.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=XVJaqRSrEZA&t=767s]]"], ["David Sinclair - can ageing be reversed?", "David Sinclair", "Longevity culture and public ageing biology. Useful context; some claims are debated.", "Longevity", "[[Open||https://www.youtube.com/watch?v=DnvWAP99r3Y&t=7242s]]"], ["Bryan Johnson / All-In Podcast DMT episode", "Bryan Johnson / All-In", "Not core Oxydise education. Keep only as sector-awareness around public biohacking culture.", "Optional", "[[Open||https://www.youtube.com/watch?v=Axpnkqd-Agk&t=2107s]]"], ["Chase Hughes - influence and spotting lies", "Chase Hughes", "Communication/behaviour awareness rather than health science. Optional for sales/communication training.", "Sales optional", "[[Open||https://www.youtube.com/watch?v=A44MGp-In4w]]"], ["Sauna 90-day experiment", "Recovery/longevity channel", "Useful wider recovery/longevity context. Make clear Oxydise is not a sauna brand.", "Optional", "[[Open||https://www.youtube.com/watch?v=kiUM92VDI1Y]]"], ["Cancer Dies When You Do THIS", "Dr Eric Berg", "High-risk cancer content. Internal awareness only; do not use as customer advice or evidence for Oxydise claims.", "Internal only", "[[Open||https://www.youtube.com/watch?v=f9PL6o4OLNw]]"], ["How to Cure Cancer?", "Michael Levin & Lex Fridman / Lex Clips", "Future-facing biology and cancer thinking. Internal curiosity only; not customer treatment language.", "Internal only", "[[Open||https://www.youtube.com/watch?v=yRMIZrn8IuE]]"]]}, {"t": "p", "text": "Approval note for the video library"}, {"t": "p", "text": "On the website, cancer, peptides, disease-specific and strong claim videos should be visually marked as Internal only or Hold for clinical review unless specifically approved. The goal is to educate colleagues, not provide public medical recommendations."}]}, {"title": "16. People everyone should know", "blocks": [{"t": "p", "text": "People rule"}, {"t": "p", "text": "Knowing names helps colleagues understand the sector, not name-drop. Add links to YouTube channels or prominent videos where useful. Do not repeat a person’s claims without checking the underlying evidence."}, {"t": "table", "head": ["Name", "Known for", "Why Oxydise colleagues should know them", "Useful links / videos"], "rows": [["Dr Shai Efrati / Sagol Center", "HBOT, neuroplasticity, ageing and post-COVID research.", "Know the Israeli research direction and hyperoxic-hypoxic paradox. Use cautiously, not as anti-ageing claims.", "Search / Sagol Center"], ["Dr Jason Sonners", "HBOT education, mild vs higher pressure and inflammatory signalling.", "Useful for practical HBOT education and dose mindset.", "How to Hyperbaric / HBOT USA videos"], ["Dr Scott Sherr", "HBOT, health optimisation, methylene blue and oxygen metabolism.", "Clear communicator for oxygen and pressure physiology.", "Dr Hyman HBOT episode"], ["Prof Michael Hamblin", "Photobiomodulation mechanisms and applications.", "Foundational PBM literature and RLT credibility.", "PubMed / PBM literature"], ["Prof Glen Jeffery", "Red light, mitochondria and ageing retina.", "Useful for 670 nm / eye-energy discussion; do not generalise to all devices.", "Huberman interview"], ["Andrew Huberman", "Neuroscience, circadian light and behaviour.", "Useful public educator for light, sleep and behaviour change.", "Huberman Lab"], ["Bryan Johnson", "Longevity, protocol culture and self-measurement.", "Understand the biohacking mindset; avoid copying extreme protocols.", "Bryan Johnson podcast / Blueprint"], ["Oli Patrick", "Physiology, performance, recovery and wellness strategy.", "Important Oxydise advisor/collaborator; practical energy and recovery language.", "Modern Wellness / Oxydise content"], ["Dr Masha Makeeva", "HBOT safety, regenerative therapies and clinical training.", "Escalation point for medical-suitability conversations and internal safety education.", "Internal / clinical board"], ["Peter Attia", "Healthspan, VO2 max, metabolic health and risk reduction.", "Core longevity language: healthspan, strength, cardiovascular base and risk.", "The Drive / Outlive"], ["Ben Greenfield", "Biohacking, performance and recovery technologies.", "Understand customers already in the biohacking world.", "Ben Greenfield Life"], ["David Sinclair", "Ageing biology, epigenetics and longevity debate.", "Important longevity name; also know some claims are debated.", "Lifespan / interviews"], ["Emeran Mayer", "Gut-brain axis and microbiome.", "Useful for gut, mood, inflammation and wellbeing context.", "Books / interviews"], ["Rhonda Patrick", "Nutrients, sauna, metabolism and evidence translation.", "Good model for careful science communication.", "FoundMyFitness"], ["Satchin Panda", "Circadian biology and time-restricted eating.", "Supports daylight, sleep timing and circadian education.", "Interviews / books"], ["Matthew Walker", "Sleep science.", "Sleep is foundational for all recovery conversations.", "Why We Sleep / interviews"], ["Thomas Seyfried", "Cancer metabolism.", "Advanced internal cancer-metabolism thinker; never use as customer treatment advice.", "Lectures / books"], ["Kelly Turner", "Radical remission factors and patient agency.", "Useful empathy resource for cancer-support conversations and non-technology factors.", "Radical Remission"], ["Michael Levin", "Bioelectricity and regeneration.", "Advanced future-science lens; curiosity, not claims.", "Lectures / interviews"], ["Gary Brecka", "Genetics, methylation and public biohacking.", "Customers may ask about him. Know the claims and verify before repeating.", "Ultimate Human / interviews"], ["Wim Hof", "Breathwork and cold exposure.", "Customers may connect HBOT with resilience and oxygen conversations. Safety boundaries matter.", "Beyond The Pill / Wim Hof content"], ["Tim Spector", "Nutrition, microbiome and personalised health.", "Useful for microbiome and nutrition context.", "ZOE / books"], ["Davinia Taylor", "Biohacking, nutrition and metabolic health.", "Customers reference her in UK wellness/longevity culture.", "Willpowders / interviews"], ["Marisa Peer", "Mindset, hypnotherapy and behaviour change.", "Featured in longevity/wellness media; useful for wider sector awareness.", "Interviews / Beyond The Pill context"]]}]}, {"title": "17. Books and wider wellness sector map", "blocks": [{"t": "p", "text": "Book rule"}, {"t": "p", "text": "Books are internal education, not proof for product claims. Use them to build context, vocabulary and customer empathy. Do not quote books as clinical evidence unless the underlying study is checked."}, {"t": "table", "head": ["Book", "Author", "Came out", "What it is about", "Most important takeaways"], "rows": [["The Body: A Guide for Occupants", "Bill Bryson", "2019", "An accessible tour of human biology, covering the main systems of the body, disease, repair and how much is still not fully understood.", "Build colleague confidence with plain-English biology. The body is interconnected, resilient and complex, so avoid over-simple explanations of health problems."], ["The Blue Zones, Second Edition", "Dan Buettner", "2012 (original 2008)", "Lessons from long-lived communities, linking lifespan to daily habits, food culture, purpose and social connection.", "Environment often beats willpower. Build movement into daily life, eat simply, reduce stress, maintain social ties and make healthy choices automatic."], ["Outlive: The Science and Art of Longevity", "Peter Attia, MD, with Bill Gifford", "2023", "A practical longevity framework focused on healthspan: living better for longer, not just adding years.", "Move from reactive to proactive health. Exercise, metabolic health, sleep, nutrition and emotional wellbeing are core levers. Measure risk early and act before disease is obvious."], ["Lifespan: Why We Age - and Why We Don’t Have To", "David A. Sinclair, PhD, with Matthew D. LaPlante", "2019", "A science-led argument that ageing is a biological process influenced by genes, cellular repair and environment.", "Useful for longevity customers, but teach colleagues that longevity claims are contested. Separate promising science from proven customer advice."], ["Good Energy: The Surprising Connection Between Metabolism and Limitless Health", "Casey Means, MD, with Calley Means", "2024", "A metabolic-health book linking cellular energy, mitochondria, glucose control and lifestyle to broad health outcomes.", "Good everyday framing: energy, cravings, sleep, movement and ultra-processed food connect to metabolic health. Avoid disease-treatment claims."], ["The Mind-Gut Connection", "Emeran A. Mayer, MD", "2016", "Explains the gut-brain axis: two-way communication between digestion, microbiome, mood, stress, food choices and behaviour.", "Useful for why gut health, inflammation, mood and recovery feel connected. Keep the message balanced around diet, stress, sleep and symptoms."], ["Why We Sleep: The New Science of Sleep and Dreams", "Matthew Walker, PhD", "2017", "Popular science on why sleep matters for learning, memory, emotional regulation, metabolism, immunity and recovery.", "Sleep is a foundation for recovery. Understand routine, light, caffeine, alcohol and bedroom environment. Some claims are debated, so stay practical."]]}, {"t": "h3", "text": "Book table continued"}, {"t": "table", "head": ["Book", "Author", "Came out", "What it is about", "Most important takeaways"], "rows": [["Breath: The New Science of a Lost Art", "James Nestor", "2020", "Journalistic exploration of breathing, nasal breathing, CO2 tolerance, mouth breathing, breathwork traditions and respiratory awareness.", "Breathing patterns can affect stress, sleep and performance. Useful customer language, but do not over-medicalise techniques or present them as cures."], ["The Circadian Code", "Satchin Panda, PhD", "2018", "Shows how light timing, meal timing, sleep timing and daily routines interact with the body clock and metabolic health.", "Recovery is not only what people do, but when they do it. Morning light, consistent sleep windows and sensible eating windows are practical talking points."], ["Boundless: Upgrade Your Brain, Optimize Your Body & Defy Aging", "Ben Greenfield", "2020 (updated 2025)", "Wide-ranging biohacking manual covering sleep, training, recovery, cognition, nutrition, devices and self-experimentation.", "Useful for biohacker language and expectations. Bring conversations back to basics first: sleep, movement, nutrition, recovery and safety."], ["The Blood Sugar Solution 10-Day Detox Diet", "Mark Hyman, MD", "2014", "A short dietary reset aimed at reducing sugar cravings, insulin spikes and reliance on processed foods.", "Metabolic health is central to energy and weight control. Reducing sugar/refined carbohydrates can help, but short resets only matter if followed by sustainable habits."], ["The Plant Paradox", "Steven R. Gundry, MD", "2017", "A diet book built around the author’s view that lectins and some plant foods can trigger gut and inflammatory issues.", "Gut health and individual tolerance matter. Understand this school of thought, but avoid presenting lectin avoidance as settled or universal advice."], ["The Inflammation Spectrum", "Dr Will Cole with Eve Adamson", "2019", "A food-trigger and inflammation framework using elimination and reintroduction to personalise diet choices.", "Personalisation is a recurring theme. Track symptoms, food responses, sleep and stress. Reducing ultra-processed foods is more robust than assuming one diet suits everyone."], ["The Longevity Paradox", "Steven R. Gundry, MD", "2019", "A microbiome-centred longevity book linking ageing, gut bacteria, diet quality and metabolic resilience.", "Microbiome health, metabolic flexibility and food quality are useful themes. Treat strict exclusions as the author’s model, not a one-size-fits-all rule."]]}, {"t": "h3", "text": "Book table continued"}, {"t": "table", "head": ["Book", "Author", "Came out", "What it is about", "Most important takeaways"], "rows": [["Mitochondria and the Future of Medicine", "Lee Know, ND", "2018", "A deeper look at mitochondria, cellular energy, oxidative stress, chronic illness, ageing and the central role of energy production in health.", "Good advanced education. Link mitochondria to energy, recovery and resilience, but do not translate broad disease discussions into product or therapy claims."], ["Oxygen Under Pressure", "Dr Jason Sonners", "2020", "An introduction to HBOT, oxygen delivery under pressure and possible recovery uses.", "Oxygen availability, pressure, dose and protocol all matter. Be clear on indications, contraindications and supervision. Do not overstate therapeutic claims."], ["Supercharge Your Health with PEMF Therapy", "William Pawluk, MD, MSc", "2021", "A guide to pulsed electromagnetic field therapy, including device types, protocols and proposed benefits.", "Understand modality, evidence and safety screening before discussing benefits. Be conservative around support, recovery and wellbeing claims."], ["The End of Alzheimer’s", "Dale E. Bredesen, MD", "2017", "A multifactorial protocol for cognitive decline, covering sleep, metabolism, inflammation, hormones and nutrients.", "Brain health is multifactorial. Clinical claims are debated and require medical oversight. Do not use as a treatment guide."], ["Radical Remission: Surviving Cancer Against All Odds", "Kelly A. Turner, PhD", "2014", "Research and survivor stories about unexpected cancer remission and common factors people reported.", "Important empathy resource for cancer-support conversations. Never imply cancer can be cured by lifestyle, Oxydise equipment or any non-medical intervention."], ["The Cancer Code", "Dr Jason Fung", "2020", "Cancer history and cancer-metabolism book arguing cancer should be understood through genetic, metabolic and environmental lenses.", "Internal education only. Cancer is complex and high-risk: colleagues should not advise on treatment, prevention or protocols beyond qualified medical professionals."], ["Evolutionary Ideas", "Sam Tatam", "2022", "A behavioural science and innovation book on solving new problems by borrowing from proven, evolved solutions.", "For colleagues: make desired behaviours easy, visible and socially reinforced. Use defaults, habit design and small tests before complex solutions."]]}, {"t": "h3", "text": "17.1 Suggested starting order"}, {"t": "ul", "items": ["Start with general literacy: The Body, The Blue Zones and Outlive.", "Add core recovery foundations: Why We Sleep, Breath, The Circadian Code and The Mind-Gut Connection.", "Use Lifespan, Good Energy and Boundless to understand longevity and biohacker customer language while keeping claims cautious.", "Keep therapy-specific titles, cancer titles and Alzheimer’s titles as role-relevant internal education only."]}, {"t": "p", "text": "Working principle"}, {"t": "p", "text": "Keep claims evidence-based, distinguish wellbeing support from treatment claims, and treat books as prompts for discussion rather than approved clinical guidance."}, {"t": "h3", "text": "17.2 Wider wellness and biohacking sector map"}, {"t": "p", "text": "Oxydise should not sound as if the only solution is Oxydise equipment. A credible wellness brand can recommend strong foundations where they genuinely help customers. This builds trust and shows the goal is customer outcomes, not only product sales."}, {"t": "table", "head": ["Area", "Tools / topics to know", "Why it matters"], "rows": [["Sleep", "8 Sleep, temperature control, sleep consistency, light timing and caffeine timing.", "Many recovery problems start with poor sleep."], ["Wearables / tracking", "Oura, WHOOP, Garmin, Apple Watch, HRV, resting heart rate and sleep regularity.", "Use tracking to measure trends, not obsess over daily fluctuations."], ["Blood and biomarkers", "Vitamin D, B12, ferritin, CRP, thyroid, hormones and metabolic markers.", "Move from guessing to measurable baselines with clinician interpretation."], ["Microbiome", "Gut testing, fibre, fermented foods and personalised nutrition.", "Relevant to inflammation, mood, recovery and nutrient uptake."], ["Circadian rhythm", "Morning daylight, evening dim light and consistent sleep/wake times.", "A free foundational tool that supports energy and sleep."], ["Heat and cold", "Sauna, cold exposure and cryotherapy.", "Useful recovery and resilience tools; match to contraindications."], ["Movement", "Zone 2 cardio, resistance training, mobility and walking.", "Technology should support movement, not replace it."], ["Nutrition and metabolic health", "Protein, fibre, glucose stability, hydration and electrolytes.", "Supports mitochondrial energy and repair. Avoid extreme advice unless qualified."], ["Mental health / stress", "Breathwork, therapy, meditation and nervous-system regulation.", "Stress load changes recovery; empathy matters."], ["Environment", "Air quality, mould awareness, daylight, noise and EMF concerns.", "Customers in chronic illness communities may care deeply about environmental load."]]}]}, {"title": "18. Equipment fundamentals and technology language", "blocks": [{"t": "p", "text": "How Oxydise should talk about technology"}, {"t": "p", "text": "The aim is to sound knowledgeable, precise and premium without sounding aggressive about competitors. Explain engineering principles clearly. Do not call another company cheap, do not name competitors in a negative way and do not publish manufacturer comparisons or percentage claims unless Oxydise has test data and approval."}, {"t": "h3", "text": "18.1 HBOT equipment basics"}, {"t": "table", "head": ["Term", "What it means"], "rows": [["Oxygen concentrator", "A device that takes room air and uses zeolite molecular sieves to trap nitrogen, leaving concentrated oxygen, often around 90-96%, to flow to the user."], ["Sieve beds", "Zeolite-filled beds inside the concentrator. They are responsible for nitrogen adsorption and oxygen concentration."], ["Zeolite", "A mineral with microscopic cage-like pores that trap nitrogen molecules more readily than oxygen under pressure."], ["Compressor", "Supplies air to pressurise the chamber. The chamber should not be inflated with pure oxygen."], ["Mask / hood", "The delivery route for concentrated oxygen. The chamber is pressurised with air; oxygen is usually delivered separately."], ["Flow rate (LPM)", "Litres per minute of oxygen flow. Higher flow does not automatically mean better if the mask, seal, pressure and protocol are not right."], ["Pressure gauge", "Shows chamber pressure. Users should not exit until pressure returns to zero."], ["Pressure relief valve", "Safety valve that prevents over-pressurisation. Never cover it during operation."], ["Compression / decompression", "The gradual increase/decrease in pressure at the start and end of the session. Important for ear comfort and safety."]]}, {"t": "p", "text": "Safety line from equipment manual"}, {"t": "p", "text": "Never inflate the chamber using pure oxygen alone. Use compressed air for chamber pressure and oxygen through the intended breathing circuit. Keep flammables and sharp objects out of the chamber and follow device instructions."}, {"t": "h3", "text": "18.2 How the oxygen concentrator works - the proper explanation"}, {"t": "p", "text": "A good simple explanation: the concentrator pulls in room air, then uses zeolite molecular sieves to separate nitrogen from oxygen. Air is mostly nitrogen and oxygen. The zeolite structure acts like a microscopic cage that captures nitrogen under pressure, allowing oxygen-rich gas to pass through to the mask."}, {"t": "p", "text": "Within a typical oxygen concentrator there are two zeolite-filled sieve beds. The system alternates between them every few seconds. While one bed is online and pressurised, it captures nitrogen and allows oxygen to pass through. At the same time, the second bed is depressurised, releasing the nitrogen it captured and regenerating itself for the next cycle. The beds keep switching, which creates a continuous supply of concentrated oxygen."}, {"t": "table", "head": ["Quality factor", "Why it matters", "Customer-safe way to say it"], "rows": [["Zeolite quality", "Not all zeolite performs the same. Purity, structure and adsorption capacity affect nitrogen capture.", "“The material inside the sieve beds matters, not just the box around it.”"], ["Quantity of zeolite", "Too little zeolite can reduce reserve capacity and make performance less stable under load.", "“We care about consistent output, not only headline specifications.”"], ["Moisture management", "Moisture is one of the biggest enemies of zeolite. Water vapour can occupy adsorption sites and reduce nitrogen capture efficiency.", "“Good moisture control helps protect oxygen purity over time.”"], ["Engineering and cycling", "Valve timing, pressure swing stability and airflow design all affect how well the concentrator regenerates its sieve beds.", "“The concentrator has to work consistently session after session.”"], ["Long-term oxygen purity", "The real difference is not only oxygen purity on day one; it is whether the system maintains performance over months and years.", "“We focus on engineering that keeps oxygen delivery stable over the long term.”"]]}, {"t": "p", "text": "Customer script - concentrator quality"}, {"t": "p", "text": "“Inside the oxygen concentrator are zeolite sieve beds. Their job is to remove nitrogen from room air so the mask receives oxygen-rich air. The quality of those sieve beds, the amount of zeolite, moisture control and the engineering around the cycling process all affect how consistent the oxygen output remains over time. That is why we focus on build quality and long-term performance, not just headline numbers.”"}, {"t": "h3", "text": "18.3 Red Light equipment basics"}, {"t": "table", "head": ["Term", "What it means"], "rows": [["LED count", "Number of LEDs. Useful, but less important than wavelength, irradiance, lens angle, thermal control and verified output."], ["Wavelength blend", "The mix of red and NIR wavelengths. Common useful bands include 630, 660, 810, 830 and 850 nm."], ["LED binning / quality control", "Manufacturers sort LEDs by wavelength and output tolerance. Tighter tolerances improve consistency."], ["Lens angle", "How tightly or widely light is directed. Affects intensity and coverage."], ["Irradiance claim", "Power per cm2. Always ask at what distance and how it was measured."], ["Power draw vs output", "Electrical wattage is not the same as light delivered to the body."], ["Pulse / frequency", "Some devices allow pulsed light. Interesting, but do not turn frequency settings into unapproved claims."], ["Thermal management", "Good LEDs require heat control. Heat is not the main therapeutic mechanism of PBM; it is something that must be managed to protect performance."]]}, {"t": "h3", "text": "18.4 Why LED quality and thermal regulation matter"}, {"t": "p", "text": "In Red Light Therapy, the value is not just that the bed turns red or looks powerful. The value is delivering the intended wavelengths and output consistently, session after session. LED choice, manufacturing quality, driver design, lensing, spacing and thermal regulation all affect the real dose reaching the user."}, {"t": "table", "head": ["Issue", "Why it matters", "How Oxydise should say it"], "rows": [["LED manufacturer and binning", "Lower-cost LEDs often have wider tolerances in wavelength and output. Better sourcing and tighter binning help keep the device closer to the intended wavelength profile.", "“We pay attention to LED quality and wavelength consistency, because photobiomodulation depends on the right light signal.”"], ["Headline lifespan claims", "Claims such as 50,000 or 100,000 hours only mean much if heat, current and operating conditions are well controlled.", "“LEDs can last a long time, but only if they are driven and cooled properly.”"], ["Thermal drift", "Heat can affect LED performance. Poor thermal regulation can lead to output changes or wavelength drift over time.", "“Thermal control protects consistency. It is one reason engineering detail matters.”"], ["Wavelength stability over months of use", "Internal experience suggests lower-quality systems can move away from the stated wavelength over time. Do not publish a percentage unless backed by Oxydise test data.", "“We are careful about verified output, not just brochure numbers.”"], ["Verified output", "Real performance should be measured at the correct distance and operating temperature.", "“The question is not only how strong it is, but what dose and wavelengths are actually delivered.”"]]}, {"t": "p", "text": "Customer script - red light quality"}, {"t": "p", "text": "“With red light beds, the quality of the LEDs and the way heat is managed are critical. Photobiomodulation depends on the body receiving the intended wavelengths at a consistent output. Some systems sound impressive because they quote long LED lifespans or high power numbers, but without good thermal regulation the real wavelength and output can drift over time. We focus on stable, measured performance, not just impressive headline specs.”"}, {"t": "h3", "text": "18.5 Competitor-safe language"}, {"t": "table", "head": ["Internal instinct", "Better customer-facing phrasing"], "rows": [["“Competitor equipment is cheap.”", "“There can be big differences in engineering quality, materials and long-term output stability.”"], ["“They use poor LEDs.”", "“Not all LEDs are the same. Wavelength tolerance, heat management and measured output matter.”"], ["“Their concentrator will drop purity.”", "“Moisture control, sieve-bed quality and servicing all influence whether oxygen purity stays consistent.”"], ["“Our equipment is better because theirs is Chinese.”", "“We focus on product quality, design detail, verified performance and support.”"], ["“The wavelength will drift by 20%.”", "“Lower-quality systems can drift materially over time. We should only use exact percentages when we have test evidence and approval.”"]]}, {"t": "p", "text": "Premium positioning line"}, {"t": "p", "text": "“Oxydise is not just selling equipment. We are building a standard around performance, support and consistency over time.”"}, {"t": "h3", "text": "18.6 Glossary"}, {"t": "table", "head": ["Term", "Meaning"], "rows": [["Angiogenesis", "Growth of new blood vessels."], ["ATP", "Adenosine triphosphate, the cell’s energy currency."], ["BDNF", "Brain-derived neurotrophic factor, involved in brain plasticity and neuronal support."], ["Cytochrome c oxidase", "A mitochondrial enzyme often discussed as a PBM chromophore."], ["Cytokines", "Immune signalling molecules involved in inflammation and repair."], ["Fluence", "Total energy delivered by light per cm2, measured as J/cm2."], ["H2", "Molecular hydrogen gas, the form discussed in hydrogen water and hydrogen therapy research."], ["HIF-1 alpha", "Hypoxia-inducible factor, a signalling protein activated by low oxygen states."], ["Hyperoxia", "Higher-than-normal oxygen exposure."], ["Hypoxia", "Low oxygen availability in tissue."], ["Irradiance", "Light power arriving at a surface per cm2."], ["Mitochondria", "Cellular structures that help produce ATP and regulate energy metabolism."], ["Nitric oxide", "A signalling molecule involved in blood flow and mitochondrial function."], ["Partial pressure", "The pressure exerted by a specific gas in a mixture."], ["PBM", "Photobiomodulation, the biological effect of specific light exposure."], ["PEMF", "Pulsed electromagnetic field."], ["PSA", "Pressure swing adsorption, the concentrator process that alternates pressure across sieve beds to separate gases."], ["ROS", "Reactive oxygen species; damaging in excess but also useful as signalling molecules."], ["Senescent cells", "Cells that no longer divide normally and can contribute to inflammatory signalling."], ["Sieve bed", "A zeolite-filled part of an oxygen concentrator that adsorbs nitrogen and helps concentrate oxygen."], ["Stem/progenitor cells", "Repair-associated cells with regenerative potential."], ["VEGF", "Vascular endothelial growth factor, involved in blood vessel growth."], ["Zeolite", "Mineral used in oxygen concentrators to separate nitrogen from air."]]}]}, {"title": "19. Prominent Oxydise-associated people and projects", "blocks": [{"t": "p", "text": "Consent and usage rule"}, {"t": "p", "text": "Only mention a person if their relationship/story is publicly approved or specifically approved internally. Do not discuss private health information. Use a name to build context, not to pressure a customer."}, {"t": "table", "head": ["Name / project", "Who they are", "Conversation relevance", "When to mention"], "rows": [["Anthony Elanga", "Professional footballer", "Sports performance / recovery credibility.", "Mention only approved public wording; useful with footballers and performance customers."], ["Ola Aina", "Professional footballer", "Elite sport recovery credibility.", "Use only approved public wording."], ["Ben Whittaker", "Professional boxer", "Combat sport recovery and marginal gains.", "Use only approved public wording."], ["Joseph Parker", "Professional boxer / former heavyweight champion", "High-performance recovery story.", "Use only approved public wording."], ["Gorka Marquez", "Professional dancer / Strictly Come Dancing", "Dance, performance, energy and recovery.", "Use for performance/lifestyle context if public and approved."], ["Tom Stoltman / Stoltman Brothers", "World-class strength athletes", "Strength, training load and recovery.", "Use only approved public wording."], ["Philly Bowden", "Elite marathon runner", "Endurance recovery and resilience.", "Use if public and approved."], ["Harry Aikines-Aryeetey", "Elite sprinter", "Speed, power and recovery.", "Use if public and approved."], ["Sam Kerr", "Professional footballer", "Women’s football / elite recovery context.", "Verify current public approval before using."], ["Louise Proddow", "Customer story on Oxydise website", "Post-procedure recovery anecdote.", "Use only as anecdote and with approved copy."], ["Jeremy McConnell", "Public figure/customer story on website", "Biohacking / baseline optimisation.", "Use only approved public wording."], ["Lynne", "Customer story", "Cancer-related story.", "Use only with consent and approved wording. Never imply cancer treatment."], ["Tom Joice", "Public/customer association to confirm", "To be completed internally.", "Verify exact relationship and approval before publication."], ["Diane Budwell / Dianne Buswell", "Professional dancer / public figure - spelling to confirm internally", "Dance, performance, energy and recovery context.", "Add once spelling, relationship and approved wording are confirmed."], ["Clair Turner / Claire Turner", "Customer story - spelling to confirm", "Cancer-related story / resilience and energy.", "Use only with consent and approved wording."], ["Lone’er Kavanagh", "Professional MMA athlete; documentary project in progress", "Combat sport, performance, recovery and storytelling.", "Mention only as “documentary project in progress” if approved. Do not publish details until cleared."], ["Beyond The Pill: The Path to Longevity", "Amazon/documentary involvement", "Oxydise took part / chamber featured in the documentary.", "Use approved line: “Oxydise’s hyperbaric chamber featured in Beyond The Pill: The Path to Longevity.” Avoid implying endorsement or clinical proof."]]}, {"t": "p", "text": "Best moment to use names"}, {"t": "p", "text": "Mention prominent customers only after listening to the customer goal. Athletes care about recovery and consistency; beauty customers care about skin and confidence; chronic illness customers care about safety and empathy. Do not name-drop before the customer feels heard."}]}, {"title": "21. Reference list", "blocks": [{"t": "p", "text": "Reference links are for internal checking and context. Some links point to studies; others are public education, podcasts, internal learning portals or internal source documents. Only primary studies or approved Oxydise pages should be used to substantiate customer-facing claims."}, {"t": "p", "text": "1. FDA - safe use of HBOT devices: [[Open||https://www.fda.gov/medical-devices/letters-health-care-providers/follow-instructions-safe-use-hyperbaric-oxygen-therapy-devices-letter-health-care-providers]]"}, {"t": "p", "text": "2. UHMS - HBO indications: [[Open||https://www.uhms.org/resources/featured-resources/hbo-indications.html]]"}, {"t": "p", "text": "3. StatPearls - HBOT contraindications: [[Open||https://www.ncbi.nlm.nih.gov/books/NBK557661/]]"}, {"t": "p", "text": "4. StatPearls - Hyperbaric physics: [[Open||https://www.ncbi.nlm.nih.gov/books/NBK448104/]]"}, {"t": "p", "text": "5. Thom et al. - Stem cell mobilisation by hyperbaric oxygen: [[Open||https://pubmed.ncbi.nlm.nih.gov/16299259/]]"}, {"t": "p", "text": "6. Hachmo et al. - HBOT, telomeres and immunosenescence: [[Open||https://pubmed.ncbi.nlm.nih.gov/33206062/]]"}, {"t": "p", "text": "7. Zilberman-Itskovich et al. - HBOT for post-COVID condition: [[Open||https://www.nature.com/articles/s41598-022-15565-0]]"}, {"t": "p", "text": "8. Hadanny et al. - Cognitive enhancement and cerebral blood flow: [[Open||https://pubmed.ncbi.nlm.nih.gov/32589613/]]"}, {"t": "p", "text": "9. de Freitas and Hamblin - PBM mechanisms: [[Open||https://pubmed.ncbi.nlm.nih.gov/28070154/]]"}, {"t": "p", "text": "10. Quirk et al. - Light, cytochrome c oxidase and nitric oxide: [[Open||https://pubmed.ncbi.nlm.nih.gov/32716711/]]"}, {"t": "p", "text": "11. Huang et al. - Biphasic dose response in low-level light therapy: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC3315174/]]"}, {"t": "p", "text": "12. UCL / Glen Jeffery - Morning deep red light and eyesight: [[Open||https://www.ucl.ac.uk/news/2021/nov/morning-exposure-deep-red-light-improves-declining-eyesight]]"}, {"t": "p", "text": "13. Wunsch and Matuschka - Red and NIR light for skin: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC3926176/]]"}, {"t": "p", "text": "14. Hamblin - PBM anti-inflammatory effects: [[Open||https://pubmed.ncbi.nlm.nih.gov/28748217/]]"}, {"t": "p", "text": "15. Sonners - comparative mild vs high-pressure HBOT cytokine analysis: [[Open||https://www.researchgate.net/publication/389431285_Comparative_Analysis_Effects_of_Mild_and_High-Pressure_Hyperbaric_Oxygen_Therapy_HBOT_on_Cytokine_Modulation_both_Immune_and_Inflammatory_Pathways]]"}, {"t": "p", "text": "16. Oxydise - full guide to HBOT: [[Open||https://oxydise.co.uk/blogs/studies/full-guide-to-hyperbaric-oxygen]]"}, {"t": "p", "text": "17. Oxydise - safety: [[Open||https://oxydise.co.uk/pages/safety]]"}, {"t": "p", "text": "18. Oxydise homepage: [[Open||https://oxydise.co.uk/]]"}, {"t": "p", "text": "19. Alan Trim with Oli Patrick - Modern Wellness Podcast: [[Open||https://shows.acast.com/modern-wellness-podcast/episodes/129-hyperbarics-game-changing-recovery-oxydises-alan-trim-in]]"}, {"t": "p", "text": "20. Dr Mark Hyman / Dr Scott Sherr - HBOT: [[Open||https://www.youtube.com/watch?v=uaZNFWb9pxg]]"}, {"t": "p", "text": "21. Huberman Lab - Using light to optimise health: [[Open||https://www.youtube.com/watch?v=UF0nqolsNZc]]"}, {"t": "p", "text": "22. Bryan Johnson - India air pollution and HBOT: [[Open||https://www.youtube.com/watch?v=XVJaqRSrEZA]]"}, {"t": "p", "text": "23. Emeran Mayer - The Mind-Gut Connection: [[Open||https://emeranmayer.com/the-mind-gut-connection-2/]]"}, {"t": "p", "text": "24. David Sinclair - Lifespan: [[Open||https://lifespanbook.com/]]"}, {"t": "p", "text": "25. Ben Greenfield - Boundless: [[Open||https://boundlessbook.com/]]"}, {"t": "p", "text": "26. Kelly Turner - Radical Remission books: [[Open||https://www.radicalremission.com/the-books]]"}, {"t": "p", "text": "27. Alan Trim - personal site and story: [[Open||https://www.alantrim.com/]]"}, {"t": "p", "text": "28. HBOT USA - research by category: [[Open||https://hbotusa.com/hbot-research-by-category/]]"}, {"t": "p", "text": "29. Hydrogen Water Studies: [[Open||https://hydrogenwaterstudies.com/]]"}, {"t": "p", "text": "30. Brain photobiomodulation narrative review: [[Open||https://pubmed.ncbi.nlm.nih.gov/29327206/]]"}, {"t": "p", "text": "31. Transcranial photobiomodulation for brain diseases: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC10840571/]]"}, {"t": "p", "text": "32. Vielight Neuro Gamma 4 product information: [[Open||https://www.vielight.com/devices/vielight-neuro-gamma/]]"}, {"t": "p", "text": "33. Molecular hydrogen / hydrogen water review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC10816294/]]"}, {"t": "p", "text": "34. Ohsawa et al. 2007 - Hydrogen acts as a therapeutic antioxidant: [[Open||https://pubmed.ncbi.nlm.nih.gov/17486089/]]"}, {"t": "p", "text": "35. Johnsen et al. 2023 - Molecular hydrogen therapy clinical studies review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC10707987/]]"}, {"t": "p", "text": "36. Sim et al. 2020 - Hydrogen-rich water RCT in healthy adults: [[Open||https://www.nature.com/articles/s41598-020-68930-2]]"}, {"t": "ul", "items": ["Li et al. 2024 - Molecular hydrogen and exercise oxidative stress meta-analysis: [[Open||https://www.frontiersin.org/journals/nutrition/articles/10.3389/fnut.2024.1328705/full]]", "UHMS summary of FDA-cleared HBOT conditions: [[Open||https://www.uhms.org/hu/resources/news-announcements/1104-fda-recommends-uhms-accredited-hyperbaric-facilities-for-treatment-of-specific-illnesses.html]]", "CMS National Coverage Determination 20.29 - Hyperbaric Oxygen Therapy: [[Open||https://www.cms.gov/medicare-coverage-database/view/ncd.aspx?ncdid=12]]", "Moen and Stuhr 2012 - Hyperbaric oxygen therapy and cancer, a review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC3510426/]]", "Feldmeier et al. 2003 - Hyperbaric oxygen and malignancy review: [[Open||https://www.uhms.org/images/MEDFAQs/October-21-2016/Feldmeier_HBO_and_Malignancy.pdf]]", "Boulefour et al. 2021 - Hypoxia and radioresistance in cancer: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC8573967/]]", "Sletta et al. 2017 - Oxygen-dependent regulation of tumour growth and metastasis under HBOT in breast cancer models: [[Open||https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0183254]]", "Demir et al. 2025 - HBOT for managing cancer-treatment complications: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC11943617/]]"]}, {"t": "p", "text": "38. Molecular Hydrogen Institute - human studies library: [[Open||https://molecularhydrogeninstitute.org/human-studies/]]"}, {"t": "p", "text": "39. PEMF comprehensive review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC11205752/]]"}, {"t": "p", "text": "40. Grounding review: [[Open||https://pmc.ncbi.nlm.nih.gov/articles/PMC4378297/]]"}, {"t": "p", "text": "41. Oxygen concentrator molecular sieve basics: [[Open||https://www.oxidationtech.com/downloads/Applications/How-Oxygen-Concentrators-Work/Molecular-Sieve-Animation-Basics.pdf]]"}, {"t": "p", "text": "42. Zeolite molecular sieve oxygen production system: [[Open||https://www.mdpi.com/2227-9717/11/1/124]]"}, {"t": "p", "text": "43. LED thermal management and wavelength stability context: [[Open||https://tech-led.com/how-near-infrared-leds-are-revolutionizing-medical-devices/]]"}, {"t": "p", "text": "44. Hydrogen-rich water and exercise performance review: [[Open||https://www.mdpi.com/2218-1989/14/10/537]]"}, {"t": "p", "text": "45. Beyond The Pill documentary site: [[Open||https://thelongevity.network/]]"}]}, {"title": "Resource page reference (from the SOP)", "blocks": [{"t": "p", "text": "Title this “Oxydise Education: what everyone at Oxydise should know.” Keep it controlled - not a dumping ground for 200 links nobody reads. Much of this content already exists in the three companion documents; this page is the index to them."}, {"t": "h3", "text": "Structure"}, {"t": "ul", "items": ["Start here - required for everyone.", "Product knowledge; safety and contraindications; customer categories.", "Sales and customer conversations; research, studies and articles; books and long-form learning.", "Competitor and market awareness; brand, tone and messaging; role-specific learning."]}, {"t": "h3", "text": "Resource card format"}, {"t": "ul", "items": ["Title; type (website, PDF, article, study, video, book or internal note); topic.", "Required for: Everyone, Sales, Olga, Drivers, Petro, Egor, Giles or Directors.", "Reading time; why it matters; how to use it with customers.", "Can this be quoted externally? Yes / No / Needs approval. Owner; last reviewed."]}, {"t": "h3", "text": "Required for everyone"}, {"t": "table", "head": ["Resource", "Why it matters", "Where it lives"], "rows": [["Mission, values and proposition", "Everyone explains Oxydise consistently.", "Learning Portal §1"], ["Brand guidelines / tone", "Keeps tone calm, credible and practical.", "Learning Portal §1–2"], ["HBOT basics", "Everyone understands the main technology.", "Learning Portal §4 / HBOT Study Guide"], ["Red Light Therapy basics", "Everyone understands the second core pillar.", "Learning Portal §5"], ["Safety and contraindication guide", "Prevents unsafe or inconsistent advice.", "HBOT Study Guide; Sales Call Bible §4"], ["Customer-journey overview", "Everyone understands how their role fits.", "This document"], ["Approved claims wording", "Prevents exaggerated or non-compliant messaging.", "Learning Portal §3; Sales Call Bible §3"], ["Top customer questions", "Helps everyone answer consistently.", "Sales Call Bible; Learning Portal"], ["Review / testimonial process", "Everyone understands why reviews matter and how to ask.", "§5–6 and §12 of this document"]]}, {"t": "h3", "text": "Product knowledge, research and books"}, {"t": "ul", "items": ["Product knowledge: HBOT and RLT explainers, product pages, setup videos, FAQs, contraindications and study summaries; hydrogen tablets (approved explanation only); chamber types; finance / rent-to-buy; the Wellness Lab.", "Research and studies: a curated library at three levels - Essential, Role-specific, Advanced - each with a plain-English summary of what it supports, what it does not prove, how to talk about it safely, and who approved it.", "Books and long-form learning: internal education only, not automatic evidence for customer claims."]}, {"t": "h3", "text": "Related learning"}, {"t": "p", "text": "→ This page should mostly link out: the HBOT Study Guide (science), the Learning Portal (education, decoder, equipment, guardrails) and the Sales Call Bible (conversations). Keep it as an index, not a second copy."}]}], "toc": true}, "sales": {"type": "doc", "hero": ["OXYDISE", "Sales Call Bible", "First calls · explaining the technology · safe language · follow-up · CRM", "For the Oxydise sales team - how we listen, explain and sell with confidence, clarity and care.", "Internal sales training. Draft - needs final director / compliance review before being treated as approved customer-facing wording.", "v0.9 draft · June 2026 · companion to the HBOT Study Guide and the Colleague Learning Portal"], "sections": [{"title": "How to use this guide", "blocks": [{"t": "p", "text": "This is the practical playbook for an Oxydise salesperson: how to run a first call, explain HBOT and Red Light safely, use customer stories responsibly, handle objections, and follow up properly. The aim isn’t a robotic script - it’s a consistent standard: calm, expert, empathetic, clear and commercially disciplined."}, {"t": "callout", "label": "Your two learning bibles", "text": "This guide is about selling. For the underlying knowledge, lean on the two companion documents:\nHBOT Study Guide - the full science: physics, mechanisms, indications, contraindications and safety.\nColleague Learning Portal - the claim guardrails (§3), the plain-English decoder (§2.1), equipment detail and competitor-safe language (§18).\nWhen a customer goes deep on science, or you’re unsure how to phrase something, that’s where you turn. This guide points to them throughout."}, {"t": "callout", "label": "The one-line rule", "text": "Every lead must be captured, called, qualified, safety-checked, followed up, and given a next task."}]}, {"title": "1. Non-negotiables for every call", "blocks": [{"t": "p", "text": "These standards apply to every serious enquiry, whatever the source - website, Shopify, WhatsApp, phone, Instagram, referral, Wellness Lab or B2B."}, {"t": "table", "head": ["Non-negotiable", "What it means in practice"], "rows": [["Every lead goes into the CRM", "Even wrong-fit calls are logged - they improve website wording, ads and lead quality."], ["Every customer has an owner", "Sales owns the lead until the order form, Shopify delivery form or admin handover is complete."], ["Every customer has a next action", "No call ends without a next task, follow-up date or handover."], ["Ask why they enquired", "Understand the customer before explaining any product."], ["Ask the safety questions", "Use the approved contraindication wording. Pause and escalate if anything is unclear."], ["No medical advice", "Do not diagnose, recommend treatment, change medication advice or promise outcomes."], ["Use approved language", "Explain mechanisms and support safely. Do not improvise medical claims."], ["Tailor the follow-up", "Send only the relevant documents. Do not overwhelm the customer."], ["Record what was discussed", "Source, category, product interest, reason, safety status, buying route, access notes and next task."], ["The sales mindset\nThis is a consultation, not a pitch. The customer should feel listened to, reassured and clear on what happens next.", "The sales mindset\nThis is a consultation, not a pitch. The customer should feel listened to, reassured and clear on what happens next."]]}]}, {"title": "2. The Oxydise way of communicating", "blocks": [{"t": "p", "text": "Oxydise should sound calm, credible, considered and practical. Be confident without being pushy, scientific without becoming clinical, and empathetic without becoming vague or over-emotional."}, {"t": "table", "head": ["Value", "How it sounds on a call", "Behaviour to show"], "rows": [["Trust", "“I’ll be honest about what we can and cannot say.”", "Be transparent on price, safety, fit, limitations and next steps."], ["Empathy", "“Tell me what has led you to look at this now.”", "Listen first. Repeat back what matters to the customer."], ["Relationships", "“We support you before, during and after delivery.”", "Do not disappear after payment. Build long-term trust."], ["Curiosity", "“Let me understand the background before recommending anything.”", "Ask better questions. Learn from each enquiry."], ["Detail", "“Let’s check the room, access, safety and usage plan properly.”", "Use checklists, record notes, do not guess."], ["Innovation", "“We’re constantly improving the equipment with our partners.”", "Position Oxydise as improving the category, not chasing trends."], ["Tone rule\nAvoid hype. Avoid false urgency. Avoid “this will fix you”. Lead with the mechanism and let the customer decide.\nUseful phrases: “supports”, “designed to”, “research suggests”, “customers report” and “we will guide you”.", "Tone rule\nAvoid hype. Avoid false urgency. Avoid “this will fix you”. Lead with the mechanism and let the customer decide.\nUseful phrases: “supports”, “designed to”, “research suggests”, “customers report” and “we will guide you”.", "Tone rule\nAvoid hype. Avoid false urgency. Avoid “this will fix you”. Lead with the mechanism and let the customer decide.\nUseful phrases: “supports”, “designed to”, “research suggests”, “customers report” and “we will guide you”."]]}, {"t": "h3", "text": "2.1 Listening and empathy framework"}, {"t": "p", "text": "Use this when a customer is anxious, unwell, cynical, technical, or has had poor support elsewhere."}, {"t": "table", "head": ["Step", "What to do", "Example wording"], "rows": [["Acknowledge", "Recognise the reason for the call without exaggeration.", "“That sounds like it has been a difficult period.”"], ["Clarify", "Ask precise questions rather than assuming.", "“When you say fatigue, is that physical, cognitive, or both?”"], ["Reflect", "Repeat back the main goal.", "“So the main goal isn’t just energy, it’s getting back to work reliably.”"], ["Guide", "Explain the next step simply.", "“I’ll explain what HBOT can support, then we’ll check whether it’s suitable.”"], ["", "", ""]]}]}, {"title": "3. Customer-safe language and claim guardrails", "blocks": [{"t": "p", "text": "This section is the standard the whole company works to. It is taken from the Colleague Learning Portal, Section 3, and it governs every customer conversation. When in doubt, default to it."}, {"t": "table", "head": ["The Oxydise language rule\nConfident about mechanisms. Responsible about outcomes. Clear about safety.\nLead with what is known: oxygen under pressure increases dissolved oxygen in plasma; pressure changes gas behaviour; oxygen is required for mitochondrial ATP production, collagen synthesis, white-cell oxidative killing and many repair pathways; red and near-infrared light act through photobiomodulation pathways; dose, timing and suitability matter.\nThe uncertainty is never whether the mechanism exists. It is how strongly an individual will respond, how many sessions they need, what else is driving their situation, and whether the use is on-label, off-label, wellness-led, clinician-led or internal education only.", "The Oxydise language rule\nConfident about mechanisms. Responsible about outcomes. Clear about safety.\nLead with what is known: oxygen under pressure increases dissolved oxygen in plasma; pressure changes gas behaviour; oxygen is required for mitochondrial ATP production, collagen synthesis, white-cell oxidative killing and many repair pathways; red and near-infrared light act through photobiomodulation pathways; dose, timing and suitability matter.\nThe uncertainty is never whether the mechanism exists. It is how strongly an individual will respond, how many sessions they need, what else is driving their situation, and whether the use is on-label, off-label, wellness-led, clinician-led or internal education only.", "The Oxydise language rule\nConfident about mechanisms. Responsible about outcomes. Clear about safety.\nLead with what is known: oxygen under pressure increases dissolved oxygen in plasma; pressure changes gas behaviour; oxygen is required for mitochondrial ATP production, collagen synthesis, white-cell oxidative killing and many repair pathways; red and near-infrared light act through photobiomodulation pathways; dose, timing and suitability matter.\nThe uncertainty is never whether the mechanism exists. It is how strongly an individual will respond, how many sessions they need, what else is driving their situation, and whether the use is on-label, off-label, wellness-led, clinician-led or internal education only."], "rows": [["Old phrasing to reduce", "Old phrasing to reduce", "Better Oxydise phrasing"], ["Passive anecdote language", "Passive anecdote language", "“We have customers who have told us…”"], ["“This supports recovery…”", "“This supports recovery…”", "“The mechanism supports recovery biology by improving oxygen availability, circulation, inflammatory signalling or cellular energy. Individual outcomes still vary.”"], ["Vague evidence hedging", "Vague evidence hedging", "“The mechanism is well understood. The clinical evidence is strongest in [recognised indication] and still developing in [off-label area].”"], ["“It can help…”", "“It can help…”", "“The biological rationale is…” / “The mechanism we’re interested in is…”"], ["“We can’t say much because it’s off-label.”", "“We can’t say much because it’s off-label.”", "“Off-label doesn’t mean random. It means we explain the mechanism, the evidence level and the safety boundary without promising a treatment outcome.”"], ["“It’s not proven, so be careful.”", "“It’s not proven, so be careful.”", "“The mechanism is strong, but the clinical evidence isn’t equal across every condition. We explain the difference clearly.”"], ["Plain-English version:  be positive about the mechanism, but do not promise the customer’s result.", "Plain-English version:  be positive about the mechanism, but do not promise the customer’s result."]]}, {"t": "h3", "text": "3.1 The one-sentence rule"}, {"t": "callout", "label": "We can explain how the technology works, where it is established, where it is being used off-label, what mechanisms make biological sense and what our customers have told us - but we do not diagnose, prescribe, replace a clinician or guarantee outcomes.", "text": ""}, {"t": "h3", "text": "3.2 On-label, off-label and internal education"}, {"t": "table", "head": ["Category", "What it means", "How Oxydise talks about it"], "rows": [["On-label / recognised medical use", "A use recognised by regulators or medical bodies for appropriate HBOT equipment and clinical settings - e.g. decompression sickness, carbon monoxide poisoning, selected diabetic wounds, delayed radiation injury.", "“HBOT is established in medicine for specific indications. The mechanism is oxygen under pressure, and the clinical use is defined by protocols, screening and supervision.”"], ["Off-label clinical or wellness use", "A use outside the formal indication list, where practitioners or researchers use HBOT because the mechanism fits the biology of the problem.", "“This is a mechanism-led use."], ["Internal education only", "Topics that help colleagues understand the sector but are not sales claims without approval - strong disease claims, cancer protocols, peptides, complex neurological disease, specific medication interactions.", "“This is useful for our understanding. It isn’t a customer claim or a protocol unless approved.”"], ["Customer story", "A real customer or athlete experience, used only with permission and approved wording.", "“We have customers who have told us…” - never “this will happen for you.”"]]}, {"t": "h3", "text": "3.3 Why clinical evidence can lag behind the mechanism"}, {"t": "p", "text": "HBOT is harder to study than a tablet. A proper trial needs expensive equipment, repeated sessions, consistent pressure and oxygen delivery, trained operators, credible sham controls, objective outcomes and long follow-up. Oxygen isn’t a patent-protected drug, so the commercial incentive for large pharmaceutical-style trials is weaker. That doesn’t make the mechanism weak - it means we separate three things:"}, {"t": "ul", "items": ["Mechanism strength - what oxygen under pressure clearly does biologically.", "Clinical evidence strength - how much trial evidence exists for a specific condition and protocol.", "Customer outcome certainty - what we can responsibly predict for one person."]}, {"t": "p", "text": "A useful internal analogy is the wound model. HBOT is established in wound care because wounds involve hypoxia, poor microcirculation, inflammation, infection risk, collagen demand and impaired repair. Many internal disease processes share that wound-like biology, which is the logic behind many off-label conversations. It is a rationale, not a guarantee."}, {"t": "callout", "label": "Memorable internal phrase:", "text": "“Disease is often the absence of oxygen at tissue level.” Use it as a teaching lens, not a literal universal claim."}, {"t": "p", "text": "→ Full version, with the decoder for scientific terms: Colleague Learning Portal, §3 and §2.1."}, {"t": "h3", "text": "3.4 Confident customer language examples"}, {"t": "table", "head": ["Situation", "Stronger phrasing"], "rows": [["General HBOT explanation", "“HBOT is oxygen plus pressure. The pressure is what allows oxygen to dissolve into the plasma, so it can reach tissues beyond normal red-blood-cell delivery.”"], ["Customer asks whether it works", "“The mechanism is strong: oxygen under pressure improves oxygen availability, and oxygen is central to repair, energy and inflammation regulation. What varies is the individual response, which is why we think in blocks of sessions and track progress.”"], ["Customer asks about off-label use", "“That use isn’t an on-label medical indication, so we don’t present it as a treatment claim. The reason people look at HBOT there is the mechanism: oxygen delivery, inflammation signalling, mitochondrial energy and tissue repair.”"], ["Customer asks about cancer", "“Cancer is complex, and we don’t claim HBOT treats cancer. What we can say is that tumour hypoxia is an important area of cancer biology, HBOT is used in recognised ways for radiation injury, and cancer-related cases should be handled with oncology input and careful timing.”"], ["Customer asks about testimonials", "“We have customers who’ve told us they noticed changes in energy, sleep, focus, recovery or comfort. That helps us understand lived experience, but your response still depends on your situation and consistency.”"], ["Customer asks for medical advice", "“I can explain the mechanism and the process clearly, but I can’t make a personal medical decision for you. For your specific diagnosis, treatment plan or medication, we’d need clinician input.”"]]}, {"t": "h3", "text": "3.5 What not to say"}, {"t": "p", "text": "Do not say: “it cures”, “it treats every case”, “you will definitely feel X”, “ignore your doctor”, “everyone should do it”, “higher pressure is always better”, or “off-label means proven”."}, {"t": "p", "text": "Also avoid sounding frightened of the science. Don’t overuse “maybe”, “might”, “could possibly” or “some people say”. The Oxydise tone is confident, grounded and human."}]}, {"title": "4. Safety, contraindications and escalation", "blocks": [{"t": "callout", "label": "Non-negotiable safety statement", "text": "The salesperson must not diagnose, treat, prescribe, advise against oncology treatment, or promise outcomes. But they can listen and have conversations about these things, advice on general mechanisms and off label use of the tech, talk about what we think protocols are. Also can refer to Dr Masha where appropriate."}, {"t": "p", "text": "→ The full absolute and relative contraindication lists live in the HBOT Study Guide (safety section). This is the call-handling version."}, {"t": "h3", "text": "4.1 Medical-advice response"}, {"t": "callout", "label": "Use whenever a customer asks for personal medical advice", "text": "“That’s a medical question, so I wouldn’t want to give you the wrong advice. I can explain how the equipment works and what the process looks like, but for your specific situation it’s best to speak with a qualified clinician. Where appropriate, we can also arrange a consultation with Dr Masha.”"}, {"t": "h3", "text": "4.2 HBOT contraindication screen"}, {"t": "p", "text": "Ask these before progressing to rental, purchase or delivery. If any answer is yes or unclear, pause and escalate. – So the 4 main contraindications ask over the phone, the rest send via email for client to read."}, {"t": "table", "head": ["Question", "If yes / unsure"], "rows": [["Have you ever had a pneumothorax, collapsed lung, lung blebs or significant lung disease?", "Pause. Clinician review required."], ["Do you currently have a chest infection, fever, severe sinus infection or blocked ears?", "Delay until resolved or clinician confirms."], ["Have you had recent chest/thoracic surgery, or is any planned?", "Pause. Clinician review required."], ["Are you currently receiving chemotherapy? (We specifically screen for doxorubicin, cisplatin, bleomycin and disulfiram, which have HBOT interactions.)", "Pause. Oncology / clinician sign-off required."], ["Do you have COPD, emphysema, severe asthma or air-trapping lung issues?", "Pause. Clinician review required."], ["Do you have uncontrolled heart failure or serious cardiac instability?", "Pause. Clinician review required."], ["Do you have a seizure disorder or a history of oxygen sensitivity?", "Pause. Clinician review required."], ["Are you pregnant?", "Usually avoid unless medically indicated. Clinician route only."], ["Recent ear surgery, ear barotrauma, or difficulty equalising ear pressure?", "Delay or clinician review."], ["Do you have cataracts or pending cataract surgery?", "Advise discussion with clinician."]]}, {"t": "p", "text": "→ Drug interactions and the reasoning behind each contraindication are detailed in the HBOT Study Guide."}, {"t": "h3", "text": "4.3 Red Light Therapy safety screen"}, {"t": "table", "head": ["Question", "If yes / unsure"], "rows": [["Active or suspected cancer?", "Oncology-sensitive. Research shows that RL can be helpful with cancer, send study but its clients decision not ours. Would be careful with wording here."], ["Pregnant, especially full-body or abdominal exposure?", "Avoid unless clinician-approved."], ["Light-sensitive condition such as lupus or porphyria?", "Do not proceed without clinician advice."], ["Photosensitising medication (some antibiotics, acne or psychiatric medicines)?", "Pause and request clinician / pharmacist advice."], ["Epilepsy triggered by light?", "Avoid unless clinician-approved."], ["Recent Botox/fillers, burns, open wounds, severe migraine, implanted devices or severe heart condition?", "Use caution and seek medical advice."]]}, {"t": "h3", "text": "4.4 Claims framework - safe vs unsafe"}, {"t": "table", "head": ["Safe wording", "Unsafe wording"], "rows": [["“HBOT supports oxygen delivery and supports recovery, inflammation balance and tissue repair. There are studies that show this”", "“HBOT cures inflammation / cancer / long Covid / neurological conditions.”"], ["", ""], ["“Our customers report improvements in energy, sleep, focus or recovery, but you need to do a block of sessions.”", "“You will feel better after X sessions.”"], ["“RLT supports cellular energy and is used for skin, recovery and comfort goals.”", "“RLT treats disease.”"], ["“We can discuss protocols, but we don’t replace your clinician.”", "“Stop or change your medication or treatment plan.”"], ["Part B - The calls", "Part B - The calls"]]}, {"t": "p", "text": "The workflow, end to end: the first call, discovery, the Day-2 check-in, the two-week decision call, and the B2B route."}]}, {"title": "5. The full first-call structure", "blocks": [{"t": "p", "text": "A good first call has a shape. Keep it natural, but don’t skip a stage."}, {"t": "table", "head": ["Stage", "Purpose", "What to say / do"], "rows": [["1. Open warmly", "Create calm and permission.", "Confirm the time, thank them, explain Oxydise starts by understanding the goal rather than pushing equipment."], ["2. Set the agenda", "Give control.", "“I’ll ask a few questions, check suitability and safety, then explain the best route and next steps.”"], ["3. Understand why now", "Find motivation.", "Ask what triggered the enquiry, who it’s for, and what outcome matters most."], ["4. Categorise", "Choose route.", "Medical/recovery, sports, wellness/longevity, beauty/skin, B2B, existing, wrong lead, unknown."], ["5. Product interest", "Find starting point.", "HBOT, Red Light, both, small products, B2B or unsure."], ["6. Safety screen", "Protect customer and company.", "Ask contraindication questions. Say that you will email full list after the call."], ["7. Practical fit", "Avoid delivery problems.", "Room, access, space, power, mobility, stairs, hardshell access, red-light placement."], ["8. Explain Oxydise", "Build trust.", "Values, service model, rental/purchase, installation, support, product-development story."], ["9. Explain the relevant product", "Educate simply.", "Plain-English mechanism plus goal-relevant, approved support points."], ["10. Social proof", "Use carefully.", "Relevant customer stories only after discovery. Don’t name-drop early."], ["11. Commercial route", "Move forward clearly.", "Rental, purchase, rent-to-buy, finance, B2B route or director call."], ["12. Next step", "End with certainty.", "Email, documents, order form, delivery form, Dr Masha call, director call, callback task."], ["13. CRM update", "Make the process real.", "Source, reason, category, safety, documents, buying route, access notes, next action."]]}, {"t": "h3", "text": "5.2 If they are anxious or medically vulnerable"}, {"t": "callout", "label": "Slower, more empathetic version", "text": "“Before we talk about equipment, I just want to understand your situation properly. People come to us for very different reasons, so I don’t want to make assumptions.”\n“I can explain how the technology works and what the process looks like.”"}, {"t": "h3", "text": "5.3 If they are highly technical"}, {"t": "callout", "label": "Technical but controlled version", "text": "“It sounds like you’ve already done a fair bit of research. I’m happy to go deeper on pressure, oxygen delivery, wavelengths and protocols, but I’ll still start with your goal and safety, because that determines the sensible recommendation.”"}, {"t": "h3", "text": "5.4 If they are a Shopify customer"}, {"t": "callout", "label": "Shopify follow-up call", "text": "“Thanks for your order. The next step isn’t just delivery; we still like to check suitability, access and safe use so the setup goes smoothly.”\n“I’ll confirm why you chose this product, run through safety and delivery details, then Olga will manage the booking once the delivery form is complete.”"}]}, {"title": "6. Discovery questions and customer categories", "blocks": [{"t": "p", "text": "Discover the customer’s motivation before recommending a product or protocol."}, {"t": "table", "head": ["Area", "Questions to ask"], "rows": [["Source", "“How did you find Oxydise?” “Google, Instagram, referral, Wellness Lab, a customer, an athlete, or something else?”"], ["Reason", "“What made you enquire now?” “What are you hoping changes over the next few weeks or months?”"], ["User", "“Is this for you, someone else, or a business?”"], ["Goal", "“Is the priority recovery, fatigue, pain/inflammation, performance, sleep, skin, brain health, longevity, or business use?”"], ["Timeline", "“Is there a date or event you’re working towards?”"], ["Previous experience", "“Have you used HBOT, Red Light, sauna, cryotherapy or similar before?”"], ["Decision process", "“Are you comparing options, ready to rent/buy, or still learning?”"], ["Concerns", "“What are you unsure about: safety, claustrophobia, cost, whether it will work, maintenance, or number of sessions?”"], ["Practical fit", "“Where would it go? Ground floor or upstairs? Any narrow access? Power nearby? Who will use it?”"]]}, {"t": "h3", "text": "6.1 Customer categories"}, {"t": "table", "head": ["Category", "Meaning", "Sales route"], "rows": [["Medical / recovery", "Health, injury, cancer-related, fatigue, neurological, inflammation, surgery or recovery.", "Extra empathy, clear safety screen, approved wording, clinician escalation when needed."], ["Sports / performance", "Athlete, gym user, club, recovery, competition, injury or performance.", "Use recovery, consistency, training capacity and the athlete story bank."], ["Wellness / longevity", "Energy, sleep, focus, ageing well, optimisation, healthspan.", "Use values, consistency, routine and long-term health planning."], ["Beauty / skin", "Usually Red Light-led: skin, collagen, hair, tone, texture.", "Explain wavelengths, skin exposure, consistency and RLT contraindications."], ["B2B", "Clinic, practitioner, gym, sports club, wellness centre, hotel, airport or commercial partner.", "Ask business questions; suggest a director call for serious opportunities."], ["Existing customer", "Returning renter, buyer, support request or referral source.", "Check record, relationship history and current need before reselling."], ["Wrong lead", "Not suitable or not relevant.", "Still log reason and source."], ["Unknown", "Not enough information yet.", "Ask discovery questions; send general education only."]]}]}, {"title": "7. The Day-2 after-delivery call", "blocks": [{"t": "p", "text": "This is not a sales call. It is a trust, safety and usage call. It makes the customer feel supported and prevents confusion, non-use and avoidable returns."}, {"t": "table", "head": ["Stage", "What to do"], "rows": [["Prepare", "Read delivery notes, setup-video notes, equipment ID, product delivered, any concerns from the driver/Olga."], ["Open", "Thank them, check it’s a good time, explain the purpose is to make sure they’re comfortable."], ["Usage check", "Ask whether they’ve used it yet. If not, ask why - without judgement."], ["Practical check", "Setup, zips, mask/inhaler, timer, pressure, controls, red-light placement and goggles clear?"], ["Safety check", "Ask about ear pressure, dizziness, discomfort, anxiety, overheating, light sensitivity or technical issues."], ["Protocol guidance", "Reinforce the agreed starting pattern using approved guidance. Don’t improvise medical advice."], ["Support", "Resend video/guide if needed. Raise a maintenance ticket if anything is wrong."], ["Relationship", "Ask what they’re hoping to notice first and how they’ll track it."], ["Next action", "Set the follow-up task, note any issue, confirm who to contact."]]}, {"t": "h3", "text": "7.1 Day-2 call script"}, {"t": "callout", "label": "", "text": "“Hi [Name], it’s [Salesperson] from Oxydise. I’m just checking in after delivery to make sure everything’s comfortable and clear. This isn’t a sales call; it’s to make sure you feel supported.”\n“Have you had a chance to use the equipment yet? How did the first session feel - any ear pressure, discomfort, confusion, anxiety, light sensitivity or technical issue?”\n“Can you talk me through how you’re turning it on and running the session, just so I know the setup is clear?”\n“The key now is consistency and tracking how you respond. We’re not forcing intensity early; we’re building a safe routine. I’ll resend the guide and log today’s check-in, and if anything’s wrong technically I’ll raise it with maintenance rather than leaving you to troubleshoot alone.”"}, {"t": "h3", "text": "7.2 Day-2 follow-up message"}, {"t": "callout", "label": "", "text": "“Lovely speaking with you today. I’ve attached the usage guide again for easy reference. The main thing at this stage is to build a safe, consistent routine and to let us know quickly if anything feels unclear. I’ve logged your check-in and we’ll stay close during the rental.”"}, {"t": "h3", "text": "7.3 If the customer has not used it"}, {"t": "callout", "label": "Reassuring version", "text": "“That’s completely fine. Can I ask what stopped you - time, confidence, setup, anxiety, or something else? Let’s remove the blocker. I can resend the setup video, talk you through the first session, or arrange technical support if anything isn’t right.”"}, {"t": "h3", "text": "7.4 Day-2 CRM checklist"}, {"t": "ul", "items": ["Day-2 check-in complete: yes/no.", "Has the customer used the equipment: yes/no.", "Any symptoms, discomfort or anxiety.", "Any technical issue or maintenance ticket.", "Protocol discussed using approved guidance.", "Documents/video resent.", "Customer sentiment: confident / unsure / anxious / unhappy.", "Next action date."]}]}, {"title": "8. The two-weeks-before-collection call", "blocks": [{"t": "p", "text": "This call confirms whether the customer will buy, extend or return. It also captures feedback, understands outcomes, and keeps the relationship open."}, {"t": "table", "head": ["Stage", "What to do"], "rows": [["Prepare", "Check rental end date, payment status, usage notes, Day-2 notes, maintenance issues, goal and sentiment."], ["Open", "Explain the rental is approaching the decision point and you want to review how it’s gone."], ["Usage review", "How often they used it, what went well, what was difficult, what they noticed."], ["Outcome review", "Compare against the original goal. Use the customer’s language."], ["Decision", "Are they leaning towards buying, extending, returning or unsure?"], ["Commercial route", "Buy, extend, rent-to-buy, finance, 12-month option and processing fee - if current terms allow."], ["Objections", "Handle price, uncertainty, low usage, space, maintenance, partner decision, results."], ["Escalation", "Director approval for discounts, unusual terms, high-value customers, strategic B2B or complaints."], ["If returning", "Hand to Olga for collection; don’t treat the relationship as over."], ["If happy", "Ask for a review/testimonial/referral at the right moment."], ["CRM", "Log decision, sentiment, reason, next action and collection/buy/extend route."]]}, {"t": "h3", "text": "8.1 Two-week call script"}, {"t": "callout", "label": "", "text": "“Hi [Name], it’s [Salesperson] from Oxydise. Your rental is coming towards the decision point, so I wanted to check how it’s gone and help you decide whether buying, extending or returning makes most sense.”\n“When we first spoke, your main goal was [goal]. How would you describe where you are now? How often have you realistically used it, and what have you noticed - positive, negative or neutral?”\n“Are you leaning towards keeping it, extending, or returning at the end? If you’re considering purchase, we can talk through rent-to-buy and finance, and I’ll confirm any figures in writing. If returning is right, that’s fine too - Olga can arrange collection and we’ll keep you connected with useful information.”"}, {"t": "h3", "text": "8.2 If they are unsure"}, {"t": "callout", "label": "Decision-support version", "text": "“It sounds like you’ve had some benefit but not enough certainty yet. The honest question is whether usage has been consistent enough to judge. Would an extension help you make a fair decision, or is it more about cost, space or fit?”"}, {"t": "h3", "text": "8.3 If they want a discount"}, {"t": "callout", "label": "Director-approval version", "text": "“I understand why you’re asking. I can’t promise discounts or special terms on the call, but I can record the request and speak to the directors. Whatever is agreed will be confirmed clearly in writing.”"}, {"t": "h3", "text": "8.4 If they are returning but happy"}, {"t": "callout", "label": "Review / referral version", "text": "“I’m glad the experience was positive even if returning is the right decision now. Would you be comfortable leaving a short review about the service and setup? It really helps other people trying to understand whether this is right for them.”"}, {"t": "h3", "text": "8.5 Two-week CRM checklist"}, {"t": "ul", "items": ["Call completed or message sent.", "Usage pattern recorded.", "Customer-reported outcomes recorded.", "Decision: buy / extend / return / unsure, and the reason.", "Finance/rent-to-buy discussed: yes/no.", "Discount/terms requested: yes/no, and approval owner.", "If returning: handover to Olga for collection. If buying: invoice/payment route agreed.", "Review/testimonial/referral opportunity recorded.", "Next action date and owner."]}]}, {"title": "9. B2B call route and director escalation", "blocks": [{"t": "p", "text": "B2B leads are strategically important and should not be handled like normal consumer enquiries."}, {"t": "table", "head": ["Question area", "Question area", "Questions to ask"], "rows": [["Business type", "Business type", "Clinic, gym, wellness centre, practitioner, hotel, sports club, airport, franchise, other."], ["Commercial goal", "Commercial goal", "New revenue, member retention, recovery proposition, premium guest experience, clinical support, differentiation."], ["User base", "User base", "Who will use it: patients, members, athletes, hotel guests, staff, high-net-worth clients?"], ["Equipment scope", "Equipment scope", "One unit, multiple units, HBOT, Red Light, lab model, franchise discussion, future expansion."], ["Space and access", "Space and access", "Room size, ventilation, power, floor, access, privacy, installation constraints."], ["Team capability", "Team capability", "Who operates it? Who trains staff? Who handles customer screening?"], ["Timeline and budget", "Timeline and budget", "Urgency, launch date, budget approval, finance or phased rollout."], ["Decision makers", "Decision makers", "Who signs off? Who else needs to be on the call?"], ["Director route", "Director route", "Offer an Alan/Egor call for serious opportunities, strategic partners, airports, clinics, hotels, multi-unit deals."], ["B2B transition to a director call\n“This sounds like a more strategic project than a simple equipment sale. I can take the initial details now, but the best next step is to bring Alan or Egor into a call so we can look at the commercial model, installation, training and support properly.”", "B2B transition to a director call\n“This sounds like a more strategic project than a simple equipment sale. I can take the initial details now, but the best next step is to bring Alan or Egor into a call so we can look at the commercial model, installation, training and support properly.”"]]}, {"t": "h3", "text": "9.1 B2B CRM fields"}, {"t": "ul", "items": ["Business type and website.", "Contact role and decision-making authority.", "Product interest and quantity.", "Use case and commercial goal.", "Timeline, budget and blockers.", "Location, room/access notes and installation constraints.", "Director call needed: yes/no.", "Next action and owner."]}, {"t": "callout", "label": "Part C - Explaining the technology", "text": ""}, {"t": "p", "text": "How to explain HBOT and Red Light simply and safely, how they combine, why Oxydise, and how to use stories and names. For the full science, lean on the HBOT Study Guide and the Learning Portal."}]}, {"title": "10. Explaining HBOT", "blocks": [{"t": "callout", "label": "Plain-English HBOT explanation", "text": "HBOT combines pressure and oxygen. Under pressure, oxygen dissolves more directly into the blood plasma, not only red blood cells. That helps oxyg
