  '<button class="btn" onclick="addComment(\''+pageId+'\')">Add comment</button></div>'+
  '<div id="cmtList"></div></div>';
}
function renderComments(pageId){
 var all=jget("oxy_comments_v1",{}),list=all[pageId]||[],el=document.getElementById("cmtList");if(!el)return;
 if(!list.length){el.innerHTML='<p class="cmt-empty">No comments yet.</p>';return;}
 el.innerHTML=list.map(function(c,i){return '<div class="cmt-item"><div class="meta"><span>'+esc(c.name||"Anonymous")+' · '+esc(c.ts)+'</span><span class="del" onclick="delComment(\''+pageId+'\','+i+')">delete</span></div><div>'+esc(c.text).replace(/\n/g,"<br>")+'</div></div>';}).join("");
}
function addComment(pageId){var t=document.getElementById("cmtText"),n=document.getElementById("cmtName");if(!t.value.trim())return;var all=jget("oxy_comments_v1",{});(all[pageId]=all[pageId]||[]).push({name:n.value.trim(),text:t.value.trim(),ts:new Date().toLocaleDateString()});jset("oxy_comments_v1",all);t.value="";renderComments(pageId);}
function delComment(pageId,i){var all=jget("oxy_comments_v1",{});if(all[pageId]){all[pageId].splice(i,1);jset("oxy_comments_v1",all);renderComments(pageId);}}

/* ---------- TEMPLATE LIBRARY ---------- */
var tlCat="all",tlQ="";
function renderTemplates(){
 var cats=["all"];TEMPLATES.forEach(function(t){if(cats.indexOf(t.cat)<0)cats.push(t.cat);});
 var h='<div class="fade"><h1 class="doc-h1">Template Library</h1>'+
  '<p class="prose">Every template, brochure, email and form in the Oxydise operating system. The actual files live in Google Drive — open the folder to add or edit files, and use the shared register to record links and comments the whole team can see. Each template links back to the customer-journey stage it belongs to.</p>'+
  '<div class="tl-actions"><a class="tl-btn prim" href="'+DRIVE.folder+'" target="_blank" rel="noopener">📁 Open Drive folder</a>'+
  '<a class="tl-btn" href="'+DRIVE.register+'" target="_blank" rel="noopener">📋 Shared register (links & comments)</a></div>'+
  '<div class="tl-filter"><input class="tl-search" id="tlSearch" placeholder="Search templates…" value="'+esc(tlQ)+'">'+
  cats.map(function(c){return '<button class="chip'+(c===tlCat?" on":"")+'" onclick="setTlCat(\''+esc(c)+'\')">'+(c==="all"?"All":esc(c))+'</button>';}).join("")+'</div>'+
  '<div class="tl-count" id="tlCount"></div><div id="tlList"></div></div>';
 document.getElementById("content").innerHTML=h;
 var s=document.getElementById("tlSearch");s.addEventListener("input",function(){tlQ=s.value;drawTpl();});
 drawTpl();
}
function setTlCat(c){tlCat=c;renderTemplates();}
function drawTpl(){
 var saved=jget("oxy_tpl_v1",{}),q=tlQ.trim().toLowerCase();
 var list=TEMPLATES.filter(function(t){
   if(tlCat!=="all"&&t.cat!==tlCat)return false;
   if(q){return (t.id+" "+t.name+" "+t.stage+" "+t.owner+" "+(t.notes||"")).toLowerCase().indexOf(q)>=0;}
   return true;});
 document.getElementById("tlCount").textContent=list.length+" template"+(list.length===1?"":"s");
 document.getElementById("tlList").innerHTML=list.map(function(t){
   var sv=saved[t.id]||{},stage=t.stage||"";
   var stageEl=t.jlink?'<span class="tpl-stage" onclick="event.stopPropagation();go(\''+t.jlink+'\')">'+esc(stage)+' →</span>':(stage?'<span class="tpl-stage" style="color:var(--muted);cursor:default">'+esc(stage)+'</span>':'');
   return '<div class="tpl" id="tpl-'+t.id+'"><div class="tpl-head" onclick="document.getElementById(\'tpl-'+t.id+'\').classList.toggle(\'open\')">'+
     '<span class="tpl-id">'+esc(t.id)+'</span><span class="tpl-name">'+esc(t.name)+(sv.url?' 🔗':'')+'</span>'+
     '<span class="tpl-pri">'+esc(t.priority||"")+'</span>'+stageEl+'</div>'+
     '<div class="tpl-body">'+
       '<div class="tpl-meta"><b>Category:</b> '+esc(t.cat)+(t.owner?' &nbsp;·&nbsp; <b>Owns/sends:</b> '+esc(t.owner):'')+(t.when?' &nbsp;·&nbsp; <b>When:</b> '+esc(t.when):'')+'</div>'+
       (t.notes?'<p class="prose">'+rich(t.notes)+'</p>':'')+
       '<div class="tpl-save"><span class="lbl">Quick link & note (saved on this device — for the shared copy use the register sheet)</span>'+
         '<input id="u-'+t.id+'" placeholder="Paste a Google Drive / file link" value="'+esc(sv.url||"")+'">'+
         '<input id="c-'+t.id+'" placeholder="Note / comment" value="'+esc(sv.note||"")+'">'+
         '<button class="btn" onclick="saveTpl(\''+t.id+'\')">Save</button>'+
         '<div class="tpl-saved" id="sv-'+t.id+'">'+(sv.url?'<a href="'+esc(sv.url)+'" target="_blank" rel="noopener" class="ext">Open saved link</a>':'')+'</div>'+
       '</div></div></div>';
 }).join("");
}
function saveTpl(id){var saved=jget("oxy_tpl_v1",{});saved[id]={url:document.getElementById("u-"+id).value.trim(),note:document.getElementById("c-"+id).value.trim()};jset("oxy_tpl_v1",saved);var d=document.getElementById("sv-"+id);d.innerHTML=saved[id].url?'<a href="'+esc(saved[id].url)+'" target="_blank" rel="noopener" class="ext">Open saved link</a> · saved':'saved';}

/* ---------- IMPROVEMENTS / TASKS ---------- */
function renderImprove(p){
 var h='<div class="fade"><h1 class="doc-h1">'+esc(p.title)+'</h1>'+
  '<p class="prose">Add improvement tasks for the website and the customer journey. The shared list everyone can see lives in Google Drive; the board below is a quick personal tracker on this device.</p>'+
  '<div class="tl-actions"><a class="tl-btn prim" href="'+DRIVE.improve+'" target="_blank" rel="noopener">📋 Open shared Improvements sheet</a></div>'+
  '<h3 class="eh3">Quick task board (this device)</h3>'+
  '<div class="cmt-form" style="max-width:560px"><input id="tkTitle" placeholder="Task title"><textarea id="tkDetail" placeholder="Detail (optional)"></textarea>'+
  '<button class="btn" onclick="addTask()">Add task</button></div><div class="tasks" id="taskList"></div>';
 if(p.blocks&&p.blocks.length)h+='<h3 class="eh3">Reference: feedback card (from the SOP)</h3>'+p.blocks.map(blockHTML).join("");
 h+='</div>';
 document.getElementById("content").innerHTML=h;
 renderTasks();
}
function renderTasks(){var t=jget("oxy_tasks_v1",[]),el=document.getElementById("taskList");if(!el)return;
 if(!t.length){el.innerHTML='<p class="cmt-empty">No tasks yet.</p>';return;}
 el.innerHTML=t.map(function(x,i){return '<div class="task'+(x.done?' done':'')+'"><div class="tk-check" onclick="toggleTask('+i+')">'+(x.done?'✓':'')+'</div><div><div class="tk-title">'+esc(x.title)+'</div>'+(x.detail?'<div class="tk-detail">'+esc(x.detail)+'</div>':'')+'</div><span class="tk-del" onclick="delTask('+i+')">delete</span></div>';}).join("");}
function addTask(){var ti=document.getElementById("tkTitle"),d=document.getElementById("tkDetail");if(!ti.value.trim())return;var t=jget("oxy_tasks_v1",[]);t.unshift({title:ti.value.trim(),detail:d.value.trim(),done:false});jset("oxy_tasks_v1",t);ti.value="";d.value="";renderTasks();}
function toggleTask(i){var t=jget("oxy_tasks_v1",[]);if(t[i]){t[i].done=!t[i].done;jset("oxy_tasks_v1",t);renderTasks();}}
function delTask(i){var t=jget("oxy_tasks_v1",[]);t.splice(i,1);jset("oxy_tasks_v1",t);renderTasks();}

/* ---------- HOME ---------- */
function renderHome(){
 var h='<div class="fade"><p class="hero-eyebrow">Oxydise</p><h1 class="hero-title">Customer Operating System</h1>'+
  '<p class="hero-desc">One place for how Oxydise runs — the customer journey, the templates we send, how we talk about the technology, and the knowledge behind it. Pick a section to start. Use <b>Viewing as</b> at the top to highlight the parts of the journey that involve a particular role.</p>'+
  '<div class="cards">'+SECTIONS.map(function(s){return '<button class="card" onclick="go(\''+s.id+'\')"><div class="ci">'+s.icon+'</div><h3>'+esc(s.title)+'</h3><p>'+esc(s.desc)+'</p></button>';}).join("")+'</div></div>';
 document.getElementById("content").innerHTML=h;document.querySelectorAll(".nav-link").forEach(function(e){e.classList.remove("on");});
}

/* ---------- RENDER ---------- */
function render(id){
 var p=PAGES[id];
 if(id==="home"||!p){renderHome();return;}
 var c=document.getElementById("content"),html='<div class="fade">';
 if(p.type==="templates"){renderTemplates();afterRender(id,false);return;}
 if(p.type==="improve"){renderImprove(p);afterRender(id,true);return;}
 if(p.type==="single"){html+='<h1 class="doc-h1">'+esc(p.title)+'</h1>'+p.blocks.map(blockHTML).join("");}
 else{ if(p.hero&&p.hero.length)html+=heroHTML(p.hero);var secs=p.sections||[];
   if(p.toc&&secs.length>3)html+='<div class="toc"><p class="tt">On this page</p><ol>'+secs.map(function(s,i){return '<li><a href="#sec-'+id+'-'+i+'" onclick="return jump(\''+id+'\','+i+')">'+esc(s.title.replace(/^\d+\.\s*/,''))+'</a></li>';}).join("")+'</ol></div>';
   html+=secs.map(function(s,i){return '<h2 class="doc-h1" id="sec-'+id+'-'+i+'">'+esc(s.title)+'</h2>'+s.blocks.map(blockHTML).join("");}).join("");}
 html+=commentsHTML(id);
 var oi=ORDER.indexOf(id);
 if(oi>=0){var pg='<div class="pager">';if(oi>0)pg+='<a onclick="go(\''+ORDER[oi-1]+'\')"><span class="pl">← Previous</span><span class="pt">'+esc(navLabel(ORDER[oi-1]))+'</span></a>';if(oi<ORDER.length-1)pg+='<a class="nx" onclick="go(\''+ORDER[oi+1]+'\')"><span class="pl">Next →</span><span class="pt">'+esc(navLabel(ORDER[oi+1]))+'</span></a>';html+=pg+'</div>';}
 html+='</div>';
 c.innerHTML=html;
 afterRender(id,false);
 renderComments(id);
}
function afterRender(id,isImprove){setActive(id);applyRole();window.scrollTo(0,0);}
function jump(id,i){var el=document.getElementById("sec-"+id+"-"+i);if(el)el.scrollIntoView();return false;}
function setActive(id){document.querySelectorAll(".nav-link").forEach(function(e){e.classList.toggle("on",e.dataset.id===id);});}
function buildNav(){var h="";NAV.forEach(function(g){if(!g.items.length)return;h+='<div class="nav-gh">'+esc(g.label)+'</div>';g.items.forEach(function(it){h+='<button class="nav-link" data-id="'+it.id+'" onclick="go(\''+it.id+'\')">'+(it.num?'<span class="n">'+esc(it.num)+'</span>':'')+'<span>'+esc(it.label)+'</span><span class="dot"></span></button>';});});document.getElementById("nav").innerHTML=h;}
function buildChips(){document.getElementById("chips").innerHTML=ROLES.map(function(r){return '<button class="chip'+(r[0]==="all"?" on":"")+'" data-role="'+r[0]+'" onclick="setRole(\''+r[0]+'\')">'+esc(r[1])+'</button>';}).join("");}
function setRole(key){activeRole=key;store.set("oxydise_role",key);
 document.querySelectorAll(".chip").forEach(function(c){c.classList.toggle("on",c.dataset.role===key);});
 var b=document.getElementById("rbanner");
 if(key==="all"){b.className="role-banner";b.innerHTML="";}
 else{var lbl=ROLES.filter(function(r){return r[0]===key;})[0][1];b.className="role-banner show";b.innerHTML='Viewing as <b>'+esc(lbl)+'</b> — '+esc(ROLE_FOCUS[key]||"")+'<span class="clr" onclick="setRole(\'all\')">Show all ✕</span>';}
 // sidebar highlight
 document.querySelectorAll(".nav-link").forEach(function(e){var rel=key!=="all"&&ROLEMAP[e.dataset.id]&&ROLEMAP[e.dataset.id].indexOf(key)>=0;e.classList.toggle("role-rel",!!rel);});
 applyRole();}
function applyRole(){var c=document.getElementById("content");c.querySelectorAll(".rh").forEach(function(e){e.classList.remove("rh");});if(activeRole==="all"||!ROLE_RE[activeRole])return;var re=new RegExp(ROLE_RE[activeRole],"i");c.querySelectorAll("td,li,p.prose").forEach(function(el){if(el.querySelector("td,li"))return;if(re.test(el.textContent))el.classList.add("rh");});}
function go(id){if(location.hash!=="#"+id)location.hash=id;else route();document.body.classList.remove("nav-open");}
function route(){render((location.hash.replace(/^#/,""))||"home");}
function initTheme(){var t=store.get("oxydise_theme")||(window.matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}
function unlock(){document.body.classList.remove("locked");store.set("oxydise_unlock","1");}
function gate(){var inp=document.getElementById("gp"),btn=document.getElementById("gb"),err=document.getElementById("ge");function a(){if(inp.value===VIEW_PASS){err.textContent="";unlock();}else{err.textContent="Incorrect password. Please try again.";inp.value="";inp.focus();}}btn.onclick=a;inp.addEventListener("keydown",function(e){if(e.key==="Enter")a();});if(store.get("oxydise_unlock")==="1")unlock();else setTimeout(function(){inp.focus();},60);}
function init(){initTheme();buildNav();buildChips();gate();var r=store.get("oxydise_role");if(r&&ROLE_FOCUS[r])setRole(r);
 document.getElementById("brand").onclick=function(){go("home");};
 document.getElementById("themeBtn").onclick=function(){var t=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",t);store.set("oxydise_theme",t);};
 document.getElementById("menuBtn").onclick=function(){document.body.classList.toggle("nav-open");};
 document.getElementById("scrim").onclick=function(){document.body.classList.remove("nav-open");};
 window.addEventListener("hashchange",route);route();}
init();
</script></body></html>
