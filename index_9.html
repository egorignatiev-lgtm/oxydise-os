en reach areas where circulation, inflammation or tissue stress is limiting normal supply."}, {"t": "p", "text": "→ Full science - physics, mechanisms, indications, safety: HBOT Study Guide."}, {"t": "h3", "text": "10.1 The simple mechanism"}, {"t": "ul", "items": ["Normal breathing relies mainly on haemoglobin in red blood cells to carry oxygen.", "Inside a chamber, increased pressure lets more oxygen dissolve into plasma, the liquid part of blood.", "That dissolved oxygen can support deeper oxygen delivery, microcirculation and tissue-repair processes.", "HBOT isn’t just “breathing oxygen” - it’s oxygen under pressure, which changes delivery physiology.", "Benefits are cumulative: a few sessions may feel useful, but meaningful biological change usually needs repeated exposure."]}, {"t": "h3", "text": "10.2 Plasma-oxygen talking point"}, {"t": "table", "head": ["Pressure / condition", "Practical talking point"], "rows": [["Normal air at 1 ATA", "Plasma oxygen is low; most oxygen is carried on haemoglobin."], ["100% oxygen at 1 ATA", "Dissolved oxygen rises versus air, but pressure is still the main missing factor."], ["HBOT around 1.3–1.5 ATA", "Meaningfully increases oxygen availability for many wellness/recovery goals; usually more accessible for home use."], ["Clinical HBOT around 2.0–3.0 ATA", "Used for recognised indications in appropriate facilities; higher pressure isn’t automatically better for every person or goal."], ["3.0 ATA benchmark", "Clinical references describe plasma oxygen rising from roughly 0.3 mL/dL on normal air to around 6 mL/dL at 3 ATA on 100% oxygen. Use as an educational benchmark, not a promise about a home setup."]]}, {"t": "h3", "text": "10.3 Key HBOT benefit areas - approved-style wording"}, {"t": "table", "head": ["Area", "Approved-style explanation"], "rows": [["Inflammation", "“HBOT may help support a calmer inflammatory environment by improving oxygen delivery and cellular energy.”"], ["Tissue repair", "“Oxygen is central to collagen formation, wound repair and tissue recovery; HBOT is used clinically for some hard-to-heal tissue problems.”"], ["Microcirculation / angiogenesis", "“Repeated oxygen-pressure exposure may support blood-vessel signalling and better microcirculation over time.”"], ["Mitochondrial energy", "“More available oxygen can support mitochondrial ATP production, which is why some customers report better energy or clarity.”"], ["Stem cells", "“Some research shows hyperbaric exposure can mobilise stem/progenitor cells; we frame this as a regenerative-support mechanism, not a cure.”"], ["Cognition / brain health", "“HBOT is being studied for neurological and cognitive support. We discuss brain oxygenation, circulation and energy, not a guaranteed treatment.”"], ["Beauty / collagen", "“Improved oxygen availability can support collagen and tissue-repair biology; for skin-specific goals, Red Light is often relevant too.”"]]}, {"t": "h3", "text": "10.4 Protocol guide for conversation"}, {"t": "table", "head": ["Protocol rule\nProtocols are guidance, not prescription. Always tailor to the customer, screen for safety, track response and escalate complex medical cases.", "Protocol rule\nProtocols are guidance, not prescription. Always tailor to the customer, screen for safety, track response and escalate complex medical cases.", "Protocol rule\nProtocols are guidance, not prescription. Always tailor to the customer, screen for safety, track response and escalate complex medical cases."], "rows": [["Customer goal", "Typical internal guidance", "How to explain it"], ["General wellness / energy / longevity", "2–3 sessions/week; ~40-session block; maintenance ~1/week if useful.", "“We usually think in blocks rather than one-off sessions.”"], ["Chronic inflammation / pain", "4–6 sessions/week; 40–60 sessions; review around session 20.", "“Consistency matters more than trying one or two sessions.”"], ["Neurological / brain fog / concussion", "Often 5/week initially; 40–60 sessions; step down after week 3–4.", "“Brain and nervous-system work usually needs repeated exposure.”"], ["Cancer support / post-treatment recovery", "Oncology team involvement; supportive recovery only.", "“We don’t treat cancer. This would be supportive recovery and should be discussed with your oncology team.”"], ["Sports performance / in-season", "3–4 sessions/week ongoing.", "“It supports recovery capacity; it doesn’t replace training.”"], ["Sports injury / rehab", "Often 5/week; 40–60 sessions.", "“Injury recovery is where a tighter block is usually more meaningful.”"], ["Post-surgery / tissue repair", "Often 5/week; 40–60 sessions.", "“Earlier intervention can be more efficient, but suitability matters.”"], ["Long Covid / post-viral fatigue", "4–5 sessions/week; 30–50 sessions; track sleep, HRV, steps, symptoms.", "“Evidence is emerging and results vary, so we track objective change.”"]]}, {"t": "h3", "text": "10.5 Air breaks / off-gassing"}, {"t": "callout", "label": "Use when explaining 20-minute oxygen / 5-minute air-break approaches", "text": "“Some protocols use oxygen breaks. The idea isn’t to interrupt the session, but to alternate high oxygen with normal air. That can improve tolerance and may stimulate adaptive repair signalling, while keeping the session balanced. We only recommend protocols within approved guidance.”"}, {"t": "h3", "text": "10.6 Evidence language"}, {"t": "p", "text": "Use evidence to educate, not to overwhelm. Know the categories below; don’t turn the call into a lecture."}, {"t": "table", "head": ["Evidence topic", "How to use it safely"], "rows": [["Recognised medical HBOT uses", "HBOT is established in medicine for selected indications: carbon monoxide poisoning, decompression sickness, delayed radiation injury, difficult wounds."], ["Stem-cell mobilisation", "Mention as a biological mechanism shown in research, not a guaranteed outcome for a customer."], ["Israeli ageing / telomere study", "Internal education point only: a 60-session protocol in older adults showed cellular-ageing marker changes. Don’t imply home rental reverses ageing."], ["Long Covid evidence", "Emerging and mixed. Some studies show improvement after larger protocols; a shorter 10-session trial didn’t outperform placebo. Track outcomes, avoid guarantees."], ["Pressure differences", "Dose includes pressure, oxygen concentration, session length, frequency and total exposure. Higher pressure isn’t automatically better for every goal."]]}, {"t": "p", "text": "→ The studies behind these points (Hachmo 2020, Zilberman-Itskovich 2022, Thom stem-cell work) are in the Learning Portal §14 and the HBOT Study Guide."}]}, {"title": "11. Explaining Red Light Therapy", "blocks": [{"t": "callout", "label": "Plain-English RLT explanation", "text": "Red and near-infrared light are used to support cellular energy and repair signalling. Red light is more surface/skin-focused; near-infrared penetrates deeper into muscles, joints and soft tissue."}, {"t": "p", "text": "→ Full RLT detail - wavelengths, dose, eye safety, equipment: Learning Portal §5 and §18."}, {"t": "h3", "text": "11.1 The simple mechanism"}, {"t": "ul", "items": ["Red light is usually discussed around 630–660 nm; near-infrared around 810–850 nm.", "Photobiomodulation research focuses on mitochondrial signalling, cytochrome c oxidase, nitric oxide and ATP pathways.", "Customer-friendly line: “the right wavelengths of light can help cells produce energy and repair more efficiently.”", "RLT is cumulative: regular use matters more than one dramatic session."]}, {"t": "h3", "text": "11.2 What RLT may be relevant for"}, {"t": "table", "head": ["Customer goal", "Talking point"], "rows": [["Skin / beauty", "“Red light is commonly used for skin tone, texture, collagen support and visible-ageing goals.”"], ["Muscle recovery", "“Near-infrared is often used for muscle soreness, recovery and performance routines.”"], ["Joint comfort", "“Some people use RLT for joint stiffness and comfort; we frame it as support, not treatment.”"], ["Hair / scalp", "“Red and near-infrared light can support scalp circulation and follicle stimulation over time.”"], ["Mood / energy", "“Some customers report mood, energy or sleep improvements, but this varies.”"], ["Pairing with HBOT", "“RLT and HBOT can complement each other: RLT supports cellular signalling and microcirculation; HBOT supports oxygen delivery.”"], ["Cancer-related", "Oncology-sensitive. Don’t recommend RLT in a cancer context without clinician sign-off. See §11.5 and §12."]]}, {"t": "h3", "text": "11.3 RLT session guidance"}, {"t": "table", "head": ["Situation", "Guidance"], "rows": [["First month", "Often 3–5 sessions/week depending on goal and tolerance."], ["Maintenance", "Often 2–3 sessions/week."], ["Session length", "Usually 10–20 minutes depending on equipment and goal. Earlier in the day is often better; ask how they feel and sleep."], ["Skin exposure", "Light needs to reach the skin. Clothing reduces the effect on covered areas, though some activation still occurs through light clothing."], ["Eyes", "Eye protection is recommended."], ["Aftercare", "Hydrate and track how the customer feels across repeated sessions."]]}, {"t": "h3", "text": "11.4 LED quality conversation - competitor-safe"}, {"t": "p", "text": "Customers sometimes ask about LED brands. Keep it competitor-safe: don’t name-knock and don’t quote country of origin. Focus on what actually determines performance."}, {"t": "callout", "label": "", "text": "“What matters for performance isn’t a brand name on a spec sheet - it’s the full optical and engineering package: wavelength accuracy, irradiance, beam angle, heat management, driver stability, build quality and verified output. Not all LEDs are the same, and the real question is what wavelength and output the device actually delivers, and how well heat is managed so that stays consistent over time. Epistar LED producer is installed in most of the RL, which is produced in India and drifts by 20% on wave length after a few months of use. We use a different LED manufacturer for that reason.”"}, {"t": "callout", "label": "", "text": ""}]}, {"title": "12. Combining therapies and sequencing", "blocks": [{"t": "p", "text": "HBOT changes oxygen availability. Red Light changes cellular light signalling and mitochondrial activity. Used thoughtfully they can complement each other, but sequencing should be context-specific."}, {"t": "table", "head": ["Context", "Suggested internal approach", "Why"], "rows": [["General recovery / wellness", "Either order, depending on practical setup and customer response.", "RLT can support circulation and cellular readiness; HBOT supports oxygen delivery and recovery."], ["Customer feels overstimulated by RLT", "Reduce time/output; consider HBOT first or separate days.", "Some users are sensitive to light dose or nervous-system stimulation."], ["Oncology-sensitive or cancer-related", "HBOT first; Red Light after", "HBOT raises oxygen availability before metabolic stimulation. Internal education only, not a cancer-treatment claim."], ["Athlete / acute recovery", "RLT around training; HBOT as a recovery block.", "Monitor sleep, soreness and training load."], ["Don’t overclaim synergy\nIt’s fine to say the therapies can complement each other. Avoid saying they “work better together” as a universal claim unless a specific protocol and evidence source is approved.", "Don’t overclaim synergy\nIt’s fine to say the therapies can complement each other. Avoid saying they “work better together” as a universal claim unless a specific protocol and evidence source is approved.", "Don’t overclaim synergy\nIt’s fine to say the therapies can complement each other. Avoid saying they “work better together” as a universal claim unless a specific protocol and evidence source is approved."]]}]}, {"title": "13. Why Oxydise: commercial, service and product confidence", "blocks": [{"t": "p", "text": "A confident answer to “why should I choose Oxydise?”"}, {"t": "table", "head": ["Area", "Message", "Notes / guardrail"], "rows": [["Safety-first", "We screen, train and support - we don’t just sell and disappear.", "Mention contraindication checks and usage guidance."], ["Full-service support", "Consultation, selection, delivery, installation, training, aftercare and troubleshooting.", "Important for anxious or premium customers."], ["Transparent process", "Call, follow-up, order form, invoice/payment, delivery form, installation, support.", "The customer should never wonder what happens next."], ["Rent-to-buy", "Customers can experience consistent use before ownership, where current terms allow.", "Confirm current commercial terms before quoting."], ["Finance", "A 12-month finance route can be discussed, subject to approval and current terms.", "Confirm the exact processing fee and wording before use."], ["Training credibility", "Alan has formal hyperbaric training and Oxydise takes education seriously.", "Don’t claim a device is “IBUM certified” unless the certification pack confirms it."], ["Product development", "Oxydise works with manufacturing and engineering partners to improve equipment.", "Use only director-approved wording on exclusivity and territories."], ["B2B support", "We help with commercial use, training, customer journey and director-level setup.", "Offer a director call for serious B2B."]]}, {"t": "h3", "text": "13.1 Finance and commercial wording"}, {"t": "callout", "label": "Use only after confirming current terms", "text": "“There are three main routes: rental, purchase, and finance/rent-to-buy depending on the product and your situation. For finance, we can discuss a 12-month option with a processing fee, subject to the current terms and approval. I’ll confirm exact figures in writing rather than guessing on the phone.”"}, {"t": "p", "text": "[ Confirm before use: exact finance processing fee (e.g. 5%), rent-to-buy terms, and any pricing/market-comparison wording - all director-approved. ]"}, {"t": "h3", "text": "13.2 External equipment and wellbeing recommendations"}, {"t": "p", "text": "This shows Oxydise isn’t only trying to sell its own products. Recommend categories first, brands second, and only where relevant."}, {"t": "table", "head": ["Category / example", "When to mention", "Careful wording"], "rows": [["Sleep temperature control (e.g. Eight Sleep)", "Sleep, recovery, athletes, overheating, poor sleep quality.", "“Temperature is a major sleep lever; something like Eight Sleep can help people who overheat or want better recovery tracking.”"], ["Wearables (Oura / WHOOP / Apple Watch)", "Customers who want to track sleep, HRV, recovery and routine.", "“Use data to observe patterns, not to become anxious.”"], ["Sauna / heat therapy", "Stress, recovery, circulation, general wellness.", "“Sauna is a foundational habit for many people, but build gradually.”"], ["Morning daylight / circadian routine", "Poor sleep, mood, energy, jet lag.", "“Free and powerful: daylight early in the day helps anchor rhythm.”"], ["Blood / microbiome testing", "Customers who want measurable, personalised plans.", "“Data can help target action rather than guess.”"], ["Strength training / mobility", "Longevity, pain, performance, confidence.", "“Technology works best on top of foundations.”"], ["Air quality / filtration", "Sleep, asthma/allergy, city living, environmental illness.", "“Indoor air quality is often overlooked.”"]]}, {"t": "p", "text": "[ To complete: optional rows for home lighting/circadian, nutrition foundations, and a recommended-reading pointer (Learning Portal §17). ]"}]}, {"title": "14. Customer stories and prominent customers", "blocks": [{"t": "p", "text": "Social proof should reassure, not pressure. Use stories only after you understand the customer’s goal, and never imply the same result will happen for them."}, {"t": "h3", "text": "14.1 When to use named customers"}, {"t": "table", "head": ["Name / type", "Best-fit situation", "How to use"], "rows": [["Anthony Elanga", "Football, sprint capacity, recovery, elite performance.", "“We’ve worked with elite footballers who integrate HBOT into recovery routines.” Approved public wording only."], ["Ola Aina", "Football, athlete trust, professional sport.", "Part of an “elite sport trusts this technology” point, not outcome proof."], ["Gorka Marquez", "Mainstream awareness, dance, performance.", "Useful for lifestyle/performance customers who recognise public figures."], ["Joseph Parker", "Boxing, combat sport, recovery between sessions.", "Use for high-intensity training and recovery discussions."], ["Ben Whittaker", "Boxing, athletic performance, recovery.", "Use similarly to Joseph Parker."], ["Tom Stoltman", "Strength, power, heavy training load.", "Use for strength athletes, or customers asking whether serious performers use it."], ["Anonymous long-Covid story", "Medical/recovery, fatigue, return to work/life.", "Anonymised unless consent is documented. Focus on “why consistent access matters”, not a promise."], ["Wellness Lab testimonials", "Local reassurance, try-before-home-setup.", "Use when someone is nervous, claustrophobic, or wants to experience it first."]]}, {"t": "p", "text": "[ Confirm details and consent before use (incomplete in the source): Lynne (long-term cancer journey), an MS story, a long-Covid story, a sports-injury story, and Dianne Buswell (post-pregnancy recovery - confirm spelling and approval). ]"}, {"t": "h3", "text": "14.2 Rules for customer stories"}, {"t": "ul", "items": ["Use stories after discovery, not as a cold opener.", "Match the story to the customer: athlete with athlete, fatigue with fatigue, B2B with B2B.", "Say “many customers report” only when the feedback exists and is approved.", "Use anonymous stories unless written consent allows a named one.", "Don’t share clinical details casually.", "Never say or imply “this will happen to you.”", "If a customer gives a strong story, ask permission and flag it for marketing/testimonial follow-up."]}, {"t": "h3", "text": "14.3 Customer story bank template"}, {"t": "table", "head": ["Field", "What to record"], "rows": [["Customer type", "Medical/recovery, athlete, longevity, beauty, B2B, other."], ["Product used", "HBOT, Red Light, both, model, pressure if relevant."], ["Goal", "What they hoped to improve."], ["Usage pattern", "Sessions/week, total sessions, rental/purchase."], ["Reported change", "Use the customer’s words where possible."], ["Permission status", "Internal only, anonymous, named testimonial, video approved."], ["Useful for", "Which future customer type this story helps."], ["Compliance note", "Any claims that need rewriting or approval."]]}]}, {"title": "15. Experts and wellness names to know", "blocks": [{"t": "p", "text": "These names help you understand the wider context. They aren’t all customer-facing authorities and shouldn’t be used as evidence unless the claim is properly sourced and approved."}, {"t": "h3", "text": "15.1 Oxydise-related experts and when to bring them in"}, {"t": "table", "head": ["Name", "What they stand for", "When to mention / use"], "rows": [["Dr Masha", "Medical suitability and clinician-level questions for complex cases.", "When a customer asks medical advice, has contraindications, active treatment, pregnancy, cancer concern or medication complexity. Don’t describe credentials beyond what’s approved."], ["Oliver “Oli” Patrick", "Physiology, lifestyle management, corporate wellbeing, health assessment.", "B2B/corporate wellbeing, premium positioning, personalised health strategy."], ["Professor Glen Jeffery", "UCL red-light research, ageing eye, mitochondrial function, deep-red light.", "Red Light customers asking whether there’s serious science. Don’t claim Oxydise panels treat eyesight."], ["Dr Jason Sonners", "HBOT education, oxygen dose, pressure/time/frequency thinking.", "Internal education on protocols and pressure. Customer-facing only as “we follow the dose conversation carefully”, not proof."], ["Prof Shai Efrati / Sagol Center", "HBOT research into neuroplasticity, ageing markers, the hyperoxic-hypoxic paradox.", "Internal education and scientifically curious customers. Avoid overclaiming age reversal."], ["Michael Hamblin", "Photobiomodulation mechanisms and research translation.", "Internal RLT education and deeper science questions."]]}, {"t": "h3", "text": "15.2 Wider wellness names and what they stand for"}, {"t": "table", "head": ["Name", "What they stand for", "How useful for sales"], "rows": [["Andrew Huberman", "Neuroscience, light exposure, sleep, stress, behaviour change.", "Customers may reference him; useful for circadian and recovery conversations."], ["Peter Attia", "Healthspan, longevity medicine, VO2 max, strength, metabolic risk.", "Useful for longevity customers; don’t turn him into proof for HBOT."], ["Rhonda Patrick", "Nutrients, sauna, inflammation, exercise, research translation.", "Useful for customers who value evidence and podcasts."], ["Matthew Walker", "Sleep science and sleep as a foundation of health.", "Useful when recommending sleep foundations before expensive technology."], ["Tim Spector", "Microbiome, personalised nutrition, gut-health data.", "Useful for gut/inflammation customers and product-ecosystem chats."], ["Bryan Johnson", "Quantified self, anti-ageing protocols, biomarker tracking.", "Useful for longevity customers; frame as extreme self-tracking, not prescription."], ["Gary Brecka", "Commercial wellness, oxygen/breathing narrative, biological-age messaging.", "Customers may know him; be careful not to copy exaggerated claims."], ["Ben Greenfield", "Biohacking, performance lifestyle, recovery stack.", "Useful for early-adopter customers."], ["Rangan Chatterjee", "Accessible lifestyle medicine and behaviour change.", "Useful for customers who need simple, sustainable habits."], ["Stacy Sims", "Female physiology and performance.", "Useful for female-athlete or perimenopause/menopause-sensitive conversations."]]}]}, {"title": "16. Alan’s story and founder-led trust", "blocks": [{"t": "p", "text": "Use Alan’s story to build trust when a customer asks how Oxydise started, why HBOT matters personally, or why the company cares beyond selling equipment."}, {"t": "callout", "label": "Founder story - short version", "text": "“Oxydise began from a real personal experience. Alan first found HBOT through his own health journey - particularly severe insomnia - after trying several wellness approaches. HBOT was the one that made a meaningful difference. That led to formal hyperbaric training, Cambridge Hyperbarics, and eventually Oxydise. The business grew because the team wanted more people to access technologies that previously felt reserved for clinics, elite sport or very high budgets.”"}, {"t": "callout", "label": "Founder story - longer, relationship-building version", "text": "“Alan’s background isn’t a classic corporate wellness story. He came to this through personal health challenges, curiosity, psychotherapy training, business-building and then formal hyperbaric education. That matters because Oxydise isn’t simply a distributor - the company was built around making technology understandable and accessible, while keeping the human side of the experience at the centre.”"}, {"t": "callout", "label": "Part D - Objections, scripts and CRM", "text": ""}, {"t": "p", "text": "Handling objections safely, the words to avoid, and the CRM discipline that makes the whole process real."}]}, {"title": "17. Objection handling and “do not say”", "blocks": [{"t": "table", "head": ["Customer concern", "Best response", "Avoid saying"], "rows": [["“Is it safe?”", "“It’s generally well tolerated when screened and used correctly. That’s why we ask safety questions and provide training.”", "“It’s completely risk-free.”"], ["“Will it work for me?”", "“The mechanism is strong and applies broadly, but the honest answer is that individual response varies. That’s why we screen for suitability, match it to your goal, and track response over a sensible block of sessions.”", "“Yes, definitely.” / “It works for everyone.”"], ["“How many sessions?”", "“It depends on the goal - one or two is rarely enough to judge. We usually think in blocks; many people find a 40–60 session block is where they notice the most, but it depends on the individual.”", "“You only need one session.”"], ["“Why isn’t it on the NHS?”", "“HBOT is used in medicine for specific recognised indications, like carbon monoxide poisoning, decompression sickness, some non-healing wounds and radiation injury. Wider wellness and recovery use sits outside that formal list - a different access model, not a sign the mechanism is weak.”", "“It has the same results for everything.”"], ["“I’m claustrophobic.”", "“That’s common. We can talk through chamber type, delivery training and starting slowly. The Wellness Lab can help some people experience it first.”", "“You’ll be fine.”"], ["“It’s expensive.”", "“That’s why rental, rent-to-buy and finance routes exist, so you can start at the most sensible level of commitment.”", "“It’s cheap.”"], ["“I found a cheaper one online.”", "“It’s worth comparing the whole package: equipment, safety, training, delivery, support, warranty and advice. If you tell me which one, I can talk you through the differences honestly.”", "“Cheap ones are dangerous.”"], ["“Can I use it with cancer?”", "“Cancer is complex, and we don’t claim HBOT treats cancer. Tumour hypoxia is an important area of cancer biology and HBOT is recognised for some radiation-related injury, but any cancer-related case should be handled with oncology input and careful timing - we’d arrange a Dr Masha conversation. We also screen medication, as one chemotherapy drug interacts with HBOT.”", "“Yes, it helps cancer.” / “It treats cancer.”"], ["“Can I use red light on medication?”", "“Some medications increase light sensitivity, so please check with your clinician or pharmacist first.”", "“It’s fine for everyone.”"]]}, {"t": "p", "text": "[ Confirm before use: any specific pricing/market-comparison wording for the “expensive” and “cheaper online” answers - keep it director-approved and avoid naming competitors. ]"}, {"t": "h3", "text": "17.1 Do not say"}, {"t": "ul", "items": ["“HBOT cures cancer / long Covid / dementia / autoimmune disease / infertility.”", "“Red Light is safe for everyone.”", "“You can ignore your doctor.”", "“This replaces medication, surgery, rehabilitation or oncology treatment.”", "“Higher pressure is always better.”", "“Our equipment is medically certified for everything we discuss.”", "“IBUM-certified equipment” - unless the exact certification pack confirms it.", "“You’ll see X result by session Y.”"]}, {"t": "h3", "text": "17.2 Better alternatives"}, {"t": "ul", "items": ["“This may support your recovery environment.”", "“Research suggests, but outcomes vary.”", "“This is a supportive wellness/recovery tool, not a replacement for medical care.”", "“Let’s check safety first.”", "“Let’s confirm that in writing rather than guessing.”", "“That’s a clinician question.”", "“The right protocol depends on the goal and the person.”"]}]}, {"title": "18. CRM checklist, templates and call scorecard", "blocks": [{"t": "h3", "text": "18.1 First-call CRM checklist"}, {"t": "table", "head": ["Field", "Required"], "rows": [["Lead source and sub-source/campaign/page", "Yes"], ["Customer name, phone, email, location", "Yes"], ["Product interest", "HBOT / Red Light / both / small product / B2B / unsure"], ["Customer category", "Medical / sports / wellness / beauty / B2B / existing / wrong / unknown"], ["Reason for enquiry", "Yes - in the customer’s words where possible"], ["Original goal", "Yes"], ["Concerns", "Safety / claustrophobia / maintenance / longevity / sessions / cost / will it work / other"], ["Safety questions asked", "Yes/no, plus any concern"], ["Medical escalation needed", "Dr Masha / clinician / none"], ["Delivery/access notes", "If relevant"], ["Buying route", "Rental / purchase / rent-to-buy / finance / B2B / unsure"], ["Documents sent", "Which exact documents"], ["Next task", "Date, owner, action"]]}, {"t": "h3", "text": "18.2 Documents-to-send follow-up template"}, {"t": "callout", "label": "", "text": "“Hi [Name], great speaking with you. As promised, I’ve attached [only the relevant documents: HBOT overview / Red Light overview / safety guide / finance options]. The key points we covered were [goal] and [next step]. I’ll [call back on date / await your decision]. Anything unclear in the meantime, just reply here.”"}, {"t": "p", "text": "[ Confirm the approved document set and file names so the team attaches consistent files. ]"}, {"t": "h3", "text": "18.3 Missed-call WhatsApp / email"}, {"t": "callout", "label": "", "text": "“Hi [Name], it’s [Salesperson] from Oxydise. Thanks for your enquiry - I tried to call so I could understand what you’re looking for and point you to the right information. I’ll try again [time/day], or reply here with a good time to speak.”"}, {"t": "h3", "text": "18.4 Call scorecard for a new salesperson"}, {"t": "table", "head": ["Skill", "Score 1–5", "What good looks like"], "rows": [["Opening", "", "Warm, calm, clear agenda."], ["Discovery", "", "Understands why the customer enquired and what outcome matters."], ["Listening", "", "Reflects back the customer’s words and doesn’t interrupt."], ["Safety", "", "Asks contraindication questions and escalates appropriately."], ["Product explanation", "", "Explains HBOT/RLT simply without overclaiming."], ["Oxydise positioning", "", "Explains service, safety, support and values."], ["Social proof", "", "Uses stories only when relevant and responsibly."], ["Commercial confidence", "", "Explains rental, purchase, finance and next steps clearly."], ["CRM discipline", "", "Logs complete notes and a next action."], ["Follow-up", "", "Sends only relevant documents and sets a task."]]}]}, {"title": "Appendix A. Quick reference: first-call checklist", "blocks": [{"t": "table", "head": ["Check", "Done"], "rows": [["Lead captured in CRM", ""], ["Source recorded", ""], ["Customer called if phone available", ""], ["Reason for enquiry recorded", ""], ["Customer category selected", ""], ["Product interest recorded", ""], ["Safety questions asked", ""], ["Medical escalation if needed", ""], ["Practical fit checked", ""], ["Oxydise process explained", ""], ["Relevant product explained", ""], ["Social proof used only if relevant", ""], ["Commercial route explained", ""], ["Relevant documents sent", ""], ["Next task set", ""], ["Olga/director handover if needed", ""]]}]}, {"title": "Appendix B. One-minute explanations", "blocks": [{"t": "callout", "label": "HBOT in one minute", "text": "“HBOT is oxygen plus pressure. Under pressure, more oxygen dissolves into the plasma, so it can reach tissues in a way normal breathing can’t. That extra oxygen can support cellular energy, inflammation balance, microcirculation and repair. The important point is consistency - we think in blocks of sessions because the deeper effects are cumulative.”"}, {"t": "callout", "label": "Red Light in one minute", "text": "“Red Light Therapy uses specific red and near-infrared wavelengths. Red light is more surface-focused, so it’s often used for skin and collagen goals. Near-infrared goes deeper and is often discussed for muscle, joint and recovery goals. The mechanism is usually explained through cellular energy and mitochondrial signalling, and it works best with consistency.”"}, {"t": "callout", "label": "HBOT + RLT pairing", "text": "“They can complement each other. Red Light supports cellular signalling and microcirculation; HBOT supports oxygen delivery under pressure. For general wellness or recovery, using both can make sense. For oncology-sensitive cases, we don’t recommend Red Light without clinician sign-off.”"}]}, {"title": "Appendix C. Source and evidence notes", "blocks": [{"t": "p", "text": "These notes are for internal training and review. They are not automatic customer-facing claims. The two companion documents - the HBOT Study Guide and the Colleague Learning Portal - are the master references for the science and the claim guardrails."}, {"t": "table", "head": ["Source area", "Key point used in this guide"], "rows": [["Oxydise Customer Operating System", "Sales owns the first call; build trust and empathy; Day-2 and two-week calls are required; CRM is the source of truth."], ["Oxydise brand guidelines", "Tone is calm, credible, considered and practical; values are trust, empathy, relationships, curiosity, detail, innovation."], ["Oxydise strategy notes", "Differentiators: transparency, customer care, product knowledge, attention to detail, expert advice, athlete association, B2B growth."], ["HBOT Study Guide", "Mechanisms, physics, indications, contraindications, oxygen-toxicity and drug-interaction detail."], ["Colleague Learning Portal", "Claim guardrails (§3), the plain-English decoder (§2.1), equipment and competitor-safe language (§18)."], ["RLT guide and manual", "Wavelengths, safety cautions, session guidance and customer FAQs."], ["FDA / UHMS / NCBI / PubMed", "External safety, indications and mechanism support, for internal substantiation and claim review."]]}]}], "toc": true}, "course": {"type": "doc", "hero": ["OXYDISE EDUCATION PROGRAMME", "Hyperbaric Oxygen Therapy", "Chapter-by-Chapter Study Guide", "Mechanisms of Action  •  Indications  •  Contraindications & Safety", "A training reference for clinical and operational staff", "Internal learning material — summarised and rewritten in original form for staff education."], "sections": [{"title": "How to Use This Guide", "blocks": [{"t": "p", "text": "This guide condenses the source material on hyperbaric oxygen therapy (HBOT) into a study-friendly reference. It is written in plain teaching language rather than as a copy of any text, so it can be used freely for internal onboarding, revision and discussion within the Oxydise education programme."}, {"t": "p", "text": "It opens with plain-English and foundations material for every reader, then three core chapters:"}, {"t": "ul", "items": ["Start Here + Foundations: HBOT in plain language, the physics (Boyle's and Henry's laws, how much oxygen dissolves), offgassing, air breaks, and how a session and the chamber types work.", "Chapter 1 (source Ch.6): how HBOT actually works — the mechanisms of action and the benefits each one produces.", "Chapter 2 (source Ch.7): what HBOT is used for — the recognised indications and the wider, emerging applications.", "Chapter 3 (source Ch.8): when HBOT should not be used, and what can go wrong — contraindications, adverse reactions and drug interactions."]}, {"t": "p", "text": "Each chapter follows the same layout so it is easy to revise:"}, {"t": "ul", "items": ["Overview — the big picture in a few sentences.", "Key concepts — the main ideas explained one by one.", "Key terms — a quick-reference table of definitions.", "Clinical & practical points — what it means at the chamber side.", "Review questions — to check understanding."]}, {"t": "callout", "label": "Important learning note", "text": "HBOT is a dose of a drug (oxygen) delivered under pressure. Three dials control that dose: pressure (depth, measured in ATA), oxygen concentration (the fraction breathed), and time (session length and number of sessions). Almost everything in this guide comes back to how those three dials are set for a given goal.\nProtocols are starting points, not fixed recipes. A trained practitioner is expected to adjust pressure, time and schedule for each individual patient, taking their full history and other conditions into account."}]}, {"title": "Start Here — HBOT in Plain English", "blocks": [{"t": "p", "text": "This guide is read by clinicians, by divers, and by people on the commercial and front-of-house side who need to explain HBOT clearly to customers. So before any science, here is the whole idea in everyday language. The rest of the guide then adds the detail."}, {"t": "h3", "text": "The one-paragraph version"}, {"t": "p", "text": "Hyperbaric oxygen therapy means breathing oxygen inside a sealed chamber where the air pressure is higher than normal. Two things are happening at once: you are breathing much more oxygen than usual, and you are doing it under pressure. The pressure is the trick — it forces far more oxygen than normal to dissolve straight into the watery part of your blood and into your body's fluids. That oxygen-rich fluid can then reach places that struggling blood supply cannot, and it switches on the body's own repair, anti-inflammatory and infection-fighting processes."}, {"t": "h3", "text": "A few everyday analogies"}, {"t": "p", "text": "Fizzy-drink bottle. A sealed fizzy drink has gas dissolved in the liquid because it is under pressure. Open the cap, the pressure drops, and the gas escapes as bubbles. Your body fluids behave the same way: more pressure pushes more gas into solution; less pressure lets it come back out. This single idea explains both how HBOT loads oxygen into the blood and why divers must come up slowly."}, {"t": "p", "text": "A delivery network. Normally almost all oxygen is carried by red blood cells, like parcels on a fixed set of delivery trucks. If a road is blocked (poor circulation, a clot, swelling), the parcels cannot get through and the tissue beyond starves. HBOT dissolves oxygen into the plasma — the liquid the cells float in — so oxygen can effectively seep down the back lanes and footpaths to reach areas the trucks cannot."}, {"t": "p", "text": "Watering a dried-out garden. Tissue that has been short of oxygen is like parched ground where nothing will grow. Flooding it with oxygen lets the normal processes of repair — new blood vessels, new tissue, working immune cells — start up again."}, {"t": "h3", "text": "The diving connection (for divers reading this)"}, {"t": "p", "text": "Hyperbaric medicine grew out of diving. The pressure unit used throughout this guide, the ATA (atmosphere absolute), is the same pressure idea divers live by: at the surface you are at 1 ATA; descend about 10 metres (33 feet) of seawater and you add another atmosphere, so 10 m ≈ 2 ATA, 20 m ≈ 3 ATA. A hyperbaric chamber simply recreates that “depth” on dry land. The original use of these chambers — still a recognised emergency — is treating decompression sickness (“the bends”) and gas embolism, where the chamber recompresses and clears the very bubbles a fast ascent created."}, {"t": "h3", "text": "Jargon decoder"}, {"t": "p", "text": "These technical words appear throughout the guide. Here is the plain-English version of each, so any reader can follow along."}, {"t": "table", "head": ["Term", "Definition"], "rows": [["ATA", "How much pressure (how “deep” it feels). 1 ATA = surface; 2 ATA ≈ 10 m underwater; 3 ATA ≈ 20 m."], ["Hyperoxygenation", "Loading lots of extra oxygen into the blood and body fluids."], ["Hypoxia", "Not enough oxygen reaching tissue — the core problem HBOT fixes."], ["Perfusion", "Blood flow through tissue — i.e. how well an area is being supplied."], ["Ischaemia", "Tissue cut off from its blood supply."], ["Plasma", "The watery part of blood the cells float in; where HBOT parks its extra oxygen."], ["Partial pressure", "How much push one gas (e.g. oxygen) exerts in a mix; higher push = more dissolves."], ["Angiogenesis", "Growing new blood vessels."], ["Neurogenesis", "Growing/repairing nerve tissue."], ["Cytokines", "The body's inflammation “messages”; HBOT turns the volume down on the harmful ones."], ["Oedema", "Swelling from fluid in the tissues."], ["Stem cells", "The body's spare-parts cells that can become other cell types and aid repair."], ["Telomeres", "Protective caps on the ends of our DNA that shorten as we age."], ["Senescent cells", "Worn-out “zombie” cells that linger and cause inflammation."], ["Offgassing", "Gas leaving the body's fluids as pressure is reduced — the reverse of loading it in."], ["Air break", "A short spell of breathing ordinary air during a session, to keep oxygen safe."]]}]}, {"title": "Foundations — The Physics of HBOT", "blocks": [{"t": "p", "text": "Almost everything HBOT does flows from a few simple gas laws. They are worth understanding once, because they explain the therapy, the safety rules, and the diving link all at the same time. None of the maths below is complicated — it is mostly about pressure pushing gas around."}, {"t": "h3", "text": "Pressure and the ATA"}, {"t": "p", "text": "Pressure is measured in atmospheres absolute (ATA). One ATA is the ordinary air pressure at sea level. A hyperbaric session typically takes you to between 1.3 and 3.0 ATA — the equivalent of being a few metres to about twenty metres underwater. “Absolute” simply means we are counting the surface atmosphere too, so the chamber pressure plus the atmosphere already on you."}, {"t": "callout", "label": "In plain terms:", "text": "More ATA = more pressure = more squeeze and more oxygen pushed into your fluids. Pressure is the active ingredient; oxygen is the cargo it carries in."}, {"t": "h3", "text": "Boyle's Law — why bubbles shrink"}, {"t": "p", "text": "Boyle's Law: at a fixed temperature, the volume of a gas falls as pressure rises (squeeze a balloon and it gets smaller). In the body this is what shrinks dangerous gas bubbles — the kind seen in decompression sickness and air embolism. At about 3 ATA a bubble is compressed to roughly a third of its surface volume, which helps unblock vessels and lets the body clear the gas."}, {"t": "callout", "label": "In plain terms:", "text": "Pressure literally crushes bubbles smaller. This is the original reason chambers were built — to treat divers with the bends."}, {"t": "h3", "text": "Henry's Law — the heart of HBOT"}, {"t": "p", "text": "Henry's Law is the single most important idea in the therapy. It says: the amount of a gas that dissolves into a liquid is directly proportional to the partial pressure of that gas pressing on the liquid. Double the pressure of the gas and you roughly double how much dissolves; raise it many-fold and far more goes into solution."}, {"t": "p", "text": "Two levers raise oxygen's partial pressure, and HBOT pulls both at once. First, breathing a higher concentration of oxygen — up to 100% instead of the 21% in air. Second, raising the overall pressure in the chamber. Multiply the two together and the partial pressure of oxygen in the lungs, and therefore the amount forced into the plasma, climbs dramatically."}, {"t": "callout", "label": "In plain terms:", "text": "Think of the fizzy-drink bottle. Henry's Law is why a pressurised bottle holds so much dissolved gas. HBOT pressurises you so your blood plasma can hold far more dissolved oxygen than normal. Let the pressure off slowly at the end and that extra gas comes back out gently — that is offgassing."}, {"t": "h3", "text": "How much extra oxygen actually dissolves?"}, {"t": "p", "text": "Normally, the plasma (the liquid part of blood) carries almost no oxygen on its own — only about 0.3 millilitres of oxygen per 100 millilitres of blood at sea level breathing air. Nearly all oxygen rides on haemoglobin in the red cells, which carry roughly 20 mL per 100 mL. The point of HBOT is to load up that normally-empty plasma. Because haemoglobin is already almost fully loaded at sea level, the only way to add a lot more oxygen is to dissolve it into the plasma — and that is exactly what pressure does."}, {"t": "p", "text": "The figures below are approximate textbook values (real numbers vary with the person and conditions), but they show the scale of the effect. “Vol%” means millilitres of oxygen dissolved in the plasma per 100 mL of blood; PaO₂ is the oxygen pressure in arterial blood; the “×” compares each value with the sea-level air baseline of 0.3 vol%. The table shows both columns side by side: breathing ordinary air (21% oxygen) under pressure, and breathing 100% oxygen — so you can see exactly what the oxygen itself is adding at each pressure. The shaded rows are the pressures we typically operate at (1.3, 1.5, 1.8 and 2.0 ATA)."}, {"t": "table", "head": ["Pressure", "Air 21% — PaO₂", "Air 21% — dissolved", "100% O₂ — PaO₂", "100% O₂ — dissolved"], "rows": [["1.0 ATA", "~100", "~0.3 vol% (1×)", "~670", "~2.0 vol% (7×)"], ["1.3 ATA", "~150", "~0.45 vol% (1.5×)", "~890", "~2.7 vol% (9×)"], ["1.5 ATA", "~180", "~0.55 vol% (1.8×)", "~1,045", "~3.1 vol% (10×)"], ["1.8 ATA", "~225", "~0.7 vol% (2.3×)", "~1,270", "~3.8 vol% (13×)"], ["2.0 ATA", "~260", "~0.8 vol% (2.6×)", "~1,420", "~4.3 vol% (14×)"], ["2.4 ATA", "~325", "~1.0 vol% (3.2×)", "~1,725", "~5.2 vol% (17×)"], ["3.0 ATA", "~420", "~1.25 vol% (4.2×)", "~2,000+", "~6.5 vol% (~20×)"]]}, {"t": "p", "text": "Reading our operating range. At the lower pressures we use, the gain from pressure alone (the air column) is modest — at 1.3 ATA breathing air, dissolved oxygen only rises from 0.3 to about 0.45 vol%. The big jump comes from the oxygen: at the same 1.3 ATA, breathing 100% oxygen lifts dissolved plasma oxygen to roughly 2.7 vol% — about nine times baseline. By 2.0 ATA on 100% oxygen it is around 4.3 vol% (about fourteen times). In short, across our 1.3–2.0 ATA range, pressure roughly doubles to triples the dissolved oxygen on its own, but adding 100% oxygen multiplies it roughly eight- to fifteen-fold."}, {"t": "callout", "label": "In plain terms:", "text": "Two levers, very different sizes. Going deeper (more ATA) helps a bit; switching from air to oxygen helps a lot. The two multiply together — which is why even our gentler pressures deliver a large oxygen dose when 100% oxygen is used."}, {"t": "p", "text": "A note on oxygen concentrators (not 100% oxygen). Many mild-chamber setups breathe oxygen from a concentrator rather than pure (100%) oxygen. A good concentrator delivers somewhere around 90–95% oxygen at the mask, so the figures sit just below the 100% column — e.g. at 1.5 ATA a 90–95% supply gives roughly 2.8–3.0 vol%, only a touch under the ~3.1 vol% of pure oxygen. If instead only an enriched mix reaches the person (say ~40%), the effect is far smaller: about 1.0–1.2 vol% at 1.5 ATA. The takeaway: what matters is the oxygen fraction actually delivered to the lungs — the closer to 100%, the closer to the right-hand column."}, {"t": "p", "text": "The headline at full clinical pressure: at around 3 ATA on 100% oxygen, the plasma alone carries roughly 6–6.5 vol% of dissolved oxygen — about twenty times the sea-level baseline. That figure matters because the body's tissues, at rest, extract only about 5–6 vol% from the blood. In other words, at 3 ATA the dissolved oxygen in the plasma is, on its own, almost enough to meet the body's resting needs — even with little or no working haemoglobin."}, {"t": "h3", "text": "“Life Without Blood” — the experiment that proved it"}, {"t": "callout", "label": "Boerema's pigs (1959–1960)", "text": "The Dutch surgeon Ite Boerema set out to test whether dissolved plasma oxygen alone could sustain life. He took healthy pigs, drained out their blood and replaced it with a blood-free, plasma-like fluid — leaving a haemoglobin level of about 0.4 g/dL, normally far too low to survive.\nHe then placed the pigs in a hyperbaric chamber at 3 ATA on oxygen. The animals stayed alive and well with essentially no red blood cells, sustained purely by the oxygen dissolved in their plasma, and recovered fully once their blood was returned.\nPublished as “Life Without Blood,” this remains the classic demonstration of Henry's Law in medicine — and it is exactly why HBOT can keep tissue alive in severe anaemia when transfusion is not possible."}, {"t": "h3", "text": "Dalton's Law and partial pressures (briefly)"}, {"t": "p", "text": "In a mix of gases, each gas exerts its own share of the total pressure — its partial pressure — in proportion to how much of the mix it makes up (Dalton's Law). HBOT works by deliberately driving up oxygen's partial pressure (more oxygen in the mix, at higher total pressure) while, when breathing pure oxygen, removing nitrogen from the equation almost entirely. That last point leads straight to offgassing."}, {"t": "h3", "text": "Offgassing and nitrogen washout"}, {"t": "p", "text": "Loading gas into the body's fluids under pressure is only half the story; getting it back out safely is the other half. Offgassing is the gradual release of dissolved gas from tissues and fluids as pressure is reduced — the slow, controlled version of the fizzy bottle being opened."}, {"t": "p", "text": "Two related ideas matter here:"}, {"t": "ul", "items": ["Nitrogen washout. Ordinary air is about 78% nitrogen, and our tissues are saturated with it. When a person breathes 100% oxygen, there is no nitrogen coming in, so nitrogen steadily diffuses out of the tissues and is exhaled — “washed out.” This is useful in two ways: it steepens the gradient that pulls unwanted gases (including nitrogen in decompression sickness) out of bubbles and tissues, and it is part of how the body is prepared to release gas cleanly.", "Controlled decompression. At the end of a session the chamber pressure is brought down slowly so that the extra dissolved gas leaves solution gently and is breathed off, rather than forming bubbles. This is the same reason a diver ascends slowly and makes safety stops: come up too fast and dissolved gas erupts into bubbles, causing decompression sickness. A chamber does in reverse, and under control, exactly what a careful ascent does."]}, {"t": "callout", "label": "In plain terms:", "text": "Loading oxygen in is Henry's Law working for you under pressure; offgassing is Henry's Law working in reverse as the pressure comes off. Done slowly, gas leaves quietly. Done too fast, it bubbles — which is the bends."}, {"t": "h3", "text": "Air breaks — keeping the oxygen dose safe"}, {"t": "p", "text": "Oxygen is a drug, and like any drug too much for too long can harm. Breathing 100% oxygen continuously raises the risk of oxygen toxicity — irritation of the central nervous system (which can, rarely, trigger a seizure) and, over longer exposures, irritation of the lungs. The standard safeguard is the air break: at planned intervals during a session (commonly around every 20–30 minutes), the person breathes ordinary air for a few minutes before returning to oxygen."}, {"t": "p", "text": "Air breaks help in several ways:"}, {"t": "ul", "items": ["They lower the cumulative oxygen dose. Oxygen exposure is tracked in Oxygen Tolerance Units (OTUs / UPTD); short air breaks pull the running total down and keep it under the threshold where toxicity becomes likely.", "They give the most oxygen-sensitive systems — the brain and the lungs — a brief recovery, much as resting a muscle between sets prevents strain.", "They appear to enhance the benefit, not just the safety. Swinging between high oxygen and a relatively lower-oxygen “break” is thought to amplify the regenerative signals HBOT triggers — the basis of the “hyperoxic–hypoxic paradox” discussed under anti-aging."]}, {"t": "callout", "label": "In plain terms:", "text": "An air break is a planned breather — a few minutes on normal air partway through — that keeps oxygen on the right side of safe and may even make the therapy work better."}]}, {"title": "How a Session Works & Types of Chamber", "blocks": [{"t": "p", "text": "This section is deliberately practical — useful for explaining HBOT to a newcomer, and for divers who will recognise much of it. It describes general practice rather than any single clinic's protocol."}, {"t": "h3", "text": "What a typical session feels like"}, {"t": "p", "text": "A session has three phases that mirror a dive:"}, {"t": "ul", "items": ["Compression (the “descent”). The chamber is gradually pressurised. The only thing most people notice is a fullness in the ears, exactly like landing in a plane or descending on a dive. Clearing the ears — swallowing, yawning, or a gentle Valsalva (pinch the nose and blow softly) — equalises the pressure and removes the sensation. The chamber may feel warm during this phase (compressing gas heats it).", "At pressure (the “bottom time”). Once at the target pressure, the person rests and breathes oxygen, usually for somewhere between about 60 and 90 minutes. They can typically relax, listen to music or doze. Planned air breaks are taken during this phase.", "Decompression (the “ascent”). The pressure is slowly released. Ears may click or pop as they re-equalise, and the chamber cools slightly. Going slowly is what allows safe offgassing."]}, {"t": "p", "text": "A course of treatment is usually many sessions — often daily over several weeks — because the regenerative effects (new vessels, tissue repair, the cellular changes behind anti-aging) build up cumulatively rather than from a single visit."}, {"t": "h3", "text": "Hard chambers: monoplace vs multiplace"}, {"t": "p", "text": "Clinical (“hard”) chambers are built to reach the full therapeutic pressures (commonly up to 3 ATA) and to deliver 100% oxygen. They come in two broad types:"}, {"t": "ul", "items": ["Monoplace chamber — a single-person tube. The whole chamber is usually filled with oxygen, and the person lies inside. Compact and common in smaller clinics.", "Multiplace chamber — a room that holds several people (and, if needed, a clinician or “tender” inside). The room is pressurised with air, and each person breathes oxygen through a mask or hood. This allows hands-on care during treatment and suits emergencies and larger services."]}, {"t": "h3", "text": "Hard vs “mild” (soft) chambers"}, {"t": "p", "text": "It is worth being clear with customers about a key distinction, because the two are often confused:"}, {"t": "ul", "items": ["Clinical/hard HBOT reaches higher pressures (typically 2.0–3.0 ATA) and usually delivers near-100% oxygen. This is the setting nearly all of the indications and research in this guide refer to.", "Mild hyperbaric (mHBOT), often in soft/inflatable chambers, operates at lower pressures (commonly around 1.3 ATA) and frequently with oxygen concentrators rather than pure oxygen. It is gentler and more accessible, and is widely used for wellness, recovery and some neurological applications — but it is not equivalent to clinical HBOT, and most published indication research is based on the higher-pressure protocols."]}, {"t": "callout", "label": "In plain terms:", "text": "“Higher pressure + purer oxygen = a bigger dose.” Both hard and mild chambers can help, but they are different doses of the same medicine, and it is important not to imply mild chambers match clinical results."}, {"t": "p", "text": "Whichever the setting, the safety chapter still applies — the same contraindications, the same need to equalise ears, and the same respect for the oxygen dose."}]}, {"title": "Chapter 1 — Mechanisms of Action and Benefits of HBOT", "blocks": [{"t": "p", "text": "(Source chapter 6)"}, {"t": "h3", "text": "Overview"}, {"t": "p", "text": "This chapter explains the biological reasons HBOT produces results. The central message is that a practitioner should understand the mechanism they are trying to trigger first, and then design the protocol around it — rather than reaching for a fixed, condition-based recipe. Knowing the desired mechanism lets the clinician choose the right pressure, oxygen percentage and time, and apply the principle of the minimum effective dose: use the least oxygen exposure needed to get the intended effect."}, {"t": "p", "text": "The chapter also sets the historical and scientific context. Hyperbaric medicine has existed in some form for centuries and has been used clinically for over a hundred years, but until molecular and cellular biology matured in the mid-20th century, no one could explain how it worked. That gap allowed sceptics to dismiss it. Modern understanding of DNA, epigenetics and cell signalling has since provided the evidence base, moving HBOT into mainstream medicine. The authors frame all of this through the scientific method — observation, background research, hypothesis, experiment, analysis and communication — and argue the field should be led by science rather than by outdated politics and over-regulation."}, {"t": "callout", "label": "The thirteen mechanisms at a glance", "text": "1. Decreased bubble size   2. Hyperoxygenation   3. Reduced lipid peroxidation\n4. Vasoconstriction   5. Reduced intravascular leukocyte adherence   6. Toxin inhibition\n7. Leukocyte oxidative killing   8. Antibiotic synergy\n9. Growth factor release (angiogenesis / neurogenesis / mitogenesis)\n10. Fibroblast proliferation & collagen synthesis   11. Stem-cell proliferation\n12. Increased reverse transcriptase (telomerase) activity   13. Reduced cytokine activity (less inflammation)"}, {"t": "h3", "text": "Key Concepts"}, {"t": "h4", "text": "1. Decreased bubble size"}, {"t": "p", "text": "When gas bubbles form in the body — as in decompression sickness or an arterial gas embolism — they can block vessels and starve tissue of oxygen. HBOT shrinks these bubbles in two ways. First, pressure itself compresses them, following Boyle's law (as pressure rises, gas volume falls; at 3 ATA a bubble drops to roughly a third of its surface volume). Second, breathing high oxygen creates a steep diffusion gradient (Henry's law) that washes inert gas such as nitrogen out of the bubble and into solution, where the body can clear it."}, {"t": "p", "text": "Benefits: improved circulation as blocked vessels reopen; better gas exchange; increased bubble surface tension that discourages bubbles from re-forming or merging; a lower risk of embolism; and relief of bubble-related pain and symptoms."}, {"t": "p", "text": "Protocol logic: pressure is the active ingredient here, so protocols use higher pressures (up to about 3.0 ATA), with or without added oxygen. Deeper air-based pressure can help when problems persist. Sessions tend to be long (sometimes over 200 minutes), with air breaks used to hold off oxygen toxicity."}, {"t": "h4", "text": "2. Hyperoxygenation"}, {"t": "p", "text": "Under pressure, far more oxygen dissolves directly into the blood plasma, independent of haemoglobin. This dissolved oxygen can reach tissue that red cells cannot — past blockages and through poorly perfused areas — and can support cellular respiration on its own. The driving force is the raised partial pressure of oxygen (PaO2): a bigger gradient pushes more oxygen into the tissues."}, {"t": "p", "text": "Benefits: greater mitochondrial efficiency and ATP (cellular energy) production; rescue of hypoxic cells; displacement of harmful gases such as carbon monoxide from haemoglobin; and re-establishment of the oxygen gradient needed for wound, trauma and post-surgical healing. Hypoxia normally stalls healing by activating HIF-1 and slowing the electron transport chain; restoring oxygen reverses this and restarts normal repair."}, {"t": "p", "text": "Three dials that set the dose: pressure (higher pressure dissolves more oxygen), oxygen concentration (higher fraction = more absorption), and exposure time (longer sessions absorb more)."}, {"t": "h4", "text": "3. Reduced lipid peroxidation"}, {"t": "p", "text": "Lipid peroxidation is oxidative damage to the fats that make up cell membranes. It might seem paradoxical that giving more oxygen reduces oxidative damage, but HBOT up-regulates the body's own antioxidant defences, so that over a course of treatment the net oxidative burden on membranes falls. The chapter frames controlled, low-level oxidative stress as hormesis — a mild stress that makes cells stronger — while preventing the runaway oxidation that harms tissue."}, {"t": "p", "text": "Benefits: preservation of cell-membrane integrity, mitigation of harmful oxidative stress, and protective “hormetic” conditioning. This mechanism is also part of why HBOT is discussed in the context of cancer and neurological protection."}, {"t": "p", "text": "Safety practice: to avoid tipping patients into oxygen toxicity, expose them to rising PO2 slowly over a series of treatments and consider pre-treating with antioxidants."}, {"t": "h4", "text": "4. Vasoconstriction"}, {"t": "p", "text": "High oxygen causes blood vessels to narrow. This sounds counter-productive, but because the blood is now so oxygen-rich, tissues still receive plenty of oxygen even with reduced flow. The narrowing reduces fluid leaking into tissues, which is useful where swelling is a problem."}, {"t": "p", "text": "Benefits: less vasogenic oedema (swelling from leaky vessels) and less cytotoxic oedema; a lower chance of oxygen toxicity in some settings; and a reduced diffusion barrier so oxygen reaches cells more easily. Particularly valuable in crush injuries, compartment syndrome and burns where oedema is dangerous."}, {"t": "p", "text": "Caution: vasoconstriction can raise blood pressure, so it must be monitored in patients who are already hypertensive."}, {"t": "h4", "text": "5. Reduced intravascular leukocyte adherence"}, {"t": "p", "text": "After injury or reperfusion, white blood cells (leukocytes) stick to the inner vessel wall and trigger an inflammatory cascade that can cause secondary damage. HBOT reduces this excessive sticking."}, {"t": "p", "text": "Benefits: less reperfusion injury, reduced inflammation, and fewer secondary blockages of small vessels by clumped immune cells — all while preserving the leukocytes' normal ability to fight infection (the goal is to calm over-reaction, not to disable immunity)."}, {"t": "h4", "text": "6. Toxin inhibition"}, {"t": "p", "text": "Oxygen at pressure interferes directly with the toxins produced by certain microorganisms, especially anaerobes (bacteria that thrive without oxygen). By disrupting their anaerobic metabolism, HBOT stops toxin production and slows the organisms themselves."}, {"t": "p", "text": "Benefits: neutralises toxins in conditions like clostridial infections; supports liver detoxification; and contributes to neurological protection by helping reduce harmful cytokine levels and supporting repair. Clinical studies support its use against toxin-mediated disease."}, {"t": "h4", "text": "7. Leukocyte oxidative killing"}, {"t": "p", "text": "White cells destroy swallowed bacteria using an “oxidative burst” that depends on oxygen. In poorly oxygenated tissue this killing power drops. By flooding tissue with oxygen, HBOT restores and enhances the oxidative burst."}, {"t": "p", "text": "Benefits: improved clearance of microbes, lower infection risk, and stronger killing of bacteria that the immune system has already engulfed — especially important in hypoxic, infected wounds."}, {"t": "h4", "text": "8. Antibiotic synergy"}, {"t": "p", "text": "Synergy means the combination works better than the sum of its parts. HBOT improves the performance of several antibiotics, partly by raising tissue oxygen (some drugs need oxygen to work) and partly by improving drug penetration into poorly perfused tissue."}, {"t": "p", "text": "Benefits: HBOT is commonly used as an adjunct to antibiotics; it shows synergy across a range of infections and can make otherwise stubborn infections treatable."}, {"t": "h4", "text": "9. Growth factor release (angiogenesis / neurogenesis / mitogenesis)"}, {"t": "p", "text": "HBOT prompts the release of molecular signals (growth factors such as VEGF and basic fibroblast growth factor) that drive three kinds of new growth: angiogenesis (new blood vessels), neurogenesis (new nerve tissue and neuroplastic repair) and mitogenesis (cell division)."}, {"t": "p", "text": "Benefits: new vessels improve long-term blood supply to damaged areas; nerve repair underpins HBOT's use in brain injury and neurological conditions; and increased cell division supports tissue regeneration generally."}, {"t": "h4", "text": "10. Fibroblast proliferation and collagen synthesis"}, {"t": "p", "text": "Fibroblasts are the cells that build the structural protein collagen, the scaffold of healed tissue. Both fibroblast activity and collagen formation are oxygen-dependent — collagen production requires the hydroxylation of the amino acids proline and lysine, which cannot happen without oxygen."}, {"t": "p", "text": "Benefits: drives the proliferative phase of wound healing, strengthens new tissue, and is essential to closing wounds that have stalled for lack of oxygen."}, {"t": "h4", "text": "11. Stem-cell proliferation"}, {"t": "p", "text": "HBOT mobilises and multiplies the body's own stem cells, which can then travel to damaged areas and assist repair."}, {"t": "p", "text": "Benefits & protocol numbers: a typical stem-cell protocol is 100% oxygen at 2.0–2.5 ATA for about 90 minutes. The source reports a roughly eight-fold increase in stem-cell proliferation over a course at these pressures, with figures in the region of a 2.5–3× increase also cited. Stem-cell effects tie closely to neurogenesis, growth-factor release and angiogenesis."}, {"t": "h4", "text": "12. Increased reverse transcriptase (telomerase) activity"}, {"t": "p", "text": "Telomeres are protective caps on the ends of chromosomes that shorten as cells age. Telomerase (a reverse transcriptase that builds DNA from an RNA template) can lengthen them. HBOT has been associated with increased reverse-transcriptase/telomerase activity, which is part of the anti-ageing discussion."}, {"t": "p", "text": "Benefits: potential lengthening of telomeres and support for cellular longevity — a mechanism still being researched but central to HBOT's anti-ageing rationale."}, {"t": "h4", "text": "13. Reduced cytokine activity (less inflammation)"}, {"t": "p", "text": "Cytokines are signalling molecules that, in excess, sustain chronic inflammation. HBOT lowers pro-inflammatory cytokine activity, calming inflammation that would otherwise damage tissue or prevent healing."}, {"t": "p", "text": "Benefits: reduced chronic inflammation underlies HBOT's role in autoimmune-type conditions, neurological injury, pain syndromes and recovery — and links back to mechanisms 3, 5 and 7."}, {"t": "h3", "text": "Background: hypoxia and the science framing"}, {"t": "p", "text": "Because so many mechanisms exist to correct oxygen shortage, the chapter classifies the main types of hypoxia (oxygen deficiency):"}, {"t": "ul", "items": ["Hypoxic hypoxia — not enough oxygen reaching the blood in the first place (e.g. altitude, lung problems).", "Anemic hypoxia — the blood's oxygen-carrying capacity is reduced (e.g. low haemoglobin, carbon monoxide poisoning).", "Stagnant hypoxia — blood flow is too slow or blocked, so oxygen does not arrive (e.g. crush injury, ischaemia).", "Histotoxic hypoxia — oxygen arrives but cells cannot use it (e.g. certain poisonings)."]}, {"t": "p", "text": "HBOT helps across several of these because dissolved oxygen can bypass the carrier and the circulation to reach cells directly."}, {"t": "h3", "text": "Key Terms"}, {"t": "table", "head": ["Term", "Definition"], "rows": [["ATA", "Atmospheres absolute — the unit of pressure used in HBOT. Higher ATA = greater depth/pressure."], ["Mechanism of action (MOA)", "The specific biological process by which a therapy produces its effect."], ["Minimum effective dose", "The smallest oxygen exposure (pressure × concentration × time) that achieves the intended effect."], ["Boyle's law", "As pressure increases, gas volume decreases — explains physical compression of bubbles."], ["Henry's law", "More gas dissolves into a liquid as its partial pressure rises — explains dissolved oxygen and bubble washout."], ["PaO2", "Partial pressure of oxygen in arterial blood; the driving force pushing oxygen into tissue."], ["Hyperoxygenation", "Dissolving large amounts of oxygen into plasma so it reaches tissue independently of haemoglobin."], ["Lipid peroxidation", "Oxidative damage to cell-membrane fats; reduced over a course of HBOT via boosted antioxidant defences."], ["Hormesis", "Beneficial adaptation produced by a mild, controlled stress (here, low-level oxidative stress)."], ["Vasoconstriction", "Narrowing of blood vessels; reduces swelling while oxygen-rich blood still supplies tissue."], ["Leukocyte", "White blood cell; central to immune defence and to inflammation."], ["Angiogenesis", "Formation of new blood vessels."], ["Neurogenesis", "Formation/repair of nerve tissue."], ["Mitogenesis", "Stimulation of cell division."], ["Fibroblast", "Cell that produces collagen, the structural scaffold of healed tissue."], ["Telomere / telomerase", "Protective chromosome caps / the enzyme that lengthens them; linked to ageing."], ["Cytokine", "Signalling molecule of the immune system; excess drives chronic inflammation."], ["HIF-1", "Hypoxia-inducible factor-1; a switch activated by low oxygen that slows energy production."]]}, {"t": "h3", "text": "Clinical & Practical Points"}, {"t": "ul", "items": ["Treat oxygen as a drug: decide the mechanism you want, then set pressure, concentration and time to match.", "Protocols are guidelines, not fixed prescriptions — adjusting depth, time and schedule for the individual patient is expected and, the source argues, required.", "Most practitioners receive little formal HBOT training in medical school, so additional, field-specific learning matters for both safety and outcomes.", "Bubble problems → favour pressure (up to ~3.0 ATA) and longer sessions with air breaks.", "Healing, regeneration and neurological goals → favour the growth-factor, stem-cell, fibroblast and cytokine-reduction mechanisms, often around 2.0–2.5 ATA for ~90 minutes.", "Watch blood pressure when vasoconstriction is in play, and ramp PO2 up gradually to limit oxygen-toxicity risk."]}, {"t": "h3", "text": "Review Questions"}, {"t": "ul", "items": ["Name the three “dials” that determine an HBOT dose and give an example of adjusting one.", "Explain, using Boyle's and Henry's laws, the two ways HBOT shrinks a gas bubble.", "Why can dissolved plasma oxygen reach tissue that red blood cells cannot?", "How can giving more oxygen ultimately reduce lipid peroxidation? Mention hormesis.", "Vasoconstriction reduces blood flow — why does tissue oxygenation not suffer, and what must be monitored?", "Distinguish leukocyte oxidative killing from reduced leukocyte adherence — how can HBOT support one while reducing the other?", "List the three growth processes stimulated by growth-factor release and a clinical use of each.", "Why are fibroblast activity and collagen synthesis described as oxygen-dependent?", "State a typical stem-cell protocol and the kind of increase in stem-cell proliferation reported.", "Match each hypoxia type (hypoxic, anemic, stagnant, histotoxic) to a clinical example."]}]}, {"title": "Chapter 2 — Hyperbaric Indications", "blocks": [{"t": "p", "text": "(Source chapter 7)"}, {"t": "h3", "text": "Overview"}, {"t": "p", "text": "Where Chapter 1 explained how HBOT works, this chapter covers what it is used for. It separates two groups: a set of well-established, formally recognised indications (the conditions for which HBOT has long been accepted), and a much larger set of emerging or “off-label” applications where evidence is growing. For each condition the source follows a consistent template — the rationale, the mechanism(s) of action involved, patient-selection criteria, and clinical management notes (typical pressure, session length and number of sessions)."}, {"t": "p", "text": "This expanded version adds, for every condition, the “thought mechanism of help” — the underlying reasoning for why oxygen under pressure should benefit that particular problem. The recurring lesson is that the same thirteen mechanisms from Chapter 1 reappear in different combinations; learning to see which ones are doing the work is what lets a practitioner reason about a new condition rather than memorise a list."}, {"t": "callout", "label": "How to read an indication", "text": "What it is — a plain description of the condition.\nThought mechanism of help — the chain of reasoning: what goes wrong, and how oxygen under pressure should correct it.\nMechanisms of action — which of the thirteen mechanisms are responsible.\nTypical protocol — representative pressure (ATA), session length and number of sessions. These are illustrative starting points, always individualised."}, {"t": "p", "text": "A note on units used throughout: ATA = atmospheres absolute (pressure/depth); BID = twice daily; TID = three times daily; QD = once daily; fsw = feet of seawater."}, {"t": "h3", "text": "Recognised / established indications"}, {"t": "p", "text": "These conditions have the strongest acceptance and the clearest protocols, and map closely to the classic list of approved hyperbaric indications. Several have strong supporting studies; all rely on well-understood physiology."}, {"t": "h4", "text": "1. Air or gas embolism (AGE)"}, {"t": "p", "text": "Gas bubbles enter the bloodstream and block flow to the brain or other organs. The source notes these often arise iatrogenically — from procedures such as surgery, biopsy, tumour ablation and arterial catheterisation — or from environmental causes such as blast explosions that force air into vessels."}, {"t": "p", "text": "Thought mechanism of help: A bubble in an artery acts like a cork, cutting off oxygen downstream. Pressure physically compresses the bubble (Boyle's law) while breathing high oxygen sets up a steep gradient that washes the trapped gas out of the bubble into solution (Henry's law). As the bubble shrinks and dissolves, flow is restored and the dissolved oxygen keeps the threatened tissue alive in the meantime. This is a true emergency — speed limits the damage."}, {"t": "p", "text": "Mechanisms of action: Decreased bubble size, hyperoxygenation."}, {"t": "h4", "text": "2. Carbon monoxide (CO) poisoning"}, {"t": "p", "text": "CO inhaled from burning carbon-based fuel takes the place of oxygen on haemoglobin, starving tissues. Haemoglobin saturation that should be ~97% falls, and the oxygen-dissociation curve shifts left so what oxygen remains is held too tightly to release."}, {"t": "p", "text": "Thought mechanism of help: CO binds haemoglobin roughly 200–300 times more strongly than oxygen, forming carboxyhaemoglobin (COHb). The fix is twofold: flood the plasma with so much dissolved oxygen that tissues are supplied even while haemoglobin is blocked, and use the sheer partial pressure of oxygen to physically displace CO off the haemoglobin. The effect on CO's half-life is dramatic — about 6 hours on room air, ~75 minutes on surface 100% oxygen, and around 23 minutes on oxygen at 3.0 ATA. HBOT also helps CO let go of cytochrome-c oxidase inside cells and reduces brain lipid peroxidation, which matters for preventing delayed neurological injury."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, reduced lipid peroxidation."}, {"t": "p", "text": "Typical protocol: Up to three sessions of 100% oxygen at ~3.0 ATA, air breaks as needed. Assess COHb levels; patients with sickle-cell anaemia or heavy exposure warrant particular attention. Delayed neurological or vascular sequelae can justify additional sessions even after the acute phase."}, {"t": "h4", "text": "3. Arterial insufficiencies (incl. central retinal artery occlusion, CRAO)"}, {"t": "p", "text": "Arterial insufficiency means tissue is starved of arterial blood. The headline acute example is CRAO — sudden, painless loss of vision when the central retinal artery blocks, classically with a pale retina and a cherry-red spot at the macula."}, {"t": "p", "text": "Thought mechanism of help: The retina has one of the highest oxygen demands in the body and little tolerance for ischaemia. If arterial supply fails, dissolved plasma oxygen delivered under pressure can keep the inner retina alive by diffusion alone — buying time for the clot to clear or be treated. Because retinal cells die quickly, HBOT is treated as a sight-saving emergency to be given without delay."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation."}, {"t": "h4", "text": "4. Clostridial myonecrosis (gas gangrene)"}, {"t": "p", "text": "A necrotising, rapidly spreading infection — chiefly by Clostridium perfringens, a spore-forming, anaerobic, Gram-positive bacillus — that produces alpha-toxin (lecithinase) and destroys tissue. Mortality is high (cited from ~30% up toward 100%)."}, {"t": "p", "text": "Thought mechanism of help: Clostridia thrive only where oxygen is absent and they kill partly through secreted toxins. Saturating the tissue with oxygen does three things at once: it poisons the oxygen-hating bacteria, it shuts down their anaerobic toxin production, and it restores the white cells' oxygen-dependent killing power. A telling clinical clue is severe pain out of proportion to what the area looks like — a reason to consider HBOT early, before visible gangrene."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, toxin inhibition, leukocyte oxidative killing, collagen formation."}, {"t": "p", "text": "Typical protocol: Aggressive: ~10–12 sessions of 100% oxygen at 3.0 ATA for ~90 minutes — three times daily for the first 24 hours, then twice daily for 2–5 days. The goal is to arrest the infection."}, {"t": "h4", "text": "5. Compromised grafts and flaps"}, {"t": "p", "text": "A skin graft or flap covers a wound, but its survival depends on blood and oxygen reaching it. Grafts can become “compromised” when that supply is marginal — e.g. after burns, amputations or irradiated wound beds."}, {"t": "p", "text": "Thought mechanism of help: A struggling graft is essentially tissue on the edge of hypoxia. Raising dissolved oxygen keeps the marginal tissue alive, while stimulating new blood-vessel growth (angiogenesis) builds the lasting supply the graft needs to “take.” Added benefits — stronger white-cell killing, fibroblast and collagen activity, and stem-cell mobilisation — reinforce the healing response so the graft adheres."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, angiogenesis, leukocyte oxidative killing, fibroblast proliferation/collagen synthesis, stem-cell mobilisation."}, {"t": "p", "text": "Typical protocol: Up to ~20 sessions of 100% oxygen at 2.0–2.5 ATA, 90–120 minutes; BID for the first 24–48 hours, then QD."}, {"t": "h4", "text": "6. Crush injury / compartment syndrome"}, {"t": "p", "text": "Severe trauma (road accidents, falls, crushing loads, sometimes snake bites) injures multiple tissue types. Swelling inside a fixed muscle compartment then chokes off its own blood supply — compartment syndrome."}, {"t": "p", "text": "Thought mechanism of help: The danger is a vicious cycle: injury causes swelling, swelling cuts off circulation, the resulting hypoxia causes more swelling. HBOT breaks the cycle from two directions — dissolved oxygen reaches the hypoxic tissue directly, while oxygen-induced vasoconstriction reduces the oedema (less leaky-vessel swelling). Reducing leukocyte adherence and lipid peroxidation limits the secondary reperfusion damage. Decisions are guided by grading systems and signs such as pain out of proportion to injury, altered sensation, weakness and a tense compartment."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, vasoconstriction (oedema reduction), reduced leukocyte adherence, reduced lipid peroxidation."}, {"t": "p", "text": "Typical protocol: Up to ~14 sessions of 100% oxygen at 2.0–2.5 ATA, 90–120 minutes; BID for the first ~48 hours, then QD."}, {"t": "h4", "text": "7. Decompression sickness (DCS)"}, {"t": "p", "text": "The classic diving injury: dissolved inert gas (mainly nitrogen) comes out of solution as bubbles when ambient pressure drops too quickly — on ascent from a dive, rapid altitude change, or chamber use. Pain is the most common symptom."}, {"t": "p", "text": "Thought mechanism of help: Recompression shrinks the bubbles (Boyle's law) and high oxygen both
