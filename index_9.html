], ["Angiogenesis (new blood vessels)", "Oxygen gradients and intermittent exposure can support VEGF-related signalling, new blood-vessel formation and the collagen needed for repair.", "Slow healing, vascular recovery, post-surgery, skin and tissue repair."]]}, {"t": "p", "text": "→ Full detail: see Part B (4.12 The thirteen mechanisms) and the HBOT Study Guide."}, {"t": "h3", "text": "4.5 The oxygen concentrator - why our equipment is different"}, {"t": "p", "text": "This is central to how we explain that our equipment is better than the competition. Most home and mild-chamber systems do not breathe bottled 100% oxygen; they use an oxygen concentrator. A good concentrator delivers around 90-95% oxygen at the mask, so its delivered dose sits just below the 100% oxygen column. If the breathing circuit only delivers a much lower enriched mix, the dose is much lower - so what matters is the oxygen actually reaching the mask, session after session."}, {"t": "p", "text": "Inside the concentrator are zeolite sieve beds - a mineral with microscopic cage-like pores that trap nitrogen and let oxygen-rich gas pass to the mask. Most units use two beds: while one is online and adsorbing nitrogen, the other depressurises, releases its nitrogen and regenerates, switching every few seconds for a continuous supply. The quality points below are where engineering - and Oxydise - make the difference."}, {"t": "table", "head": ["Quality point", "Why it matters", "Oxydise way to say it"], "rows": [["Zeolite quality", "Different sieve materials vary in adsorption performance and durability.", "“The material inside the sieve bed matters, not just the label on the machine.”"], ["Quantity of zeolite", "More capacity and better design help the bed maintain output under repeated use.", "“We care about stable oxygen delivery session after session.”"], ["Moisture management", "Water vapour can occupy adsorption sites and reduce nitrogen capture.", "“Moisture is one of the main enemies of long-term oxygen purity.”"], ["Regeneration cycle", "Bed switching must fully release nitrogen before the next cycle.", "“Good engineering keeps the beds regenerating cleanly.”"], ["Long-term oxygen purity", "Day-one output matters less than performance after months of use.", "“The difference is consistency over time.”"]]}, {"t": "p", "text": "Customer script: &#x201C;Inside the concentrator are zeolite sieve beds. Their job is to remove nitrogen from room air so the mask receives oxygen-rich air. Zeolite quality, bed size, moisture control and cycling design all affect whether oxygen output stays consistent over time. That is why Oxydise focuses on engineering detail and long-term performance, not only headline numbers.&#x201D;"}, {"t": "p", "text": "Important equipment distinction: the chamber is pressurised with air; concentrated oxygen is delivered through the intended breathing circuit. Never imply the whole chamber is filled with pure oxygen."}, {"t": "h3", "text": "4.6 On-label and off-label - the summary by area"}, {"t": "p", "text": "HBOT has recognised medical indications (the “on-label” uses) and a wider set of mechanism-led wellness uses (“off-label”). Off-label does not mean “made up” - it means the use is outside the formal indication list, so we explain the biology without promising an outcome. Most Oxydise conversations are wellness, recovery, performance and off-label, not hospital/emergency treatment."}, {"t": "p", "text": "Recognised (on-label) areas, in brief: emergencies and gas problems (decompression sickness, air/gas embolism, carbon monoxide poisoning); serious infections (gas gangrene, necrotising infection, refractory osteomyelitis, intracranial abscess); wound and tissue salvage (problem/diabetic wounds, crush injury, compromised grafts and flaps, burns); radiation injury; threatened circulation (central retinal artery occlusion, sudden hearing loss, avascular necrosis); and severe anaemia when transfusion cannot be used. These prove the medical roots of HBOT - the full mechanism-by-mechanism map is in Part B (4.14)."}, {"t": "p", "text": "Off-label / wellness areas: energy and recovery, sports recovery, brain fog and cognition, concussion/TBI and post-stroke contexts, long COVID/post-viral fatigue, chronic inflammation, pain/fibromyalgia, metabolic support, longevity, and cancer-support conversations. For each, we explain the mechanism, screen properly, track response over a block of sessions, and avoid disease-treatment claims. The full by-area table is in Part B (4.15)."}, {"t": "h3", "text": "4.7 Safety essentials everyone must know"}, {"t": "p", "text": "Everyone must recognise the absolute stop signs, the common-sense cautions, and the simple response if anything seems wrong. The expanded safety detail (oxygen toxicity, barotrauma, fire and drug interactions) is in Part B (4.20)."}, {"t": "table", "head": ["Stop sign", "Why"], "rows": [["Untreated or tension pneumothorax", "Trapped gas can expand or worsen with pressure changes and can become life-threatening."], ["Active bronchospasm / severe air trapping", "Gas can be trapped in the lungs and create barotrauma risk."], ["Inability to equalise ears or non-compliant tympanic membrane until corrected", "Middle-ear pressure cannot equalise and can cause pain or injury."], ["Fire / unsafe oxygen setup", "Oxygen supports combustion; misuse can cause serious injury or death."]]}, {"t": "p", "text": "Common cautions to screen for: colds/sinus congestion or recent ear surgery, high fever or acute illness, COPD/emphysema/CO2 retention or severe asthma, seizure history, pregnancy, unstable cardiac disease or low ejection fraction, active or recent chemotherapy, claustrophobia, and implanted devices. These are not automatic refusals - they mean pause, screen or escalate, and build the dose low and slow."}, {"t": "p", "text": "Oxygen toxicity, in brief: oxygen is a drug and the dose makes the risk. At Oxydise-style pressures - around 1.5 ATA, up to 2.0 ATA - and normal session lengths, oxygen toxicity is not a practical concern for properly delivered sessions. Colleagues still need to recognise early signs (vision changes, ear ringing, nausea, twitching, irritability, dizziness)."}, {"t": "p", "text": "The simple response:  if anything seems wrong, remove the oxygen source, switch the person to breathing air, and escalate appropriately. Never force through ear pain - equalise gently and pressurise slowly."}, {"t": "h3", "text": "4.8 What everyone should be able to say - the HBOT script"}, {"t": "p", "text": "“HBOT is oxygen plus pressure. Under pressure, oxygen dissolves into the plasma - the liquid part of the blood - instead of only travelling on red blood cells. That matters because plasma can carry oxygen into places where normal delivery is limited by inflammation, swelling, poor circulation or injury. Oxygen is fundamental for ATP production, collagen formation, white-cell killing, blood-vessel signalling and repair. The clinical evidence is strongest in recognised medical indications like decompression sickness, carbon monoxide poisoning, selected wounds and radiation injury. In wellness and off-label areas, we explain the mechanism clearly, screen properly and track the individual response over a sensible block of sessions.”"}, {"t": "p", "text": "Part B - Go deeper (full reference)"}, {"t": "p", "text": "Everything below is the deeper reference. For the complete science - full physics, the dissolved-oxygen tables, all thirteen mechanisms, every recognised indication, expanded safety and the cancer detail - see the Oxydise HBOT Study Guide."}, {"t": "h3", "text": "4.9 The physics that make HBOT work"}, {"t": "table", "head": ["Physics principle", "Scientific version", "Simple version", "What it explains"], "rows": [["ATA", "Atmospheres absolute; the pressure scale used in hyperbarics.", "How deep it feels. 1 ATA = surface, 2 ATA = about 10 metres underwater.", "Why chamber pressure matters."], ["Boyle’s Law", "At a fixed temperature, gas volume falls as pressure rises.", "Squeeze a balloon and it gets smaller.", "Why HBOT shrinks bubbles in decompression sickness and gas embolism."], ["Henry’s Law", "The amount of gas dissolved in liquid is proportional to the partial pressure of that gas.", "More pressure pushes more gas into liquid.", "Why oxygen dissolves into plasma under pressure."], ["Dalton’s Law", "Each gas in a mixture contributes its own partial pressure.", "Oxygen’s “push” depends on both pressure and oxygen percentage.", "Why breathing high oxygen at pressure creates a much larger oxygen gradient."], ["Off-gassing", "Dissolved gas leaves fluids as pressure is reduced.", "Let the fizzy bottle open slowly so bubbles do not erupt.", "Why decompression must be controlled."]]}, {"t": "p", "text": "→ The HBOT Study Guide explains Boyle&#x2019;s and Henry&#x2019;s laws and offgassing in full."}, {"t": "h3", "text": "4.10 How much oxygen dissolves - the useful table"}, {"t": "p", "text": "Normal plasma carries very little oxygen: roughly 0.3 mL per 100 mL blood at sea level breathing air. Haemoglobin carries most oxygen in normal life. HBOT loads oxygen into the plasma. Approximate values for dissolved plasma oxygen:"}, {"t": "table", "head": ["Pressure", "Air 21% dissolved oxygen", "100% oxygen dissolved oxygen", "Practical reading"], "rows": [["1.0 ATA", "~0.3 vol%", "~2.0 vol%", "Surface pressure oxygen helps, but pressure is missing."], ["1.3 ATA", "~0.45 vol%", "~2.7 vol%", "Mild pressure plus high oxygen already gives a meaningful rise."], ["1.5 ATA", "~0.55 vol%", "~3.1 vol%", "A common home/wellness pressure with a large oxygen delivery change when high oxygen is used."], ["1.8 ATA", "~0.7 vol%", "~3.8 vol%", "Stronger oxygen push."], ["2.0 ATA", "~0.8 vol%", "~4.3 vol%", "Upper Oxydise range / clinical-style pressure in some settings."], ["2.4 ATA", "~1.0 vol%", "~5.2 vol%", "Clinical pressure range."], ["3.0 ATA", "~1.25 vol%", "~6.5 vol%", "High clinical/emergency range; plasma oxygen approaches resting tissue oxygen extraction needs."]]}, {"t": "p", "text": "Plain-English version:  deeper pressure helps, but oxygen percentage is the big lever. The two multiply together."}, {"t": "h3", "text": "4.11 Types of chamber and why dose differs"}, {"t": "table", "head": ["Chamber type", "What it usually means", "Colleague positioning"], "rows": [["Soft / mild chamber", "Lower pressure, commonly around 1.3-1.5 ATA, often with oxygen from a concentrator.", "Accessible, practical for repeated home sessions and suitable for many wellness/recovery contexts. Do not claim it is identical to hospital HBOT."], ["Higher-pressure soft or hardshell", "Around 1.7-2.0 ATA depending on device and specification.", "Stronger oxygen push, useful when the conversation is more advanced and suitability is clear."], ["Clinical hard chamber", "Typically 2.0-3.0 ATA with medical protocols and 100% oxygen.", "The pressure range used for many recognised medical indications and emergency treatments. Usually clinician-led."], ["Monoplace / multiplace clinical chambers", "One-person chamber or room-style chamber with medical attendance.", "Useful for understanding hospital/clinic HBOT and why clinical protocols differ from home wellness protocols."]]}, {"t": "p", "text": "Premium explanation: higher pressure is a stronger dose, not automatically a better choice. The right dose depends on the person, the goal, the equipment and the safety profile."}, {"t": "h3", "text": "4.12 The thirteen mechanisms every advanced colleague should know"}, {"t": "p", "text": "These expand the core six from 4.4. Advanced colleagues should be able to recognise all thirteen; the HBOT Study Guide covers the science behind each."}, {"t": "table", "head": ["#", "Mechanism", "What it means", "Simple version"], "rows": [["1", "Decreased bubble size", "Pressure compresses gas bubbles and oxygen accelerates inert gas washout.", "Bubble problems need pressure."], ["2", "Hyperoxygenation", "Oxygen dissolves into plasma and body fluids at much higher levels.", "Oxygen reaches where red cells struggle."], ["3", "Reduced lipid peroxidation", "Controlled oxygen exposure upregulates antioxidant defences and reduces damaging membrane oxidation over time.", "The body adapts to handle oxidative stress better."], ["4", "Vasoconstriction", "Oxygen narrows vessels while keeping oxygen delivery high.", "Less swelling without starving tissue."], ["5", "Reduced leukocyte adherence", "HBOT reduces excessive white-cell sticking to vessel walls after injury/reperfusion.", "Calms damaging immune traffic jams."], ["6", "Toxin inhibition", "Oxygen interferes with toxins from certain anaerobic organisms.", "Oxygen stops some bacteria playing their usual game."], ["7", "Leukocyte oxidative killing", "White blood cells need oxygen to kill bacteria effectively.", "More oxygen helps immune cells fight."], ["8", "Antibiotic synergy", "Oxygen improves the function/penetration of certain antibiotics in hypoxic tissue.", "Oxygen makes some standard care work better."], ["9", "Growth-factor release", "Signals such as VEGF and fibroblast growth factors drive new vessels, nerve repair and cell growth.", "Blood supply, brain wiring and repair signals."], ["10", "Fibroblast and collagen synthesis", "Oxygen is needed to build collagen scaffold in tissue repair.", "No oxygen, poor repair scaffold."], ["11", "Stem/progenitor mobilisation", "Repeated HBOT exposure mobilises repair-associated cells from bone marrow.", "The body releases more repair resources."], ["12", "Telomerase / reverse transcriptase activity", "Research links repeated HBOT with telomere and senescent-cell changes.", "Longevity signal, not immortality."], ["13", "Reduced cytokine activity", "HBOT influences inflammatory messaging.", "Turns down harmful inflammation noise."]]}, {"t": "h3", "text": "4.13 HBOT and mitochondrial efficiency"}, {"t": "p", "text": "Hyperbaric oxygen affects mitochondrial efficiency at a fundamental level: it restores oxygen availability to the electron transport chain, where ATP is produced. When tissue is inflamed, hypoxic or poorly perfused, mitochondria are forced into less efficient energy production, often producing more oxidative stress for less useful output. By raising dissolved oxygen in plasma, HBOT can improve oxidative-phosphorylation efficiency, support mitochondrial-biogenesis pathways such as PGC-1 alpha, and reduce compensatory “overworking.”"}, {"t": "p", "text": "Important nuance: HBOT improves oxygen availability and can lift ATP production, but it does not replace damaged mitochondrial DNA or solve every root cause of mitochondrial ageing. This keeps us confident without becoming simplistic."}, {"t": "h3", "text": "4.14 Recognised indications - the full mechanism map"}, {"t": "table", "head": ["Recognised indication", "What is going wrong", "Why HBOT helps biologically", "Oxydise colleague line"], "rows": [["Air or gas embolism", "Gas bubbles block blood vessels.", "Pressure shrinks bubbles by Boyle’s Law; high oxygen washes nitrogen out and keeps threatened tissue oxygenated.", "“This is one of the clearest examples of pressure as medicine.”"], ["Decompression sickness", "Nitrogen bubbles form after pressure drops too quickly.", "Recompression shrinks bubbles, oxygen accelerates nitrogen washout and supports injured tissue.", "“HBOT grew out of diving medicine; the physics is direct.”"], ["Carbon monoxide poisoning", "CO binds haemoglobin and blocks oxygen transport; cells become hypoxic.", "High-pressure oxygen displaces CO faster and floods plasma with oxygen while haemoglobin is blocked.", "“HBOT pays back the oxygen debt quickly.”"], ["Cyanide / smoke inhalation context", "Cellular oxygen use is impaired, often alongside CO exposure.", "Plasma oxygen and high oxygen gradients support tissue oxygenation while standard antidotes and emergency care work.", "“This is emergency medicine, not a wellness conversation.”"], ["Gas gangrene / clostridial myonecrosis", "Anaerobic bacteria and toxins destroy tissue.", "Oxygen is hostile to anaerobes, inhibits toxin production and restores white-cell oxidative killing.", "“Oxygen changes the environment the bacteria rely on.”"], ["Crush injury / compartment syndrome / traumatic ischaemia", "Trauma causes swelling, poor perfusion and secondary tissue death.", "Dissolved oxygen reaches tissue despite compromised blood flow; vasoconstriction reduces oedema without starving tissue.", "“It helps break the swelling-hypoxia-swelling cycle.”"], ["Central retinal artery occlusion / arterial insufficiency", "Sudden blood-flow blockage starves high-energy retinal tissue.", "Plasma oxygen can diffuse into threatened retina and buy time.", "“The retina is extremely oxygen-hungry, so speed matters.”"], ["Selected problem wounds / diabetic foot wounds", "A wound cannot heal because oxygen delivery, collagen production, blood-vessel growth or infection control is impaired.", "HBOT supports angiogenesis, fibroblast function, collagen synthesis, infection control and oxygen gradients.", "“This is the wound-healing model that helps colleagues understand the whole category.”"], ["Severe anaemia when transfusion cannot be used", "Not enough haemoglobin is available to carry oxygen.", "Oxygen dissolved in plasma can temporarily carry meaningful oxygen independent of red blood cells.", "“This proves why plasma oxygen matters.”"], ["Intracranial abscess", "Infected, swollen, low-oxygen brain tissue.", "HBOT supports white-cell killing, oxygenates low-oxygen tissue and helps antibiotics work in difficult environments.", "“Adjunctive medical treatment only.”"], ["Necrotising soft tissue infections", "Rapid tissue destruction, infection, hypoxia and toxins.", "Oxygen supports immune killing, suppresses anaerobic metabolism and works alongside surgery/antibiotics.", "“HBOT is an adjunct, not a replacement for emergency care.”"], ["Refractory osteomyelitis", "Chronic bone infection persists despite standard care.", "Higher oxygen improves bone oxygen tension, white-cell killing, antibiotic synergy and new vessel growth.", "“Bone infections are hard because blood supply is poor; oxygen under pressure changes that.”"], ["Delayed radiation injury", "Radiation damages vessels and leaves tissue hypoxic, fibrotic and unable to repair.", "HBOT stimulates angiogenesis, fibroblast activity, collagen synthesis and long-term tissue oxygenation.", "“This is a major bridge between oncology care and HBOT: HBOT is recognised for radiation injury, not as a cancer cure.”"], ["Compromised grafts and flaps", "Relocated tissue is at risk because blood supply is marginal.", "Plasma oxygen preserves tissue while new vessels form and healing biology catches up.", "“HBOT helps keep vulnerable tissue alive while repair catches up.”"], ["Acute thermal burns", "Burn tissue has swelling, infection risk, capillary damage and a salvageable zone of stasis.", "HBOT reduces oedema, supports oxygenation, immune function, angiogenesis and collagen biology.", "“The aim is to protect tissue that is not yet lost.”"], ["Idiopathic sudden sensorineural hearing loss", "Inner-ear tissue has high oxygen demand and limited blood supply.", "HBOT raises oxygen tension in inner-ear fluids and supports hair-cell recovery biology.", "“Time-sensitive and clinician-led.”"], ["Avascular necrosis / osteonecrosis", "Bone loses blood supply and becomes ischaemic.", "HBOT supports oxygenation, oedema reduction and angiogenesis in threatened bone.", "“Mechanism-led bone-preservation rationale.”"]]}, {"t": "h3", "text": "4.15 Off-label and wellness uses - mechanism-led thinking"}, {"t": "p", "text": "Off-label means the use is outside the formal indication list. Explain the biology; never claim a guaranteed treatment outcome."}, {"t": "table", "head": ["Off-label / wellness area", "Mechanism Oxydise is interested in", "How to say it confidently without promising"], "rows": [["General energy and recovery", "Oxygen availability, mitochondrial ATP production, lower inflammatory load and improved recovery environment.", "“The mechanism fits energy and recovery because mitochondria use oxygen to make ATP. We track response over a block of sessions.”"], ["Sports performance and training recovery", "Tissue oxygenation, inflammation regulation, oedema control, collagen repair and faster return to training capacity.", "“Athletes use it because recovery is where consistent performance is built.”"], ["Brain fog and cognitive clarity", "Brain oxygenation, perfusion, mitochondrial energy and neuroplasticity pathways.", "“The brain is oxygen- and energy-hungry. HBOT is used by people looking to support clarity and cognitive recovery.”"], ["Concussion / TBI / post-stroke style contexts", "Neuroinflammation, perfusion, oedema, neuroplasticity and mitochondrial strain.", "“The mechanism makes neurological recovery a serious research area. Medical cases need clinician involvement.”"], ["Long COVID / post-viral fatigue", "Persistent inflammation, microvascular dysfunction, autonomic strain, mitochondrial energy and brain perfusion.", "“This is an emerging area where the biology is plausible and research is developing. We track objective change.”"], ["Chronic inflammation / autoimmune patterns", "Cytokine signalling, redox balance, tissue hypoxia and nervous-system stress.", "“We think about the inflammatory environment, not a single disease claim.”"], ["Pain / fibromyalgia / CRPS-style conversations", "Local oxygenation, inflammation signalling, vascular tone and nervous-system sensitivity.", "“The conversation is comfort, recovery capacity and regulation, not cure.”"], ["Diabetes and metabolic support", "Wound model, glucose utilisation, inflammation, microvascular health and cellular energy.", "“HBOT is recognised in specific diabetic wound contexts. Wider metabolic claims need careful, clinician-aware wording.”"], ["Wellness / longevity", "Hyperoxic-hypoxic signalling, stem/progenitor mobilisation, angiogenesis, mitochondrial efficiency and senescent-cell research.", "“Longevity interest comes from repeated-session biology, not from a promise to reverse ageing.”"], ["Addiction recovery / burnout", "Brain energy, inflammation, sleep/recovery routine and nervous-system regulation.", "“It can sit within a wider recovery environment, but it is not an addiction treatment.”"], ["Lyme / viral / mould conversations", "Low-oxygen microenvironments, immune function, inflammation and detoxification discussions.", "“Customers ask because these communities discuss HBOT. We explain mechanism and safety, then avoid disease-treatment claims.”"], ["Cancer-related support", "Tumour hypoxia, oxygen-dependent treatment biology, radiation injury, inflammation and recovery from conventional treatment.", "“Cancer is specialist. HBOT is not a cancer treatment claim; it is a mechanism and supportive-recovery discussion requiring oncology input.”"]]}, {"t": "h3", "text": "4.16 Pressure levels and inflammation: Jason Sonners framing"}, {"t": "p", "text": "Jason Sonners is useful internally because he discusses how different pressure ranges can influence inflammatory signalling differently. Treat this as practical education rather than settled clinical dosing law."}, {"t": "table", "head": ["Pressure range", "Internal positioning", "Useful for thinking about", "Caution"], "rows": [["1.3-1.5 ATA", "Mild to moderate pressure; comfortable and practical for repeated home sessions.", "Wellness, fatigue, chronic low-grade inflammation, brain fog, nervous-system regulation and sensitive users.", "Do not position as identical to hospital HBOT. Consistency and total sessions matter."], ["1.7-2.0 ATA", "Higher oxygen push, typically hardshell or advanced systems.", "Acute injury, stubborn tissue recovery, post-surgical recovery and advanced contexts where suitable.", "Not automatically better for everyone. Suitability matters."], ["2.0+ ATA", "Clinical pressure range.", "Decompression sickness, CO poisoning, serious wounds, radiation injury and other clinician-led indications.", "Usually medical indication, prescription or qualified supervision."]]}, {"t": "h3", "text": "4.17 Air breaks, off-gassing and the hyperoxic-hypoxic paradox"}, {"t": "p", "text": "Some protocols use repeated oxygen periods with short air breaks. The air break is not “wasting” the session: it lowers cumulative oxygen exposure, improves tolerance and creates a swing between high oxygen and relatively lower oxygen. That swing is part of the hyperoxic-hypoxic paradox - cells can activate some low-oxygen repair signals while overall oxygen availability stays high."}, {"t": "p", "text": "Customer line: &#x201C;Air breaks are planned. They manage the oxygen dose and can help create the biological rhythm used in some HBOT protocols.&#x201D;"}, {"t": "h3", "text": "4.18 Cancer and HBOT - the Oxydise internal position"}, {"t": "p", "text": "Cancer needs its own section because it is the most nuanced area and the easiest to oversimplify. We should sound informed and confident about the biology, but never sound as if we treat cancer or know what will happen for every tumour or customer. HBOT has recognised medical use in delayed radiation injury and radionecrosis - that is cancer-treatment-damage support, not cancer treatment. Active cancer and any timing with chemotherapy, radiotherapy, immunotherapy or surgery require oncology input."}, {"t": "h4", "text": "The four mechanism-led rationales colleagues should understand"}, {"t": "table", "head": ["Rationale", "Biology", "Boundary"], "rows": [["Reducing hypoxia", "HBOT raises tissue oxygen tension and can reduce hypoxia-driven survival signalling.", "Does not mean it treats every cancer or shrinks every tumour."], ["Improving oxygen-dependent treatment biology", "Radiotherapy is more effective in oxygenated tissue than severely hypoxic tissue.", "Any timing with radiotherapy or chemotherapy belongs with oncology clinicians."], ["Supporting healthy tissue recovery", "HBOT supports blood-vessel growth, collagen, fibroblasts and repair in irradiated or damaged normal tissue.", "This is the recognised radiation-injury lane."], ["Modulating inflammation and immune environment", "HBOT influences cytokines, oxidative stress and white-cell function.", "Immune effects can be context-dependent; do not make simple immune-cure claims."]]}, {"t": "p", "text": "How to say it to customers: &#x201C;Cancer is complex, so we do not claim HBOT treats cancer or that it will help every case. The reason HBOT appears in cancer conversations is the biology of oxygen: tumours often contain hypoxic regions, oxygen matters for radiation response, and HBOT is recognised for some radiation-related tissue injuries. For anyone in active cancer care, we would want oncology input before discussing a protocol.&#x201D;"}, {"t": "p", "text": "Oncology-sensitive sequencing with Red Light: HBOT first, Red Light second. HBOT raises tissue oxygen tension before any metabolic stimulation; Red Light increases mitochondrial activity and oxygen demand, so the cautious order is oxygen foundation first, light signal second. This is an internal physiology rule, not a cancer-treatment protocol."}, {"t": "h3", "text": "4.19 Protocol cards - internal working guide"}, {"t": "p", "text": "Protocol status: internal education only. Protocols must remain flexible and safety-led. Complex cases - cancer, pregnancy, neurological diagnoses, medication questions and post-surgical cases - should be escalated appropriately."}, {"t": "table", "head": ["Customer goal", "Typical internal guidance", "How to explain it"], "rows": [["General wellness / energy / longevity", "2-3 sessions per week; think in blocks of around 40 sessions; maintenance once weekly if useful.", "“We usually think in blocks rather than one-off sessions.”"], ["Chronic inflammation / pain / autoimmune patterns", "4-6 sessions per week; 40-60 sessions; review around session 20.", "“Consistency matters more than trying one or two sessions.”"], ["Neurological / brain health / concussion / brain fog", "Often 5 sessions per week initially; 40-60 sessions; step down after week 3-4.", "“Brain and nervous-system work usually needs repeated exposure.”"], ["Cancer support / post-treatment recovery", "3-5 sessions per week; 60+ sessions where suitable; oncology team involvement.", "“We do not treat cancer. This is supportive recovery and mechanism-led education, with oncology input.”"], ["Sports performance / in-season recovery", "3-4 sessions per week ongoing.", "“It supports recovery capacity; it does not replace training.”"], ["Sports injury / rehab", "Often 5 sessions per week; 40-60 sessions.", "“Injury recovery is where a tighter block is usually more meaningful.”"], ["Post-surgery / tissue repair", "Often 5 sessions per week; 40-60 sessions, subject to suitability and clinician advice.", "“Earlier support can be more efficient, but suitability matters.”"], ["Long COVID / post-viral fatigue", "4-5 sessions per week; 30-50 sessions; track sleep, HRV, steps and symptoms.", "“The mechanism is oxygen, inflammation, brain energy and microcirculation; results should be tracked.”"]]}, {"t": "h3", "text": "4.20 HBOT safety - the expanded basics"}, {"t": "h4", "text": "Relative cautions - pause, screen or escalate"}, {"t": "table", "head": ["Caution", "Why it matters"], "rows": [["Cold, sinus infection, blocked ears, recent ear surgery", "Equalisation becomes difficult and barotrauma risk rises."], ["High fever or acute illness", "Discomfort and seizure threshold concerns."], ["COPD, emphysema, CO2 retention, severe asthma", "Breathing drive and trapped-gas risk require clinician review."], ["Seizure history", "CNS oxygen toxicity is rare but relevant; protocols need care."], ["Pregnancy", "Conservative clinician-led route only."], ["Low ejection fraction / unstable cardiac disease", "Pressure and oxygen can affect haemodynamics."], ["Active chemotherapy or recent chemotherapy", "Drug interactions and tissue oxidative stress need oncology review."], ["Claustrophobia or anxiety", "Prepare, reassure and build slowly."], ["Implanted devices", "Check manufacturer guidance and clinician advice where relevant."]]}, {"t": "p", "text": "Oxygen toxicity (expanded): CNS oxygen toxicity is driven mainly by high oxygen partial pressure and shows warning signs remembered by VENTID-C: vision changes, ear symptoms/ringing, nausea, twitching, irritability, dizziness and convulsions. Pulmonary oxygen toxicity is cumulative and relates to long exposure over time. At around 1.5 ATA and normal session lengths it is not a practical concern; the response to any concern is to remove oxygen, switch to air and escalate."}, {"t": "p", "text": "Barotrauma: the most common practical issue is ear or sinus pressure. Teach equalisation early - swallow, yawn, slow breathing and a gentle Valsalva if appropriate. Pressurise gradually; users should not force through pain."}, {"t": "p", "text": "Fire and oxygen safety: follow the manufacturer&#x2019;s instructions. No smoking, flames, sparks, oils, flammable materials, unsafe electronics or static-risk clothing. Chamber pressure uses air; oxygen goes through the intended breathing circuit. Cleaning, maintenance and safety checks are part of the therapy."}, {"t": "h4", "text": "Drug and treatment interactions colleagues must recognise"}, {"t": "table", "head": ["Drug / treatment area", "Why it matters"], "rows": [["Doxorubicin / Adriamycin", "Potential increased oxidative injury, especially cardiac; oncology input required."], ["Cisplatin", "Oxidative stress and tissue toxicity considerations; oncology input required."], ["Bleomycin", "Historical pulmonary oxygen-risk concerns; clinician review required."], ["Disulfiram / Antabuse", "Can affect oxygen-toxicity susceptibility."], ["Mafenide acetate / Sulfamylon", "Relevant in burn/wound contexts."], ["Any active cancer regimen", "Do not advise. Record and escalate to clinician/oncology input."]]}, {"t": "h3", "text": "4.21 Sources for this HBOT section"}, {"t": "p", "text": "This section uses the uploaded Oxydise HBOT course as the main internal source, plus FDA device-safety guidance, FDA-cleared condition summaries, UHMS HBO indications, CMS NCD 20.29, and cancer/hypoxia review papers listed in the reference section. For the full clinical detail, see the Oxydise HBOT Study Guide."}]}, {"title": "5. Red Light Therapy / photobiomodulation", "blocks": [{"t": "h3", "text": "5.1 Simple explanation everyone should be able to say"}, {"t": "p", "text": "Red Light Therapy, also called photobiomodulation, uses specific wavelengths of red and near-infrared light to interact with cells. The goal is not heat or tanning. It is a cellular light signal. Red wavelengths are often used for skin and surface tissues; near-infrared wavelengths travel deeper and are used for muscles, joints and recovery. The main idea is that light can support mitochondrial function, circulation, nitric oxide signalling and tissue repair."}, {"t": "p", "text": "Customer-safe summary"}, {"t": "p", "text": "Red Light Therapy is a way of giving cells a useful light signal. Its intended mechanisms support energy production, circulation, recovery and skin health when used consistently and at the right dose. It is not a cure and more light is not always better."}, {"t": "h3", "text": "5.2 Wavelengths, output and dose"}, {"t": "table", "head": ["Term", "Plain-English meaning", "What colleagues should know"], "rows": [["Wavelength (nm)", "The colour or type of light. Red is usually around 630-660 nm; near-infrared is commonly around 810-850 nm.", "Different wavelengths penetrate and interact differently. Do not just say “stronger”."], ["Red light", "Visible red light, often 630 and 660 nm.", "Commonly discussed for skin, collagen, surface circulation and general cellular signalling."], ["Near-infrared (NIR)", "Invisible or barely visible light, often 810, 830 and 850 nm.", "Often discussed for deeper tissue, muscles, joints and recovery."], ["Irradiance", "Power arriving at the skin per square centimetre.", "Supplier numbers can be inflated. Measured distance matters."], ["Fluence / dose", "Total light energy delivered over time.", "Dose = irradiance x time. Too little may do nothing; too much can blunt the effect."], ["Pulsing / frequency", "Light can be continuous or pulsed at a chosen frequency.", "Interesting area, but do not overclaim unless protocol-specific."], ["Biphasic dose response", "A little can stimulate, a moderate amount can be optimal, too much can be less effective.", "This is the “more is not always better” principle."]]}, {"t": "h3", "text": "5.3 Core mechanisms colleagues should understand"}, {"t": "table", "head": ["Mechanism", "What is happening", "Customer-safe language"], "rows": [["Cytochrome c oxidase / mitochondria", "Light interacts with mitochondrial signalling pathways discussed in photobiomodulation research.", "“It supports cellular energy production.”"], ["Nitric oxide signalling", "Light can influence nitric oxide availability, which affects blood flow and mitochondrial respiration.", "“It can help circulation and cellular signalling.”"], ["ATP production", "Cells use ATP as their energy currency. PBM can influence mitochondrial activity.", "“It helps cells do the work of repair more efficiently.”"], ["Inflammation signalling", "PBM is studied for effects on inflammatory signalling in multiple models.", "“It helps create a calmer inflammatory environment for recovery biology.”"], ["Collagen / fibroblasts", "Red light can influence fibroblast activity and collagen-related pathways.", "“It is often used for skin quality and tissue repair support.”"], ["Microcirculation", "Light can influence local blood flow and tissue oxygen/nutrient delivery.", "“It supports tissue oxygen and nutrient-use signalling.”"]]}, {"t": "h3", "text": "5.4 The eye, retina and mitochondrial demand"}, {"t": "p", "text": "The eye is one of the most energy-intensive tissues in the body. The retina and retinal pigment epithelium burn a large amount of ATP because they are constantly processing light signals at high speed and maintaining ionic gradients that reset the visual cycle."}, {"t": "p", "text": "On a per-cell basis, retinal mitochondrial demand is among the highest in human biology. This helps explain why ageing can show up early as reduced acuity, slower dark adaptation and inflammation, and why conditions such as age-related macular degeneration are often discussed through a metabolic and mitochondrial lens."}, {"t": "p", "text": "Eye safety language"}, {"t": "p", "text": "Some online influencers suggest looking directly at red light. Oxydise should not recommend this. Advise eye protection to all clients unless a clinician/device-specific protocol says otherwise."}, {"t": "h3", "text": "5.5 RLT protocol cards - internal working guide"}, {"t": "table", "head": ["Use case", "Typical session", "Frequency", "Notes"], "rows": [["General wellness / energy / mood", "10-20 minutes", "3-5x/week for first month, then 2-3x/week", "Track sleep, energy and calmness. Avoid late-night overstimulation in sensitive users."], ["Skin / beauty / collagen", "10-20 minutes, expose skin", "3-5x/week initially", "Remove make-up and sunscreen. Expect gradual changes over weeks."], ["Muscle recovery / sports", "10-20 minutes around training schedule", "3-5x/week or targeted around heavy sessions", "Good for soreness/recovery discussions; do not promise performance."], ["Joint / pain / stiffness support", "10-20 minutes targeted or full body", "3-5x/week initially", "Track pain and mobility. Consider combining with HBOT where suitable."], ["Sensitive users / overstimulation", "Shorter sessions or lower output", "Build gradually", "Lower-BMI or highly sensitive users often need lower power; treat as internal observation pending validation."]]}, {"t": "h3", "text": "5.6 RLT safety and contraindication basics"}, {"t": "table", "head": ["Pause / review before use", "Why it matters"], "rows": [["Photosensitive conditions such as lupus or porphyria", "Light exposure can aggravate photosensitive conditions."], ["Photosensitising medications", "Some antibiotics, acne medicines and psychiatric medicines can increase light sensitivity."], ["Pregnancy, especially full-body or abdominal use", "Use a conservative approach unless clinician-approved."], ["Epilepsy triggered by light", "Flashing/pulsed light is relevant."], ["Recent Botox/fillers, open wounds, burns, skin infections, severe migraine/light sensitivity, pacemakers/implanted devices, severe heart conditions", "Use caution and medical advice where appropriate."]]}]}, {"title": "6. Combining HBOT, Red Light and other modalities", "blocks": [{"t": "p", "text": "Simple principle"}, {"t": "p", "text": "HBOT changes oxygen availability. Red Light changes cellular light signalling and mitochondrial activity. Used thoughtfully, they can complement each other, but sequencing should be context-specific."}, {"t": "table", "head": ["Context", "Suggested internal approach", "Why"], "rows": [["General recovery / wellness", "Either order can be used depending on practical setup and customer response.", "Red Light can support circulation and cellular readiness; HBOT can support oxygen delivery and recovery."], ["Customer feels overstimulated by RLT", "Reduce time/output; consider HBOT first or separate days.", "Some users are sensitive to light dose or nervous-system stimulation."], ["Oncology-sensitive or cancer-related cases", "Use HBOT first and Red Light only with clinician guidance.", "HBOT raises oxygen availability before metabolic stimulation. This is internal education only and not a cancer-treatment claim."], ["Athlete / acute recovery", "Consider RLT around training and HBOT as a recovery block.", "Monitor sleep, soreness and training load."], ["PEMF + Red Light", "PEMF can be framed as a relaxation/recovery-support tool. Pair carefully if the user is sensitive.", "Both can feel stimulating or regulating depending on programme and person."], ["HBOT + Hydrogen", "Some educators discuss hydrogen as a potential oxidative-stress support alongside oxygen-based therapies.", "Keep claims cautious; evidence is emerging and product-specific."]]}, {"t": "h3", "text": "6.1 Oncology-sensitive sequencing: HBOT first, Red Light after"}, {"t": "p", "text": "The attached internal oncology-sensitive protocol argues for HBOT first and Red Light Therapy afterwards. The reasoning is that HBOT raises tissue oxygen tension before any metabolic stimulation. Tumour tissue is often hypoxic, and hypoxia can activate HIF-1 alpha signalling linked to angiogenesis, metabolic survival pathways and aggressiveness. Red Light Therapy can increase mitochondrial activity, nitric oxide release and cellular repair signalling, which can increase oxygen demand. Internally, the sequence HBOT -> RLT is therefore treated as the more cautious order when a cancer-related context is present."}, {"t": "p", "text": "Important boundary"}, {"t": "p", "text": "This is not a cancer-treatment protocol. It is internal physiology education and should only be discussed externally with approved wording and clinician involvement."}, {"t": "h3", "text": "6.2 Do not overclaim synergy"}, {"t": "p", "text": "It is acceptable to say the therapies can complement each other. Avoid saying they “work better together” as a universal claim unless a specific protocol and evidence source is approved."}]}, {"title": "7. PEMF technology", "blocks": [{"t": "p", "text": "PEMF stands for pulsed electromagnetic field. In simple terms, PEMF devices emit low-level electromagnetic pulses that are intended to interact with tissues and the nervous system. In wellness settings, PEMF is usually positioned around recovery, relaxation, sleep support, fatigue, comfort and nervous-system regulation rather than as a treatment for disease."}, {"t": "p", "text": "Customer-safe summary"}, {"t": "p", "text": "PEMF is a non-invasive recovery-support technology. People use PEMF to feel calmer, more balanced or more energised depending on the programme, but the response is individual and it should not be presented as a medical treatment."}, {"t": "h3", "text": "7.1 How PEMF fits Oxydise"}, {"t": "table", "head": ["Use it for", "Do not use it for"], "rows": [["Explaining recovery stacks and wider wellness literacy.", "Diagnosing or treating pain, inflammation, neurological disease or sleep disorders."], ["Helping customers understand why programmes feel different: calming, energising, focus or deep rest.", "Claiming that one frequency has a guaranteed outcome."], ["Supporting nervous-system language: down-regulation, rest, balance and recovery.", "Overloading a sensitive customer with too many therapies at once."]]}, {"t": "h3", "text": "7.2 PEMF mat programme functions"}, {"t": "table", "head": ["Programme", "Internal description", "Plain-English positioning"], "rows": [["P1 - Schumann Recharge", "Schumann resonance to restore baseline energy and balance.", "Grounding-style recharge and baseline balance."], ["P2 - Energising Focus", "Stimulating beta and alpha waves, 7.83-21 Hz, to increase alertness and vitality.", "Daytime focus and vitality."], ["P3 - Hemispheric Balance", "Alpha and beta waves to harmonise left and right brain hemispheres.", "Balance and mental coordination."], ["P4 - Deep Relaxation Descent", "Gradual transition from 14.4 Hz beta down to low theta around 3 Hz.", "Deep relaxation and down-shift."], ["P5 - Mental Clarity & Drive", "Beta and gamma waves to promote clarity, motivation and alertness.", "Clearer, more motivated daytime state."], ["P6 - Maximum Energising", "High-intensity Schumann programme, 7.8-30 Hz.", "Peak stimulation; use cautiously in sensitive users."], ["P7 - Fatigue Relief", "High-frequency beta waves designed to combat tiredness and mental fatigue.", "Fatigue and alertness support."], ["P8 - Harmonious Meditation", "Emotion regulation and mental calming through meditative frequencies.", "Meditation and emotional calm."], ["P9 - Calm & Balance", "Schumann resonance at 7.8 Hz to stabilise mood and calm the nervous system.", "Calm, balance and grounding."], ["PA / P10 - Daytime Balance & Fatigue Reduction", "Gentle balancing programme for daytime fatigue while maintaining alertness.", "Daytime regulation without deep sedation."], ["PC / P11 - Energy Restoration", "Alternating low-frequency beta waves and Schumann resonance.", "Energy restoration."], ["PE / P12 - Morning Activation", "Theta around 4.5 Hz to 7.83 Hz Schumann resonance.", "Natural wakefulness support."], ["PF / P13 - Daytime Deep Rest", "Restorative programme for deep relaxation without full sleep.", "Reset between busy periods."], ["PH / P14 - Continuous Loop Mode", "Cycles through all programmes in sequence.", "Demonstration or broad-use mode; use with guidance."]]}, {"t": "h3", "text": "7.3 PEMF safety basics"}, {"t": "table", "head": ["Pause / review before use", "Why"], "rows": [["Pacemaker or implanted electronic device", "Electromagnetic fields can interfere with implanted electronics."], ["Pregnancy", "Use a conservative approach unless clinician-approved."], ["Epilepsy or seizure history", "Frequency-based stimulation can be inappropriate."], ["Active bleeding, acute infection, fever or unexplained symptoms", "Escalate and avoid using wellness devices as a substitute for medical assessment."], ["Highly sensitive / anxious users", "Start low and slow. Some programmes feel stimulating."]]}]}, {"title": "8. Grounding principles", "blocks": [{"t": "p", "text": "Grounding, also called earthing, usually means direct skin contact with the earth - for example bare feet on grass, soil or sand - or using conductive products that claim to connect the body electrically to the ground. People in the wellness sector talk about grounding in relation to inflammation, sleep, stress, circadian rhythm and nervous-system regulation."}, {"t": "p", "text": "Oxydise brand position"}, {"t": "p", "text": "Oxydise should not sell grounding as a product or make it a core proposition. It can devalue the premium, technology-led brand and distract from the clear pillars of HBOT and Red Light Therapy. Colleagues should still understand the principles because customers may ask about it."}, {"t": "h3", "text": "8.1 How to talk about grounding"}, {"t": "table", "head": ["Useful principle", "How to say it carefully"], "rows": [["Nature contact matters", "Time outdoors, daylight, movement and calm surroundings are foundational for wellbeing."], ["Possible electrical hypothesis", "Some grounding advocates propose that direct contact with the earth may influence charge balance and inflammatory signalling."], ["Evidence is debated", "The evidence base is smaller and more disputed than the evidence base for many established medical interventions. Avoid strong claims."], ["Oxydise does not need to own it", "It can be mentioned as a free lifestyle principle, not sold as an Oxydise solution."]]}, {"t": "p", "text": "Customer-safe wording"}, {"t": "p", "text": "“Grounding is something people in the wellness world talk about. We do not sell it as a product, but we do think simple foundations such as daylight, time outdoors, movement and sleep routine are worth understanding.”"}]}, {"title": "9. Hydrogen and hydrogen water", "blocks": [{"t": "p", "text": "Hydrogen water is water with dissolved molecular hydrogen gas (H2). It is not the same thing as simply making water alkaline, and it is not about adding hydrogen ions or changing pH as the main mechanism. The interest is that dissolved H2 is discussed as a small, diffusible redox-signalling molecule. In the wellness and research world it is discussed around oxidative stress, inflammation, mitochondrial function, metabolic health and exercise recovery."}, {"t": "p", "text": "Customer-safe summary"}, {"t": "p", "text": "Hydrogen water is an emerging wellness topic. It is worth understanding because customers often connect it with HBOT, red light, mitochondria and recovery. Oxydise should frame it carefully: promising enough to learn about, not proven enough to use as a cure, treatment or replacement for medical care."}, {"t": "h3", "text": "9.1 What molecular hydrogen is - and is not"}, {"t": "table", "head": ["Point", "Plain-English explanation", "Why it matters"], "rows": [["Molecular hydrogen (H2)", "Two hydrogen atoms bonded together as a gas. Hydrogen water contains this dissolved gas.", "The active topic is dissolved H2, not just “hydrogen” as a vague word."], ["Not the same as alkaline water", "Some hydrogen-water products are alkaline, but pH is not the main evidence-based mechanism usually discussed.", "Avoid confusing hydrogen water with alkaline-water claims."], ["Small and diffusible", "H2 is very small and can diffuse through fluids and tissues quickly.", "This is why it is discussed in relation to cellular redox signalling."], ["Dose depends on concentration and timing", "H2 can escape from water over time. Concentration, container, production method and how soon it is consumed all matter.", "Do not compare products without measured concentration and protocol."], ["Evidence is heterogeneous", "There are human studies and reviews, but many trials are small, varied and use different doses and populations.", "Good internal education topic; not a strong customer claim yet."]]}, {"t": "h3", "text": "9.2 Why people discuss hydrogen with mitochondria, HBOT and Red Light"}, {"t": "p", "text": "HBOT, Red Light Therapy and hydrogen all sit in the wider oxygen, redox and mitochondrial conversation. HBOT increases oxygen availability under pressure. Red Light Therapy gives cells a light signal that can influence mitochondrial enzymes and nitric oxide. Molecular hydrogen is discussed as a redox-signalling tool that can influence oxidative stress and inflammatory pathways. The common thread is not “more stimulation”; it is helping the cell move towards a better regulated environment."}, {"t": "table", "head": ["Theme", "Internal explanation", "Customer-safe wording"], "rows": [["Oxidative stress", "Molecular hydrogen is studied for selective antioxidant and redox-signalling effects, especially around hydroxyl radicals and peroxynitrite in mechanistic literature.", "“It is being studied for how it influences oxidative-stress signalling.”"], ["Inflammation", "Some human and preclinical studies look at inflammatory markers, immune-cell behaviour and recovery contexts.", "“Some research is looking at inflammation and recovery markers.”"], ["Mitochondria", "Oxidative stress and inflammation influence mitochondrial efficiency. Hydrogen is sometimes discussed as a way to support a healthier redox environment.", "“It belongs in the wider mitochondrial-health conversation.”"], ["Exercise and recovery", "Research in exercise settings is mixed. A 2024 meta-analysis found improved antioxidant potential, but not a direct reduction in exercise-induced oxidative stress.", "“Interesting for sport/recovery, but not a guaranteed performance tool.”"], ["HBOT pairing", "Some practitioners discuss hydrogen alongside HBOT to balance oxygen/redox conversations.", "“This is advanced education, not an Oxydise protocol unless approved.”"]]}, {"t": "h3", "text": "9.3 Evidence snapshot - what it supports and what it does not prove"}, {"t": "table", "head": ["Evidence area", "What it suggests", "How to use carefully"], "rows": [["Foundational mechanism", "The 2007 Nature Medicine paper by Ohsawa et al. helped launch the field by reporting selective reduction of cytotoxic oxygen radicals in experimental models.", "Mechanism education only. It does not mean every hydrogen-water product has clinical benefit."], ["Clinical-study landscape", "A 2023 review discussed 81 clinical trials and 64 human scientific publications across hydrogen therapy routes and conditions.", "The field is real, but diverse. Trial quality, route, dose and population vary."], ["Healthy adults / inflammation", "A randomised, double-blind controlled trial in healthy adults reported changes in inflammatory responses and peripheral blood-cell apoptosis markers after hydrogen-rich water.", "Useful as a research signal; not a customer promise."], ["Exercise oxidative stress", "A 2024 systematic review/meta-analysis of six studies with 76 participants found improved antioxidant potential but no significant direct reduction in exercise-induced oxidative stress markers.", "Good example of cautious language: possible signal, small evidence base, more rigorous studies needed."], ["Research libraries", "HydrogenWaterStudies.com and the Molecular Hydrogen Institute collect many papers and categories.", "Use them as starting points, then check the original paper before repeating a claim."]]}, {"t": "h3", "text": "9.4 Hydrogen tablets - Alan’s internal summary"}, {"t": "p", "text": "Hydrogen tablets are designed to increase molecular hydrogen availability, usually by generating dissolved H2 in water before it is consumed. Internally, the simplest explanation is that molecular hydrogen is discussed as a selective antioxidant and redox-support molecule: it is used to help the body deal with excess oxidative stress and inflammation without flattening the useful stress responses still needed for adaptation and recovery."}, {"t": "p", "text": "Customer-safe summary"}, {"t": "p", "text": "Hydrogen tablets sit in the wider recovery, redox and mitochondrial-health conversation. They should be described as a potential support tool, not as a treatment, cure, detox product or replacement for sleep, nutrition, medical care or a clinician-led plan."}, {"t": "table", "head": ["Benefit theme", "Internal explanation", "Customer-safe wording"], "rows": [["Oxidative-stress load", "Training, travel, poor sleep, stress, alcohol and modern lifestyle load can increase oxidative stress. Hydrogen is discussed as a way to help buffer excess stress signalling.", "“It supports the body’s response to oxidative-stress load.”"], ["Inflammation and recovery", "Alan’s note frames hydrogen tablets as supporting lower inflammation levels and helping the body recover more efficiently.", "“It supports recovery routines and a healthier inflammatory environment.”"], ["Fatigue and burnout", "By supporting redox balance and recovery, hydrogen is discussed around physical recovery and feelings of fatigue or burnout.", "“Some people use it as part of a wider recovery routine.”"], ["Exercise performance and endurance", "The proposed mechanism is support for cellular energy production and less excess oxidative stress around training.", "“There is interest in exercise recovery and endurance, but we should not promise performance gains.”"], ["Metabolic health", "Hydrogen research and practitioner education sometimes discuss blood sugar balance, cholesterol markers and metabolic stress.", "“It is being studied in metabolic-health contexts; any marker changes need clinician interpretation.”"], ["Brain function and mood", "Alan’s note includes mental clarity, focus, mood and brain function as areas people discuss.", "“It belongs in the wider brain-energy and clarity conversation, not as a neurological treatment.”"]]}, {"t": "p", "text": "How to position it"}, {"t": "p", "text": "Keep it simple: hydrogen tablets are positioned as supporting the body’s ability to manage oxidative stress and recovery load. Do not oversell it, do not connect it to disease outcomes, and do not make it sound like Oxydise is moving away from its core HBOT and Red Light pillars."}, {"t": "h3", "text": "9.5 Practical product-literacy points"}, {"t": "table", "head": ["Question", "What colleagues should know"], "rows": [["What concentration matters?", "Hydrogen concentration is usually discussed in ppm or mg/L. Higher headline concentration is not automatically better unless it is measured and delivered consistently."], ["Why drink it quickly?", "H2 gas can dissipate. Once hydrogen water is generated or opened, timing and container quality affect how much H2 is still present when consumed."], ["What about tablets or machines?", "Tablets, generators and bottled products can all vary. Colleagues should avoid making quality claims without measured data."], ["Is it safe?", "Hydrogen water is generally discussed as low-risk for many healthy adults, but colleagues should not advise medically complex customers, pregnant customers or people in active treatment without clinician input."], ["Where does Oxydise place it?", "A useful supporting education topic. It should not dilute the HBOT and Red Light proposition or be made into a major sales pillar unless Oxydise approves a specific product and evidence position."]]}, {"t": "h3", "text": "9.6 What to say and what not to say"}, {"t": "table", "head": ["Say this", "Do not say this"], "rows": [["“Hydrogen water contains dissolved molecular hydrogen gas, which is being studied for oxidative-stress and inflammation signalling.”", "“Hydrogen water detoxes the body.”"], ["“The evidence is interesting, but still developing and product-specific.”", "“It cures inflammation, cancer, fatigue or ageing.”"], ["“Concentration, timing and storage matter because hydrogen gas can dissipate.”", "“Any hydrogen-water product will work.”"], ["“This is useful background for the wider mitochondrial and recovery conversation.”", "“This is part of an Oxydise protocol” unless Oxydise has approved that protocol."]]}, {"t": "p", "text": "Resource to include"}, {"t": "p", "text": "HydrogenWaterStudies.com can be included as a research-library link. Colleagues should treat it as a starting point, not as automatic substantiation for customer-facing claims."}]}, {"title": "10. Neuro Gamma and brain photobiomodulation", "blocks": [{"t": "p", "text": "Neuro Gamma usually refers to a brain photobiomodulation device, commonly discussed in relation to Vielight Neuro Gamma, that uses near-infrared light and gamma-frequency pulsing. It is part of the wider brain photobiomodulation category: using red or near-infrared light transcranially and/or intranasally to influence brain energy, blood flow, inflammation signalling and neural oscillations."}, {"t": "p", "text": "Customer-safe summary"}, {"t": "p", "text": "Neuro Gamma is an advanced brain-light technology topic. It should be explained as a brain photobiomodulation and neuromodulation concept, not as a treatment for dementia, depression, brain injury or any neurological disease unless a qualified clinician is leading the conversation."}, {"t": "h3", "text": "10.1 Benefits colleagues should remember"}, {"t": "ul", "items": ["Better clarity and faster thinking.", "Improved focus and concentration.", "Stronger recall and memory.", "Less brain fog."]}, {"t": "p", "text": "These are internal memory hooks. In customer-facing language, say “used for clarity, focus and cognitive performance support” rather than promising results."}, {"t": "h3", "text": "10.2 How it fits with HBOT and Red Light"}, {"t": "table", "head": ["Topic", "Internal explanation"], "rows": [["Mitochondria", "Brain PBM is usually discussed through mitochondrial energy, cytochrome c oxidase and ATP signalling."], ["Gamma rhythm", "Gamma-frequency stimulation is often discussed in relation to attention, information processing, memory and brain energy."], ["HBOT link", "HBOT supports the brain oxygen-availability and perfusion conversation; Neuro Gamma sits more in the light/neuromodulation lane."], ["Positioning", "Advanced education for brain health and biohacking customers. Do not confuse it with standard Red Light panels."]]}, {"t": "h3", "text": "10.3 Neuro Gamma safety basics"}, {"t": "table", "head": ["Pause / review before use", "Why"], "rows": [["History of seizures or photosensitive epilepsy", "Frequency-based light stimulation may not be appropriate."], ["Active brain bleed or acute neurological event", "Requires medical assessment; do not use wellness device advice."], ["Pregnancy", "Use conservative approach and clinician advice."], ["Severe migraine or light sensitivity", "Start cautiously or avoid."], ["Evening use", "Gamma-style stimulation may feel activating; avoid close to bedtime in sensitive users."]]}]}, {"title": "11. Fasting, metabolic switching and cellular recycling", "blocks": [{"t": "p", "text": "Fasting is part of the wider longevity and metabolic health conversation. It should be treated as context, not as Oxydise advice. Fasting can be unsuitable for people with eating disorders, pregnancy, diabetes, underweight status, certain medications, cancer treatment, frailty or complex medical conditions."}, {"t": "p", "text": "Fasting guardrail"}, {"t": "p", "text": "Oxydise colleagues should not prescribe fasting. Use this section only to understand why biohacking and longevity customers talk about autophagy, ketones, insulin and cellular clean-up."}, {"t": "table", "head": ["Fasting period", "Internal education notes"], "rows": [["After 24 hours", "Liver glycogen becomes depleted and fat oxidation begins; insulin drops; ketones rise; autophagy starts; growth hormone rises to help preserve lean tissue."], ["After 48 hours", "Ketones become a more dominant fuel; deeper autophagy may clear damaged proteins and organelles; immune-cell recycling begins; systemic inflammation can reduce in some people."], ["After 72 hours", "Stem-cell activity can increase in gut and immune tissues; immune regeneration may accelerate; refeeding becomes critical and should be handled carefully."]]}, {"t": "p", "text": "Customer-safe position: fasting is a personalised nutrition/medical topic. Encourage people to work with a qualified clinician or nutrition professional, especially if they have any medical condition or medication use."}]}, {"title": "12. Growth factors and useful biological language", "blocks": [{"t": "p", "text": "Colleagues do not need to be molecular biologists, but a few terms help them understand the research and speak confidently with educated customers."}, {"t": "table", "head": ["Term", "Plain-English meaning", "Why it matters"], "rows": [["VEGF - vascular endothelial growth factor", "A signal that stimulates new blood vessel formation, called angiogenesis.", "Important for oxygen and nutrient delivery, wound healing, exercise adaptation and tissue recovery. It can also be hijacked by cancers, so use carefully."], ["BDNF - brain-derived neurotrophic factor", "A brain-support factor involved in neuroplasticity: neurons growing, surviving and forming new connections.", "Relevant to learning, memory, mood, brain fog and exercise/cold/fasting discussions."], ["PDGF - platelet-derived growth factor", "A repair signal released by platelets at injury sites.", "Relevant to collagen synthesis, tissue repair, wound healing and PRP conversations."], ["HIF-1 alpha", "A low-oxygen signalling pathway.", "Important for understanding hypoxia, cancer microenvironments and the hyperoxic-hypoxic paradox."], ["PGC-1 alpha", "A regulator of mitochondrial biogenesis.", "Useful in mitochondrial-efficiency conversations."], ["Cytokines", "Immune signalling molecules involved in inflammation and repair.", "Useful for discussing pressure research and chronic vs acute inflammation."]]}, {"t": "p", "text": "Big picture"}, {"t": "p", "text": "VEGF = blood supply. BDNF = brain wiring. PDGF = repair scaffold."}]}, {"title": "13. Testing, microbiome, bloods and DNA methylation", "blocks": [{"t": "p", "text": "Testing helps move a customer from guessing to measurable baselines. It also reinforces the Oxydise position: advanced wellness should be guided, thoughtful and individual rather than random stacking of devices."}, {"t": "table", "head": ["Area", "Purpose", "Core points", "Careful wording"], "rows": [["Microbiome testing", "Find gut-driven issues that can hold clients back.", "Gut health influences nutrient absorption, body composition, energy and recovery. Dysbiosis contributes to inflammation, poor sleep and cognitive dips.", "“This can guide personalised nutrition, but a qualified professional should interpret results.”"], ["Blood testing", "Get data before recommending interventions.", "Can check hormones, CRP/inflammation, liver strain, metabolic markers, B12, vitamin D, ferritin and training stress.", "“Test what is real rather than guessing.”"], ["DNA methylation", "Understand biological age and epigenetic patterns.", "Shows how lifestyle, sleep, stress and environment can be influencing gene expression over time.", "“This is not genetics; it is how genes are being expressed, and it can be influenced.”"], ["Peptides", "Advanced regenerative/performance topic.", "Customers ask due to biohacking content. This is medical/regulated territory.", "Do not recommend or prescribe. Refer to qualified clinicians."]]}, {"t": "p", "text": "Rapid one-liners for colleagues"}, {"t": "p", "text": "Microbiome: fix the gut environment, and everything else works better. Bloods: treat what is real, not what is guessed. DNA methylation: understand biological ageing and build longer-term plans. HBOT: oxygen plus pressure supports recovery capacity. Red Light: a mitochondrial light signal for circulation and repair support."}]}, {"title": "14. Evidence map and studies", "blocks": [{"t": "p", "text": "Evidence rule"}, {"t": "p", "text": "This is not a full literature review. The aim is to give colleagues enough context to understand the direction of the science without overclaiming. Podcasts and documentaries are not primary evidence."}, {"t": "table", "head": ["Study / resource", "What it supports", "How to use carefully"], "rows": [["UHMS indications", "HBOT is established standard care for specific medical indications such as decompression sickness, carbon monoxide poisoning, selected diabetic wounds and delayed radiation injury.", "Does not prove home wellness HBOT treats every condition. Use to understand medical roots."], ["Thom et al. stem cell mobilisation", "HBOT mobilised stem/progenitor cells from bone marrow in a nitric-oxide-dependent mechanism.", "Mechanism education only; not guaranteed regeneration."], ["Hachmo et al. 2020", "Repeated HBOT in healthy ageing adults was associated with telomere length increases and lower senescent immune-cell markers.", "Important but not a universal anti-ageing promise."], ["Zilberman-Itskovich et al. 2022", "Randomised sham-controlled post-COVID study reported improvements in neurocognitive and symptom measures.", "Does not mean every Long COVID case responds or that home protocols are identical."], ["Hadanny et al. 2020", "HBOT in healthy older adults was associated with cognitive enhancement and regional cerebral blood-flow changes.", "Does not prove dementia prevention."], ["de Freitas & Hamblin 2016", "PBM mechanisms include mitochondrial chromophores and downstream signalling.", "Does not mean every device/dose is effective."], ["Huang et al. 2011", "Biphasic dose response in low-level light therapy.", "Supports “more is not always better”."], ["Glen Jeffery / UCL 670 nm eye study", "Morning 670 nm exposure improved colour contrast sensitivity in a small older-adult study.", "Do not generalise to all panels or advise eye treatment."], ["Wunsch & Matuschka 2014", "Red and NIR light supported skin appearance and collagen-related outcomes in a controlled trial.", "Not instant cosmetic transformation."], ["PEMF reviews", "PEMF is studied as a non-invasive modality in musculoskeletal, pain and recovery contexts.", "Evidence varies by indication, device, waveform, dose and study quality."], ["Hydrogen water reviews", "Molecular hydrogen is studied for oxidative stress, inflammation and metabolic/exercise outcomes.", "Emerging and mixed. Avoid cure-style or detox claims."], ["Grounding reviews", "Grounding is discussed in relation to sleep, pain, inflammation and autonomic markers.", "Evidence is debated and often based on small studies. Oxydise should not sell it."], ["Brain PBM / Neuro Gamma research", "Transcranial/intranasal PBM is studied for brain energy, blood flow, oscillations and cognitive/neurological contexts.", "Device-specific and not a medical treatment claim."]]}]}, {"title": "15. Podcast and video library", "blocks": [{"t": "p", "text": "Library rule"}, {"t": "p", "text": "Podcasts, YouTube videos and documentaries are for colleague education and pattern recognition. They are not primary evidence. If a video makes a strong claim, colleagues should look for the study behind it before using the claim with customers."}, {"t": "p", "text": "Website structure note"}, {"t": "p", "text": "The previously manual-check podcast/video links have been split into the same 15.1 to 15.6 categories as the original library. On the website, each resource card should show: title, speaker/channel, why watch, claim-risk flag and suggested audience."}, {"t": "h3", "text": "15.1 Starter videos and core Oxydise context"}, {"t": "table", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Alan Trim with Oli Patrick - Hyperbarics & Beyond", "Alan Trim with Oli Patrick / Modern Wellness", "Oxydise founder story, mechanics of HBOT, access model, clinical/performance applications and how to explain the category with care.", "All colleagues", "[[Open||https://shows.acast.com/modern-wellness-podcast/episodes/129-hyperbarics-game-changing-recovery-oxydises-alan-trim-in]]"], ["Mindability Matters with Alan Trim - Oxydise", "Alan Trim / Mindability Matters", "Alan/Oxydise overview, red light beds, hyperbaric chambers and the wider customer-education story.", "All colleagues", "[[Open||https://www.youtube.com/watch?v=cAiDfGp7XC4&t=3s]]"], ["Oli Patrick - Why You Are Always Tired / The Oxydise Protocol", "Oli Patrick / Oxydise", "Useful for explaining fatigue, energy, the “engine room” and how customers think about low energy.", "Sales, marketing", "[[Open||https://www.youtube.com/watch?v=3oU-rANB2Fw&t=2822s]]"], ["Jason Sonners: How Hyperbaric Oxygen Therapy Changed My Life", "Jason Sonners / Oxydise", "Personal journey with HBOT and why it matters to him. Use as story and education, not outcome proof.", "All colleagues", "[[Open||https://www.youtube.com/watch?v=z51gbFL9WWQ&t=229s]]"], ["From Addiction to Elite 15: Jeremy McConnell’s HYROX Journey", "Jeremy McConnell / Oxydise", "Recovery, addiction, performance and identity story. Useful for tone, empathy and human transformation themes.", "All colleagues", "[[Open||https://www.youtube.com/watch?v=4o-RfRJvrkw&t=5s]]"], ["From Brain Fog to Clarity: Michael’s Transformational Journey with HBOT", "Michael testimonial / Oxydise", "Customer story around brain fog and clarity. Use only as approved anecdote, never as a promise.", "Sales, support", "[[Open||https://www.youtube.com/watch?v=Pc7dPt3goPw]]"], ["Beyond The Pill: The Path to Longevity", "Amazon Prime documentary context", "Oxydise took part via chamber/documentary involvement. Use only with approved wording and never as clinical proof.", "All colleagues", "[[Context||https://thelongevity.network/]]"]]}, {"t": "h3", "text": "15.2 HBOT foundations, pressure, protocols and research channels"}, {"t": "table", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["HBOT USA channel", "HBOT USA", "Educational channel for HBOT basics, protocols and interviews.", "Starter", "[[Open||https://www.youtube.com/@HBOTUSA]]"], ["HBOT USA research by category", "HBOT USA", "Research-library page grouped by HBOT topic and condition. Good for colleague research, not for direct claims without checking the study.", "Advanced", "[[Open||https://hbotusa.com/hbot-research-by-category/]]"], ["How to Hyperbaric channel", "How to Hyperbaric", "Interviews and education from HBOT practitioners and experts.", "Starter", "[[Open||https://www.youtube.com/@hyperbaric]]"], ["How HBOT is the Most Powerful Tool for Longevity and Recovery", "Dr Scott Sherr / Thomas DeLauer", "Deep-dive into HBOT, oxygen delivery, recovery and longevity framing. Strong internal education; translate claims cautiously.", "Core HBOT", "[[Open||https://www.youtube.com/watch?v=onILjIlPCRA&t=6s]]"], ["Dr Scott Sherr on The Dr Hyman Show", "Dr Scott Sherr / Dr Mark Hyman", "Clear HBOT physiology and why oxygen delivery matters in wellness and clinical contexts.", "Core HBOT", "[[Open||https://www.youtube.com/watch?v=uaZNFWb9pxg]]"], ["Dave Asprey and Dr Jason Sonners - HBOT questions", "Dave Asprey / Dr Jason Sonners", "Useful for pressure, dosing and consumer HBOT questions. Translate claims carefully.", "Advanced", "[[Open||https://www.youtube.com/watch?v=87XyzRLICkU&t=1s]]"], ["Dr Jason Sonners / HBOT and ageing", "Dr Jason Sonners", "Useful for internal education on pressure, consistency, physiology and longevity framing.", "Advanced", "[[Open||https://www.youtube.com/watch?v=xqdZufdEjrw]]"], ["Proven Methods for Getting Top Results from HBOT", "Dr Masha Makeeva / How to HYPERBARIC", "Protocol and optimisation education. Useful for colleague confidence and practical questions.", "Sales, support", "[[Open||https://www.youtube.com/watch?v=tk1b_txokQg]]"], ["#1 Absolute Best Way to Get Maximum Results from HBOT", "Dr Masha Makeeva / How to HYPERBARIC", "Practical optimisation advice. Good internal watch; avoid absolute public claims.", "Advanced", "[[Open||https://www.youtube.com/watch?v=IMcE3edYkug]]"], ["The Healing and Regenerative Power of HBOT", "HBOT USA", "Overview of HBOT and tissue-repair concepts. Good for background, not a claim library.", "Starter", "[[Open||https://www.youtube.com/watch?v=wMFmA3AotU8]]"], ["How to Answer the Top 8 HBOT Patient Questions", "HBOT USA", "Practical Q&A resource covering safety, process, benefits and expectations.", "Sales, support", "[[Open||https://www.youtube.com/watch?v=oSykWqi9BXc]]"], ["Soft vs Hard HBOT Chambers: What Recent Research Reveals", "HBOT USA", "Compares mild/soft and harder clinical systems. Useful for pressure positioning and expectation-setting.", "Sales, directors", "[[Open||https://www.youtube.com/watch?v=P9ZdlZiCITg]]"]]}, {"t": "h3", "text": "15.3 HBOT stories, brain health, sport and recovery examples"}, {"t": "table", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Joe Namath brain injury/HBOT story", "Joe Namath / HBOT story", "Useful for understanding why high-profile brain-recovery stories make HBOT memorable. Use only as anecdote, not proof.", "Internal story", "[[Open||https://www.youtube.com/watch?v=s7nxU3QadIA]]"], ["Joe Rogan / Justin Wren HBOT discussion", "Joe Rogan / Justin Wren", "Mainstream conversation about hyperbaric experiences and brain recovery themes.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=mhympAfm0TY&t=4s]]"], ["Joe Rogan Suggests Hyperbaric Chamber to Israel Adesanya", "Joe Rogan & Israel Adesanya", "Shows HBOT entering combat-sport culture. Use as sector awareness, not clinical evidence.", "Sport/recovery", "[[Open||https://www.youtube.com/watch?v=IFZqzfgQ9bU]]"], ["Mel Gibson / Amen Clinics experience", "Mel Gibson / Amen Clinics", "Public brain-health story that customers mention; treat as anecdote and avoid copying claims.", "Anecdote only", "[[Open||https://www.youtube.com/watch?v=0xZ0oLhR154]]"], ["Jay’s Journey - MS and HBOT", "Jay / Oxydise-style story", "Customer story: hope, energy and lived experience of a neurological diagnosis. Internal empathy resource.", "Internal story", "[[Open||https://www.youtube.com/watch?v=nSngCpLzlbk]]"], ["Claire Turner - living with Stage 4 Melanoma", "Claire Turner / Oxydise", "Cancer-related customer story. Use with extreme care, consent and approved wording only.", "Hold for approval", "[[Open||https://www.youtube.com/watch?v=7e7vnyDBUiU&t=4s]]"], ["Ben Whittaker recovery story", "Ben Whittaker / Oxydise", "Athlete recovery example and performance-context content.", "Sport/recovery", "[[Open||https://www.youtube.com/watch?v=Py2DG8MKPdw]]"], ["Stoltman Brothers recovery routine", "Stoltman Brothers / Oxydise", "Strength-athlete recovery credibility and recovery-stack storytelling.", "Sport/recovery", "[[Open||https://www.youtube.com/watch?v=XQMfYoE0Sts&t=19s]]"]]}, {"t": "h3", "text": "15.4 Red Light / photobiomodulation, light and mitochondria"}, {"t": "table", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Huberman Lab - Using light to optimise health", "Andrew Huberman / Huberman Lab", "Foundation for circadian light, sunlight, blue light, red light and practical light hygiene.", "Starter", "[[Open||https://www.youtube.com/watch?v=UF0nqolsNZc&t=1s]]"], ["Huberman with Dr Glen Jeffery", "Andrew Huberman / Glen Jeffery", "Useful for retina, mitochondria, 670 nm, LED concerns and light-timing nuance.", "Advanced", "[[Open||https://www.youtube.com/watch?v=iT8W6kaD-RA&t=1s]]"], ["Dr Ruscio - powerful effects of red light therapy", "Dr Michael Ruscio", "Simple public-facing overview of PBM, mitochondria and practical benefits; verify claims before using.", "Starter", "[[Open||https://www.youtube.com/watch?v=exrLFJk96ws]]"], ["Gary Brecka - red light therapy", "Gary Brecka", "Mainstream biohacking explanation; useful for knowing what customers have heard.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=mvr0Ub3TG_Y&t=5s]]"], ["Human Biologist on the Benefits of Red Light Therapy", "Gary Brecka with Joe Rogan / PowerfulJRE clips", "Mainstream PBM explanation. Useful for customer awareness and common claims; check study basis before using.", "Sector awareness", "[[Open||https://www.youtube.com/watch?v=lM8SR11Oazw&t=1s]]"], ["Methylene blue, red light and HBOT synergy", "Biohacking discussion", "Advanced stack conversation. Internal context only; do not recommend methylene blue.", "Internal only", "[[Open||https://www.youtube.com/watch?v=mylh0x62kN8&t=1s]]"]]}, {"t": "h3", "text": "15.5 Grounding, hydrogen, metabolism, mindset and wider biohacking"}, {"t": "table", "head": ["Resource", "Speaker / channel", "Why watch", "Suggested audience", "Link"], "rows": [["Huberman AMA - nature and grounding", "Andrew Huberman / Huberman Lab", "Good example of cautious, practical discussion of nature exposure and grounding-style questions.", "Grounding", "[[Open||https://www.youtube.com/watch?v=eJU6Df_ffAE&t=2s]]"], ["Earthing / blood-quality discussion", "Grounding-sector content", "Content colleagues encounter. Treat as debated and do not productise.", "Grounding", "[[Open||https://www.youtube.com/watch?v=Q31UfsdKdhc]]"], ["Hydrogen Water Studies library", "Hydrogen Water Studies", "Research-library link for molecular hydrogen and hydrogen water studies.", "Hydrogen", "[[Open||https://hydrogenwaterstudies.com/]]"], ["HBOT + Hydrogen discussion", "HBOT/hydrogen discussion", "Internal education on why some practitioners pair hydrogen with HBOT. Verify claims and avoid overstatement.", "Hydrogen", "[[Open||https://www.youtube.com/watch?v=lSeVKavhlxo]]"], ["Diary of a CEO - sugar / metabolic health", "The Diary of a CEO", "Sector awareness for metabolic health, sugar and everyday energy conversations.", "Metabolic health", "[[Open||https://www.youtube.com/watch?v=ZE_H7rijrVk]]"], ["I Tested 100,000 People’s DNA. This Diet Will Kill You", "Gary Brecka / The Diary of a CEO", "Public genetics and nutrition conversation. Useful because customers may reference Gary Brecka; verify claims before repeating.", "Genetics/nutrition", "[[Open||https://www.youtube.com/watch?v=10enqcw2Qiw]]"], ["Gary Brecka - prediction/biological age style interview", "Gary Brecka", "Know what customers may hear in public longevity media; verify before repeating.", "Longevity", "[[Open||https://www.youtube.com/watch?v=r3atRG5wvtg]]"], ["Joe Rogan Experience - Gary Brecka", "Gary Brecka / Joe Rogan", "Public biohacking/longevity conversation. Useful for awareness, not evid
