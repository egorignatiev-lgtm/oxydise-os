dissolves them and steepens the gradient that washes nitrogen out of tissue (Henry's law), while supplying oxygen to tissue the bubbles had cut off. Treating early matters; the source notes symptoms appearing more than ten minutes post-dive should prompt intervention, and argues that even milder cases are worth treating to limit cumulative, long-term diving injury."}, {"t": "p", "text": "Mechanisms of action: Decreased bubble size, hyperoxygenation."}, {"t": "p", "text": "Typical protocol: Initial treatment at 2.8 ATA on 100% oxygen, aiming for clear improvement within the first 20 minutes; proceed on a minimum of US Navy Treatment Table 6 (TT6) with possible extensions (two at 2.8 ATA / 60 fsw and two at 1.9 ATA). Treat until asymptomatic or a plateau over three consecutive sessions; up to two TT6 rounds per day are possible with vigilant monitoring for pulmonary and CNS oxygen toxicity."}, {"t": "h4", "text": "8. Delayed radiation injury (soft-tissue and bony necrosis)"}, {"t": "p", "text": "Months or years after radiotherapy, treated tissue can scar and lose blood vessels, leaving it chronically under-supplied and prone to breakdown — e.g. cystitis, proctitis, enteritis, skin ulcers, and osteoradionecrosis (notably of the jaw). Serious complications occur in under ~10% of survivors but are hard to heal."}, {"t": "p", "text": "Thought mechanism of help: Irradiated tissue is the textbook example of a wound bed that cannot heal because it is hypoxic and poorly vascularised. HBOT's most important contribution here is angiogenesis — literally growing new blood vessels into the damaged territory — supported by re-oxygenation, collagen/fibroblast activity and stem-cell mobilisation, and by reducing fibrosis. Use has been documented since the mid-1970s."}, {"t": "p", "text": "Mechanisms of action: Angiogenesis, hyperoxygenation, fibroblast proliferation/collagen synthesis, stem-cell mobilisation."}, {"t": "p", "text": "Typical protocol: As many as ~60 sessions of 100% oxygen at 2.0–2.5 ATA, 90–120 minutes."}, {"t": "h4", "text": "9. Idiopathic sudden sensorineural hearing loss (ISSHL)"}, {"t": "p", "text": "An abrupt hearing loss — usually one-sided, of at least 30 dB across at least three contiguous frequencies, developing within three days — often without an identifiable cause."}, {"t": "p", "text": "Thought mechanism of help: The cochlea has a very high oxygen demand but a poor blood supply, so it relies on oxygen diffusing from nearby capillaries into the fluids around the hair cells (peri- and cortilymph). Sudden hearing loss involves a sharp drop in that perilymph oxygen tension. HBOT raises perilymph oxygenation roughly tenfold, supporting the starved hair cells and, via reduced inflammation and neurogenesis, their recovery. Earlier treatment gives better outcomes."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, neurogenesis, reduced inflammatory cytokines."}, {"t": "p", "text": "Typical protocol: ~10–20 sessions of 100% oxygen at 2.0–2.5 ATA, ~90 minutes; ideally started within 14 days. Often coordinated with ENT care and intratympanic steroid injection."}, {"t": "h4", "text": "10. Intracranial abscess (ICA)"}, {"t": "p", "text": "A pus-filled pocket in the brain, seeded from infections such as sinusitis, otitis or mastoiditis, from bloodstream spread, or from head trauma."}, {"t": "p", "text": "Thought mechanism of help: An abscess is an infected, swollen, often low-oxygen pocket. Raising oxygen tension supports white-cell killing of the organisms (including against anaerobes) and helps reduce the surrounding brain swelling. It is especially considered where there are multiple or deep/awkwardly placed abscesses, fungal involvement, or where surgery is risky."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, leukocyte oxidative killing."}, {"t": "p", "text": "Typical protocol: As many as ~20 sessions of 100% oxygen at 2.0–2.5 ATA, 60–90 minutes, QD or BID."}, {"t": "h4", "text": "11. Necrotising soft-tissue infections"}, {"t": "p", "text": "“Flesh-eating” infections entering through a skin breach, causing blistering, fever, fatigue and severe pain; often polymicrobial (aerobes, anaerobes and fungi). Includes Fournier's gangrene."}, {"t": "p", "text": "Thought mechanism of help: Like gas gangrene, the killing here is partly anaerobic and toxin-driven, and the tissue is hypoxic. Supersaturating it with oxygen restores white-cell oxidative killing, suppresses anaerobes and their toxins, and boosts antibiotic effectiveness. HBOT is an adjunct — studies (Gozal, Riseman, Hollabaugh) show that antibiotics + surgery + HBOT cut mortality versus standard care alone."}, {"t": "p", "text": "Mechanisms of action: Leukocyte oxidative killing, toxin inhibition, antibiotic synergy, fibroblast/collagen formation, stem-cell mobilisation."}, {"t": "p", "text": "Typical protocol: As many as ~40 sessions of 100% oxygen at 2.0–2.5 ATA, ~90 minutes; BID for the first ~3 days, then QD. Imaging (CT) and deep-tissue biopsy guide diagnosis."}, {"t": "h4", "text": "12. Refractory osteomyelitis"}, {"t": "p", "text": "Bone infection that has failed appropriate standard treatment, often leaving non-healing wounds and sinus tracts and sometimes threatening amputation."}, {"t": "p", "text": "Thought mechanism of help: Infected bone is poorly perfused and hypoxic, which both weakens the immune response and limits antibiotic delivery. Raising oxygen tension in the bone to normal or above re-activates the oxygen-dependent killing of polymorphonuclear leukocytes, works synergistically with antibiotics, and supports new vessel growth — so the bone can finally heal. The source argues it is reasonable to consider HBOT even before infection becomes truly “refractory.”"}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, leukocyte oxidative killing, antibiotic synergy, angiogenesis."}, {"t": "p", "text": "Typical protocol: As many as ~40 sessions of 100% oxygen at 2.0–2.5 ATA, ~90 minutes."}, {"t": "h4", "text": "13. Severe anaemia (transfusion not possible)"}, {"t": "p", "text": "A critical shortage of healthy red cells, so oxygen transport fails — used when transfusion is impossible, refused, or unavailable."}, {"t": "p", "text": "Thought mechanism of help: This is the purest demonstration of hyperoxygenation: with too few red cells, HBOT dissolves enough oxygen straight into the plasma to meet tissue demand without haemoglobin, preventing or correcting the accumulating “oxygen debt” until red-cell mass can recover."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation."}, {"t": "p", "text": "Typical protocol: As many as ~10 sessions of 100% oxygen at 2.0–3.0 ATA, 90–120 minutes."}, {"t": "h4", "text": "14. Thermal burn injury"}, {"t": "p", "text": "Burns from external heat; deeper and more severe with higher temperature and longer exposure. They impair circulation, concentrate the blood, damage vessels and promote clotting and infection."}, {"t": "p", "text": "Thought mechanism of help: Around a burn lies a salvageable “zone of stasis” that will die if it stays hypoxic and oedematous. HBOT reduces that oedema (vasoconstriction), delivers oxygen to the borderline cells whose capillaries can no longer supply them, fights infection (oxidative killing) and drives healing (angiogenesis, collagen, fibroblast and stem-cell activity). Notably, inhalation injury is not a contraindication; superficial burns and non-survivable cases are excluded."}, {"t": "p", "text": "Mechanisms of action: Vasoconstriction, hyperoxygenation, leukocyte oxidative killing, angiogenesis, collagen formation, fibroblast/stem-cell activity."}, {"t": "p", "text": "Typical protocol: As many as ~40 sessions of 100% oxygen at 2.0–2.4 ATA, ~90 minutes; TID in the first 24 hours, then BID. Best delivered where a burn centre and chamber are co-located."}, {"t": "h4", "text": "15. Avascular necrosis (AVN / osteonecrosis)"}, {"t": "p", "text": "Bone tissue — classically the femoral head — dies when its blood supply is interrupted, causing pain and loss of mobility. There is no cure; the aim is to manage pain, preserve the bone and improve movement."}, {"t": "p", "text": "Thought mechanism of help: AVN is essentially a localised arterial/ischaemic problem in bone. Raising oxygen to hyperbaric levels relieves the ischaemia (and any associated compartment-syndrome-like pressure), keeps marginal bone alive, reduces oedema and stimulates new vessels. Early treatment is important to outcomes."}, {"t": "p", "text": "Mechanisms of action: Hyperoxygenation, vasoconstriction, reduced leukocyte adherence, reduced lipid peroxidation, angiogenesis."}, {"t": "p", "text": "Typical protocol: As many as ~90 sessions of 100% oxygen at 2.0–2.5 ATA, 60–90 minutes, ~5–6 days/week."}, {"t": "h3", "text": "Emerging and off-label applications"}, {"t": "p", "text": "Outside the formally approved list lies a wide field of conditions where HBOT is used or being studied. “Off-label” does not mean ineffective — it means the burden of proof (especially large double-blind, placebo-controlled, randomised trials) is thinner, which limits insurance reimbursement more than it limits the underlying physics. The source is careful to frame these as plausible benefit grounded in known mechanisms rather than guaranteed cures, and reminds readers that the absence of FDA approval marks a use as experimental, with efficacy not guaranteed. (It draws an analogy with sildenafil/Viagra, approved first as a cardiac drug, whose now-famous use emerged from an observed side effect.)"}, {"t": "p", "text": "Conditions are grouped by theme for easier study; each carries its proposed thought mechanism of help."}, {"t": "h4", "text": "Addiction & recovery"}, {"t": "p", "text": "Addiction recovery. Chronic alcohol or drug use kills brain cells, and acetaldehyde build-up is a common consequence of substance abuse. Thought mechanism of help: extra oxygen may speed repair of damaged neurons, help clear lingering toxic substances faster, and reduce systemic inflammation — supporting mood, decision-making and recovery. Mechanisms: hyperoxygenation, toxin inhibition, vasoconstriction. Typical protocol: ~20 sessions at 1.3–2.0 ATA for 60 minutes."}, {"t": "h4", "text": "Brain, nerve & neurodevelopment"}, {"t": "p", "text": "Alzheimer's disease & dementia. Thought mechanism of help: improving cerebral perfusion and oxygenation, growing new vessels and nerve tissue, and calming neuro-inflammation may slow decline and support function. Mechanisms: angiogenesis, neurogenesis, hyperoxygenation, reduced cytokine activity, stem-cell mobilisation."}, {"t": "p", "text": "Vascular dementia. Thought mechanism of help: this dementia is driven by poor brain blood flow, so increasing oxygen delivery and stimulating new vessels directly targets the cause. Mechanisms: hyperoxygenation, angiogenesis, reduced cytokine activity."}, {"t": "p", "text": "Traumatic brain injury (TBI). TBI is a major cause of disability and death (often from road accidents, falls, sport, blasts). Thought mechanism of help: brain injury leaves regions hypoxic and inflamed; HBOT induces neuroplastic change, reduces cerebral inflammation and improves circulation, working synergistically with rehabilitation. Reported benefits include better speech/language, less spasticity, fewer seizures and improved fine motor skills. Mechanisms: neurogenesis, angiogenesis, reduced cytokine activity, hyperoxygenation, vasoconstriction, fibroblast/collagen, growth-factor release, stem-cell production."}, {"t": "p", "text": "Post-stroke recovery. Thought mechanism of help: around the dead core of a stroke is a “penumbra” of stunned-but-viable tissue; re-oxygenation plus new vessel and nerve growth may rescue and rewire it. Strong pre-clinical signals. Mechanisms: neurogenesis, angiogenesis, reduced cytokine activity, hyperoxygenation."}, {"t": "p", "text": "Neurological disorders (general). Thought mechanism of help: the same toolkit — stimulating repair, perfusion and neuroplasticity while reducing inflammation — underlies a broad category of neurological conditions. Mechanisms: hyperoxygenation, neurogenesis, angiogenesis, reduced cytokine activity, stem-cell production."}, {"t": "p", "text": "Autism spectrum disorder (ASD). The source notes that a large share of ASD patients show neuro-inflammation and reduced perfusion (hypoperfusion) of the prefrontal and temporal lobes. Thought mechanism of help: improving blood flow and oxygen to these regions and reducing inflammation may improve cognitive function. Mechanisms: angiogenesis, hyperoxygenation, neurogenesis, reduced cytokine activity, stem-cell mobilisation."}, {"t": "p", "text": "Cerebral palsy (CP). CP is a non-progressive motor disability, often linked to oxygen deprivation around birth. Thought mechanism of help: HBOT may aid neurological repair and regeneration, mitigate the hypoxic injury to the neonatal brain, support neurogenesis and stem-cell activity, and boost neuroplasticity. Mechanisms: hyperoxygenation, neurogenesis, reduced cytokine activity, increased stem-cell production."}, {"t": "p", "text": "Migraines. Thought mechanism of help: raising oxygen and modulating vessel tone (and reducing inflammation) may relieve the vascular and inflammatory components of migraine. Mechanisms: hyperoxygenation, vasoconstriction, reduced cytokine activity."}, {"t": "p", "text": "Multiple sclerosis (MS). Thought mechanism of help: reducing inflammatory cytokines and supporting nerve repair/perfusion may help in this immune-mediated demyelinating disease. Mechanisms: neurogenesis, angiogenesis, reduced cytokine activity."}, {"t": "p", "text": "Post-traumatic stress disorder (PTSD). Thought mechanism of help: HBOT may repair damaged brain tissue and improve perfusion in regions implicated in PTSD, alongside reducing inflammation. Mechanisms: hyperoxygenation, angiogenesis, neurogenesis, reduced cytokine activity."}, {"t": "p", "text": "Near-drowning. Thought mechanism of help: after a hypoxic/ischaemic insult from submersion, re-oxygenation, oedema reduction and reduced inflammation may protect the brain and lungs. Mechanisms: hyperoxygenation, vasoconstriction, reduced cytokine activity."}, {"t": "h4", "text": "Ageing, wellness & performance"}, {"t": "p", "text": "Anti-aging. Ageing is now understood through several “hallmarks” — DNA damage and genetic instability, shortening of the protective chromosome caps (telomeres), epigenetic drift, loss of proteostasis and dysregulated nutrient sensing, mitochondrial dysfunction, accumulation of senescent (“zombie”) cells that inflame their neighbours, stem-cell depletion and disrupted cell signalling. Thought mechanism of help: HBOT may act on several of these at once — stimulating angiogenesis (especially where circulation is failing), clearing or countering senescent cells, mobilising stem cells, and increasing reverse-transcriptase/telomerase activity that can lengthen telomeres. The source is explicit that long-term efficacy and safety need more research. Mechanisms: hyperoxygenation, increased reverse transcriptase (telomerase), stem-cell proliferation, angiogenesis, reduced cytokine activity."}, {"t": "callout", "label": "Evidence spotlight: the Israeli telomere study (Hachmo et al., 2020)", "text": "This is the study most often cited for HBOT and aging. It was run by Professor Shai Efrati's group at the Sagol Center for Hyperbaric Medicine, Shamir (Assaf-Harofeh) Medical Center, with Tel Aviv University — hence “the Israeli study.”\nDesign: 35 healthy, independently living adults aged 64 and over received 60 daily HBOT sessions (five days a week). Blood was sampled at baseline, at the 30th and 60th sessions, and 1–2 weeks after the course. The team measured telomere length and the proportion of senescent (“zombie”) immune cells.\nHeadline results: telomere length in several immune-cell types (T-helper, T-cytotoxic, natural-killer and B cells) increased by more than 20% — the kind of change normally associated with reversing, not just slowing, a marker of cellular ageing. At the same time senescent T-helper cells fell by roughly 37% and senescent cytotoxic T-cells by about 11%.\nWhy it matters: rather than tweaking symptoms, the therapy appeared to shift two of the fundamental hallmarks of ageing — telomere shortening and senescent-cell accumulation — in healthy older people. It remains a single, modest-sized study, so it should be presented as promising rather than proof, but it is the strongest signal behind the anti-aging rationale."}, {"t": "p", "text": "The hyperoxic–hypoxic paradox. This is the clever idea that ties the anti-aging effect to the air breaks described earlier. Many of the body's repair programmes — growing new vessels, mobilising stem cells, lengthening telomeres — are normally switched on by a shortage of oxygen (hypoxia). HBOT exploits a loophole: by repeatedly raising oxygen to very high levels and then easing off (the air breaks and the swing between sessions), it tricks the cells into sensing a relative drop in oxygen even though overall oxygen is abundant. The cells respond as if challenged by hypoxia — launching the regenerative programmes — while actually being bathed in oxygen. In short: the up-and-down of the oxygen dose, not just the high level, is part of why HBOT can produce regenerative, anti-aging effects safely."}, {"t": "p", "text": "Wellness / performance. Thought mechanism of help: in healthy people, the recovery toolkit — better oxygen delivery, new vessels, growth-factor release and stem-cell mobilisation — may speed recovery and support performance. Mechanisms: hyperoxygenation, angiogenesis, stem-cell mobilisation, growth-factor release."}, {"t": "p", "text": "Sports injuries. Thought mechanism of help: injured musculoskeletal tissue heals faster when oxygenated and re-vascularised, with oedema controlled. Mechanisms: hyperoxygenation, vasoconstriction, angiogenesis, fibroblast/collagen synthesis."}, {"t": "p", "text": "Erectile dysfunction (ED). Studies (as recent as 2018) reported marked increases in penile blood flow, with ~80% of subjects showing improvement after ~40 daily sessions. Thought mechanism of help: by increasing vascular endothelial growth factor (VEGF) and promoting angiogenesis, HBOT can rebuild blood supply to the tissue. Mechanisms: hyperoxygenation, angiogenesis, reduced lipid peroxidation. Typical protocol: ~30 sessions at 2.4 ATA for 90 minutes with three 5-minute air breaks."}, {"t": "p", "text": "Infertility. Thought mechanism of help: improving tissue oxygenation, circulation and reducing oxidative/inflammatory stress in reproductive tissue may support fertility. Mechanisms: hyperoxygenation, reduced lipid peroxidation, angiogenesis."}, {"t": "h4", "text": "Inflammatory, autoimmune & pain conditions"}, {"t": "p", "text": "Inflammation (general). Thought mechanism of help: HBOT lowers pro-inflammatory cytokine activity and improves perfusion, calming the inflammatory state that underlies many chronic conditions. Mechanisms: reduced cytokine activity, hyperoxygenation."}, {"t": "p", "text": "Inflammatory bowel disease (IBD). IBD is defined by chronic gut inflammation. Thought mechanism of help: reducing inflammation while improving oxygenation and new-vessel growth in the bowel wall supports mucosal healing. Mechanisms: hyperoxygenation, angiogenesis, reduced cytokine activity."}, {"t": "p", "text": "Fibromyalgia (FMS) & chronic fatigue. Thought mechanism of help: decreasing inflammation and supporting nerve function/perfusion may reduce pain and fatigue. Mechanisms: neurogenesis, reduced cytokine activity, hyperoxygenation."}, {"t": "p", "text": "Complex regional pain syndrome (CRPS). Strong pre-clinical signals. Thought mechanism of help: improving oxygenation, modulating vessel tone and reducing inflammation in the affected limb may relieve the pain/swelling cycle. Mechanisms: hyperoxygenation, vasoconstriction, reduced cytokine activity."}, {"t": "p", "text": "Mast cell activation syndrome. Thought mechanism of help: HBOT may create conditions that calm the over-active inflammatory cascade. Mechanisms: hyperoxygenation, angiogenesis, reduced cytokine activity."}, {"t": "h4", "text": "Metabolic & vascular"}, {"t": "p", "text": "Diabetes. Thought mechanism of help: beyond foot wounds, HBOT has been shown to improve cellular insulin sensitivity — helping glucose uptake into skeletal muscle and lowering blood sugar — and research even hints at regeneration of pancreatic islets (insulin-producing cells). It also treats complications (osteomyelitis, cellulitis) and, in diabetic foot ulcers, promotes healing: a 2021 study of 181 patients (avg. ~39 sessions plus standard care) reported ~62% achieving complete healing, ~17% no improvement and ~21% amputation. Mechanisms: hyperoxygenation, angiogenesis, fibroblast proliferation, reduced cytokine activity."}, {"t": "p", "text": "Plastic surgery. Thought mechanism of help: as with grafts and flaps, reducing inflammation and stimulating oxygenation, new vessels and collagen improves survival of relocated tissue and speeds recovery. Mechanisms: angiogenesis, fibroblast/collagen synthesis, hyperoxygenation, reduced cytokine activity."}, {"t": "p", "text": "Hyaluronic-acid filler-induced necrosis. A cosmetic-filler complication where a vessel is compromised and tissue starts to die. Thought mechanism of help: oxygen introduced under pressure reaches the threatened tissue past the blockage and supports vessel recovery before necrosis sets in. Mechanisms: hyperoxygenation, angiogenesis."}, {"t": "p", "text": "Gadolinium deposition disease (GDD). Thought mechanism of help: the rationale aligns with HBOT's detox and anti-inflammatory effects — supporting clearance of retained gadolinium (from MRI contrast) and reducing associated symptoms. Mechanisms: hyperoxygenation, reduced cytokine activity."}, {"t": "p", "text": "Menière's disease. Hearing loss, tinnitus and vertigo significantly affect quality of life. Thought mechanism of help: improving inner-ear oxygenation and modulating vessel tone may relieve symptoms. Mechanisms: hyperoxygenation, vasoconstriction."}, {"t": "p", "text": "Anaemia (off-label). Thought mechanism of help: as in the recognised severe-anaemia indication, dissolved plasma oxygen pays off the tissue “oxygen debt” when red cells are insufficient. Mechanism: hyperoxygenation."}, {"t": "h4", "text": "Infections & toxins"}, {"t": "p", "text": "Bacterial infections. Thought mechanism of help: oxygen restores white-cell oxidative killing, works synergistically with antibiotics and suppresses anaerobes. Mechanisms: leukocyte oxidative killing, antibiotic synergy, toxin inhibition."}, {"t": "p", "text": "Anaerobic infections. Thought mechanism of help: anaerobes by definition cannot tolerate oxygen — HBOT directly kills them and halts their toxin production. Mechanisms: toxin inhibition, leukocyte oxidative killing, hyperoxygenation."}, {"t": "p", "text": "Viral infections (general). Thought mechanism of help: supporting the immune response (oxidative killing) and reducing the harmful inflammatory over-reaction that viruses can provoke. Mechanisms: increased leukocyte oxidation/oxidative killing, reduced cytokine activity, toxin inhibition."}, {"t": "p", "text": "COVID-19. Conventional oxygen therapies rely on ambient pressure to push oxygen across the lung's diffusion barrier; as hypoxaemia worsens, that barrier defeats them. Thought mechanism of help: HBOT is not limited by those barriers — it forces oxygen into the blood under pressure — and may also damp the systemic inflammatory response that causes organ damage. Preliminary evidence suggests benefit, especially when started early. Mechanisms: hyperoxygenation, reduced cytokine activity."}, {"t": "p", "text": "Lyme disease. Borrelia burgdorferi is a microaerophile — it thrives in low-oxygen conditions. Thought mechanism of help: raising tissue oxygen creates an environment hostile to the organism while supporting immune killing and reducing inflammation. Mechanisms: hyperoxygenation, leukocyte oxidative killing, reduced cytokine activity, angiogenesis."}, {"t": "p", "text": "Herpesviridae. The source describes these as effectively anaerobic viruses that thrive in low oxygen. Thought mechanism of help: a high-oxygen environment is unfavourable to them, while immune function is supported. Mechanisms: hyperoxygenation, leukocyte oxidative killing, mitogenesis, toxin inhibition."}, {"t": "p", "text": "West Nile virus (WNV). Thought mechanism of help: support immune clearance and reduce the inflammatory/neurological impact of the infection. Mechanisms: leukocyte oxidative killing, toxin inhibition, reduced cytokine activity."}, {"t": "p", "text": "Mould toxicity. Thought mechanism of help: HBOT raises tissue oxygenation, increases white-cell activity and supports detoxification while reducing inflammation. Mechanisms: hyperoxygenation, toxin inhibition, leukocyte oxidative killing, reduced cytokine activity."}, {"t": "p", "text": "Snake venom. Used effectively in non-healing envenomation wounds. Thought mechanism of help: oxygenating venom-damaged, ischaemic tissue and stimulating new vessels limits necrosis and aids healing. Mechanisms: hyperoxygenation, angiogenesis, reduced cytokine activity."}, {"t": "p", "text": "Spider venoms. Thought mechanism of help: similarly, re-oxygenation plus toxin inhibition and immune support reduce local tissue death from cytotoxic bites. Mechanisms: hyperoxygenation, toxin inhibition, leukocyte oxidative killing."}, {"t": "h3", "text": "Cancer — a closer look"}, {"t": "p", "text": "Cancer is treated separately here because it is the most nuanced application and the one most easily misunderstood. HBOT is discussed only as an adjunct — alongside conventional radiation and chemotherapy and under oncology supervision — not as a standalone treatment, and it carries genuine theoretical risk as well as potential benefit."}, {"t": "h4", "text": "Why oxygen is a double-edged sword in cancer"}, {"t": "p", "text": "Many tumours grow in hypoxic (low-oxygen) micro-environments, and hypoxia is associated with aggressiveness and resistance to treatment. The intuitive hope is that adding oxygen weakens tumours and makes therapy work better. But the source is careful: simply equating “more oxygen” with “less cancer” oversimplifies. Two of HBOT's own mechanisms — angiogenesis (new blood vessels) and mitogenesis (cell division) — could in theory feed a tumour. This is why HBOT for cancer demands caution, oncologist agreement, and careful timing."}, {"t": "h4", "text": "The four proposed rationales (the “thought mechanism of help”)"}, {"t": "ul", "items": ["Mitigating hypoxia. Hypoxia promotes cancer growth, invasion and metastasis and makes tumours resistant to chemotherapy and radiotherapy (radiotherapy in particular needs oxygen to generate the free radicals that damage tumour DNA). By re-oxygenating the tumour, HBOT may render it more sensitive to conventional treatment.", "Stimulating angiogenesis — for the healthy tissue. New vessels are vital to repair normal tissues damaged by radiation (skin, bone, mucosa), reducing infection, ulceration, necrosis and fibrosis. Here angiogenesis is aimed at healing the patient's normal tissue, not the tumour.", "Modulating the immune system. HBOT can enhance the activity of immune cells — natural killer cells, macrophages and T-cells — that recognise and destroy cancer cells, and, by limiting inflammation, may hinder cancer progression and ease treatment side effects.", "Maximising treatment outcomes. Tailoring HBOT to the cancer's type and location allows a targeted approach, aids recovery from radiation injury, and disrupts the anaerobic environment that certain cancers depend on — potentially undermining anaerobic-dependent tumour cells."]}, {"t": "h4", "text": "Clinical signals"}, {"t": "p", "text": "The source cites HBOT as advantageous when combined with conventional care — reducing tumour hypoxia, improving chemotherapy and radiation response, and easing side effects such as “chemo-brain” symptoms and post-operative healing. One study is described in which the great majority of patients receiving HBOT alongside their treatment showed substantial (>50%) tumour regression. (The exact comparative percentages in the source text are not reproduced precisely here because the scanned figures were not fully legible; the direction of effect — favouring the HBOT-plus-standard-care group — is the takeaway, and the underlying study should be checked directly before any figure is quoted.)"}, {"t": "h4", "text": "The mouse experiment (tumour bioluminescence)"}, {"t": "p", "text": "The most concrete piece of evidence the source presents is an animal study that measured tumour burden in mice using bioluminescence — tumour cells are engineered to emit light, so the amount of light (measured in photons per second) is a proxy for how much tumour is present. Less light means less tumour."}, {"t": "p", "text": "The experiment compared groups that combined diet and HBOT. The labelled conditions include a Control group, a standard-diet-plus-HBOT group (SD+HBO₂T) and, most strikingly, a ketogenic-diet-plus-HBOT group (KD+HBO₂T). Bioluminescence was recorded both for the whole animal and organ-by-organ — brain, kidneys, spleen and lungs — to see where tumour had spread."}, {"t": "callout", "label": "What the mouse data showed", "text": "Whole-animal and organ bioluminescence (the tumour-burden signal) decreased in the HBOT groups compared with control.\nThe combination of a ketogenic diet with HBOT (KD+HBO₂T) produced the largest reduction in tumour bioluminescence.\nInterpretation: oxygen and a metabolic intervention appear to work together — the ketogenic diet limits the glucose that many tumours rely on, while HBOT raises oxygen, and the two stresses combined hit the tumour harder than either alone. This “metabolic + oxygen” synergy is the basis for pairing HBOT with dietary and glucose-control strategies in the cancer discussion."}, {"t": "p", "text": "Tumour bioluminescence in mice. (A) Whole-body images: less light = less tumour, with KD+HBO₂T clearly the dimmest. (B) Whole-animal tumour signal over 7 weeks by group. (C–D) Organ-by-organ signal (SD vs KD+HBO₂T) — brain, kidneys, spleen, lungs, adipose and liver. SD = standard diet, KD = ketogenic diet, HBO₂T = hyperbaric oxygen therapy."}, {"t": "p", "text": "Reading the figure: in panel A the control mouse glows brightest (most tumour) while the ketogenic-diet-plus-HBOT mouse is almost dark. Panel B shows the tumour signal climbing fastest on standard diet alone and slowest on KD+HBO₂T — the two interventions together hold tumour growth down the most over time. Panels C and D confirm the same pattern organ by organ: across brain, kidneys, spleen, lungs, adipose and liver, the KD+HBO₂T group (black bars) carries far less tumour signal than standard diet (white bars)."}, {"t": "p", "text": "The practical message from the figure is not a precise percentage but a pattern: across the whole animal and multiple organs, adding HBOT lowered the tumour signal, and adding it on top of a ketogenic diet lowered it most."}, {"t": "h4", "text": "How cancer HBOT is actually approached"}, {"t": "p", "text": "Mechanisms of action: Cytokine reduction, increased stem-cell production, mitogenesis, angiogenesis, hyperoxygenation, fibroblast proliferation/collagen synthesis."}, {"t": "p", "text": "Patient selection & cautions: Considered only in synergy with traditional oncology care and with the oncologist's agreement. Caution is essential because HBOT may enhance the effects of chemotherapy (which can be desirable) but its mitogenic and angiogenic effects could also, in theory, support tumour growth — so timing and monitoring matter. It is frequently paired with metabolic therapies (ketogenic diet, glucose control, targeted nutrition) rather than used alone."}, {"t": "p", "text": "Typical protocol: A representative scheme cited is 2.5 ATA for 60 minutes, with decompression involving 21% oxygen — always weighed against the demands of the patient's wider treatment regimen."}, {"t": "h3", "text": "Key Terms"}, {"t": "table", "head": ["Term", "Definition"], "rows": [["Indication", "A condition for which a treatment is appropriate and intended."], ["Off-label / emerging use", "Use beyond formally recognised indications; supported by mechanism and growing (not always definitive) evidence; experimental, efficacy not guaranteed."], ["Iatrogenic", "Caused by medical treatment or a procedure (e.g. an air embolism from catheterisation)."], ["Carboxyhaemoglobin (COHb)", "Haemoglobin bound to carbon monoxide instead of oxygen; measured to gauge CO-poisoning severity."], ["CRAO", "Central retinal artery occlusion — sudden painless vision loss; a sight-saving HBOT emergency."], ["Decompression sickness (DCS)", "Illness from inert-gas bubbles forming when pressure drops too quickly (e.g. diving)."], ["Clostridial myonecrosis", "Gas gangrene; a fast, toxin-producing anaerobic infection (mainly C. perfringens)."], ["Graft / flap", "Transplanted or relocated tissue whose survival depends on adequate blood supply and oxygen."], ["Compartment syndrome", "Dangerous pressure build-up in a muscle compartment after injury, cutting off circulation."], ["Zone of stasis", "The salvageable, marginally perfused tissue around a burn that HBOT aims to rescue."], ["Osteoradionecrosis", "Bone death (often of the jaw) following radiotherapy; a delayed radiation injury."], ["Refractory", "Not responding to standard treatment (e.g. refractory osteomyelitis)."], ["Microaerophile", "An organism (e.g. Borrelia in Lyme) that thrives in low-oxygen conditions — hence vulnerable to HBOT."], ["Senescent cells", "Aged “zombie” cells that stop dividing and release inflammatory signals; targeted in the anti-aging rationale."], ["Bioluminescence", "Light emitted by engineered tumour cells, used as a measurable proxy for tumour burden in the mouse study."], ["Ketogenic diet", "A very-low-carbohydrate diet that limits glucose; paired with HBOT in the cancer-synergy rationale."], ["VEGF", "Vascular endothelial growth factor — the signal driving new blood-vessel growth (angiogenesis)."], ["Mitogenesis", "Stimulation of cell division — helpful for repair, but a reason for caution in cancer."]]}, {"t": "h3", "text": "Clinical & Practical Points"}, {"t": "ul", "items": ["The recognised indications have the firmest protocols; emerging uses should be framed as plausible benefit, not guaranteed cure, and labelled experimental where unapproved.", "Emergencies where speed matters: air/gas embolism, CO poisoning, CRAO, decompression sickness, and gas gangrene.", "CO poisoning is time-critical — oxygen at 3.0 ATA cuts CO's half-life to roughly 23 minutes versus ~6 hours on room air.", "Most wound, bone, graft and radiation-injury uses lean on the same trio: hyperoxygenation, angiogenesis and collagen/fibroblast support.", "Infection uses lean on toxin inhibition, oxidative killing and antibiotic synergy — alongside surgery and antibiotics, not instead of them.", "Anaerobe-driven or low-oxygen-loving organisms (gas gangrene, Lyme, herpesviridae, anaerobic infections) are especially logical HBOT targets because oxygen itself is hostile to them.", "Cancer is adjunctive only: oncologist agreement, careful timing, and awareness that angiogenesis/mitogenesis could theoretically aid a tumour; often paired with metabolic therapy (e.g. ketogenic diet).", "Always record patient-selection screening and the chosen pressure / time / session count for each indication."]}, {"t": "h3", "text": "Review Questions"}, {"t": "ul", "items": ["For any three established indications, state the “thought mechanism of help” in one sentence each.", "Why is carbon monoxide so dangerous at the haemoglobin level, and how does HBOT reverse it? Quote the half-life figures.", "Explain the vicious cycle in compartment syndrome and the two ways HBOT breaks it.", "Why is angiogenesis the key mechanism in delayed radiation injury?", "How can HBOT help in severe anaemia even without red cells?", "Give two infections where HBOT is logical specifically because the organism dislikes oxygen, and name the organism type.", "List the four proposed rationales for HBOT in cancer, and explain why oxygen is described as a “double-edged sword” here.", "Describe the mouse bioluminescence experiment: what was measured, which groups were compared, and what the ketogenic-diet result suggests.", "Why must emerging/off-label uses be presented differently from recognised indications?", "Pick an emerging neurological use and trace its reasoning from ‘what goes wrong’ to ‘how oxygen helps’."]}]}, {"title": "Chapter 3 — Contraindications, Adverse Reactions and Interactions", "blocks": [{"t": "p", "text": "(Source chapter 8)"}, {"t": "h3", "text": "Overview"}, {"t": "p", "text": "This is the safety chapter. It answers three questions: when HBOT must not be used (contraindications), what harms it can cause (adverse reactions), and what medicines change its risk or effect (interactions). The structure distinguishes absolute contraindications — situations where treatment is essentially never appropriate — from relative contraindications, where treatment may proceed with extra caution, monitoring or prior management. Understanding this chapter is what keeps the therapy safe."}, {"t": "callout", "label": "The unifying principle behind the absolutes", "text": "Every absolute contraindication in the book comes down to one thing: trapped gas in a space that cannot equalise as the pressure changes. Under Boyle's Law that trapped gas expands and contracts as the chamber pressurises and decompresses, and if it has nowhere to go it can cause serious injury. So the rule of thumb is: a sealed air pocket that cannot equalise is a stop sign."}, {"t": "h3", "text": "Absolute contraindications"}, {"t": "p", "text": "The book lists three absolute contraindications. The first two are flagged as “trapped gas” problems; the third is absolute only until it is corrected."}, {"t": "ul", "items": ["Tension pneumothorax (trapped gas). A life-threatening state in which air enters the pleural space (around the lung) and cannot escape, raising pressure on the lungs and other chest structures. Changing chamber pressure can worsen it, causing severe respiratory distress and cardiovascular compromise. Anatomically it involves the pleura, lungs and chest wall.", "Bronchospasm, when present (trapped gas). A sudden tightening of the muscles in the bronchiole walls narrows the airways and makes breathing difficult; the high pressure and oxygen of HBOT can itself trigger this, especially in people with reactive airway disease such as asthma. Because it traps gas in the lungs distal to the constriction, it is treated as absolute while it is occurring. Anatomically it affects the bronchi and bronchioles.", "Non-compliant tympanic membrane — until corrected. The eardrum normally flexes to help equalise middle-ear pressure. If it cannot (it is “non-compliant”), rising chamber pressure causes pain or injury because the middle-ear air space cannot equalise. This is an absolute contraindication until the problem is corrected, after which treatment may proceed."]}, {"t": "p", "text": "(Note the distinction the book draws: a tension pneumothorax is absolute, whereas a simple/managed pneumothorax is treated as a relative contraindication — see below.)"}, {"t": "h3", "text": "Relative contraindications"}, {"t": "p", "text": "These are not automatic refusals. The book's stance is that most of these people can still be treated, but only with special consideration before building their protocol or putting them in the chamber. The recommended approach is “low and slow”: begin with lower PO₂ exposures for the first few sessions and build the pressure gradually only as needed, finding the minimum therapeutic dose. Each case needs an individual cost–benefit analysis."}, {"t": "ul", "items": ["Pneumothorax. The only reason to treat someone with a pneumothorax is if they also have an arterial gas embolism — a life-threatening situation that supersedes the usual rule — in which case the pneumothorax is managed inside the chamber during the dive.", "Upper respiratory tract infections. Congestion makes equalising the ears and sinuses harder, and the person may be contagious — a real consideration in a shared office/chamber setting.", "Viral infections. Again a matter of congestion, fever and possible contagion; the added risks should be thought through and explained.", "High fevers. The chamber runs warm during pressurisation, which makes a feverish patient more uncomfortable, and there is an increased risk of febrile seizures once temperature climbs above about 102°F (39°C).", "Emphysema with CO₂ retention. Normally a rising CO₂ level is the signal to breathe. CO₂ retainers have adapted so that low oxygen — not high CO₂ — has become their drive to breathe. Flooding them with oxygen removes that stimulus and oxygen can act as a respiratory depressant, so these patients must be watched very carefully throughout their sessions.", "Doxorubicin (Adriamycin). This chemotherapy kills cancer cells partly by generating free radicals. HBOT raises tissue oxygen and can drive even more free-radical formation, heightening oxidative damage to healthy tissue — especially the heart. Use lower PO₂ and/or antioxidant pre-treatment, coordinated with the oncology team.", "Cisplatin (cisplatinum). Works by causing DNA damage and also generates reactive oxygen species (ROS), with depletion of the antioxidant enzyme SOD. Because HBOT further raises ROS, it can add oxidative damage to normal tissue already stressed by chemotherapy. Lower PO₂ and antioxidant support should be considered beforehand, with the oncology team.", "Disulfiram (Antabuse). May alter how the body handles oxygen, making tissue more susceptible to oxygen toxicity. Such patients can still be treated, but start at lower PO₂ to precondition them to tolerate the higher PO₂ of HBOT.", "Optic neuritis. The optic nerve has very high metabolic activity and is highly sensitive to oxidative stress. HBOT may ultimately help by reducing inflammation and healing nerve damage, but should be approached with lower PO₂ initially, building slowly only if needed.", "Congenital spherocytosis. The red cells are abnormally shaped (spherical rather than the usual biconcave disc) and more prone to haemolysis. HBOT's oxidative stress can accelerate destruction of these fragile cells, so a slow-and-low pressure approach is advised to reduce the risk.", "History of middle-ear surgery or disorders. Scar tissue or a less compliant eardrum makes equalising harder. Descend (pressurise) slowly and watch closely for signs of middle-ear squeeze.", "History of seizures / epilepsy. Convulsions are a sign of CNS oxygen toxicity, so HBOT could in theory trigger a seizure — yet there is also evidence it reduces seizure frequency and intensity in epilepsy. PO₂ is typically kept around 1.25–1.5, and higher PO₂ is avoided unless necessary. If a seizure occurs in the chamber, the first step is to remove the oxygen source and get the person onto air, and — most importantly — the pressure must never be changed until the tonic phase of the seizure is over and the person is resting comfortably.", "Pregnancy. There is no obvious direct contraindication, but — as with many therapies — there is not enough evidence to confirm safety in pregnancy. HBOT is used at various stages of pregnancy in some countries outside the US; within the US it is treated as a contraindication unless another condition genuinely requires HBOT and the risk–benefit balance has been properly assessed.", "Heart ejection fraction (EF) < 25%. A low EF signals advanced congestive heart failure — the heart already struggles to pump enough blood. Such patients are at greater risk of arrhythmias, pulmonary hypertension, pulmonary oedema and CNS oxygen toxicity. They may still benefit from HBOT, so a thoughtful low-and-slow protocol should be used with careful consideration."]}, {"t": "h3", "text": "Adverse Reactions"}, {"t": "p", "text": "Even when HBOT is appropriate, it can cause side effects. The main categories are oxygen toxicity, barotrauma, pneumothorax, ear/hearing disturbance, visual changes and confinement anxiety."}, {"t": "h4", "text": "Oxygen toxicity"}, {"t": "p", "text": "Oxygen is a drug, and like any drug the dose makes the poison. “Oxygen toxicity” means the harm that occurs when cells receive more oxygen than their antioxidant defences can handle, so reactive oxygen species (free radicals) build up faster than the body can neutralise them. Two quite different forms matter, and they are driven by different things: one by how high the oxygen pressure is (CNS toxicity), the other by how much oxygen is taken in over time (pulmonary toxicity). The single most important fact for understanding risk is that both rise steeply with pressure — which is why the pressure a chamber runs at largely determines how relevant they are."}, {"t": "p", "text": "CNS oxygen toxicity (the “Bert effect”): first described by Paul Bert, this affects the central nervous system and, in its extreme form, can cause a seizure. It is driven by a high oxygen partial pressure (PO₂) rather than by total dose, so it is fundamentally a function of pressure. Warning signs usually precede anything serious and are remembered by the mnemonic VENTID-C: Vision changes, Ear symptoms/ringing, Nausea, Twitching (classically of the lips or face), Irritability, Dizziness, and — the extreme end — Convulsions. Crucially, it is temporary and reversible: removing the oxygen (switching to air) settles it, and it rarely needs neurology input or medication. Carbon dioxide build-up tends to be the trigger, and certain conditions raise susceptibility. The quoted incidence in clinical practice is roughly 1 in 10,000 to 1 in 50,000 treatments — and almost all of that experience comes from treatment at 2.0 ATA and above. Below about 1.6 ATA it is very rarely seen at all."}, {"t": "p", "text": "Pulmonary oxygen toxicity (the “Lorrain Smith effect”): this affects the lungs and is the opposite kind of problem — not a sudden event at high pressure, but a slow, cumulative irritation that depends on the total oxygen dose breathed over time. It first shows as mild chest discomfort or a dry cough and, if exposure continued for many hours, a measurable dip in lung vital capacity. It too is reversible once exposure stops. The cumulative dose is tracked in Oxygen Tolerance Units (OTUs, historically UPTD), calculated from the oxygen pressure and the minutes breathed. Two reference points are widely used: about 615 OTU is associated with a small (~2%) reduction in vital capacity, and about 1,425 OTU with a larger (~10%) reduction — the figure usually treated as a single-exposure ceiling. For scale, breathing 100% oxygen at 1 ATA for one minute is, by definition, one OTU."}, {"t": "callout", "label": "What this means at our operating pressures (1.5 ATA, up to 2.0 ATA)", "text": "Because we run our chambers at around 1.5 ATA — and at most 2.0 ATA — oxygen toxicity is not a practical concern for normal client sessions. CNS toxicity is essentially a high-pressure phenomenon: the clinical research on it is conducted at 2.0 ATA and above, and it is very rarely seen below about 1.6 ATA. A standard session at 1.5 ATA sits comfortably inside even the conservative diving exposure limits.\nPulmonary toxicity is about hours of cumulative oxygen, not the length of a normal visit. As the table below shows, at 1.5 ATA on 100% oxygen a person would need to breathe oxygen continuously for the best part of six hours before even a mild (2%) lung effect would be expected, and around thirteen hours to approach the single-exposure ceiling. A typical 60–90 minute session is a small fraction of that.\nThese figures assume pure (100%) oxygen, which is the worst case for toxicity. If oxygen is delivered from a concentrator (~90–95%) or as an enriched mix, the partial pressure is lower and the safety margin is larger still."}, {"t": "p", "text": "The table puts numbers on it. It shows, for continuous 100% oxygen at our two pressures, how long it would take to reach each pulmonary-toxicity reference point, and how little of that a normal session uses."}, {"t": "table", "head": ["Pressure (100% O₂)", "Time to a mild lung effect (~2% VC, 615 OTU)", "Time to single-exposure ceiling (~10% VC, 1,425 OTU)", "A normal 90-min session"], "rows": [["1.5 ATA", "~5.8 hours continuous", "~13.4 hours continuous", "≈160 OTU — about 11% of the ceiling"], ["2.0 ATA", "~4.1 hours continuous", "~9.5 hours continuous", "≈224 OTU — about 16% of the ceiling"]]}, {"t": "p", "text": "In other words, even at our upper pressure of 2.0 ATA, a person would have to stay on pure oxygen for around four hours before a mild, reversible lung effect would be expected — roughly three to four back-to-back sessions without any air breaks — and far longer to approach the ceiling. At our usual 1.5 ATA the margin is larger again. For the session lengths clients actually do, neither form of oxygen toxicity is a realistic risk."}, {"t": "p", "text": "Two sensible caveats remain, for completeness. First, this is about the oxygen dose only — the relative contraindications listed earlier (for example a history of seizures, where even low PO₂ warrants care) still apply regardless of pressure. Second, “very low risk” is not the same as “impossible”; staff should still recognise the early warning signs and know that the response to any concern is simply to take the person off oxygen and onto air."}, {"t": "callout", "label": "Air breaks", "text": "Scheduling short periods of breathing ordinary air partway through an oxygen session lowers the cumulative oxygen dose and gives the brain and lungs a brief rest, reducing both forms of oxygen-toxicity risk. At higher clinical pressures (2.0 ATA and above) they are an important routine safeguard; at the gentle pressures we use they add an extra margin of safety on top of an already very low baseline risk, and may also enhance the therapeutic effect (the hyperoxic–hypoxic paradox)."}, {"t": "h4", "text": "Barotrauma"}, {"t": "p", "text": "Barotrauma is pressure-related injury to air-containing spaces when pressure changes faster than they can equalise. The most common site is the middle ear (the tympanic membrane), but sinuses and the lungs can also be affected."}, {"t": "ul", "items": ["Ear (aural) barotrauma — the most frequent side effect; managed by teaching equalisation techniques (e.g. the Valsalva manoeuvre) and descending slowly. Middle-ear injury is graded (the TEED scale).", "Sinus barotrauma — congestion blocks sinus openings, causing pain on pressure change.", "Pulmonary barotrauma — over-expansion of trapped lung gas; can lead to pneumothorax."]}, {"t": "h4", "text": "Pneumothorax (including tension pneumothorax)"}, {"t": "p", "text": "Air in the pleural cavity collapses the lung. In an open pneumothorax air accumulates and presses on the lung; a tension pneumothorax is worse — air enters but cannot escape, building pressure that compresses the heart and lungs. Signs include chest discomfort, breathlessness, coughing, bluish skin, fatigue and a rapid heart rate; it is a medical emergency. This is why an untreated pneumothorax is the absolute contraindication."}, {"t": "h4", "text": "Ear and hearing disturbances; visual changes"}, {"t": "ul", "items": ["Ear/hearing disturbances — pressure effects on the middle ear can cause temporary hearing changes.", "Reversible myopia and lens changes — courses of HBOT can temporarily shift vision toward short-sightedness and, with very long exposure, contribute to cataract changes. The myopic shift typically reverses after treatment ends."]}, {"t": "h4", "text": "Confinement anxiety"}, {"t": "p", "text": "Some patients find the enclosed chamber distressing. This is managed with preparation, reassurance and, where appropriate, choice of chamber type."}, {"t": "h3", "text": "Drug Interactions"}, {"t": "p", "text": "Certain medicines change HBOT's risk profile, mainly by amplifying oxidative damage or oxygen toxicity. Key examples:"}, {"t": "ul", "items": ["Doxorubicin (Adriamycin) — generates free radicals; combined with HBOT this can increase toxicity to healthy tissue, particularly the heart. Requires special care.", "Cisplatin — works by causing DNA damage in cancer cells, but with HBOT can increase harm to normal tissues, especially tissue already affected by chemotherapy.", "Disulfiram (Antabuse) — can interfere with the body's oxidative/antioxidant handling, altering HBOT's effects.", "Bleomycin — historically associated with serious pulmonary risk in the context of high oxygen exposure.", "Mafenide acetate (Sulfamylon) — a topical agent that can affect local tissue oxygen handling and was historically the one FDA-recognised drug interaction of note."]}, {"t": "p", "text": "The practical lesson: always review a patient's medication list before HBOT, because some drugs make tissues more susceptible to oxygen toxicity or oxidative injury."}, {"t": "h3", "text": "Key Terms"}, {"t": "table", "head": ["Term", "Definition"], "rows": [["Absolute contraindication", "A condition where treatment must not be given. The book lists three: tension pneumothorax, active bronchospasm, and a non-compliant eardrum (until corrected)."], ["Relative contraindication", "A condition where treatment may proceed only with caution, preparation or monitoring."], ["Pneumothorax", "Air in the pleural cavity collapsing the lung; expands dangerously under changing pressure."], ["Tension pneumothorax", "Severe pneumothorax where air enters but cannot escape, compressing heart and lungs — an emergency."], ["Oxygen toxicity", "Harm from too much oxygen for too long; affects the CNS and the lungs."], ["Bert effect", "CNS oxygen toxicity; can cause seizures; usually reversible when oxygen is stopped."], ["Lorrain Smith effect", "Pulmonary (lung) oxygen toxicity from prolonged exposure."], ["OTU / UPTD", "Oxygen Tolerance Units — the cumulative oxygen-dose measure (threshold cited ~1,440 OTUs)."], ["Air break", "A scheduled period of breathing air during a session to lower cumulative oxygen dose."], ["Barotrauma", "Pressure injury to air-filled spaces (ear, sinus, lung) when equalisation lags pressure change."], ["Valsalva manoeuvre", "A technique to equalise middle-ear pressure during descent."], ["Ejection fraction (EF)", "Percentage of blood the heart pumps per beat; EF < 25% signals advanced heart failure."], ["Reversible myopia", "Temporary short-sightedness that can develop over a course of HBOT and usually resolves afterwards."]]}, {"t": "h3", "text": "Clinical & Practical Points"}, {"t": "ul", "items": ["Screen for the three absolutes first — tension pneumothorax, active bronchospasm, and a non-compliant eardrum (until corrected). The common thread is trapped gas that cannot equalise.", "Review medications: doxorubicin, cisplatin, disulfiram, bleomycin and mafenide all raise risk.", "Delay treatment for fever or active upper-respiratory infection where reasonable.", "Manage ear barotrauma proactively: teach equalisation, descend slowly, watch high-risk ears.", "Use air breaks and track cumulative oxygen dose (OTUs) to limit oxygen toxicity.", "If a seizure occurs in the chamber, remove oxygen first and do not change pressure until the tonic phase ends.", "Reassure patients that myopic vision shifts are usually temporary, and screen for claustrophobia in advance."]}, {"t": "h3", "text": "Review Questions"}, {"t": "ul", "items": ["What is the single absolute contraindication to HBOT, and why is it so dangerous under pressure?", "Give the difference between an absolute and a relative contraindication, with an example of each.", "Name two forms of oxygen toxicity and the historical name and main organ affected by each.", "What unit measures cumulative oxygen dose, and what threshold is commonly cited for pulmonary toxicity?", "Describe the correct response to a seizure occurring during a session.", "Which air-containing space is most commonly affected by barotrauma, and how is the risk reduced?", "Distinguish an open pneumothorax from a tension pneumothorax.", "List four drugs that interact with HBOT and the general reason they raise risk.", "Why are fever and active upper-respiratory infection reasons to delay treatment?", "What is an air break and why does it improve safety?"]}]}, {"title": "Quick-Reference Summary", "blocks": [{"t": "p", "text": "Use this page as a one-look revision aid before assessments or shifts."}, {"t": "h3", "text": "The therapy in one line"}, {"t": "callout", "label": "", "text": "HBOT = oxygen given as a drug under pressure. Dose = pressure (ATA) × oxygen concentration × time. Pick the mechanism you want, set the dose to match, adjust for the individual, and respect the safety limits."}, {"t": "h3", "text": "Mechanisms → typical uses (cross-reference)"}, {"t": "table", "head": ["Term", "Definition"], "rows": [["Decreased bubble size", "Gas embolism, decompression sickness."], ["Hyperoxygenation", "CO poisoning, CRAO, severe anaemia, all wound/healing uses."], ["Reduced lipid peroxidation", "Neuroprotection, anti-oxidative conditioning, cancer discussion."], ["Vasoconstriction", "Crush injury, compartment syndrome, burns (oedema control)."], ["Reduced leukocyte adherence", "Reperfusion injury, inflammation control."], ["Toxin inhibition", "Gas gangrene, necrotising and anaerobic infections."], ["Leukocyte oxidative killing", "Infected/hypoxic wounds, osteomyelitis."], ["Antibiotic synergy", "Refractory infections (with antibiotics)."], ["Growth factor release", "Brain/nerve repair, radiation injury, grafts, regeneration."], ["Fibroblast / collagen", "Wound healing, graft survival."], ["Stem-cell proliferation", "Regeneration, neurological recovery, anti-aging."], ["Reverse transcriptase / telomerase", "Anti-aging (telomere lengthening)."], ["Reduced cytokine activity", "Inflammatory, autoimmune and pain conditions."]]}, {"t": "h3", "text": "Safety essentials"}, {"t": "ul", "items": ["Absolute contraindication: untreated pneumothorax.", "Top adverse reactions: oxygen toxicity (CNS/Bert, pulmonary/Lorrain Smith) and barotrauma (ear most common).", "Key safety tool: air breaks; track cumulative dose in OTUs (~1,440 OTU pulmonary threshold).", "High-risk drugs: doxorubicin, cisplatin, disulfiram, bleomycin, mafenide.", "Delay for: fever, active URI/congestion; extra caution in seizure history, pregnancy, low EF, ear surgery, claustrophobia."]}, {"t": "p", "text": "Prepared as original study material for the Oxydise education programme. Content has been summarised and rewritten for teaching; it is not a reproduction of the source text. Always defer to current clinical guidance, qualified supervision and each patient's full assessment when applying any protocol."}]}], "toc": true}, "r_templates": {"type": "templates", "title": "Template Library"}, "r_feedback": {"type": "improve", "title": "Website Feedback & Improvements", "blocks": [{"t": "p", "text": "One shared improvement board. Customer questions should become better website pages, FAQs, emails, templates, videos or sales scripts."}, {"t": "h3", "text": "Feedback card format"}, {"t": "ul", "items": ["Customer question; where it came from (call, delivery, email, WhatsApp, collection or general enquiry).", "Customer category; journey stage; current website page affected.", "Suggested improvement; urgency (Low / Medium / High).", "Owner (Egor / Giles / Sales / Olga / Petro); status (New / Reviewing / In progress / Done)."]}]}, "r_exceptions": {"type": "single", "title": "16. Exception Rules", "blocks": [{"t": "p", "text": "Most of what goes “off-process” is a commercial or safety exception. This page consolidates who can approve what, so nobody promises something they can’t. It is assembled from the approval lines already in the stages above."}, {"t": "table", "head": ["Exception", "Who approves", "Rule"], "rows": [["Discounts", "Directors", "Sales cannot promise. Record the request, get director approval, confirm in writing."], ["Payment terms / finance / direct debit", "Directors", "Approval before anything is promised; agreed terms communicated to Olga."], ["Refunds", "Directors", "Check terms, reason and approval before committing."], ["Free / friend / influencer installs", "Directors", "Approval required, and recorded as a £0 special job with a booking in/out record."], ["Urgent delivery before payment or outside process", "Directors", "Director approval; speak to Egor before promising anything."], ["High-net-worth or strategic B2B terms", "Directors", "Bring Alan / Egor into the conversation; do not improvise commercial terms."], ["Public use of a customer name or story", "Directors / Marketing", "Written consent and approved wording required (see §12 and Sales Call Bible §14)."], ["Sensitive or strong product claims", "Egor / Alan", "Must pass the Learning Portal §3 guardrails before any external use."], ["The principle\nIf it changes price, terms, safety or what we claim, it is an exception: record it, get the named approver, and confirm in writing. Every exception is logged.", "The principle\nIf it changes price, terms, safety or what we claim, it is an exception: record it, get the named approver, and confirm in writing. Every exception is logged.", "The principle\nIf it changes price, terms, safety or what we claim, it is an exception: record it, get the named approver, and confirm in writing. Every exception is logged."]]}, {"t": "p", "text": "[ Confirm before finalising: exact approval thresholds (e.g. discount %), refund windows and finance terms, and the named director/owner for each row. ]"}, {"t": "callout", "label": "Operating model", "text": ""}, {"t": "p", "text": "Who sees what, the homepage framing, and the single principle behind the whole system."}]}, "r_roles": {"type": "single", "title": "Role views: who owns what", "blocks": [{"t": "p", "text": "Each role should be able to see their own tasks across the journey without wading through everything else. The role labels below are the canonical owners; confirm the named person behind each role."}, {"t": "table", "head": ["Role", "Should see"], "rows": [["Sales", "New leads, follow-up calls, qualification, order-form chase, Day-2 check-in, rental-end decision, review / testimonial / referral, general-enquiry follow-up, relationship issues."], ["Olga (admin / accounts)", "Invoice, payment, forms, delivery booking, collection booking, accounting, stock admin, payment exceptions."], ["Driver", "Delivery ETA, install, test, setup video, customer training, delivery form, collection, photos, accessory check, stock movement."], ["Petro / Maintenance", "Maintenance tickets, fault severity, photos/videos, repair / replacement, safety concerns, root cause, equipment status."], ["Egor / Alan (operations / strategy)", "Website feedback, education library, content strategy, journey improvements, stock / product issues, special jobs, strategic exceptions."], ["Giles (marketing)", "Templates, approved wording, brand consistency, email nurture, website content, education content, marketing calendar and performance."], ["Directors", "Discount approvals, payment terms, refunds, serious complaints, free installs, influencer / athlete / special jobs, high-value B2B, product-launch approvals."]]}, {"t": "p", "text": "[ Confirm the canonical role → person mapping: the draft uses several names interchangeably (e.g. Sales as Kris/Ricky, Driver as Petro/Paulo, marketing as Giles/Ricardo). Lock one name per role so the filter is unambiguous. ]"}]}, "r_rules": {"type": "single", "title": "How the system works", "blocks": [{"t": "h3", "text": "Global operating rules"}, {"t": "p", "text": "These rules apply across every stage and every role."}, {"t": "table", "head": ["Rule", "Meaning"], "rows": [["Every customer has an owner", "No lead, order, rental, issue or collection should be ownerless."], ["Every customer has a next action", "If there is no next-action date, the process is broken."], ["CRM is the source of truth", "WhatsApp and email are communication tools, not the official record."], ["Use approved templates", "Especially for medical, safety, protocol and product claims. Approved wording lives in the three reference documents."], ["Do not make medical claims", "Explain approved mechanisms only, to the standard “confident about mechanisms, responsible about outcomes, clear about safety.” Do not diagnose, advise treatment or promise outcomes."], ["Every exception is logged", "If something goes wrong, record the owner, action and resolution."], ["Stock must match reality", "Equipment cannot move without stock status and equipment ID being updated."], ["Customer feedback improves the website", "Questions from calls, delivery and support should become better FAQs, emails, videos, templates or scripts."], ["The three reference documents\nThis operating system says what must happen at each stage. For the words we actually use with customers, it points to the three companion documents:\nHBOT Study Guide - the full science behind the technology.\nColleague Learning Portal - claim guardrails (§3), the plain-English decoder, equipment and competitor-safe language.\nSales Call Bible - first calls, discovery, objection handling, follow-up and the customer-facing scripts.\nWhenever a stage says “approved wording” or “approved guidance”, that is where it comes from.", "The three reference documents\nThis operating system says what must happen at each stage. For the words we actually use with customers, it points to the three companion documents:\nHBOT Study Guide - the full science behind the technology.\nColleague Learning Portal - claim guardrails (§3), the plain-English decoder, equipment and competitor-safe language.\nSales Call Bible - first calls, discovery, objection handling, follow-up and the customer-facing scripts.\nWhenever a stage says “approved wording” or “approved guidance”, that is where it comes from."], ["Customer Journey", "Customer Journey"]]}, {"t": "p", "text": "Stages 1–7 follow a customer from first contact through delivery, rental, collection and beyond, plus the general-enquiry route."}, {"t": "h3", "text": "How to use this document"}, {"t": "p", "text": "This is the operating system for the whole team: how customers, orders, rentals, stock, maintenance, new products and marketing move through Oxydise. Each stage answers the same six questions, so anyone can pick up any stage and know what to do. It is meant to be a practical operating guide, not a long SOP nobody reads."}, {"t": "callout", "label": "How to review this draft", "text": "Comment on the section that relates to your role first.\nFlag anything wrong, missing, too complicated or unclear; where a step says “to confirm”, suggest the correct process or owner.\nDon’t rewrite the whole system - focus on making each stage practical and usable. Items still needing a decision are flagged in red."}, {"t": "h3", "text": "The principle behind the system"}, {"t": "p", "text": "Don’t make the system big for the sake of it. Every stage answers six questions:"}, {"t": "ul", "items": ["What should the customer feel?", "What must I do?", "What does good look like?", "What do I do if it goes wrong?", "Which template do I use?", "What feedback should we capture to improve the website?"]}, {"t": "p", "text": "That gives Oxydise a proper operating system without overwhelming the team. The core rules never change: every customer has an owner; every customer has a next action; use approved templates; log every exception; keep the CRM and stock updated; and turn customer questions into better content."}]}},NAV=[{"label": "Start", "items": [{"id": "home", "label": "Overview"}, {"id": "r_rules", "label": "How the system works"}]}, {"label": "Customer Journey", "items": [{"id": "j1", "num": "1", "label": "Contact / Shopify to Order Form"}, {"id": "j2", "num": "2", "label": "Order Form to Delivery"}, {"id": "j3", "num": "3", "label": "Delivery"}, {"id": "j4", "num": "4", "label": "Rental Period"}, {"id": "j5", "num": "5", "label": "Collection"}, {"id": "j6", "num": "6", "label": "After Collection"}, {"id": "j7", "num": "7", "label": "General Enquiry"}, {"id": "j8", "num": "8", "label": "Accounting"}, {"id": "j9", "num": "9", "label": "Maintenance Requests and Broken Equipment"}, {"id": "j10", "num": "10", "label": "Stock and Warehouse"}]}, {"label": "Business Operations", "items": [{"id": "j11", "num": "11", "label": "Adding a New Product to the Product Range"}, {"id": "j12", "num": "12", "label": "Marketing Operations"}]}, {"label": "Resources", "items": [{"id": "r_templates", "label": "Template Library"}, {"id": "education", "label": "Oxydise Education"}, {"id": "sales", "label": "Sales Call Bible"}, {"id": "course", "label": "HBOT Course"}, {"id": "r_feedback", "label": "Feedback & Improvements"}, {"id": "r_exceptions", "label": "Exception Rules"}, {"id": "r_roles", "label": "Role views: who owns what"}]}],ROLES=[["all", "All"], ["sales", "Sales"], ["admin", "Admin"], ["driver", "Driver"], ["maintenance", "Maintenance"], ["egor", "Egor"], ["marketing", "Marketing"], ["alan", "Alan"], ["directors", "Directors"]],ROLE_RE={"sales": "\\bsales\\b", "admin": "\\b(admin|olga)\\b", "driver": "\\bdriver\\b", "maintenance": "\\b(maintenance|petro)\\b", "marketing": "\\b(marketing|giles)\\b", "egor": "\\begor\\b", "alan": "\\balan\\b", "directors": "\\b(director|directors)\\b"},ROLE_FOCUS={"sales": "New leads, follow-up calls, qualification, order-form chase, Day 2 check-i
